<!DOCTYPE html>
<html lang="en" data-theme="parchment">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Trials of Kirtas — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="theme.css">
  <style>
    /* --- page-scoped styles; relies on theme.css variables --- */
    html, body { height: 100%; }
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--ink-deep);
      color: var(--parchment);
      font-family: var(--font-body);
      padding: 1.5rem;
      box-sizing: border-box;
    }
    .login-card {
      width: 100%;
      max-width: 380px;
      background: var(--section-bg);
      border: 1px solid var(--section-border);
      border-radius: 10px;
      padding: 2.25rem 2rem 2rem;
      box-shadow: 0 18px 50px rgba(0,0,0,0.55);
    }
    .login-title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      color: var(--gold);
      text-align: center;
      margin: 0 0 0.35rem;
      letter-spacing: 0.5px;
    }
    .login-sub {
      font-family: var(--font-title);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      text-align: center;
      margin: 0 0 1.75rem;
    }
    label {
      display: block;
      font-family: var(--font-title);
      font-size: 0.72rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      background: var(--ink);
      border: 1px solid var(--section-border);
      border-radius: 6px;
      color: var(--parchment);
      font-family: var(--font-body);
      font-size: 1rem;
      padding: 0.7rem 0.8rem;
      margin-bottom: 1.1rem;
      transition: border-color 0.15s ease;
    }
    input:focus { outline: none; border-color: var(--gold); }
    /* the 6-digit code field reads better spaced out and centered */
    #code {
      text-align: center;
      letter-spacing: 0.5em;
      font-size: 1.3rem;
      padding-left: 0.5em; /* compensate for letter-spacing so it looks centered */
    }
    button {
      width: 100%;
      background: var(--gold);
      color: var(--ink-deep);
      font-family: var(--font-title);
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      border: none;
      border-radius: 6px;
      padding: 0.8rem;
      cursor: pointer;
      transition: opacity 0.15s ease;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.45; cursor: default; }
    .link-btn {
      background: none;
      color: var(--muted);
      text-transform: none;
      letter-spacing: 0.5px;
      font-size: 0.8rem;
      padding: 0.6rem;
      margin-top: 0.4rem;
    }
    .link-btn:hover { color: var(--gold); opacity: 1; }
    .msg {
      font-size: 0.85rem;
      text-align: center;
      min-height: 1.2em;
      margin: 0 0 1rem;
      line-height: 1.4;
    }
    .msg.error { color: var(--danger, #c0504a); }
    .msg.info  { color: var(--muted); }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="login-card">
    <h1 class="login-title">Trials of Kirtas</h1>
    <p class="login-sub">Enter the Vale</p>

    <!-- STAGE 1: email -->
    <div id="stage-email">
      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="email" inputmode="email"
             placeholder="you@example.com" autofocus>
      <p id="msg-email" class="msg"></p>
      <button id="send-btn">Send code</button>
    </div>

    <!-- STAGE 2: code -->
    <div id="stage-code" class="hidden">
      <label for="code">8-digit code</label>
      <input id="code" type="text" inputmode="numeric" autocomplete="one-time-code"
             maxlength="8" placeholder="········">
      <p id="msg-code" class="msg"></p>
      <button id="verify-btn">Verify &amp; sign in</button>
      <button id="back-btn" class="link-btn">Use a different email</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
  (function () {
    'use strict';

    // --- project config (publishable key is safe to expose by design; RLS guards data) ---
    const SUPABASE_URL = 'https://cfthwspwpcfamgbfqzuq.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_12KUwzDbVvcar0zjh2KE6g_6IRBfmMJ';

    // where to land after a successful sign-in (change later as needed)
    const REDIRECT_AFTER_LOGIN = 'index.html';

    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // --- element refs ---
    const stageEmail = document.getElementById('stage-email');
    const stageCode  = document.getElementById('stage-code');
    const emailInput = document.getElementById('email');
    const codeInput  = document.getElementById('code');
    const sendBtn    = document.getElementById('send-btn');
    const verifyBtn  = document.getElementById('verify-btn');
    const backBtn    = document.getElementById('back-btn');
    const msgEmail   = document.getElementById('msg-email');
    const msgCode    = document.getElementById('msg-code');

    let currentEmail = '';

    function setMsg(el, text, kind) {
      el.textContent = text || '';
      el.className = 'msg' + (kind ? ' ' + kind : '');
    }

    // If already signed in, skip straight through.
    sb.auth.getSession().then(function (res) {
      if (res.data && res.data.session) {
        window.location.href = REDIRECT_AFTER_LOGIN;
      }
    });

    // --- STAGE 1: request the code ---
    async function sendCode() {
      const email = emailInput.value.trim();
      if (!email) { setMsg(msgEmail, 'Enter your email first.', 'error'); return; }

      sendBtn.disabled = true;
      setMsg(msgEmail, 'Sending code…', 'info');

      const { error } = await sb.auth.signInWithOtp({
        email: email,
        options: { shouldCreateUser: false } // only pre-provisioned players can log in
      });

      sendBtn.disabled = false;

      if (error) {
        setMsg(msgEmail, error.message || 'Could not send code.', 'error');
        return;
      }

      currentEmail = email;
      stageEmail.classList.add('hidden');
      stageCode.classList.remove('hidden');
      setMsg(msgCode, 'Code sent to ' + email, 'info');
      codeInput.focus();
    }

    // --- STAGE 2: verify the code ---
    async function verifyCode() {
      const token = codeInput.value.trim();
      if (token.length < 8) { setMsg(msgCode, 'Enter the 8-digit code.', 'error'); return; }

      verifyBtn.disabled = true;
      setMsg(msgCode, 'Verifying…', 'info');

      const { error } = await sb.auth.verifyOtp({
        email: currentEmail,
        token: token,
        type: 'email' // current type for an emailed sign-in code
      });

      verifyBtn.disabled = false;

      if (error) {
        setMsg(msgCode, error.message || 'Invalid or expired code.', 'error');
        return;
      }

      window.location.href = REDIRECT_AFTER_LOGIN;
    }

    function backToEmail() {
      stageCode.classList.add('hidden');
      stageEmail.classList.remove('hidden');
      codeInput.value = '';
      setMsg(msgCode, '');
      setMsg(msgEmail, '');
      emailInput.focus();
    }

    // --- wiring (Enter key works in both stages) ---
    sendBtn.addEventListener('click', sendCode);
    verifyBtn.addEventListener('click', verifyCode);
    backBtn.addEventListener('click', backToEmail);
    emailInput.addEventListener('keydown', function (e) { if (e.key === 'Enter') sendCode(); });
    codeInput.addEventListener('keydown', function (e) { if (e.key === 'Enter') verifyCode(); });
    // strip non-digits as they type the code
    codeInput.addEventListener('input', function () {
      codeInput.value = codeInput.value.replace(/\D/g, '');
    });
  })();
  </script>
</body>
</html>
