<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Opening The Forge…</title>
<meta name="robots" content="noindex">
<script>
(function(){
  var target=new URL('./',location.href);
  target.search=location.search;
  target.hash=location.hash;
  location.replace(target.href);
})();
</script>
</head>
<body>
  <p>Opening <a id="forgeLink" href="./">The Forge</a>…</p>
  <script>document.getElementById('forgeLink').href='./'+location.search+location.hash;</script>
</body>
</html>
