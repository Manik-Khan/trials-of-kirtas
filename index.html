<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Trials of Kirtas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="theme.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:       #c9a84c;
      --gold-hi:    #f0d878;
      --gold-dim:   #7a5e20;
      --gold-line:  #c8a030;
      --gold-mid:   rgba(201,168,76,0.3);
      --ink:        #0d0a06;
      --paper:      #e8d8b0;
      --muted:      #8a7050;
      --aged:       #5a4828;
      --font-title: 'Cinzel Decorative', serif;
      --font-nav:   'Cinzel', serif;
      --font-body:  'Crimson Pro', serif;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--ink);
      color: var(--paper);
      font-family: var(--font-body);
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999; opacity: 0.35;
    }

    .page {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    #bg-canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }

    .vignette {
      position: absolute; inset: 0; z-index: 1; pointer-events: none;
      background: radial-gradient(ellipse 75% 70% at 50% 52%, rgba(30,18,6,0) 30%, rgba(6,4,2,0.88) 100%);
    }

    .site-header {
      position: relative; z-index: 3;
      text-align: center;
      margin-bottom: 1.2rem;
      animation: fadeDown 0.9s ease both;
    }

    .site-title {
      font-family: var(--font-title);
      font-size: clamp(1.1rem, 2.5vw, 1.6rem);
      color: var(--gold-hi);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-shadow: 0 0 28px rgba(201,168,76,0.45), 2px 2px 0 rgba(0,0,0,0.8);
      margin-bottom: 0.3rem;
    }

    .title-rule {
      display: flex; align-items: center; gap: 0.6rem;
      max-width: 280px; margin: 0.4rem auto;
    }
    .title-rule::before, .title-rule::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    }
    .title-rule-diamond {
      width: 5px; height: 5px;
      background: var(--gold-dim); transform: rotate(45deg); flex-shrink: 0;
    }

    .site-sub {
      font-family: var(--font-nav);
      font-size: clamp(0.52rem, 1vw, 0.65rem);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Wheel stage ── */
    .wheel-stage {
      position: relative;
      z-index: 3;
      animation: fadeUp 0.9s 0.2s ease both;
      flex-shrink: 0;
    }

    #wheel-svg {
      display: block;
      /* overflow hidden so scaling slices are clipped by the outer ring mask */
      overflow: hidden;
    }

    /* Slice groups: scale from wheel center on hover */
    .slice-group {
      transform-box: fill-box;
      transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), filter 0.22s ease;
      filter: brightness(0.78) saturate(0.85);
    }
    .slice-group:hover,
    .slice-group.touch-active {
      filter: brightness(1.18) saturate(1.12);
    }

    /* Arc label text — curves along rim of each slice */
    .slice-label {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      fill: rgba(240,216,120,0);
      stroke: rgba(0,0,0,0);
      stroke-width: 3px;
      stroke-linejoin: round;
      paint-order: stroke fill;
      transition: fill 0.18s ease, stroke 0.18s ease;
      pointer-events: none;
    }
    .slice-group.label-visible .slice-label,
    .slice-group:hover .slice-label {
      fill: rgba(240,216,120,0.97);
      stroke: rgba(0,0,0,0.85);
    }
      stroke: rgba(0,0,0,0.85);
    }

    /* ── Description readout ── */
    .desc-readout {
      position: relative;
      z-index: 3;
      font-family: var(--font-body);
      font-style: italic;
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      margin-top: 1.8rem;
      min-height: 1.4em;
      pointer-events: none;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.9);
      transition: opacity 0.15s;
      animation: fadeUp 0.9s 0.3s ease both;
    }

    /* ── Footer hint ── */
    .page-hint {
      position: absolute;
      bottom: 1.8rem; left: 50%; transform: translateX(-50%);
      font-family: var(--font-nav);
      font-size: 0.52rem; letter-spacing: 0.3em;
      color: var(--aged); text-transform: uppercase;
      z-index: 3; white-space: nowrap;
      animation: pulse 2.8s ease-in-out infinite;
    }

    /* ── Nav override for index ── */
    #site-nav {
      position: absolute !important;
      top: 0; left: 0; right: 0;
      background: transparent !important;
      border-bottom: none !important;
      backdrop-filter: none !important;
    }
    #site-nav .nav-link { opacity: 0.5; }
    #site-nav .nav-link:hover { opacity: 1; }

    /* ── Sub-ring overlay ── */
    .sub-overlay {
      position: absolute; inset: 0;
      display: none; z-index: 4;
    }
    .sub-overlay.visible { display: block; }

    .hex-wrap {
      position: absolute;
      transform: translate(-50%, -50%);
      cursor: pointer;
      transition: transform 0.18s ease;
      filter: drop-shadow(1px 3px 6px rgba(0,0,0,0.65));
    }
    .hex-wrap:hover { transform: translate(-50%, -50%) scale(1.1); }
    .hex-wrap:hover .hex-body { filter: brightness(1.25); }
    .hex-wrap:hover .hex-label-sub { color: var(--gold-hi); }
    .hex-wrap.touch-active .hex-body { filter: brightness(1.35); }
    .hex-wrap.touch-active .hex-label-sub { color: var(--gold-hi); }

    .hex-body {
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 6px; position: relative;
      transition: filter 0.18s;
    }
    .hex-body::after {
      content: ''; position: absolute; inset: 0;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      background: linear-gradient(165deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0.04) 38%, transparent 60%);
      pointer-events: none; z-index: 2;
    }
    .hex-outline-svg { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 3; }
    .hex-icon-sub {
      font-size: 22px; line-height: 1; color: rgba(255,255,255,0.88);
      position: relative; z-index: 2; text-shadow: 1px 1px 0 rgba(0,0,0,0.8);
    }
    .hex-label-sub {
      font-family: var(--font-nav); font-size: 8px; letter-spacing: 0.14em;
      text-transform: uppercase; color: rgba(255,255,255,0.72);
      position: relative; z-index: 2; text-align: center; line-height: 1;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.9); transition: color 0.18s;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.25; }
      50%       { opacity: 0.65; }
    }
    @keyframes hexFadeIn {
      from { opacity: 0; transform: translate(-50%,-50%) scale(0.75); }
      to   { opacity: 1; transform: translate(-50%,-50%) scale(1); }
    }

    @media (max-width: 600px) {
      .site-header { margin-bottom: 0.5rem; }
      .site-title  { font-size: clamp(0.85rem, 4.5vw, 1.15rem); }
      .page-hint   { font-size: 0.44rem; letter-spacing: 0.18em; }
      #site-nav .nav-links { display: none; }
      .desc-readout { margin-top: 1rem; font-size: 11px; }
    }
  </style>
</head>
<body>

  <div id="nav-root"></div>

  <div class="page" id="page">
    <canvas id="bg-canvas"></canvas>
    <div class="vignette"></div>

    <header class="site-header">
      <h1 class="site-title">The Trials of Kirtas</h1>
      <div class="title-rule"><div class="title-rule-diamond"></div></div>
      <p class="site-sub">Campaign Compendium</p>
    </header>

    <div class="wheel-stage" id="wheel-stage">
      <svg id="wheel-svg" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <div class="desc-readout" id="desc-readout"></div>

    <p class="page-hint" id="page-hint">Hover to explore &nbsp;·&nbsp; Click to enter</p>
  </div>

  <script>
    // ─────────────────────────────────────────────
    // DATA
    // imgOffset: {x, y} shifts the image as a fraction of wheel size
    //   x: positive = right, negative = left
    //   y: positive = down,  negative = up
    // ─────────────────────────────────────────────
    const CDN = 'https://res.cloudinary.com/df0tgoiyb/image/upload/kirtas/icons';

    const NODES = [
      { id: 'party',      label: 'Party',      img: `${CDN}/party.png`,      imgOffset: { x: 0,     y: -0.15 }, imgScale: 1.2, desc: 'The adventurers of Kirtas',   href: 'party.html',      hasSubring: true, angle: -90 },
      { id: 'chronicle',  label: 'Chronicle',  img: `${CDN}/chronicle.jpg`,  imgOffset: { x: 0.15,  y: 0     }, desc: 'Session records & entries',   href: 'chronicle.html',  angle: -30 },
      { id: 'world',      label: 'World',      img: `${CDN}/world.png`,      imgOffset: { x: 0.15,  y: 0.05  }, desc: 'The living map of the realm', href: 'world.html',      angle: 30  },
      { id: 'compendium', label: 'Compendium', img: `${CDN}/compendium.png`, imgOffset: { x: 0,     y: 0.22  }, desc: 'Spells, items & creatures',   href: 'compendium.html', angle: 90  },
      { id: 'factions',   label: 'Factions',   img: `${CDN}/factions.jpg`,   imgOffset: { x: -0.3,  y: -0.04 }, desc: 'Powers shaping the age',     href: 'factions.html',   angle: 150 },
      { id: 'lore',       label: 'Lore',       img: `${CDN}/lore.png`,       imgOffset: { x: -0.25, y: -0.1  }, desc: 'History, myth & the arcane', href: 'lore.html',       angle: 210 },
    ];

    const CHARS = [
      { id: 'cosmere',   label: 'Cosmere',   icon: 'ti-bolt',      fill: '#301050', desc: 'Cosmere Runestar — Warlock / Sorcerer', href: 'sheet.html?character=tyros',     angle: -90  },
      { id: 'caim',      label: 'Caim',      icon: 'ti-hand-stop', fill: '#0d2e1a', desc: 'Caim — Monk, Way of Mercy',            href: 'sheet.html?character=caim',      angle: 0    },
      { id: 'liadan',    label: 'Líadan',    icon: 'ti-music',     fill: '#1c3808', desc: 'Líadan Luchóg — Bard',                 href: 'sheet.html?character=liadan',    angle: 90   },
      { id: 'vesperian', label: 'Vesperian', icon: 'ti-eye',       fill: '#0a2a3e', desc: 'Vesperian Vale',                       href: 'sheet.html?character=vesperian', angle: 180  },
    ];

    // ─────────────────────────────────────────────
    // LAYOUT
    // ─────────────────────────────────────────────
    const BASE = 420;

    function getLayout() {
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const available = Math.min(vw, vh - 210);
      const size = Math.min(BASE, available - 16);
      const scale = size / BASE;
      return {
        size,
        scale,
        cx:     size / 2,
        cy:     size / 2,
        R:      size / 2,
        rInner: size * 0.155,
        HW:     Math.round(78  * scale),
        HH:     Math.round(78  * scale),
        CHAR_R: Math.round(116 * scale),
        BW:     Math.round(66  * scale),
      };
    }

    // ─────────────────────────────────────────────
    // SVG HELPERS
    // ─────────────────────────────────────────────
    const NS = 'http://www.w3.org/2000/svg';
    function svgEl(tag, attrs = {}, parent) {
      const el = document.createElementNS(NS, tag);
      for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
      if (parent) parent.appendChild(el);
      return el;
    }

    function polarToXY(angleDeg, r, cx, cy) {
      const rad = angleDeg * Math.PI / 180;
      return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
    }

    function wedgePath(cx, cy, rInner, rOuter, startDeg, endDeg) {
      const s1 = polarToXY(startDeg, rOuter, cx, cy);
      const e1 = polarToXY(endDeg,   rOuter, cx, cy);
      const s2 = polarToXY(endDeg,   rInner, cx, cy);
      const e2 = polarToXY(startDeg, rInner, cx, cy);
      const large = (endDeg - startDeg) > 180 ? 1 : 0;
      return [
        `M ${s1.x} ${s1.y}`,
        `A ${rOuter} ${rOuter} 0 ${large} 1 ${e1.x} ${e1.y}`,
        `L ${s2.x} ${s2.y}`,
        `A ${rInner} ${rInner} 0 ${large} 0 ${e2.x} ${e2.y}`,
        'Z'
      ].join(' ');
    }

    // Arc path for textPath labels.
    // SVG coords: 0deg=right, 90deg=DOWN. Text on a CW arc (sweep=1) reads
    // left-to-right only when the arc traverses the TOP half of the circle.
    // Top half = normalized mid angle outside 0..180 (i.e. 180..360).
    // Slices with mid in 0..180 (world, compendium, factions) need a CCW arc
    // (swap endpoints, sweep=0) so text reads correctly.
    function arcPath(cx, cy, r, startDeg, endDeg) {
      const mid = ((startDeg + endDeg) / 2 + 360) % 360; // normalize 0-360
      const needsCCW = mid > 0 && mid < 180;
      let a, b, sweep;
      if (needsCCW) {
        a = endDeg; b = startDeg; sweep = 0;
      } else {
        a = startDeg; b = endDeg; sweep = 1;
      }
      const p1 = polarToXY(a, r, cx, cy);
      const p2 = polarToXY(b, r, cx, cy);
      return `M ${p1.x} ${p1.y} A ${r} ${r} 0 0 ${sweep} ${p2.x} ${p2.y}`;
    }

    // ─────────────────────────────────────────────
    // BUILD WHEEL
    // ─────────────────────────────────────────────
    const svg   = document.getElementById('wheel-svg');
    const stage = document.getElementById('wheel-stage');
    const descEl = document.getElementById('desc-readout');

    let _touchActive = null;
    function clearTouchActive() {
      if (_touchActive) {
        _touchActive.classList.remove('touch-active');
        _touchActive.classList.remove('label-visible');
        _touchActive.style.transform = '';
        _touchActive = null;
        descEl.textContent = '';
      }
    }

    // Tapping anywhere outside a slice clears the active label
    document.addEventListener('touchstart', e => {
      if (_touchActive && !_touchActive.contains(e.target)) {
        clearTouchActive();
      }
    }, { passive: true });

    function buildWheel() {
      while (svg.firstChild) svg.removeChild(svg.firstChild);
      stage.querySelectorAll('.sub-overlay').forEach(e => e.remove());

      const layout = getLayout();
      const { size, cx, cy, R, rInner } = layout;

      svg.setAttribute('width',   size);
      svg.setAttribute('height',  size);
      svg.setAttribute('viewBox', `0 0 ${size} ${size}`);
      // overflow hidden so scaled slices are clipped by the circular mask
      svg.style.overflow = 'hidden';

      const defs = svgEl('defs', {}, svg);

      // ── Circular mask for the whole wheel — clips scaled slices at the edge ──
      const maskId = 'wheel-mask';
      const mask = svgEl('clipPath', { id: maskId }, defs);
      svgEl('circle', { cx, cy, r: R }, mask);

      // ── Master group clipped to circle ──
      const wheelGroup = svgEl('g', { 'clip-path': `url(#${maskId})` }, svg);

      const GAP   = 0.8;
      const SLICE = 360 / NODES.length; // 60°

      // Label text radius — near the outer rim
      const rText = R * 0.92;

      NODES.forEach((node) => {
        const midAngle = node.angle;
        const startDeg = midAngle - SLICE / 2 + GAP;
        const endDeg   = midAngle + SLICE / 2 - GAP;
        const off      = node.imgOffset || { x: 0, y: 0 };

        // ── clipPath for image ──
        const clipId = `clip-${node.id}`;
        const clip   = svgEl('clipPath', { id: clipId }, defs);
        svgEl('path', { d: wedgePath(cx, cy, rInner, R, startDeg, endDeg) }, clip);

        // ── Arc path for textPath label (inside defs) ──
        const arcId = `arc-${node.id}`;
        svgEl('path', {
          id: arcId,
          d:  arcPath(cx, cy, rText, startDeg, endDeg),
          fill: 'none',
        }, defs);

        // ── Image — offset and optional scale applied ──
        // imgScale > 1 makes the image larger (zooms out the subject).
        // We expand the image by imgScale and re-center it so the subject
        // appears smaller/further away inside the slice.
        const sc    = node.imgScale || 1;
        const iW    = size * sc;
        const iH    = size * sc;
        const iX    = off.x * size - (iW - size) / 2;
        const iY    = off.y * size - (iH - size) / 2;
        const imgEl = svgEl('image', {
          href:                node.img,
          x:                   iX,
          y:                   iY,
          width:               iW,
          height:              iH,
          preserveAspectRatio: 'xMidYMid slice',
          'clip-path':         `url(#${clipId})`,
        });

        // ── Dark overlay ──
        const overlayPath = svgEl('path', {
          d:           wedgePath(cx, cy, rInner, R, startDeg, endDeg),
          fill:        'rgba(0,0,0,0.3)',
          'clip-path': `url(#${clipId})`,
        });

        // ── Arc label text — curved along slice ──
        const labelText = svgEl('text', { class: 'slice-label' });
        const tp = svgEl('textPath', {
          href:           `#${arcId}`,
          startOffset:    '50%',
          'text-anchor':  'middle',
        });
        tp.textContent = node.label;
        labelText.appendChild(tp);

        // ── Hit area ──
        const hitPath = svgEl('path', {
          d:     wedgePath(cx, cy, rInner, R, startDeg, endDeg),
          fill:  'transparent',
          stroke: 'none',
          style: 'cursor:pointer',
        });

        // ── Group ──
        const group = svgEl('g', { class: 'slice-group' });
        group.style.transformOrigin = `${cx}px ${cy}px`;

        group.appendChild(imgEl);
        group.appendChild(overlayPath);
        group.appendChild(labelText);
        group.appendChild(hitPath);
        wheelGroup.appendChild(group);

        // ── Gold divider line ──
        const edgePt1 = polarToXY(midAngle - SLICE / 2, rInner, cx, cy);
        const edgePt2 = polarToXY(midAngle - SLICE / 2, R,      cx, cy);
        svgEl('line', {
          x1: edgePt1.x, y1: edgePt1.y,
          x2: edgePt2.x, y2: edgePt2.y,
          stroke: 'rgba(201,168,76,0.45)', 'stroke-width': '1.5',
          'pointer-events': 'none',
        }, wheelGroup);

        // ── Events ──
        function onEnter() {
          group.style.transform = 'scale(1.06)';
          group.classList.add('label-visible');
          descEl.textContent = node.desc;
        }
        function onLeave() {
          group.style.transform = '';
          group.classList.remove('label-visible');
          descEl.textContent = '';
        }

        group.addEventListener('mouseenter', onEnter);
        group.addEventListener('mouseleave', onLeave);
        group.addEventListener('click', () => {
          if (node.hasSubring) buildSub(layout);
          else window.location.href = node.href;
        });
        group.addEventListener('touchstart', e => {
          e.preventDefault();
          if (_touchActive === group) {
            clearTouchActive();
            if (node.hasSubring) { buildSub(layout); return; }
            window.location.href = node.href;
          } else {
            clearTouchActive();
            _touchActive = group;
            group.classList.add('touch-active');
            group.style.transform = 'scale(1.06)';
            group.classList.add('label-visible');
            descEl.textContent = node.desc;
          }
        }, { passive: false });
      });

      // ── Gold outer ring (above the mask group, not clipped) ──
      svgEl('circle', {
        cx, cy, r: R - 1,
        fill: 'none', stroke: 'rgba(201,168,76,0.6)', 'stroke-width': '2',
        'pointer-events': 'none',
      }, svg);

      // ── Inner ring ──
      svgEl('circle', {
        cx, cy, r: rInner,
        fill: FILLS.center, stroke: 'rgba(201,168,76,0.7)', 'stroke-width': '1.5',
        'pointer-events': 'none',
      }, svg);

      // ── Center crest ──
      buildCrest(cx, cy, rInner);
    }

    // ─────────────────────────────────────────────
    // CENTER CREST
    // ─────────────────────────────────────────────
    const FILLS = { center: '#2a1c08', back: '#1a1208' };

    function buildCrest(cx, cy, r) {
      const g = svgEl('g', { style: 'pointer-events:none' }, svg);
      const sc = (r * 2) / 90;
      g.setAttribute('transform', `translate(${cx - r}, ${cy - r}) scale(${sc})`);
      g.innerHTML = `
        <defs>
          <clipPath id="lhc"><rect x="0" y="0" width="45" height="90"/></clipPath>
          <clipPath id="rhc"><rect x="45" y="0" width="45" height="90"/></clipPath>
        </defs>
        <circle cx="45" cy="45" r="32" fill="none" stroke="rgba(180,140,40,0.22)" stroke-width="8"/>
        <circle cx="45" cy="45" r="32" fill="none" stroke="rgba(180,140,40,0.55)" stroke-width="1.5"/>
        <circle cx="45" cy="45" r="24" fill="none" stroke="rgba(200,160,50,0.3)" stroke-width="1"/>
        <line x1="45" y1="14" x2="45" y2="76" stroke="rgba(201,168,76,0.28)" stroke-width="0.8" stroke-dasharray="2,3"/>
        <g clip-path="url(#lhc)">
          <path d="M45,24 L30,42 L45,37 Z" fill="rgba(70,110,230,0.5)" stroke="rgba(80,130,250,0.8)" stroke-width="1.2"/>
          <circle cx="45" cy="58" r="5" fill="none" stroke="rgba(80,130,250,0.55)" stroke-width="1.5"/>
        </g>
        <g clip-path="url(#rhc)">
          <path d="M45,24 L60,42 L45,37 Z" fill="rgba(220,80,40,0.5)" stroke="rgba(245,90,40,0.8)" stroke-width="1.2"/>
          <rect x="41" y="53" width="8" height="11" rx="1" fill="none" stroke="rgba(245,90,40,0.55)" stroke-width="1.5"/>
        </g>
        <circle cx="45" cy="45" r="4.5" fill="rgba(215,175,60,0.9)" stroke="rgba(255,220,80,1)" stroke-width="1"/>
        <text x="45" y="83" text-anchor="middle" font-family="Cinzel,serif" font-size="5" fill="rgba(201,168,76,0.55)" letter-spacing="2">KIRTAS</text>
      `;
    }

    // ─────────────────────────────────────────────
    // CHARACTER SUB-RING
    // ─────────────────────────────────────────────
    function hexPos(angleDeg, r, cx, cy) {
      const rad = (angleDeg - 90) * Math.PI / 180;
      return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
    }

    function makeOutline(w, h, goldOpacity = 0.72) {
      const pts = `${w/2},0 ${w},${h*0.25} ${w},${h*0.75} ${w/2},${h} 0,${h*0.75} 0,${h*0.25}`;
      const s = document.createElementNS(NS, 'svg');
      s.setAttribute('width', w); s.setAttribute('height', h);
      s.setAttribute('viewBox', `0 0 ${w} ${h}`);
      s.classList.add('hex-outline-svg');
      s.appendChild(svgEl('polygon', { points: pts, fill: 'none', stroke: 'rgba(0,0,0,0.9)', 'stroke-width': '6', 'stroke-linejoin': 'miter' }));
      s.appendChild(svgEl('polygon', { points: pts, fill: 'none', stroke: `rgba(201,168,76,${goldOpacity})`, 'stroke-width': '2.5' }));
      s.appendChild(svgEl('polygon', { points: pts, fill: 'none', stroke: 'rgba(255,230,120,0.15)', 'stroke-width': '1' }));
      return s;
    }

    function makeHexNode(node, w, h) {
      const wrap = document.createElement('div');
      wrap.className = 'hex-wrap';
      wrap.style.cssText = `width:${w}px;height:${h}px;`;
      const body = document.createElement('div');
      body.className = 'hex-body';
      body.style.cssText = `width:${w}px;height:${h}px;background:${node.fill};`;
      const ic = document.createElement('i');
      ic.className = `ti ${node.icon} hex-icon-sub`;
      ic.setAttribute('aria-hidden', 'true');
      const lbl = document.createElement('span');
      lbl.className = 'hex-label-sub';
      lbl.textContent = node.label;
      body.appendChild(ic); body.appendChild(lbl);
      wrap.appendChild(body);
      wrap.appendChild(makeOutline(w, h));
      return wrap;
    }

    function buildSub(layout) {
      const { size, HW, HH, cx, cy, CHAR_R, BW } = layout;
      svg.style.opacity = '0.08';
      svg.style.pointerEvents = 'none';
      svg.style.transition = 'opacity 0.2s';
      clearTouchActive();

      const ov = document.createElement('div');
      ov.className = 'sub-overlay visible';
      ov.style.cssText = `width:${size}px;height:${size}px;position:absolute;top:0;left:0;`;

      let _subTouch = null;
      CHARS.forEach(ch => {
        const pos  = hexPos(ch.angle, CHAR_R, cx, cy);
        const wrap = makeHexNode(ch, HW, HH);
        wrap.style.cssText += `position:absolute;left:${pos.x}px;top:${pos.y}px;animation:hexFadeIn 0.22s ease forwards;`;
        wrap.addEventListener('mouseenter', () => { descEl.textContent = ch.desc; });
        wrap.addEventListener('mouseleave', () => { descEl.textContent = ''; });
        wrap.addEventListener('click', () => { window.location.href = ch.href; });
        wrap.addEventListener('touchstart', e => {
          e.preventDefault();
          if (_subTouch === wrap) { window.location.href = ch.href; }
          else {
            if (_subTouch) _subTouch.classList.remove('touch-active');
            _subTouch = wrap; wrap.classList.add('touch-active');
            descEl.textContent = ch.desc;
          }
        }, { passive: false });
        ov.appendChild(wrap);
      });

      const bWrap = document.createElement('div');
      bWrap.className = 'hex-wrap';
      bWrap.style.cssText = `position:absolute;left:${cx}px;top:${cy}px;width:${BW}px;height:${BW}px;animation:hexFadeIn 0.22s ease forwards;`;
      const bBody = document.createElement('div');
      bBody.className = 'hex-body';
      bBody.style.cssText = `width:${BW}px;height:${BW}px;background:${FILLS.back};`;
      const bIc = document.createElement('i'); bIc.className = 'ti ti-arrow-left hex-icon-sub'; bIc.style.fontSize = '16px';
      const bLbl = document.createElement('span'); bLbl.className = 'hex-label-sub'; bLbl.textContent = 'Back';
      bBody.appendChild(bIc); bBody.appendChild(bLbl);
      bWrap.appendChild(bBody); bWrap.appendChild(makeOutline(BW, BW, 0.35));
      function doBack() { ov.remove(); svg.style.opacity = ''; svg.style.pointerEvents = ''; descEl.textContent = ''; }
      bWrap.addEventListener('mouseenter', () => { descEl.textContent = 'Return to main menu'; });
      bWrap.addEventListener('mouseleave', () => { descEl.textContent = ''; });
      bWrap.addEventListener('click', doBack);
      bWrap.addEventListener('touchstart', e => { e.preventDefault(); doBack(); }, { passive: false });
      ov.appendChild(bWrap);
      stage.appendChild(ov);
    }

    // ─────────────────────────────────────────────
    // BACKGROUND
    // ─────────────────────────────────────────────
    function paintBackground() {
      const canvas = document.getElementById('bg-canvas');
      canvas.width = window.innerWidth; canvas.height = window.innerHeight;
      const ctx = canvas.getContext('2d');
      const W = canvas.width, H = canvas.height;
      const base = ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.65);
      base.addColorStop(0,'#2e1a08'); base.addColorStop(0.35,'#1c1006');
      base.addColorStop(0.7,'#100a04'); base.addColorStop(1,'#080502');
      ctx.fillStyle = base; ctx.fillRect(0,0,W,H);
      const g2 = ctx.createRadialGradient(W*0.15,H*0.18,0,W*0.15,H*0.18,W*0.4);
      g2.addColorStop(0,'rgba(40,60,140,0.14)'); g2.addColorStop(1,'transparent');
      ctx.fillStyle = g2; ctx.fillRect(0,0,W,H);
      const g3 = ctx.createRadialGradient(W*0.85,H*0.82,0,W*0.85,H*0.82,W*0.35);
      g3.addColorStop(0,'rgba(140,70,20,0.12)'); g3.addColorStop(1,'transparent');
      ctx.fillStyle = g3; ctx.fillRect(0,0,W,H);
      for (let i=0;i<280;i++) {
        const x=Math.random()*W,y=Math.random()*H,bright=Math.random();
        const sz=bright>0.94?1.5:bright>0.72?1:0.5,alpha=Math.random()*0.45+0.06;
        ctx.fillStyle=`rgba(${220+Math.random()*20|0},${200+Math.random()*15|0},${155+Math.random()*20|0},${alpha})`;
        ctx.fillRect(Math.round(x),Math.round(y),sz,sz);
      }
    }

    // ─────────────────────────────────────────────
    // INIT
    // ─────────────────────────────────────────────
    const isTouchDevice = () => window.matchMedia('(hover: none)').matches;
    function updateHint() {
      const hint = document.getElementById('page-hint');
      if (hint) hint.textContent = isTouchDevice() ? 'Tap to reveal · Tap again to enter' : 'Hover to explore · Click to enter';
    }

    function init() { paintBackground(); buildWheel(); updateHint(); }

    if (!document.querySelector('link[href*="tabler-icons"]')) {
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = 'https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css';
      document.head.appendChild(link);
      link.onload = init;
    } else { init(); }

    let _rt = null;
    window.addEventListener('resize', () => {
      paintBackground();
      clearTimeout(_rt);
      _rt = setTimeout(() => buildWheel(), 120);
    });
  </script>

  <script src="nav.js"></script>
</body>
</html>
