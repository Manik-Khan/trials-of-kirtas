<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Trials of Kirtas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="theme.css">
  <style>

    /* ── Reset & root ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:       #c9a84c;
      --gold-hi:    #f0d878;
      --gold-dim:   #7a5e20;
      --gold-line:  #c8a030;
      --gold-mid:   rgba(201,168,76,0.3);
      --ink:        #0d0a06;
      --paper:      #e8d8b0;
      --muted:      #8a7050;
      --aged:       #5a4828;
      --font-title: 'Cinzel Decorative', serif;
      --font-nav:   'Cinzel', serif;
      --font-body:  'Crimson Pro', serif;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--ink);
      color: var(--paper);
      font-family: var(--font-body);
    }

    /* Noise overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999; opacity: 0.35;
    }

    /* ── Full-page layout ── */
    .page {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* ── Background canvas ── */
    #bg-canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }

    /* ── Vignette ── */
    .vignette {
      position: absolute; inset: 0; z-index: 1; pointer-events: none;
      background: radial-gradient(ellipse 75% 70% at 50% 52%, rgba(30,18,6,0) 30%, rgba(6,4,2,0.88) 100%);
    }

    /* ── Header ── */
    .site-header {
      position: relative; z-index: 3;
      text-align: center;
      margin-bottom: 1.6rem;
      animation: fadeDown 0.9s ease both;
    }

    .site-title {
      font-family: var(--font-title);
      font-size: clamp(1.1rem, 2.5vw, 1.6rem);
      color: var(--gold-hi);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-shadow: 0 0 28px rgba(201,168,76,0.45), 2px 2px 0 rgba(0,0,0,0.8);
      margin-bottom: 0.3rem;
    }

    .title-rule {
      display: flex; align-items: center; gap: 0.6rem;
      max-width: 280px; margin: 0.4rem auto;
    }
    .title-rule::before, .title-rule::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    }
    .title-rule-diamond {
      width: 5px; height: 5px;
      background: var(--gold-dim); transform: rotate(45deg); flex-shrink: 0;
    }

    .site-sub {
      font-family: var(--font-nav);
      font-size: clamp(0.52rem, 1vw, 0.65rem);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Radial stage ── */
    .hex-stage {
      position: relative;
      width: 420px;
      height: 420px;
      z-index: 3;
      animation: fadeUp 0.9s 0.2s ease both;
    }

    .conn-svg {
      position: absolute; inset: 0;
      pointer-events: none; z-index: 1;
      overflow: visible;
    }

    /* ── Hex nodes ── */
    .hex-wrap {
      position: absolute;
      transform: translate(-50%, -50%);
      cursor: pointer;
      transition: transform 0.18s ease;
      filter: drop-shadow(1px 3px 6px rgba(0,0,0,0.65));
    }
    .hex-wrap:hover { transform: translate(-50%, -50%) scale(1.1); }
    .hex-wrap:hover .hex-body { filter: brightness(1.25); }
    .hex-wrap:hover .hex-label { color: var(--gold-hi); }

    .hex-body {
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 6px; position: relative;
      transition: filter 0.18s;
    }

    /* Top-light cel shading */
    .hex-body::after {
      content: ''; position: absolute; inset: 0;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      background: linear-gradient(165deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0.04) 38%, transparent 60%);
      pointer-events: none; z-index: 2;
    }

    .hex-outline-svg {
      position: absolute; top: 0; left: 0;
      pointer-events: none; z-index: 3;
    }

    .hex-icon {
      font-size: 22px; line-height: 1;
      color: rgba(255,255,255,0.88);
      position: relative; z-index: 2;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.8);
    }

    .hex-icon-img {
      width: 38px;
      height: 38px;
      object-fit: contain;
      object-position: center;
      position: relative; z-index: 2;
      pointer-events: none;
      user-select: none;
      transition: filter 0.18s;
    }
    .hex-wrap:hover .hex-icon-img,
    .hex-wrap.touch-active .hex-icon-img {
      filter: brightness(1.15) drop-shadow(0 0 6px rgba(201,168,76,0.5));
    }

    .hex-label {
      font-family: var(--font-nav);
      font-size: 8px; letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.72);
      position: relative; z-index: 2;
      text-align: center; line-height: 1;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.9);
      transition: color 0.18s;
    }

    /* ── Description readout ── */
    .desc-readout {
      position: absolute;
      bottom: -3rem; left: 50%; transform: translateX(-50%);
      font-family: var(--font-body);
      font-style: italic; font-size: 13px;
      color: var(--muted);
      white-space: nowrap; pointer-events: none;
      min-height: 1.4em; z-index: 3;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.9);
      transition: opacity 0.15s;
    }

    /* ── Sub-ring overlay ── */
    .sub-overlay {
      position: absolute; inset: 0;
      display: none; z-index: 4;
    }
    .sub-overlay.visible { display: block; }

    /* ── Footer hint ── */
    .page-hint {
      position: absolute;
      bottom: 1.8rem; left: 50%; transform: translateX(-50%);
      font-family: var(--font-nav);
      font-size: 0.52rem; letter-spacing: 0.3em;
      color: var(--aged); text-transform: uppercase;
      z-index: 3; white-space: nowrap;
      animation: pulse 2.8s ease-in-out infinite;
    }

    /* ── Nav override for index: minimal ── */
    #site-nav {
      position: absolute !important;
      top: 0; left: 0; right: 0;
      background: transparent !important;
      border-bottom: none !important;
      backdrop-filter: none !important;
    }
    #site-nav .nav-link { opacity: 0.5; }
    #site-nav .nav-link:hover { opacity: 1; }

    /* ── Animations ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.25; }
      50%       { opacity: 0.65; }
    }
    @keyframes hexFadeIn {
      from { opacity: 0; transform: translate(-50%,-50%) scale(0.75); }
      to   { opacity: 1; transform: translate(-50%,-50%) scale(1); }
    }
    @keyframes pulseTravel { to { stroke-dashoffset: -60; } }

    /* ── Touch feedback: highlight on first tap ── */
    .hex-wrap.touch-active .hex-body  { filter: brightness(1.35); }
    .hex-wrap.touch-active .hex-label { color: var(--gold-hi); }

    /* ── Responsive ── */
    /* Stage width/height and ring radius are set dynamically by JS based on viewport.
       No CSS transform scaling — avoids coord-space mismatch with JS positions. */
    @media (max-width: 600px) {
      .site-header { margin-bottom: 0.6rem; }
      .site-title  { font-size: clamp(0.85rem, 4.5vw, 1.15rem); }
      .page-hint   { font-size: 0.44rem; letter-spacing: 0.18em; }
      .desc-readout { bottom: auto; top: -2.6rem; font-size: 11px; }
      #site-nav .nav-links { display: none; }
    }

  </style>
</head>
<body>

  <div id="nav-root"></div>

  <div class="page" id="page">
    <canvas id="bg-canvas"></canvas>
    <div class="vignette"></div>

    <header class="site-header">
      <h1 class="site-title">The Trials of Kirtas</h1>
      <div class="title-rule"><div class="title-rule-diamond"></div></div>
      <p class="site-sub">Campaign Compendium</p>
    </header>

    <div class="hex-stage" id="hex-stage">
      <svg class="conn-svg" id="conn-svg" viewBox="0 0 420 420" xmlns="http://www.w3.org/2000/svg"></svg>
      <div class="desc-readout" id="desc-readout"></div>
    </div>

    <p class="page-hint" id="page-hint">Hover to explore &nbsp;·&nbsp; Click to enter</p>
  </div>

  <script>
    // ── Dynamic sizing based on viewport ──
    // All positions are recalculated on init and resize.
    // This avoids CSS transform scaling which breaks coordinate alignment.
    const BASE_STAGE = 420; // design-reference stage size

    function getLayout() {
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      // Available height minus nav (~52px) and header (~100px) and hint (~40px)
      const available = Math.min(vw, vh - 192);
      // Cap at base size, scale down for small screens with some padding
      const stageSize = Math.min(BASE_STAGE, available - 20);
      const scale     = stageSize / BASE_STAGE;
      return {
        stageSize,
        HW:     Math.round(78  * scale),
        HH:     Math.round(78  * scale),
        CX:     Math.round(210 * scale),
        CY:     Math.round(210 * scale),
        R:      Math.round(132 * scale),
        CHAR_R: Math.round(116 * scale),
        CW:     Math.round(92  * scale),  // center hex width
        BW:     Math.round(66  * scale),  // back hex width
      };
    }

    const FILLS = {
      party:      '#7a4e18',
      chronicle:  '#6a2e10',
      world:      '#1a5a28',
      compendium: '#28185a',
      factions:   '#5a1818',
      lore:       '#18305a',
      center:     '#2a1c08',
      back:       '#1a1208',
    };

    const LINE = {
      party:      '#d49030',
      chronicle:  '#d06030',
      world:      '#38b060',
      compendium: '#6848d0',
      factions:   '#d03838',
      lore:       '#3888d0',
      cosmere:    '#b050d8',
      caim:       '#38d878',
      liadan:     '#88d838',
      vesperian:  '#38a8d8',
    };

    const CDN = 'https://res.cloudinary.com/df0tgoiyb/image/upload/kirtas/icons';

    const NODES = [
      { id: 'party',      label: 'Party',      iconUrl: `${CDN}/party.png`,      fill: FILLS.party,      desc: 'The adventurers of Kirtas',    href: 'party.html',      hasSubring: true, angle: -90 },
      { id: 'chronicle',  label: 'Chronicle',  iconUrl: `${CDN}/chronicle.jpg`,  fill: FILLS.chronicle,  desc: 'Session records & entries',    href: 'chronicle.html',  angle: -30 },
      { id: 'world',      label: 'World',      iconUrl: `${CDN}/world.png`,      fill: FILLS.world,      desc: 'The living map of the realm',  href: 'world.html',      angle: 30 },
      { id: 'compendium', label: 'Compendium', iconUrl: `${CDN}/compendium.png`, fill: FILLS.compendium, desc: 'Spells, items & creatures',    href: 'compendium.html', angle: 90 },
      { id: 'factions',   label: 'Factions',   iconUrl: `${CDN}/factions.jpg`,   fill: FILLS.factions,   desc: 'Powers shaping the age',      href: 'factions.html',   angle: 150 },
      { id: 'lore',       label: 'Lore',       iconUrl: `${CDN}/lore.png`,       fill: FILLS.lore,       desc: 'History, myth & the arcane',  href: 'lore.html',       angle: 210 },
    ];

    const CHARS = [
      { id: 'cosmere',   label: 'Cosmere',   icon: 'ti-bolt',      fill: '#301050', desc: 'Cosmere Runestar — Warlock / Sorcerer', href: 'sheet.html?character=tyros',      angle: -90 },
      { id: 'caim',      label: 'Caim',      icon: 'ti-hand-stop', fill: '#0d2e1a', desc: 'Caim — Monk, Way of Mercy',             href: 'sheet.html?character=caim',       angle: 0   },
      { id: 'liadan',    label: 'Líadan',    icon: 'ti-music',     fill: '#1c3808', desc: 'Líadan Luchóg — Bard',                  href: 'sheet.html?character=liadan',     angle: 90  },
      { id: 'vesperian', label: 'Vesperian', icon: 'ti-eye',       fill: '#0a2a3e', desc: 'Vesperian Vale',                        href: 'sheet.html?character=vesperian',  angle: 180 },
    ];

    // ── Helpers ──
    const stage   = document.getElementById('hex-stage');
    const descEl  = document.getElementById('desc-readout');
    const connSvg = document.getElementById('conn-svg');
    const NS      = 'http://www.w3.org/2000/svg';
    let pulseTimer = null;

    function hexPos(angleDeg, r, cx, cy) {
      const rad = (angleDeg - 90) * Math.PI / 180;
      return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
    }

    function svgEl(tag, attrs) {
      const el = document.createElementNS(NS, tag);
      for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
      return el;
    }

    // ── Hex outline SVG (cel ink border) ──
    function makeOutline(w, h, goldOpacity = 0.72) {
      const pts = `${w/2},0 ${w},${h*0.25} ${w},${h*0.75} ${w/2},${h} 0,${h*0.75} 0,${h*0.25}`;
      const s = document.createElementNS(NS, 'svg');
      s.setAttribute('width', w); s.setAttribute('height', h);
      s.setAttribute('viewBox', `0 0 ${w} ${h}`);
      s.classList.add('hex-outline-svg');

      // thick ink shadow
      const ink = svgEl('polygon', { points: pts, fill: 'none', stroke: 'rgba(0,0,0,0.9)', 'stroke-width': '6', 'stroke-linejoin': 'miter' });
      // gold border
      const gold = svgEl('polygon', { points: pts, fill: 'none', stroke: `rgba(201,168,76,${goldOpacity})`, 'stroke-width': '2.5' });
      // inner highlight
      const hi = svgEl('polygon', { points: pts, fill: 'none', stroke: 'rgba(255,230,120,0.15)', 'stroke-width': '1' });

      s.appendChild(ink); s.appendChild(gold); s.appendChild(hi);
      return s;
    }

    // ── Build a hex node DOM element ──
    function makeHex(node, w, h) {
      const wrap = document.createElement('div');
      wrap.className = 'hex-wrap';
      wrap.style.cssText = `width:${w}px;height:${h}px;`;

      const body = document.createElement('div');
      body.className = 'hex-body';
      body.style.cssText = `width:${w}px;height:${h}px;background:${node.fill};`;

      let ic;
      if (node.iconUrl) {
        ic = document.createElement('img');
        ic.src = node.iconUrl;
        ic.alt = node.label;
        ic.className = 'hex-icon hex-icon-img';
        ic.draggable = false;
      } else {
        ic = document.createElement('i');
        ic.className = `ti ${node.icon} hex-icon`;
        ic.setAttribute('aria-hidden', 'true');
      }

      const lbl = document.createElement('span');
      lbl.className = 'hex-label';
      lbl.textContent = node.label;

      body.appendChild(ic);
      body.appendChild(lbl);
      wrap.appendChild(body);
      wrap.appendChild(makeOutline(w, h));
      return wrap;
    }

    // ── Connection line with pulsing waves ──
    function clearConn() {
      if (pulseTimer) { clearInterval(pulseTimer); pulseTimer = null; }
      while (connSvg.firstChild) connSvg.removeChild(connSvg.firstChild);
    }

    function drawConn(tx, ty, color) {
      clearConn();
      const { CX, CY } = getLayout();
      const dx = tx - CX, dy = ty - CY;
      const dist = Math.sqrt(dx * dx + dy * dy);

      // gradient def
      const gid = 'g' + Math.random().toString(36).slice(2);
      const defs = svgEl('defs', {});
      const grad = svgEl('linearGradient', {
        id: gid, gradientUnits: 'userSpaceOnUse',
        x1: CX, y1: CY, x2: tx, y2: ty
      });
      [['0%','0'],['25%','0.3'],['60%','0.95'],['100%','0.2']].forEach(([o, a]) => {
        const s = svgEl('stop', { offset: o, 'stop-color': color, 'stop-opacity': a });
        grad.appendChild(s);
      });
      defs.appendChild(grad);
      connSvg.appendChild(defs);

      // faint track
      connSvg.appendChild(svgEl('line', {
        x1: CX, y1: CY, x2: tx, y2: ty,
        stroke: 'rgba(160,120,40,0.18)', 'stroke-width': '3'
      }));

      // traveling dashed beam
      const beam = svgEl('line', {
        x1: CX, y1: CY, x2: tx, y2: ty,
        stroke: `url(#${gid})`, 'stroke-width': '2.5',
        'stroke-dasharray': `${dist * 0.32} ${dist * 0.68}`,
        'stroke-dashoffset': '0'
      });
      beam.style.animation = 'pulseTravel 0.75s linear infinite';
      connSvg.appendChild(beam);

      // endpoint dots
      connSvg.appendChild(svgEl('circle', { cx: CX, cy: CY, r: '3.5', fill: color, opacity: '0.55' }));
      const endDot = svgEl('circle', { cx: tx, cy: ty, r: '4', fill: color, opacity: '0.92' });
      connSvg.appendChild(endDot);

      // expanding wave rings at destination
      const waves = Array.from({ length: 3 }, () => {
        const w = svgEl('circle', { cx: tx, cy: ty, r: '4', fill: 'none', stroke: color, 'stroke-width': '1.5', opacity: '0' });
        connSvg.appendChild(w);
        return w;
      });

      let ph = 0;
      pulseTimer = setInterval(() => {
        ph = (ph + 0.035) % 1;
        waves.forEach((w, i) => {
          const p = (ph + i / 3) % 1;
          w.setAttribute('r', (4 + p * 22).toFixed(1));
          w.setAttribute('opacity', Math.max(0, p < 0.6 ? (1 - p * 1.5) * 0.85 : 0).toFixed(2));
        });
      }, 16);
    }

    // ── Center crest ──
    function makeCenterHex(layout) {
      const w = layout.CW, h = layout.CW;
      const wrap = document.createElement('div');
      wrap.className = 'hex-wrap';
      wrap.style.cssText = `left:${layout.CX}px;top:${layout.CY}px;width:${w}px;height:${h}px;cursor:default;`;

      const body = document.createElement('div');
      body.className = 'hex-body';
      body.style.cssText = `width:${w}px;height:${h}px;background:${FILLS.center};`;

      const crest = document.createElementNS(NS, 'svg');
      crest.setAttribute('width', '90'); crest.setAttribute('height', '90');
      crest.setAttribute('viewBox', '0 0 90 90');
      crest.style.cssText = 'position:absolute;top:1px;left:1px;z-index:2;';
      crest.innerHTML = `
        <defs>
          <clipPath id="lhc"><rect x="0" y="0" width="45" height="90"/></clipPath>
          <clipPath id="rhc"><rect x="45" y="0" width="45" height="90"/></clipPath>
        </defs>
        <circle cx="45" cy="45" r="32" fill="none" stroke="rgba(180,140,40,0.22)" stroke-width="8"/>
        <circle cx="45" cy="45" r="32" fill="none" stroke="rgba(180,140,40,0.55)" stroke-width="1.5"/>
        <circle cx="45" cy="45" r="24" fill="none" stroke="rgba(200,160,50,0.3)" stroke-width="1"/>
        <line x1="45" y1="14" x2="45" y2="76" stroke="rgba(201,168,76,0.28)" stroke-width="0.8" stroke-dasharray="2,3"/>
        <g clip-path="url(#lhc)">
          <path d="M45,24 L30,42 L45,37 Z" fill="rgba(70,110,230,0.5)" stroke="rgba(80,130,250,0.8)" stroke-width="1.2"/>
          <circle cx="45" cy="58" r="5" fill="none" stroke="rgba(80,130,250,0.55)" stroke-width="1.5"/>
        </g>
        <g clip-path="url(#rhc)">
          <path d="M45,24 L60,42 L45,37 Z" fill="rgba(220,80,40,0.5)" stroke="rgba(245,90,40,0.8)" stroke-width="1.2"/>
          <rect x="41" y="53" width="8" height="11" rx="1" fill="none" stroke="rgba(245,90,40,0.55)" stroke-width="1.5"/>
        </g>
        <circle cx="45" cy="45" r="4.5" fill="rgba(215,175,60,0.9)" stroke="rgba(255,220,80,1)" stroke-width="1"/>
        <text x="45" y="83" text-anchor="middle" font-family="Cinzel,serif" font-size="5" fill="rgba(201,168,76,0.55)" letter-spacing="2">KIRTAS</text>
      `;

      body.appendChild(crest);
      wrap.appendChild(body);
      wrap.appendChild(makeOutline(w, h, 0.85));
      return wrap;
    }

    // ── Build main ring ──
    function buildMain() {
      const layout = getLayout();
      const { HW, HH, CX, CY, R } = layout;

      // Resize stage and SVG viewBox to match computed size
      stage.style.width  = layout.stageSize + 'px';
      stage.style.height = layout.stageSize + 'px';
      connSvg.setAttribute('viewBox', `0 0 ${layout.stageSize} ${layout.stageSize}`);

      stage.querySelectorAll('.hex-wrap, .sub-overlay').forEach(e => e.remove());
      clearConn();
      clearTouchActive();

      NODES.forEach(node => {
        const pos = hexPos(node.angle, R, CX, CY);
        const wrap = makeHex(node, HW, HH);
        wrap.style.left = pos.x + 'px';
        wrap.style.top  = pos.y + 'px';

        wrap.addEventListener('mouseenter', () => {
          descEl.textContent = node.desc;
          drawConn(pos.x, pos.y, LINE[node.id]);
        });
        wrap.addEventListener('mouseleave', () => { descEl.textContent = ''; clearConn(); });
        wrap.addEventListener('click', () => {
          if (node.hasSubring) buildSub();
          else window.location.href = node.href;
        });
        bindTouch(wrap, pos, node);

        stage.insertBefore(wrap, connSvg.nextSibling);
      });

      stage.insertBefore(makeCenterHex(layout), connSvg.nextSibling);
    }

    // ── Build character sub-ring ──
    function buildSub() {
      const layout = getLayout();
      const { HW, HH, CX, CY, CHAR_R, BW } = layout;
      stage.querySelectorAll('.hex-wrap').forEach(e => {
        e.style.opacity = '0.08';
        e.style.pointerEvents = 'none';
        e.style.transition = 'opacity 0.2s';
      });
      clearConn();
      clearTouchActive();

      const ov = document.createElement('div');
      ov.className = 'sub-overlay visible';

      CHARS.forEach(ch => {
        const pos = hexPos(ch.angle, CHAR_R, CX, CY);
        const wrap = makeHex(ch, HW, HH);
        wrap.style.cssText += `position:absolute;left:${pos.x}px;top:${pos.y}px;animation:hexFadeIn 0.22s ease forwards;`;

        wrap.addEventListener('mouseenter', () => {
          descEl.textContent = ch.desc;
          drawConn(pos.x, pos.y, LINE[ch.id]);
        });
        wrap.addEventListener('mouseleave', () => { descEl.textContent = ''; clearConn(); });
        wrap.addEventListener('click', () => { window.location.href = ch.href; });
        bindTouch(wrap, pos, ch);
        ov.appendChild(wrap);
      });

      // Back button at center
      const bWrap = document.createElement('div');
      bWrap.className = 'hex-wrap';
      bWrap.style.cssText = `position:absolute;left:${CX}px;top:${CY}px;width:${BW}px;height:${BW}px;animation:hexFadeIn 0.22s ease forwards;`;

      const bBody = document.createElement('div');
      bBody.className = 'hex-body';
      bBody.style.cssText = `width:${BW}px;height:${BW}px;background:${FILLS.back};`;

      const bIc = document.createElement('i');
      bIc.className = 'ti ti-arrow-left hex-icon';
      bIc.setAttribute('aria-hidden', 'true');
      bIc.style.fontSize = '16px';

      const bLbl = document.createElement('span');
      bLbl.className = 'hex-label';
      bLbl.textContent = 'Back';

      bBody.appendChild(bIc); bBody.appendChild(bLbl);
      bWrap.appendChild(bBody);
      bWrap.appendChild(makeOutline(BW, BW, 0.35));

      function doBack() {
        ov.remove();
        clearConn();
        clearTouchActive();
        descEl.textContent = '';
        stage.querySelectorAll('.hex-wrap').forEach(e => {
          e.style.opacity = '';
          e.style.pointerEvents = '';
        });
      }

      bWrap.addEventListener('mouseenter', () => { descEl.textContent = 'Return to main menu'; });
      bWrap.addEventListener('mouseleave', () => { descEl.textContent = ''; clearConn(); });
      bWrap.addEventListener('click', doBack);
      bWrap.addEventListener('touchstart', e => { e.preventDefault(); doBack(); }, { passive: false });

      ov.appendChild(bWrap);
      stage.insertBefore(ov, stage.querySelector('.desc-readout'));
    }

    // ── Background: atmospheric canvas ──
    function paintBackground() {
      const canvas = document.getElementById('bg-canvas');
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      const ctx = canvas.getContext('2d');
      const W = canvas.width, H = canvas.height;

      // Deep warm radial base
      const base = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.65);
      base.addColorStop(0,    '#2e1a08');
      base.addColorStop(0.35, '#1c1006');
      base.addColorStop(0.7,  '#100a04');
      base.addColorStop(1,    '#080502');
      ctx.fillStyle = base; ctx.fillRect(0, 0, W, H);

      // Cool blue secondary glow (top-left)
      const g2 = ctx.createRadialGradient(W * 0.15, H * 0.18, 0, W * 0.15, H * 0.18, W * 0.4);
      g2.addColorStop(0, 'rgba(40,60,140,0.14)');
      g2.addColorStop(1, 'transparent');
      ctx.fillStyle = g2; ctx.fillRect(0, 0, W, H);

      // Warm amber glow (bottom-right)
      const g3 = ctx.createRadialGradient(W * 0.85, H * 0.82, 0, W * 0.85, H * 0.82, W * 0.35);
      g3.addColorStop(0, 'rgba(140,70,20,0.12)');
      g3.addColorStop(1, 'transparent');
      ctx.fillStyle = g3; ctx.fillRect(0, 0, W, H);

      // Pixel star field
      for (let i = 0; i < 280; i++) {
        const x = Math.random() * W;
        const y = Math.random() * H;
        const bright = Math.random();
        const sz = bright > 0.94 ? 1.5 : bright > 0.72 ? 1 : 0.5;
        const alpha = Math.random() * 0.45 + 0.06;
        ctx.fillStyle = `rgba(${220 + Math.random() * 20 | 0},${200 + Math.random() * 15 | 0},${155 + Math.random() * 20 | 0},${alpha})`;
        ctx.fillRect(Math.round(x), Math.round(y), sz, sz);
      }

      // Faint radial spoke guides (barely visible)
      ctx.strokeStyle = 'rgba(180,140,60,0.04)';
      ctx.lineWidth = 1;
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(W / 2, H / 2);
        ctx.lineTo(W / 2 + Math.cos(a) * W * 0.5, H / 2 + Math.sin(a) * H * 0.5);
        ctx.stroke();
      }
    }

    // ── Mobile detection & hint text ──
    const isTouchDevice = () => window.matchMedia('(hover: none)').matches;

    function updateHint() {
      const hint = document.getElementById('page-hint');
      if (!hint) return;
      hint.textContent = isTouchDevice()
        ? 'Tap to reveal · Tap again to enter'
        : 'Hover to explore · Click to enter';
    }

    // ── Touch interaction state ──
    // On touch devices: first tap = show desc + line, second tap = navigate
    // Tapping a different hex clears the first and starts fresh
    let _touchActive = null; // currently highlighted hex wrap el
    let _touchNav    = null; // pending href for second tap

    function clearTouchActive() {
      if (_touchActive) {
        _touchActive.classList.remove('touch-active');
        _touchActive = null;
        _touchNav    = null;
        descEl.textContent = '';
        clearConn();
      }
    }

    // Attach touch events to a hex node element
    function bindTouch(wrap, pos, node) {
      wrap.addEventListener('touchstart', e => {
        e.preventDefault(); // prevent ghost mouse events
        if (_touchActive === wrap) {
          // Second tap on same hex → navigate
          clearTouchActive();
          if (node.hasSubring) { buildSub(); return; }
          window.location.href = node.href;
        } else {
          // First tap → highlight and show info
          clearTouchActive();
          _touchActive = wrap;
          _touchNav    = node.href;
          wrap.classList.add('touch-active');
          descEl.textContent = node.desc;
          drawConn(pos.x, pos.y, LINE[node.id] || LINE[node.id.replace('char_','')]);
        }
      }, { passive: false });
    }

    // ── Load Tabler icons then init ──
    function init() {
      paintBackground();
      buildMain();
      updateHint();
    }

    if (!document.querySelector('link[href*="tabler-icons"]')) {
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = 'https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css';
      document.head.appendChild(link);
      link.onload = init;
    } else {
      init();
    }

    // Redraw everything on resize so hex positions stay correct
    let _resizeTimer = null;
    window.addEventListener('resize', () => {
      paintBackground();
      clearTimeout(_resizeTimer);
      _resizeTimer = setTimeout(() => buildMain(), 120);
    });
  </script>

  <script src="nav.js"></script>

</body>
</html>
