          : '';
        scroll = (grp('Party', 'party', party) + grp('Others', 'others', others))
          || `<div class="roster-empty">No one on the board yet.</div>`;
        acts = `<button class="dock-act" data-act="start-roll"${picked ? '' : ' disabled'}>▶ &nbsp;Start — players roll <span class="roster-count">(${picked})</span></button>`
             + `<button class="dock-act" data-act="start-auto"${picked ? '' : ' disabled'}>⚄ &nbsp;Start — auto-roll everyone</button>`;
      } else {
        const seated = initRoster();
        const bench  = COMBS.filter(c => !c.in_combat);
        scroll = `<div class="roster-grp"><span class="roster-grp-l">In the fight — round ${(ENC && ENC.round) || 1}</span></div>`
          + seated.map(c => rosterRowHtml(c, true, true)).join('')
          + (bench.length
              ? `<div class="roster-grp"><span class="roster-grp-l">On the board — check to join</span></div>`
                + bench.map(c => rosterRowHtml(c, false, false)).join('')
              : '');
        acts = `<button class="dock-act" data-act="reroll">↻ &nbsp;Re-roll the seated</button>`
             + `<button class="dock-act" data-act="end">⊗ &nbsp;End combat</button>`;
      }
      wrap.innerHTML = `<div class="roster-scroll">${scroll}</div><div class="dock-acts roster-acts">${acts}</div>`;
    }
    function syncCombatChrome() { paintCombatMenu(); }

    // ── shared feed (Phase 1) — realtime game log. One Supabase table, three
    // tabs. /roll → combat; plain text → chronicle. Foundation for the session
    // archive / replay (channel + kind carry the future shape). ──
    let FEED = [], feedEl = null, feedListEl = null, feedTab = 'all', feedPostHidden = false;
    // Rendering extracted to feed-render.js (FEED-RENDER-V1) — shared with the
    // chronicle's server browser so rolls look identical on both pages.
    // escapeHtml/stripTags remain as hoisted wrappers: used widely above.
    function escapeHtml(s) { return FeedRender.escapeHtml(s); }
    function stripTags(s) { return FeedRender.stripTags(s); }
    function feedActor() {
      const key = (ME && ME.characterKey) || null;
      const name = (key && typeof CHARACTERS !== 'undefined' && CHARACTERS[key] && CHARACTERS[key].name)
        || (key ? key.charAt(0).toUpperCase() + key.slice(1) : 'Dungeon Master');
      return { key, name };
    }
    const FR = FeedRender.create({
      characters: typeof CHARACTERS !== 'undefined' ? CHARACTERS : {},
      canDelete: canDeleteRow,   // hoisted below
    });
    // Mirror the RLS so the ✕ only appears where the delete will succeed:
    // staff anything; authors their own (non-hidden) chronicle rows.
    function canDeleteRow(row) {
      if (IS_STAFF) return true;
      return !!(ME && ME.userId && row.author_id === ME.userId && row.channel === 'chronicle' && !row.hidden);
    }
    async function feedDelete(id) {
      if (!SB || !confirm('Delete this feed entry? This cannot be undone.')) return;
      const { error } = await SB.from('feed').delete().eq('id', id);
      if (error) { alert('Delete failed: ' + error.message); return; }
      onFeedDelete(id);   // realtime echoes too; onFeedDelete dedupes
    }
    function renderFeed() {
      if (!feedListEl) return;
      const staff = effectiveStaff();
      let rows = FEED.filter(r => staff || !r.hidden);
      if (feedTab !== 'all') rows = rows.filter(r => (r.channel || 'combat') === feedTab);
      rows = rows.slice().sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
      feedListEl.innerHTML = rows.length
        ? rows.map(FR.rowHtml).join('')
        : `<div class="feed-empty">No ${feedTab === 'all' ? '' : feedTab + ' '}entries yet.</div>`;
      feedListEl.scrollTop = feedListEl.scrollHeight;
    }
    function onFeedInsert(row) {
      if (!row || row.kind === 'event' || FEED.some(r => r.id === row.id)) return;   // events: recorded, not shown
      FEED.push(row);
      if (FEED.length > 250) FEED.shift();
      renderFeed();
      if (DOCK && DOCK.panes.feed && DOCK.open !== 'feed') DOCK.panes.feed.btn.classList.add('unread');
    }

    // ── campaign config (one row): which session we're on. Stamped onto every

    let CAMPAIGN = { current_session: 0 };
    async function loadCampaign() {

    // The feed's own always-on channel — deliberately NOT the per-encounter

    let FEEDRT = null;
    function initFeedRealtime() {
      if (!SB) return;
      FEEDRT = SB.channel('feed-live')
        .on('postgres_changes',
          { event: 'INSERT', schema: 'public', table: 'feed' },
          ({ new: row }) => { if (row) onFeedInsert(row); })
        .on('postgres_changes',
          { event: 'UPDATE', schema: 'public', table: 'feed' },
          ({ new: row }) => { if (row) onFeedUpdate(row); })
        .on('postgres_changes',
          { event: 'DELETE', schema: 'public', table: 'feed' },
          ({ old }) => { if (old && old.id != null) onFeedDelete(old.id); })
        .on('postgres_changes',
          { event: 'UPDATE', schema: 'public', table: 'campaign' },

    async function loadFeed() {

    async function feedInsert(partial) {

    function logEvent(type, data, body, hidden) {

    // Dice parser: NdM, +K/-K, multiple terms, khN/klN (advantage/disadvantage).
    function parseDice(expr) {
      const clean = String(expr || '').trim().replace(/\s+/g, '');
      if (!clean || !/^[0-9dk hl+\-]+$/i.test(clean)) return null;
      const re = /([+-]?)(\d*)d(\d+)(k[hl]\d+)?|([+-]?\d+)/gi;
      let m, total = 0, parts = [], anyDice = false, consumed = 0;
      while ((m = re.exec(clean)) !== null) {
        consumed += m[0].length;
        if (m[3] === undefined) { const f = parseInt(m[5], 10); total += f; parts.push({ flat: f }); continue; }
        anyDice = true;
        const sign = m[1] === '-' ? -1 : 1;
        const n = m[2] ? parseInt(m[2], 10) : 1, sides = parseInt(m[3], 10);
        if (n < 1 || n > 100 || sides < 2 || sides > 1000) return null;
        const rolls = Array.from({ length: n }, () => Math.floor(Math.random() * sides) + 1);
        let kept = rolls.slice();
        if (m[4]) {

          const sorted = rolls.slice().sort((a, b) => b - a);

        }
        total += kept.reduce((a, b) => a + b, 0) * sign;

      return parsed.parts.map(p => {
        if (p.flat !== undefined) return (p.flat >= 0 ? '+ ' : '− ') + Math.abs(p.flat);

        const shown = p.rolls.map(r => { const i = keptCopy.indexOf(r); if (i >= 0) { keptCopy.splice(i, 1); return `<span class="ft-die">${r}</span>`; } return `<span class="ft-drop">${r}</span>`; }).join(' ');
        return `${p.sign < 0 ? '− ' : ''}[${shown}]`;
      }).join(' ');

      return `${escapeHtml(parsed.formula)} → ${dicePieces(parsed)} = <span class="ft-tot">${parsed.total}</span>`;

    // each append a d4, spelled out in the breakdown. Typed /roll expressions
    // stay verbatim (kh/kl and +1d4 are already in the player's hands there).
    function feedRollWithMods(n, d) {
      const rs = (window.__battle && window.__battle.getRS) ? window.__battle.getRS() : null;
      let formula = `${n}d${d}`;
      if (rs && d === 20 && n === 1 && (rs.advantage || rs.disadvantage)) {
        formula = rs.advantage ? '2d20kh1' : '2d20kl1';

      const parsed = parseDice(formula);
      if (!parsed) return;

        if (rs.guidance) { const g = Math.floor(Math.random() * 4) + 1; total += g; extra += ` + [<span class="ft-die">${g}</span>]✦`; dbFormula += '+1d4'; }
      }
      const body = `${escapeHtml(formula)} → ${dicePieces(parsed)}${extra} = <span class="ft-tot">${total}</span>`;

    }
    function feedSubmit(raw) {

    function buildFeed() {

    // ── monster statblock (Phase B) ────────────────────────────────────────

    // Statblock renderer — lifted from compendium.html's monster detail view

    function fmtSpeed(s) {

    function sbCleanText(str) {
      const ATK = { mw: 'Melee Weapon', rw: 'Ranged Weapon', ms: 'Melee Spell', rs: 'Ranged Spell', m: 'Melee', r: 'Ranged' };
      return (str || '')
        .replace(/\{@b ([^}]+)\}/g, '<strong>$1</strong>')
        .replace(/\{@i ([^}]+)\}/g, '<em>$1</em>')
        .replace(/\{@(?:spell|creature|item) ([^|}]+)[^}]*\}/g, '<span style="color:var(--gold-light)">$1</span>')
        .replace(/\{@condition ([^|}]+)[^}]*\}/g, '<em>$1</em>')
        .replace(/\{@atk ([^}]+)\}/g, (_, codes) => codes.split(',').map(c => ATK[c.trim()] || c.trim()).join(' or ') + ' Attack:')
        .replace(/\{@h\}/g, 'Hit: ')
        .replace(/\{@recharge ([^}]+)\}/g, '(Recharge $1–6)')
        .replace(/\{@hit ([^}]+)\}/g, '+$1')
        .replace(/\{@dc ([^}]+)\}/g, 'DC $1')
        .replace(/\{@(?:damage|dice) ([^}]+)\}/g, '$1')

        if (e.type === 'list') return `<ul>${(e.items || []).map(i => `<li>${typeof i === 'string' ? sbCleanText(i) : sbEntries(i.entries || []).replace(/<\/?p>/g, '')}</li>`).join('')}</ul>`;
        if (e.type === 'table') {

    // The on-demand statblock drawer. Opened from a token's Manage tab via the

    // ── initiative & turn tracker (Phase C1) ────────────────────────────────
    let stripEl = null;
    const BURNT_SEEDS = [3, 7, 12, 19, 5, 14, 21, 9];
    function chipSeed(id) {                                  // stable per-combatant grain
      let h = 0; const s = String(id || '');
      for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) | 0;
      return BURNT_SEEDS[Math.abs(h) % BURNT_SEEDS.length];
    }
    // Participants in the active encounter (in_combat). Rolled combatants sort
    // by initiative (highest first); pending ones — in the fight, no roll yet —
    // sit at the tail until their number lands. Drives the strip render.
    function initRoster() {
      return COMBS.filter(c => c.in_combat).slice().sort((a, b) => {
        const ap = a.initiative == null, bp = b.initiative == null;
        if (ap !== bp) return ap ? 1 : -1;                    // pending → tail

      });
    }
    // The turn cycle steps only through rolled participants; a pending PC has no
    // slot until they enter a number, then re-sorts in on the next advance.
    function turnOrder() { return initRoster().filter(c => c.initiative != null); }
    function rollValue(c) {
      let mod = 0;
      if (c.side === 'party' && c.source_key && typeof CHARACTERS !== 'undefined' && CHARACTERS[c.source_key]) {
        const cc = CHARACTERS[c.source_key];

            : (cc.abilities && cc.abilities.dex && cc.abilities.dex.mod) || 0;
      } else if (c.statblock && typeof c.statblock.dex === 'number') {

    }
    async function setInitiative(id, val) {
      const c = COMBS.find(k => k.id === id); if (!c) return false;
      const prev = c.initiative; c.initiative = val; renderInitStrip();
      const { error } = await SB.from('combatants').update({ initiative: val }).eq('id', id);
      if (error) { c.initiative = prev; renderInitStrip(); console.error('[init] write failed:', error.message); return false; }
      if (c.in_combat) logEvent('initiative', { id: c.id, value: val },

    function rollInitiative(c) { return setInitiative(c.id, rollValue(c)); }
    // Resolve the active combatant's player key for the HUD: a party source_key

    function activeSourceKey() {

    // Forward shared round + whose-turn to the HUD (marquee + economy-on-start).
    function pushTurnToHud() {
      if (window.__battle && window.__battle.setTurn)
        window.__battle.setTurn({ round: (ENC && ENC.round) || 1, activeKey: activeSourceKey() });
    }
    async function setActive(id, round) {
      if (!ENC) return;
      ENC.active_combatant_id = id; if (round != null) ENC.round = round;
      document.getElementById('combat-round').textContent = ENC.round ?? 1;
      renderInitStrip();
      pushTurnToHud();
      // Replay: one public turn event per advance. A hidden foe's name would
      // leak through the body, so it masks to ??? (players can trigger this
      // via HUD End Turn, so the row itself must stay hidden:false for RLS).
      const tc = COMBS.find(x => x.id === id);
      if (tc) logEvent('turn', { active_id: id, round: ENC.round ?? 1 },
        `Round ${ENC.round ?? 1} — ${(tc.hidden && tc.side !== 'party') ? '???' : escapeHtml(tc.name)}'s turn`, false);
      const patch = { active_combatant_id: id }; if (round != null) patch.round = round;
      const { error } = await SB.from('encounters').update(patch).eq('id', ENC.id);
      if (error) console.error('[init] turn write failed:', error.message);
    }
    async function advanceTurn() {
      const order = turnOrder(); if (!order.length) return;
      const i = order.findIndex(c => c.id === (ENC && ENC.active_combatant_id));
      const next = i < 0 ? 0 : (i + 1) % order.length;
      let round = (ENC && ENC.round) || 1;
      if (i >= 0 && next === 0) round++;
      await setActive(order[next].id, round);
    }
    // Staff correction: step the shared tracker BACK one turn (mis-clicks,
    // skipped combatants). Wrapping backwards decrements the round, floor 1.
    async function retreatTurn() {
      const order = turnOrder(); if (!order.length) return;
      const i = order.findIndex(c => c.id === (ENC && ENC.active_combatant_id));
      const prev = i < 0 ? order.length - 1 : (i - 1 + order.length) % order.length;
      let round = (ENC && ENC.round) || 1;
      if (i === 0) round = Math.max(1, round - 1);
      await setActive(order[prev].id, round);
    }
    // Re-roll the SEATED only (post-picker semantics — re-seating the whole
    // board would silently undo the picker): NPCs re-roll, party resets to
    // pending so owners roll their own again; the bench is untouched. The
    // order resets to the new top and the round to 1 — this is "redo
    // initiative", not a mid-round tweak.
    function rollAllInitiative() {
      const seated = COMBS.filter(c => c.in_combat);
      if (!seated.length) return;
      seated.forEach(c => { c.initiative = (c.side === 'party') ? null : rollValue(c); });
      const top = turnOrder()[0];
      if (ENC) { ENC.active_combatant_id = top ? top.id : null; ENC.round = 1; }
      document.getElementById('combat-round').textContent = 1;
      renderInitStrip();
      pushTurnToHud();
      const npcs = seated.filter(c => c.side !== 'party' && c.initiative != null);
      if (npcs.length) feedInsert({ actor_key: null, actor_name: 'Dungeon Master', channel: 'combat', kind: 'roll', hidden: true,
        body: 'Rolled initiative — ' + npcs.map(c => `${escapeHtml(c.name)} <span class="ft-tot">${c.initiative}</span>`).join(', ') });
      seated.forEach(c => SB.from('combatants').update({ in_combat: true, initiative: c.initiative }).eq('id', c.id)
        .then(({ error }) => { if (error) console.error('[init] write failed:', error.message); }));
      if (ENC) SB.from('encounters').update({ active_combatant_id: ENC.active_combatant_id, round: 1 }).eq('id', ENC.id)
        .then(({ error }) => { if (error) console.error('[init] turn write failed:', error.message); });
    }

    // ── combat lifecycle ────────────────────────────────────────────────────
    // "In combat" = anyone is seated. Start seats the PICKED rows (everyone
    // minus PICK_OFF) and benches the rest; End clears everyone and the strip
    // hides again. mode 'roll': NPCs auto-roll, PCs pend for the one HUD
    // prompt. mode 'auto': everyone rolls now, no prompts (plain d20+mod —
    // adv/dis belongs to the players-roll path).
    function inCombat() { return COMBS.some(c => c.in_combat); }
    function startCombat(mode) {
      if (!COMBS.some(c => !PICK_OFF.has(c.id))) return;
      COMBS.forEach(c => {
        const inF = !PICK_OFF.has(c.id);
        c.in_combat = inF;
        c.initiative = !inF ? null : (mode !== 'auto' && c.side === 'party') ? null : rollValue(c);
      });
      const top = turnOrder()[0];
      if (ENC) { ENC.active_combatant_id = top ? top.id : null; ENC.round = 1; }
      document.getElementById('combat-round').textContent = 1;
      renderInitStrip();
      pushTurnToHud();
      const npcs = COMBS.filter(c => c.side !== 'party' && c.in_combat && c.initiative != null);
      if (npcs.length) feedInsert({ actor_key: null, actor_name: 'Dungeon Master', channel: 'combat', kind: 'roll', hidden: true,
        body: 'Rolled initiative — ' + npcs.map(c => `${escapeHtml(c.name)} <span class="ft-tot">${c.initiative}</span>`).join(', ') });
      if (mode === 'auto') {
        const pcs = COMBS.filter(c => c.side === 'party' && c.in_combat);
        if (pcs.length) feedInsert({ actor_key: null, actor_name: 'Dungeon Master', channel: 'combat', kind: 'roll', hidden: false,
          body: 'Rolled initiative — ' + pcs.map(c => `${escapeHtml(c.name)} <span class="ft-tot">${c.initiative}</span>`).join(', ') });
      }
      // The opening snapshot — the replay's starting position. hidden:true
      // because it can contain unrevealed foes (staff-only action, RLS ok).
      logEvent('combat_start', { round: 1, active_id: ENC ? ENC.active_combatant_id : null, combatants: rosterSnapshot() }, 'Combat started', true);
      COMBS.forEach(c => SB.from('combatants').update({ in_combat: c.in_combat, initiative: c.initiative }).eq('id', c.id)
        .then(({ error }) => { if (error) console.error('[init] write failed:', error.message); }));
      if (ENC) SB.from('encounters').update({ active_combatant_id: ENC.active_combatant_id, round: 1 }).eq('id', ENC.id)
        .then(({ error }) => { if (error) console.error('[init] turn write failed:', error.message); });
    }
    // Mid-fight join (the second wave): an NPC rolls and slots into the order;
    // a PC seats pending (their HUD prompts). Round + active turn untouched —
    // initRoster/turnOrder re-sort on their own.
    async function seatOne(id) {
      const c = COMBS.find(k => k.id === id); if (!c || c.in_combat) return;
      c.in_combat = true;
      c.initiative = (c.side === 'party') ? null : rollValue(c);
      renderInitStrip();
      const { error } = await SB.from('combatants').update({ in_combat: true, initiative: c.initiative }).eq('id', id);
      if (error) { c.in_combat = false; c.initiative = null; renderInitStrip(); console.error('[roster] seat failed:', error.message); return; }
      if (c.initiative != null) feedInsert({ actor_key: null, actor_name: 'Dungeon Master', channel: 'combat', kind: 'roll', hidden: true,
        body: `${escapeHtml(c.name)} joins the fight — initiative <span class="ft-tot">${c.initiative}</span>` });
      logEvent('join', { id: c.id, name: c.name, side: c.side, x: c.x, y: c.y, hp: c.hp, initiative: c.initiative },
        `${escapeHtml(c.name)} joins the fight`, !!(c.hidden && c.side !== 'party'));
    }
    // Pull a combatant from the fight (the token stays on the board). If it's
    // their turn, advance FIRST so the pointer never dangles on a benched row;
    // the last one out clears the pointer and the strip hides.
    async function unseatOne(id) {
      const c = COMBS.find(k => k.id === id); if (!c || !c.in_combat) return;
      if (ENC && ENC.active_combatant_id === id) {
        if (turnOrder().length > 1) await advanceTurn();
        else await setActive(null, null);
      }
      c.in_combat = false; c.initiative = null;
      renderInitStrip();
      pushTurnToHud();
      const { error } = await SB.from('combatants').update({ in_combat: false, initiative: null }).eq('id', id);
      if (error) { c.in_combat = true; renderInitStrip(); console.error('[roster] unseat failed:', error.message); return; }
      logEvent('leave', { id: c.id, name: c.name }, `${escapeHtml(c.name)} leaves the fight`, !!(c.hidden && c.side !== 'party'));
    }
    function endCombat() {
      // The closing snapshot first, while the roster still exists.
      logEvent('combat_end', { round: (ENC && ENC.round) || 1, combatants: rosterSnapshot() }, 'Combat ended', true);
      COMBS.forEach(c => { c.in_combat = false; c.initiative = null; });
      if (ENC) { ENC.active_combatant_id = null; ENC.round = 1; }
      document.getElementById('combat-round').textContent = 1;
      renderInitStrip();
      pushTurnToHud();
      COMBS.forEach(c => SB.from('combatants').update({ in_combat: false, initiative: null }).eq('id', c.id)
        .then(({ error }) => { if (error) console.error('[combat] end write failed:', error.message); }));
      if (ENC) SB.from('encounters').update({ active_combatant_id: null, round: 1 }).eq('id', ENC.id)
        .then(({ error }) => { if (error) console.error('[combat] end turn write failed:', error.message); });
    }

    function chipHtml(c, isActive) {
      const isParty = c.side === 'party';
      const art = isParty ? (PORTRAITS[c.source_key] || TOKENS[c.source_key] || '') : (monsterTokenUrl(c) || '');
      const initial = (c.name || '?').trim().charAt(0).toUpperCase();
      const seed = chipSeed(c.id);
      const pct = c.max_hp ? Math.max(0, Math.min(100, Math.round((c.hp / c.max_hp) * 100))) : 100;
      const hpC = pct > 50 ? '#4a9a52' : pct > 25 ? '#c9a14a' : '#b23b3b';
      const foe = c.hidden && !isParty;
      const pending = c.in_combat && c.initiative == null;          // in the fight, hasn't rolled
      return `<div class="init-chip ${isParty ? 'party' : 'enemy'}${isActive ? ' active' : ''}${foe ? ' hidden-foe' : ''}${pending ? ' pending' : ''}" data-id="${c.id}">
        <div class="ic-zone" style="filter:url(#burnt-${seed})">
          <div class="ic-bg ${isParty ? 'party' : 'enemy'}"></div>
          ${art ? `<img class="ic-art" src="${art}" alt="" draggable="false" onerror="this.remove()">` : ''}
          <span class="ic-initial">${initial}</span>
          <div class="ic-dots"></div>
          <div class="ic-fade"></div>
        </div>
        <span class="ic-init" data-edit="${c.id}">${pending ? '…' : (c.initiative ?? '–')}</span>
        <div class="ic-plate">
          <div class="ic-name">${c.name || '?'}</div>
          <div class="ic-hp"><i style="width:${pct}%;background:${hpC}"></i></div>
        </div>
      </div>`;
    }
    function mysteryChipHtml() {
      return `<div class="init-chip enemy active hidden-foe" data-mystery="1">
        <div class="ic-zone"><div class="ic-bg enemy"></div><span class="ic-initial">?</span><div class="ic-dots"></div><div class="ic-fade"></div></div>
        <div class="ic-plate"><div class="ic-name" style="font-style:italic;color:#8a7a52">???</div></div>
      </div>`;
    }

    function buildInitStrip() {
      let defs = `<svg width="0" height="0" style="position:absolute;overflow:hidden" aria-hidden="true"><defs>`;
      BURNT_SEEDS.forEach(seed => {
        defs += `<filter id="burnt-${seed}" x="-15%" y="-15%" width="130%" height="130%" color-interpolation-filters="sRGB">
          <feTurbulence type="turbulence" baseFrequency="0.024" numOctaves="3" seed="${seed}" result="turb"/>
          <feDisplacementMap in="SourceGraphic" in2="turb" scale="1" xChannelSelector="R" yChannelSelector="G" result="warped"/>
          <feTurbulence type="fractalNoise" baseFrequency="0.68" numOctaves="3" stitchTiles="stitch" result="grain"/>
          <feColorMatrix type="saturate" values="0" in="grain" result="gGrain"/>
          <feBlend in="warped" in2="gGrain" mode="overlay" result="final"/>
          <feComposite in="final" in2="SourceGraphic" operator="in"/></filter>`;
      });
      defs += `</defs></svg>`;
      const holder = document.createElement('div');
      holder.innerHTML = defs;
      stage.appendChild(holder.firstChild);

      stripEl = document.createElement('div');
      stripEl.className = 'init-strip empty';
      stage.appendChild(stripEl);
      renderInitStrip();
    }

    function pushMonstersToHud() {
      if (!window.__battle || !window.__battle.setMonsters) return;
      const staff = effectiveStaff();
      const rows = staff
        ? COMBS.filter(c => c.in_combat && c.side !== 'party')
            .map(c => Object.assign({}, c, { art: monsterTokenUrl(c) }))
        : [];
      window.__battle.setMonsters(rows);
    }
    function renderInitStrip() {
      if (!stripEl) return;
      syncCombatChrome();          // keep the right-side Combat menu in step
      pushMonstersToHud();         // M2: the HUD picker's Enemies section
      const ordered = initRoster();
      const visible = ordered.filter(tokenVisible);
      const staff = effectiveStaff();
      const activeId = ENC && ENC.active_combatant_id;
      const activeC = COMBS.find(c => c.id === activeId) || null;
      const activeHiddenToMe = activeC && !tokenVisible(activeC);

      // The strip is on the map only during combat — nothing seated → hidden for
      // everyone (staff start/end combat from the right-side Combat tab).
      if (!visible.length) { stripEl.className = 'init-strip empty'; stripEl.innerHTML = ''; return; }

      let chips = '';
      if (activeHiddenToMe && !staff) chips += mysteryChipHtml();   // someone's acting, unseen
      chips += visible.map(c => chipHtml(c, c.id === activeId)).join('');

      let side = `<div class="init-side"><div style="text-align:center"><div class="init-round-l">ROUND</div><div class="init-round-n">${(ENC && ENC.round) || 1}</div></div>`;
      if (staff) side += `<button class="init-btn ghost" data-turn="prev" title="Step the tracker back one turn">◂ Prev</button><button class="init-btn" data-turn="next">Next ▸</button><button class="init-btn ghost" data-roll="all">↻ Roll all</button><button class="init-btn ghost" data-combat="end">⊗ End</button>`;
      side += `</div>`;

      stripEl.className = 'init-strip';
      stripEl.innerHTML = `<div class="init-track">${chips}</div>${side}`;
      wireStrip();
    }

    function wireStrip() {
      stripEl.querySelectorAll('.init-chip[data-id]').forEach(chip =>
        chip.addEventListener('click', (e) => {
          if (e.target.closest('.ic-init') || e.target.closest('.ic-edit')) return;   // editing the number
          selectToken(chip.dataset.id);
        }));
      stripEl.querySelectorAll('.ic-init[data-edit]').forEach(badge =>
        badge.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = badge.dataset.edit;
          const c = COMBS.find(k => k.id === id); if (!c) return;
          if (!(effectiveStaff() || c.side === 'party')) return;   // players: party only
          const inp = document.createElement('input');
          inp.className = 'ic-edit'; inp.value = c.initiative ?? ''; inp.type = 'number';
          badge.replaceWith(inp); inp.focus(); inp.select();
          const commit = () => { const v = parseInt(inp.value, 10); if (!isNaN(v)) setInitiative(id, v); else renderInitStrip(); };
          inp.addEventListener('keydown', (ev) => { if (ev.key === 'Enter') inp.blur(); if (ev.key === 'Escape') renderInitStrip(); });
          inp.addEventListener('blur', commit);
        }));
      const next = stripEl.querySelector('[data-turn="next"]');
      if (next) next.addEventListener('click', advanceTurn);
      const prev = stripEl.querySelector('[data-turn="prev"]');
      if (prev) prev.addEventListener('click', retreatTurn);
      stripEl.querySelectorAll('[data-roll="all"]').forEach(b => b.addEventListener('click', rollAllInitiative));
      const endBtn = stripEl.querySelector('[data-combat="end"]');
      if (endBtn) endBtn.addEventListener('click', endCombat);
    }

    // ── left tool rail (DM) — Select / Pencil(reveal) / Eraser(hide), with a
    // contextual options slide-out. Future drawing tools (shapes, spell
    // templates) slot in as more rail buttons, each opening their own options. ──
    const TOOL_ICON = {
      select: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 3v15l4-4 3 6 2-1-3-6h5z"/></svg>',
      circle: '<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="2"/></svg>',
      cone:   '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3 L21 21 L3 21 Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>',
      pencil: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 20h4L19 9l-4-4L4 16zm13-17 4 4-2 2-4-4z"/></svg>',
      eraser: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 15l7-7 7 7-4 4H7zm4 6h12v1.6H7z"/></svg>',
      square: '<svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="4" width="16" height="16" rx="1" fill="none" stroke="currentColor" stroke-width="2"/></svg>',
      pen:    '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 18c2-6 5-6 7-3s4 4 6-1 3-6 5-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>',
    };
    function buildToolRail() {
      const rail = document.createElement('div');
      rail.className = 'tool-rail';
      // groups render into their own container — renderRail() rewrites it on
      // every pick, so the dice section below must live OUTSIDE it to survive.
      const groupsEl = document.createElement('div');
      rail.appendChild(groupsEl);

      // Tools collapse into groups. A group is ONE rail button showing its
      // currently-active member's icon; clicking it opens the slide-out with the
      // member icons in a row plus that group's options. Adding a shape later
      // (rectangle / line / freehand) = one more entry in `members`.
      const groups = [
        { id: 'select', kind: 'single', icon: TOOL_ICON.select, title: 'Select / move' },
        { id: 'shapes', kind: 'group', opts: 'draw', title: 'Shapes', members: [
            { id: 'circle', icon: TOOL_ICON.circle, title: 'Circle / radius' },
            { id: 'cone',   icon: TOOL_ICON.cone,   title: 'Cone' },
            { id: 'rect',   icon: TOOL_ICON.square, title: 'Square / rectangle' },
            { id: 'pen',    icon: TOOL_ICON.pen,    title: 'Free draw' },
          ] },
      ];
      if (IS_STAFF) groups.push(
        { id: 'fog', kind: 'group', opts: 'fog', title: 'Fog', members: [
            { id: 'hide',   icon: TOOL_ICON.pencil, title: 'Draw fog (hide map)' },
            { id: 'reveal', icon: TOOL_ICON.eraser, title: 'Erase fog (reveal map)' },
          ] });

      // remembered per-group selection → drives each rail button's icon
      const lastMember = {};
      groups.forEach(g => { if (g.kind === 'group') lastMember[g.id] = g.members[0].id; });

      const opts = document.createElement('div');
      opts.className = 'tool-options';

      function railIcon(g) {
        return g.kind === 'single' ? g.icon
          : g.members.find(m => m.id === lastMember[g.id]).icon;
      }
      function renderRail() {
        groupsEl.innerHTML = groups.map(g =>
          `<button class="tool-btn" data-group="${g.id}" title="${g.title}">${railIcon(g)}</button>`).join('');
        groupsEl.querySelectorAll('.tool-btn').forEach(b =>
          b.addEventListener('click', () => onGroup(b.dataset.group)));
      }
      function markGroup(id) {
        groupsEl.querySelectorAll('.tool-btn').forEach(b =>
          b.classList.toggle('active', b.dataset.group === id));
      }

      function fogOptsHtml() { return `
          <p class="gc-sub">Fog brush <span class="gc-tag">DM</span></p>
          <div class="gc-row"><label for="tr-size">Brush</label>
            <input type="range" id="tr-size" min="0" max="4" step="1"></div>
          <div class="gc-row gc-fog-bulk">
            <button class="gc-btn" id="tr-all">Reveal all</button>
            <button class="gc-btn" id="tr-none">Hide all</button>
          </div>`; }
      function drawOptsHtml() { return `
          <p class="gc-sub">Colour</p>
          <div class="gc-row"><label for="tr-color">Pick</label>
            <input type="color" id="tr-color" value="${DRAW.color}"></div>
          <p class="tr-hint">Tap &amp; drag the map to place. Use Select to remove yours.</p>`; }
      function wireOpts(kind) {
        if (kind === 'fog') {
          const s = opts.querySelector('#tr-size'); s.value = FOG.size;
          s.addEventListener('input', () => { FOG.size = parseInt(s.value, 10); });
          opts.querySelector('#tr-all').addEventListener('click', revealAllFog);
          opts.querySelector('#tr-none').addEventListener('click', hideAllFog);
        } else if (kind === 'draw') {
          opts.querySelector('#tr-color').addEventListener('input', e => { DRAW.color = e.target.value; });
        }
      }

      function openGroup(g) {
        const row = `<div class="tool-subrow">` + g.members.map(m =>
          `<button class="tool-btn${m.id === lastMember[g.id] ? ' active' : ''}" data-tool="${m.id}" title="${m.title}">${m.icon}</button>`).join('') + `</div>`;
        opts.innerHTML = row + (g.opts === 'fog' ? fogOptsHtml() : drawOptsHtml());
        wireOpts(g.opts);
        opts.querySelectorAll('.tool-subrow .tool-btn').forEach(b =>
          b.addEventListener('click', () => {
            lastMember[g.id] = b.dataset.tool;
            setTool(b.dataset.tool);
            opts.querySelectorAll('.tool-subrow .tool-btn').forEach(x =>
              x.classList.toggle('active', x.dataset.tool === b.dataset.tool));
            renderRail(); markGroup(g.id);            // rail icon now reflects the pick
          }));
        opts.classList.add('open');
      }

      function onGroup(id) {
        const g = groups.find(x => x.id === id);
        if (g.kind === 'single') { setTool(id); opts.classList.remove('open'); markGroup(id); return; }
        setTool(lastMember[g.id]);                    // group button = its current member
        markGroup(id);
        openGroup(g);
      }

      function setTool(t) {
        TOOL = t;
        const fog = (t === 'reveal' || t === 'hide');
        const draw = (t === 'circle' || t === 'cone');
        FOG.editing = fog;
        if (fog) FOG.brush = t;
        stage.classList.toggle('fog-edit', fog || draw);   // crosshair for paint + draw
        if (boardEl) boardEl.classList.toggle('tool-select', t === 'select');  // reveals delete handles
      }

      // ── dice tray: ⚄ expands a count row (1–8) + the dice. The count
      // persists while you stay on the same die and resets to 1 when you
      // switch dice (locked with M). Rolls post to the feed's combat channel
      // through the same parser/format as /roll, honoring the hide toggle. ──
      let diceCount = 1, lastDie = null;
      const diceBtn = document.createElement('button');
      diceBtn.className = 'tool-btn';
      diceBtn.title = 'Dice';
      diceBtn.textContent = '⚄';
      const tray = document.createElement('div');
      tray.className = 'dice-tray';
      tray.innerHTML =
        `<div class="dice-count">${[1,2,3,4,5,6,7,8].map(n => `<button data-n="${n}"${n === 1 ? ' class="on"' : ''}>${n}</button>`).join('')}</div>`
        + [4, 6, 8, 10, 12, 20, 100].map(d => `<button class="dice-die" data-die="${d}">d${d}</button>`).join('');
      function setDiceCount(n) {
        diceCount = n;
        tray.querySelectorAll('.dice-count button').forEach(b => b.classList.toggle('on', parseInt(b.dataset.n, 10) === n));
      }
      tray.querySelectorAll('.dice-count button').forEach(b =>
        b.addEventListener('click', () => setDiceCount(parseInt(b.dataset.n, 10))));
      tray.querySelectorAll('.dice-die').forEach(b => b.addEventListener('click', () => {
        const d = parseInt(b.dataset.die, 10);
        if (lastDie !== null && d !== lastDie) setDiceCount(1);
        lastDie = d;
        feedRollWithMods(diceCount, d);
      }));
      diceBtn.addEventListener('click', () =>
        diceBtn.classList.toggle('active', tray.classList.toggle('open')));
      rail.appendChild(diceBtn);
      rail.appendChild(tray);

      renderRail();
      stage.appendChild(rail);
      stage.appendChild(opts);
      onGroup('select');
    }
  })();
  </script>
</body>
</html>
