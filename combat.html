      let drawing = false, drawOX = 0, drawOY = 0, drawPts = null;      // shape placement (drawPts = freehand pen points)
      const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
      const mid  = (a, b) => ({ x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 });

      stage.addEventListener('pointerdown', (e) => {
        if (e.button > 0) return;                 // right/middle mouse → handled by contextmenu
        // never let board pan/drag steal interactions meant for the UI panels
        if (e.target.closest('.grid-controls, .zoom-bar, .tool-rail, .tool-options, .gc-backdrop, .display-tab, .bestiary-tab, .bestiary-panel, .view-toggle, .combat-tab, .combat-menu, .statblock-panel, .init-strip, .draw-del')) return;
        if (FOG.editing && IS_STAFF) {                 // fog paint mode → paint cells, skip token/pan logic
          try { stage.setPointerCapture(e.pointerId); } catch (_) {}
          fogPainting = true;
          const cell = screenToCell(e.clientX, e.clientY);
          paintCell(cell.col, cell.row);
          return;
        }
        if (TOOL === 'circle' || TOOL === 'cone' || TOOL === 'rect' || TOOL === 'pen') {  // shape placement → skip token/pan logic
          try { stage.setPointerCapture(e.pointerId); } catch (_) {}
          drawing = true;
          const c = screenToCell(e.clientX, e.clientY);
          drawOX = c.col; drawOY = c.row;
          if (TOOL === 'pen') {
            const f = screenToCellF(e.clientX, e.clientY);
            drawPts = [[f.col, f.row]];
            drawPreview = { kind: 'pen', color: DRAW.color, geometry: { pts: drawPts } };
          } else if (TOOL === 'circle') {
            drawPreview = { kind: 'circle', color: DRAW.color, geometry: { cx: drawOX, cy: drawOY, r: 1 } };
          } else if (TOOL === 'cone') {
            drawPreview = { kind: 'cone', color: DRAW.color, geometry: { ox: drawOX, oy: drawOY, angle: 0, len: 1 } };
          } else {
            drawPreview = { kind: 'rect', color: DRAW.color, geometry: { x: drawOX, y: drawOY, w: 1, h: 1 } };
          }
          redrawDrawings();
          return;
        }
        // self-heal: the first finger of a fresh gesture clears any pointer left
        // stranded by a dropped up/cancel (iOS capture quirk) — otherwise a stale
        // entry makes the next single touch read as a 2-finger pinch.
        if (e.isPrimary) { pointers.clear(); mode = null; pinch = null; }
        try { stage.setPointerCapture(e.pointerId); } catch (_) {}
        pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

        if (pointers.size === 2) {                       // second finger → pinch
          if (mode === 'drag' && dragId != null) {       // abort an in-progress drag
            const c = COMBS.find(k => k.id === dragId); if (c) updateTokenPos(c);
            const el = tokenEl(dragId); if (el) el.classList.remove('dragging');
            clearMeasure(); dragOrigin = null;
          }
          dragId = null; mode = 'pinch';
          clearTimeout(lpTimer); lpTimer = null; longPressed = false;
          const p = [...pointers.values()]; const m = mid(p[0], p[1]);
          pinch = { dist: dist(p[0], p[1]), x: m.x, y: m.y };
          return;
        }
        if (pointers.size !== 1) return;

        start = last = { x: e.clientX, y: e.clientY }; moved = false;
        const tokEl = e.target.closest('.token');
        tapId = tokEl ? tokEl.dataset.id : null;
        if (tokEl) {
          const c = COMBS.find(k => k.id === tapId);
          longPressed = false; downX = e.clientX; downY = e.clientY;
          if (e.pointerType !== 'mouse') {            // touch/pen: hold to open the menu
            clearTimeout(lpTimer);
            lpTimer = setTimeout(() => {
              lpTimer = null; longPressed = true;
              const el = tokenEl(tapId); if (el) el.classList.remove('dragging');
              clearMeasure(); dragOrigin = null;
              mode = 'menu'; dragId = null; dragCell = null;   // menu open → disarm drag (no ghost-follow, no half-move)
              selectToken(tapId);
              openCtxMenu(c, downX, downY);
            }, 500);
          }
          if (c && canMove(c)) { mode = 'drag'; dragId = tapId; dragOrigin = { col: c.x, row: c.y }; } else { mode = 'tap'; }
        } else { mode = 'pan'; }
      });

      stage.addEventListener('pointermove', (e) => {
        sendCursor(e.clientX, e.clientY);
        if (fogPainting) { const cell = screenToCell(e.clientX, e.clientY); paintCell(cell.col, cell.row); return; }
        if (drawing) {
          if (TOOL === 'pen') {
            const f = screenToCellF(e.clientX, e.clientY);
            const lp = drawPts[drawPts.length - 1];
            if (Math.hypot(f.col - lp[0], f.row - lp[1]) > 0.12) drawPts.push([f.col, f.row]);  // sample by distance
            drawPreview = { kind: 'pen', color: DRAW.color, geometry: { pts: drawPts } };
          } else {
            const c = screenToCell(e.clientX, e.clientY);
            const dx = c.col - drawOX, dy = c.row - drawOY;
            const dist = Math.max(1, Math.round(Math.hypot(dx, dy)));
            if (TOOL === 'circle')    drawPreview = { kind: 'circle', color: DRAW.color, geometry: { cx: drawOX, cy: drawOY, r: dist } };
            else if (TOOL === 'cone') drawPreview = { kind: 'cone',   color: DRAW.color, geometry: { ox: drawOX, oy: drawOY, angle: Math.atan2(dy, dx), len: dist } };
            else                      drawPreview = { kind: 'rect',   color: DRAW.color,
                                        geometry: { x: Math.min(drawOX, c.col), y: Math.min(drawOY, c.row),
                                                    w: Math.abs(c.col - drawOX) + 1, h: Math.abs(c.row - drawOY) + 1 } };
          }
          redrawDrawings();
          return;
        }
        if (!pointers.has(e.pointerId)) return;
        pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
        const rect = stage.getBoundingClientRect();

        if (mode === 'pinch' && pointers.size >= 2) {
          const p = [...pointers.values()]; const d = dist(p[0], p[1]); const m = mid(p[0], p[1]);
          if (pinch && pinch.dist > 0) {
            zoomAt(d / pinch.dist, m.x - rect.left, m.y - rect.top);
            panX += (m.x - pinch.x); panY += (m.y - pinch.y); applyTransform();
          }
          pinch = { dist: d, x: m.x, y: m.y };
          return;
        }

        const dx = e.clientX - last.x, dy = e.clientY - last.y;
        if (!moved && Math.hypot(e.clientX - start.x, e.clientY - start.y) > 4) { moved = true; clearTimeout(lpTimer); lpTimer = null; }

        if (mode === 'drag' && dragId != null && moved) {
          const { col, row } = screenToCell(e.clientX, e.clientY);
          const p = cellCenterPct(col, row); const el = tokenEl(dragId);
          if (el) { el.style.left = p.x + '%'; el.style.top = p.y + '%'; el.classList.add('dragging'); }
          dragCell = { col, row };
          if (dragOrigin) {
            const dc = COMBS.find(k => k.id === dragId);
            showMeasure(dragOrigin.col, dragOrigin.row, col, row, dc && dc.source_key);
          }
        } else if (mode === 'pan' && moved) {
          panX += dx; panY += dy; applyTransform();
        }
        last = { x: e.clientX, y: e.clientY };
      });

      function endPointer(e) {
        if (fogPainting) { fogPainting = false; try { stage.releasePointerCapture(e.pointerId); } catch (_) {} flushFog(); return; }
        if (drawing) {
          drawing = false;
          try { stage.releasePointerCapture(e.pointerId); } catch (_) {}
          const p = drawPreview; drawPreview = null;
          const okPen = !p || p.kind !== 'pen' || (p.geometry.pts && p.geometry.pts.length >= 2);
          if (p && okPen) createDrawing(p.kind, p.geometry); else redrawDrawings();
          drawPts = null;
          return;
        }
        if (!pointers.has(e.pointerId)) return;
        pointers.delete(e.pointerId);
        try { stage.releasePointerCapture(e.pointerId); } catch (_) {}
        clearTimeout(lpTimer); lpTimer = null;
        if (mode === 'pinch') { if (pointers.size < 2) { mode = pointers.size === 1 ? 'pan' : null; pinch = null; } return; }

        if (longPressed) {                               // menu already opened; no select/move
          longPressed = false;
        } else if (!moved) {                             // tap → (de)select
          if (tapId) selectToken(tapId); else deselect();
        } else if (mode === 'drag' && dragId != null && dragCell) {
          const el = tokenEl(dragId); if (el) el.classList.remove('dragging');
          clearMeasure();
          moveCombatant(dragId, dragCell.col, dragCell.row);
          selectToken(dragId);
        }
        if (pointers.size === 0) { mode = null; dragId = null; dragCell = null; dragOrigin = null; }
      }
      stage.addEventListener('pointerup', endPointer);
      stage.addEventListener('pointercancel', endPointer);
      stage.addEventListener('lostpointercapture', endPointer);   // capture yanked → clean the pointer too
      stage.addEventListener('click', (e) => {                    // ✕ handle on a drawing → remove it
        const del = e.target.closest('.draw-del');
        if (del) { e.stopPropagation(); deleteDrawing(del.dataset.id); }
      });

      // desktop right-click → context menu
      stage.addEventListener('contextmenu', (e) => {
        const tokEl = e.target.closest('.token');
        if (!tokEl) return;
        e.preventDefault();
        const c = COMBS.find(k => k.id === tokEl.dataset.id);
        selectToken(tokEl.dataset.id);
        openCtxMenu(c, e.clientX, e.clientY);
      });

      stage.addEventListener('wheel', (e) => {
        // inside a scrollable UI panel → let it scroll natively, don't zoom
        if (e.target.closest('.bestiary-panel, .statblock-panel, .init-strip, .grid-controls, .tool-options')) return;
        e.preventDefault();
        const rect = stage.getBoundingClientRect();
        zoomAt(e.deltaY < 0 ? 1.1 : 1 / 1.1, e.clientX - rect.left, e.clientY - rect.top);
      }, { passive: false });

      // arrow keys nudge the selected token one cell
      window.addEventListener('keydown', (e) => {
        if (!SELECTED) return;
        const D = { ArrowUp:[0,-1], ArrowDown:[0,1], ArrowLeft:[-1,0], ArrowRight:[1,0] }[e.key];
        if (!D) return;
        const c = COMBS.find(k => k.id === SELECTED); if (!c || !canMove(c)) return;
        e.preventDefault();
        const col = Math.max(0, Math.min(META.cols - 1, c.x + D[0]));
        const row = Math.max(0, Math.min(META.rows - 1, c.y + D[1]));
        if (col !== c.x || row !== c.y) moveCombatant(SELECTED, col, row);
      });
    }

    // ── realtime: a move on any client updates every other board live ──
    let HUD_ONCHANGE = null;   // HUD live-in callback; invoked from the combatants UPDATE handler

    function initRealtime() {
      if (!SB || !ENC) return;
      MY_ID = (ME && ME.id) || ('anon-' + Math.random().toString(36).slice(2));
      MY_NAME = (ME && ME.characterKey)
        ? ME.characterKey.charAt(0).toUpperCase() + ME.characterKey.slice(1)
        : 'DM';
      ensureCursorLayer();
      RT = SB.channel('combat-' + ENC.id, { config: { presence: { key: MY_ID } } });
      RT.on('postgres_changes',
          { event: 'UPDATE', schema: 'public', table: 'combatants', filter: 'encounter_id=eq.' + ENC.id },
          ({ new: row }) => {
            if (!row || row.id === dragId) return;       // ignore the echo of my own drag
            const c = COMBS.find(k => k.id === row.id);
            if (!c) {                                    // row just became visible to us (e.g. DM revealed it)
              COMBS.push(row); renderTokens(); renderInitStrip(); return;
            }
            // a row we can see was re-hidden from us (non-staff, not ours) → drop it
            if (!IS_STAFF && row.hidden && !(ME && row.owner === ME.id)) {
              COMBS = COMBS.filter(k => k.id !== row.id); renderTokens(); renderInitStrip(); return;
            }
            const hiddenChanged = c.hidden !== row.hidden;
            const initChanged   = c.initiative !== row.initiative;
            const inCombatChanged = c.in_combat !== row.in_combat;
            c.x = row.x; c.y = row.y; c.hp = row.hp; c.conditions = row.conditions; c.size = row.size; c.hidden = row.hidden; c.initiative = row.initiative; c.in_combat = row.in_combat;
            if (hiddenChanged) {
              renderTokens();                            // staff badge (∅) appears/clears
            } else {
              updateTokenPos(c);
              updateTokenConditions(c);
              updateTokenSize(c);
              reconcileTokenVisibility(c);               // moved into / out of the light?
            }
            if (hiddenChanged || initChanged || inCombatChanged) renderInitStrip();
            if (HUD_ONCHANGE && c.side === 'party' && c.source_key)
              HUD_ONCHANGE({ key: c.source_key, combat: { hp: row.hp, conditions: row.conditions, initiative: row.initiative, in_combat: row.in_combat } });
          })
        // New / removed combatants (e.g. a DM dropping or clearing an enemy).
        // Same channel as the UPDATE above — never a second postgres_changes
        // channel on this table. We keep COMBS in sync and re-render the layer.
        .on('postgres_changes',
          { event: 'INSERT', schema: 'public', table: 'combatants', filter: 'encounter_id=eq.' + ENC.id },
          ({ new: row }) => {
            if (!row || COMBS.some(k => k.id === row.id)) return;   // dedupe my own drop echo
            COMBS.push(row);
            renderTokens();
            renderInitStrip();
          })
        .on('postgres_changes',
          { event: 'DELETE', schema: 'public', table: 'combatants', filter: 'encounter_id=eq.' + ENC.id },
          ({ old }) => {
            if (!old || !old.id) return;
            COMBS = COMBS.filter(k => k.id !== old.id);
            renderTokens();
            renderInitStrip();
          })
        .on('postgres_changes',
          { event: 'UPDATE', schema: 'public', table: 'encounters', filter: 'id=eq.' + ENC.id },
          ({ new: row }) => {
            if (!row) return;
            ENC.revealed_cells = row.revealed_cells || [];
            ENC.active_combatant_id = row.active_combatant_id;
            ENC.round = row.round;
            document.getElementById('combat-round').textContent = row.round ?? 1;
            loadFog(); redrawFog(); renderTokens();      // fog moved → re-veil + re-evaluate token visibility
            renderInitStrip();                            // turn pointer / round changed
            pushTurnToHud();                              // forward round + whose-turn to the HUD
          })
        .on('postgres_changes',
          { event: '*', schema: 'public', table: 'drawings', filter: 'encounter_id=eq.' + ENC.id },
          (payload) => {
            const { eventType, new: row, old } = payload;
            if (eventType === 'INSERT')      { if (!DRAWINGS.some(d => d.id === row.id)) DRAWINGS.push(row); }
            else if (eventType === 'UPDATE') { const i = DRAWINGS.findIndex(d => d.id === row.id); if (i >= 0) DRAWINGS[i] = row; }
            else if (eventType === 'DELETE') { DRAWINGS = DRAWINGS.filter(d => d.id !== (old && old.id)); }
            redrawDrawings();
          })
        .on('broadcast', { event: 'cursor' }, ({ payload }) => onCursor(payload))
        .on('presence', { event: 'leave' }, ({ leftPresences }) =>
          (leftPresences || []).forEach(pr => pr && pr.id && removeCursor(pr.id)))
        .subscribe((status) => { if (status === 'SUBSCRIBED') RT.track({ id: MY_ID }); });
    }

    // ── zoom toolbar ──
    function buildZoomBar() {
      const bar = document.createElement('div');
      bar.className = 'zoom-bar';
      bar.innerHTML = `<button id="z-in" title="Zoom in">+</button>
                       <button id="z-out" title="Zoom out">−</button>
                       <button id="z-fit" class="fit" title="Fit to screen">FIT</button>`;
      stage.appendChild(bar);
      const c = () => ({ x: stage.clientWidth / 2, y: stage.clientHeight / 2 });
      bar.querySelector('#z-in').onclick  = () => { const m = c(); zoomAt(1.25, m.x, m.y); };
      bar.querySelector('#z-out').onclick = () => { const m = c(); zoomAt(1 / 1.25, m.x, m.y); };
      bar.querySelector('#z-fit').onclick = () => fitBoard(META);
    }

    // ── main ──
    whenReady(async function () {
      const sb = window.__tok.sb;  SB = sb;
      const me = window.__tok.ready ? await window.__tok.ready : null;  ME = me;
      const isStaff = !!(me && (me.role === 'overseer' || me.role === 'dm'));

      let manifest;
      try {
        manifest = await (await fetch(MANIFEST_URL)).json();
      } catch (e) {
        showMsg('Map manifest missing', 'Could not load maps/manifest.json.', false);
        return;
      }

      // active encounter (RLS: all authenticated can read)
      const { data: enc, error: encErr } = await sb
        .from('encounters').select('*').eq('status', 'active').maybeSingle();
      if (encErr) { showMsg('Could not load the encounter', encErr.message, false); return; }
      if (!enc)   { showMsg('No active encounter', 'When the DM starts a fight, the battlefield appears here.', false); return; }
      ENC = enc;
      loadFog();          // mirror encounters.revealed_cells into FOG.cells

      META = manifest[enc.map_ref];
      if (!META) { showMsg('Unknown map', `No manifest entry for "${enc.map_ref}".`, false); return; }
      if (META.grid) GRID = Object.assign(GRID, META.grid);

      // combatants (RLS auto-filters: players never receive hidden rows)
      const { data: combs, error: cErr } = await sb
        .from('combatants').select('*').eq('encounter_id', enc.id);
      if (cErr) { showMsg('Could not load combatants', cErr.message, false); return; }

      // header
      document.getElementById('combat-name').textContent  = enc.name || 'Encounter';
      document.getElementById('combat-round').textContent = enc.round ?? 1;
      barEl.style.display = 'flex';

      // build the board
      hideMsg();
      COMBS = combs || [];
      const { data: draws } = await sb.from('drawings').select('*').eq('encounter_id', enc.id);
      DRAWINGS = draws || [];
      IS_STAFF = isStaff;
      boardEl = document.createElement('div');
      boardEl.className = 'board';
      const tokensHtml = COMBS.filter(tokenVisible).map(c => tokenHtml(c, META, effectiveStaff())).join('');
      boardEl.innerHTML =
        `<img class="board-map" alt="${enc.map_ref}" draggable="false" src="${mapUrl(META.publicId)}"
              onerror="this.classList.add('missing')">
         ${gridSvg(META)}
         ${drawSvg(META)}
         ${fogSvg(META)}
         <div class="board-tokens">${tokensHtml}</div>
         ${measureSvg(META)}`;
      stage.appendChild(boardEl);
      fitBoard(META);

      // wire interactions (drag / pan / pinch / keys), realtime sync, zoom UI
      initInteractions();
      initRealtime();
      buildZoomBar();

      // grid controls (demonstrates the opacity / style / colour answer live)
      buildGridControls();
      buildToolRail();
      if (IS_STAFF) buildBestiary();
      if (IS_STAFF) buildViewToggle();
      if (IS_STAFF) buildCombatTab();
      if (IS_STAFF) buildStatblockPanel();
      buildInitStrip();

      // ── HUD ↔ combat bridge (shared: any user drives any party character) ──
      // battle.js is backend-agnostic; we hand it a Supabase combatants backend
      // keyed by the *selected* character (source_key), so the HUD's built-in
      // switcher is the live control. Read, live-in, and write all hit the same
      // row the token uses. Enemies aren't driven here — they stay on the
      // on-board context menu. (RLS lets any player write party rows; the column
      // guard still limits changes to hp/conditions/x,y.)
      if (window.__battle) {
        if (ME && ME.characterKey) window.__battle.setChar(ME.characterKey);
        window.__battle.useBackend({
          async load(key) {
            const c = COMBS.find(x => x.side === 'party' && x.source_key === key);
            return c ? { hp: c.hp, conditions: Array.isArray(c.conditions) ? c.conditions : [], initiative: c.initiative, in_combat: !!c.in_combat } : null;
          },
          async save(key, combat) {
            if (combat.hp === null || combat.hp === undefined) return;
            const c = COMBS.find(x => x.side === 'party' && x.source_key === key);
            if (!c) return;
            const { error } = await SB.from('combatants').update({ hp: combat.hp }).eq('id', c.id);
            if (error) console.warn('[hud] HP save failed:', error.message);
          },
          // Conditions write through their own verb (not folded into save) so a
          // HUD condition toggle touches only the conditions column — no hp/slot
          // churn. The guard trigger allows conditions on party rows.
          async saveConditions(key, arr) {
            const c = COMBS.find(x => x.side === 'party' && x.source_key === key);
            if (!c) return;
            const { error } = await SB.from('combatants').update({ conditions: arr }).eq('id', c.id);
            if (error) console.warn('[hud] conditions save failed:', error.message);
          },
          // Player rolls/enters their own initiative from the HUD; writes the
          // party row's initiative (the column guard permits it). The optimistic
          // local update + renderInitStrip re-sorts the map strip immediately.
          async setInitiative(key, val) {
            const c = COMBS.find(x => x.side === 'party' && x.source_key === key);
            if (!c) return;
            c.initiative = val;
            renderInitStrip();
            const { error } = await SB.from('combatants').update({ initiative: val }).eq('id', c.id);
            if (error) console.warn('[hud] initiative save failed:', error.message);
          },
          // The HUD's End Turn advances the *shared* tracker rather than faking a
          // local round: this writes encounters.active_combatant_id + round (round
          // ticks only on wrap). Calls the page-level advanceTurn() defined below.
          advanceTurn() { advanceTurn(); },
          // Live-in piggybacks combat.html's existing realtime channel — a second
          // postgres_changes channel on the same table is unreliable. The
          // combatant UPDATE handler calls HUD_ONCHANGE for party rows.
          subscribe(onChange) { HUD_ONCHANGE = onChange; },
        });
      }
      pushTurnToHud();   // seed HUD round + whose-turn now the backend is wired

      // keep the board fitted on resize/orientation change (grid + tokens are
      // %/viewBox-based, so only the board's px size needs recomputing)
      let rt;
      window.addEventListener('resize', () => {
        clearTimeout(rt);
        rt = setTimeout(() => { if (boardEl && META) fitBoard(META); }, 120);
      });
    });

    // ── grid controls panel ──
    function buildGridControls() {
      const panel = document.createElement('div');
      panel.className = 'grid-controls';

      // a circle/cutout selector per party character present in the encounter
      const partyRows = COMBS
        .filter(c => c.side === 'party' && c.source_key)
        .map(c => {
          const cur = TOKEN_STYLE[c.source_key] || TOKEN.style;
          return `<div class="gc-row">
              <label title="${c.name}">${(c.name || c.source_key).split(' ')[0]}</label>
              <select data-char="${c.source_key}" class="gc-cstyle">
                <option value="cutout"${cur === 'cutout' ? ' selected' : ''}>Cutout</option>
                <option value="circle"${cur === 'circle' ? ' selected' : ''}>Circle</option>
              </select>
            </div>`;
        }).join('');

      panel.innerHTML = `
        <h4>Display <span class="gc-toggle" id="gc-close">✕</span></h4>
        <div class="gc-body">
          <p class="gc-sub">Grid <span class="gc-tag">global</span></p>
          <div class="gc-row">
            <label for="gc-style">Style</label>
            <select id="gc-style">
              <option value="lines">Lines</option>
              <option value="dots">Dots</option>
              <option value="none">Off</option>
            </select>
          </div>
          <div class="gc-row">
            <label for="gc-opacity">Opacity</label>
            <input type="range" id="gc-opacity" min="0" max="1" step="0.02">
          </div>
          <div class="gc-row">
            <label for="gc-color">Colour</label>
            <input type="color" id="gc-color">
          </div>
          <div class="gc-sep"></div>
          <p class="gc-sub">Token style <span class="gc-tag">per character</span></p>
          ${partyRows || '<p class="gc-empty">No party tokens.</p>'}
          <div class="gc-sep"></div>
          <p class="gc-sub">Tokens <span class="gc-tag">view</span></p>
          <div class="gc-row">
            <label for="gc-tsize">Size</label>
            <input type="range" id="gc-tsize" min="0.6" max="1.8" step="0.05">
          </div>
          <div class="gc-row">
            <label for="gc-tring">Ring / base</label>
            <input type="checkbox" id="gc-tring">
          </div>
        </div>`;
      stage.appendChild(panel);

      const styleSel = panel.querySelector('#gc-style');
      const opac     = panel.querySelector('#gc-opacity');
      const color    = panel.querySelector('#gc-color');
      styleSel.value = GRID.style;
      opac.value     = GRID.opacity;
      color.value    = GRID.color;

      styleSel.addEventListener('change', () => { GRID.style = styleSel.value; redrawGrid(); });
      opac.addEventListener('input',      () => { GRID.opacity = parseFloat(opac.value); redrawGrid(); });
      color.addEventListener('input',     () => { GRID.color = color.value; redrawGrid(); });

      // per-character token style → updates TOKEN_STYLE and re-renders
      panel.querySelectorAll('.gc-cstyle').forEach(sel => {
        sel.addEventListener('change', () => {
          TOKEN_STYLE[sel.dataset.char] = sel.value;
          renderTokens();
        });
      });

      const tsize  = panel.querySelector('#gc-tsize');
      const tring  = panel.querySelector('#gc-tring');
      tsize.value    = TOKEN.size;
      tring.checked  = TOKEN.ring;
      tsize.addEventListener('input',   () => { TOKEN.size = parseFloat(tsize.value); renderTokens(); });
      tring.addEventListener('change',  () => { TOKEN.ring = tring.checked; renderTokens(); });

      // drawer open/close (compendium-style): a tab opens it, ✕ or backdrop closes
      const backdrop = document.createElement('div');
      backdrop.className = 'gc-backdrop';
      stage.appendChild(backdrop);
      const tab = document.createElement('button');
      tab.className = 'display-tab';
      tab.innerHTML = '⚙ Display';
      stage.appendChild(tab);
      function setDisplay(open) {
        panel.classList.toggle('open', open);
        backdrop.classList.toggle('open', open);
        tab.style.display = open ? 'none' : '';
      }
      tab.addEventListener('click', () => setDisplay(true));

    // ── bestiary picker (DM only) — search the 5etools bestiary and drop a
    // monster onto the board as a HIDDEN enemy combatant. The full monster JSON
    // is SNAPSHOT onto combatants.statblock (self-contained, survives homebrew);
    // hp/max_hp/ac/size are denormalised so the board/HUD never parse jsonb.
    // Same CDN source as compendium.html. New token appears live via the
    // combatants INSERT realtime handler. ──
    const BEST_BASE = 'https://raw.githubusercontent.com/5etools-mirror-3/5etools-2014-src/main/data';
    const BEST_SOURCES = [
      { label: 'Monster Manual', file: 'bestiary/bestiary-mm.json' },
      { label: "Volo's Guide",   file: 'bestiary/bestiary-vgm.json' },
      { label: "Mordenkainen's", file: 'bestiary/bestiary-mtf.json' },
      { label: 'DMG',            file: 'bestiary/bestiary-dmg.json' },
    ];
    const BEST_CR = [
      { label: 'All', val: null }, { label: '0–½', val: 'low' }, { label: '1–4', val: 'mid' },
      { label: '5–10', val: 'high' }, { label: '11+', val: 'deadly' },
    ];
    const SIZE_CODE = { T: 'tiny', S: 'small', M: 'medium', L: 'large', H: 'huge', G: 'gargantuan' };

    function bstFmtCR(cr)  { if (cr === 0) return '0'; if (!cr) return '—'; return typeof cr === 'object' ? (cr.cr || '—') : cr; }
    function bstParseCR(cr){ const s = bstFmtCR(cr); if (s === '1/8') return 0.125; if (s === '1/4') return 0.25; if (s === '1/2') return 0.5; return parseFloat(s) || 0; }
    function bstAC(ac) {
      if (typeof ac === 'number') return ac;
      if (Array.isArray(ac) && ac.length) { const a = ac[0]; return typeof a === 'object' ? (a.ac ?? null) : a; }
      return null;
    }
    function bstSize(sz) { return SIZE_CODE[Array.isArray(sz) ? sz[0] : sz] || 'medium'; }

    function buildBestiary() {
      const cache = {};
      let all = [], crFilter = null, srcIdx = 0;

      const panel = document.createElement('div');
      panel.className = 'bestiary-panel';
      panel.innerHTML = `
        <h4>Bestiary <span class="gc-toggle" id="bst-close">✕</span></h4>
        <select class="bst-source" id="bst-source">
          ${BEST_SOURCES.map((s, i) => `<option value="${i}">${s.label}</option>`).join('')}
        </select>
        <input class="bst-search" id="bst-search" type="text" placeholder="Search monsters…" autocomplete="off">
        <div class="bst-cr">
          ${BEST_CR.map(f => `<button data-cr="${f.val}"${f.val === null ? ' class="on"' : ''}>${f.label}</button>`).join('')}
        </div>
        <div class="bst-list" id="bst-list"><div class="bst-state">Open to load…</div></div>`;
      stage.appendChild(panel);

      const backdrop = document.createElement('div');
      backdrop.className = 'gc-backdrop bst-backdrop'; // reuse Display backdrop style; tagged for player-view hide
      stage.appendChild(backdrop);
      const tab = document.createElement('button');
      tab.className = 'bestiary-tab';
      tab.innerHTML = '☷ Bestiary';
      stage.appendChild(tab);

      const listEl = panel.querySelector('#bst-list');

      function setOpen(open) {
        panel.classList.toggle('open', open);
        backdrop.classList.toggle('open', open);
        tab.style.display = open ? 'none' : '';
        if (open && !all.length) loadSrc();
      }
      tab.addEventListener('click', () => setOpen(true));
      backdrop.addEventListener('click', () => setOpen(false));
      panel.querySelector('#bst-close').addEventListener('click', () => setOpen(false));

      async function loadSrc() {
        const url = `${BEST_BASE}/${BEST_SOURCES[srcIdx].file}`;
        listEl.innerHTML = '<div class="bst-state">Loading…</div>';
        try {
          if (!cache[url]) {
            const res = await fetch(url);
            if (!res.ok) throw new Error('HTTP ' + res.status);
            cache[url] = await res.json();
          }
          all = (cache[url].monster || []).map(m => ({ raw: m, name: m.name, cr: bstParseCR(m.cr) }));
          renderList();
        } catch (e) {
          listEl.innerHTML = `<div class="bst-state">Failed to load.<br><small>${e.message}</small></div>`;
        }
      }

      function renderList() {
        const q = (panel.querySelector('#bst-search').value || '').toLowerCase().trim();
        const shown = all.filter(e => {
          if (q && !e.name.toLowerCase().includes(q)) return false;
          if (crFilter === 'low')    return e.cr <= 0.5;
          if (crFilter === 'mid')    return e.cr >= 1 && e.cr <= 4;
          if (crFilter === 'high')   return e.cr >= 5 && e.cr <= 10;
          if (crFilter === 'deadly') return e.cr >= 11;
          return true;
        }).sort((a, b) => a.name.localeCompare(b.name));
        if (!shown.length) { listEl.innerHTML = '<div class="bst-state">No results.</div>'; return; }
        listEl.innerHTML = shown.map((e, i) => `
          <div class="bst-row">
            <span class="bst-row-name">${e.name}</span>
            <span class="bst-row-cr">CR ${bstFmtCR(e.raw.cr)}</span>
            <button class="bst-drop" data-i="${i}">Drop</button>
          </div>`).join('');
        listEl.querySelectorAll('.bst-drop').forEach(btn => {
          btn.addEventListener('click', async () => {
            if (btn.classList.contains('done')) return;
            btn.disabled = true; btn.textContent = '…';
            const ok = await dropMonster(shown[+btn.dataset.i].raw);
            btn.textContent = ok ? 'Added' : 'Retry';
            btn.classList.toggle('done', ok);
            btn.disabled = false;
          });
        });
      }

      panel.querySelector('#bst-search').addEventListener('input', renderList);
      panel.querySelector('#bst-source').addEventListener('change', (e) => { srcIdx = +e.target.value; all = []; loadSrc(); });
      panel.querySelectorAll('.bst-cr button').forEach(b => {
        b.addEventListener('click', () => {
          crFilter = b.dataset.cr === 'null' ? null : b.dataset.cr;
          panel.querySelectorAll('.bst-cr button').forEach(x => x.classList.remove('on'));
          b.classList.add('on');
          renderList();
        });
      });

      async function dropMonster(m) {
        const avg = (m.hp && typeof m.hp.average === 'number') ? m.hp.average : 1;
        const insertRow = {
          encounter_id: ENC.id, owner: null, name: m.name, side: 'enemy', hidden: true,
          hp: avg, max_hp: avg, ac: bstAC(m.ac), conditions: [], size: bstSize(m.size),
          statblock: m, x: Math.floor(META.cols / 2), y: Math.floor(META.rows / 2),
        };
        const { data, error } = await SB.from('combatants').insert(insertRow).select().single();
        if (error) { console.error('[bestiary] drop failed:', error.message); return false; }
        // Optimistic local add; the INSERT realtime echo dedupes on id.
        if (data && !COMBS.some(k => k.id === data.id)) { COMBS.push(data); renderTokens(); }
        return true;
      }
    }

    // ── "view as player" toggle (staff only) — flips a visual-only preview:
    // hidden enemies vanish, fog covers solid, DM panels hide, the context-menu
    // Manage tab disappears, and moves drop to player permissions. Real role is
    // unchanged; toggle back to act as DM. ──
    function buildViewToggle() {
      const EYE_OPEN  = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5C5 5 1 12 1 12s4 7 11 7 11-7 11-7-4-7-11-7zm0 11a4 4 0 110-8 4 4 0 010 8z"/></svg>';
      const btn = document.createElement('button');
      btn.className = 'view-toggle';
      function paint() {
        btn.classList.toggle('on', VIEW_AS_PLAYER);
        btn.innerHTML = EYE_OPEN + `<span>${VIEW_AS_PLAYER ? 'Player view' : 'View as player'}</span>`;
        btn.title = VIEW_AS_PLAYER ? 'Showing what a player sees — click for DM view' : 'Preview what players see';
      }
      btn.addEventListener('click', () => {
        VIEW_AS_PLAYER = !VIEW_AS_PLAYER;
        stage.classList.toggle('view-as-player', VIEW_AS_PLAYER);
        if (VIEW_AS_PLAYER) {
          // leaving DM tooling cleanly: stop fog painting, close DM surfaces
          FOG.editing = false; stage.classList.remove('fog-edit');
          document.querySelector('.bestiary-panel')?.classList.remove('open');
          document.querySelector('.bst-backdrop')?.classList.remove('open');
          closeCtxMenu();
        }
        redrawFog();      // veil opacity (translucent ↔ solid)
        renderTokens();   // hidden enemies + badges
        renderInitStrip(); // strip visibility + staff controls
        paint();
      });
      paint();
      stage.appendChild(btn);
    }

    // ── combat tab (staff) — right-side dropdown to start / re-roll / end
    // combat. Start is live out of combat; Roll all + End live during. ──
    function buildCombatTab() {
      const tab = document.createElement('button');
      tab.className = 'combat-tab';
      tab.innerHTML = '⚔ Combat';
      const menu = document.createElement('div');
      menu.className = 'combat-menu';
      menu.innerHTML =
        `<button data-act="start">▶ Start combat</button>` +
        `<button data-act="roll">↻ Roll all</button>` +
        `<button data-act="end">⊗ End combat</button>`;
      stage.appendChild(tab);
      stage.appendChild(menu);
      const close = () => menu.classList.remove('open');
      tab.addEventListener('click', (e) => { e.stopPropagation(); menu.classList.toggle('open'); paintCombatMenu(); });
      menu.addEventListener('click', (e) => {
        const b = e.target.closest('button[data-act]'); if (!b || b.disabled) return;
        close();
        if (b.dataset.act === 'start') startCombat();
        else if (b.dataset.act === 'roll') rollAllInitiative();
        else if (b.dataset.act === 'end') endCombat();
      });
      document.addEventListener('click', (e) => { if (!e.target.closest('.combat-tab, .combat-menu')) close(); });
      paintCombatMenu();
    }
    function paintCombatMenu() {
      const menu = document.querySelector('.combat-menu'); if (!menu) return;
      const on = inCombat();
      const s = menu.querySelector('[data-act="start"]'); if (s) s.disabled = on;
      const r = menu.querySelector('[data-act="roll"]');  if (r) r.disabled = !on;
      const e = menu.querySelector('[data-act="end"]');   if (e) e.disabled = !on;
    }
    function syncCombatChrome() { paintCombatMenu(); }

    // ── monster statblock (Phase B) ────────────────────────────────────────
    // Token art: 5etools serves token webps by source + name. We layer the img
    // over the initial-disc fallback (onerror removes it → initial shows).
    function monsterTokenUrl(c) {
      const m = c.statblock;
      if (!m || !m.source || !m.name) return null;
      return `https://5e.tools/img/bestiary/tokens/${m.source}/${encodeURIComponent(m.name)}.webp`;
    }

    // Statblock renderer — lifted from compendium.html's monster detail view
    // (uses bstFmtCR for CR; same 5etools entry shape we snapshot on drop).
    function fmtSpeed(s) {
      if (!s) return '—';
      if (typeof s === 'number') return `${s} ft.`;
      return Object.entries(s).map(([k, v]) => { const n = typeof v === 'object' ? v.number : v; return k === 'walk' ? `${n} ft.` : `${k} ${n} ft.`; }).join(', ');
    }
    function sbCleanText(str) {
      const ATK = { mw: 'Melee Weapon', rw: 'Ranged Weapon', ms: 'Melee Spell', rs: 'Ranged Spell', m: 'Melee', r: 'Ranged' };
      return (str || '')
        .replace(/\{@b ([^}]+)\}/g, '<strong>$1</strong>')
        .replace(/\{@i ([^}]+)\}/g, '<em>$1</em>')
        .replace(/\{@(?:spell|creature|item) ([^|}]+)[^}]*\}/g, '<span style="color:var(--gold-light)">$1</span>')
        .replace(/\{@condition ([^|}]+)[^}]*\}/g, '<em>$1</em>')
        .replace(/\{@atk ([^}]+)\}/g, (_, codes) => codes.split(',').map(c => ATK[c.trim()] || c.trim()).join(' or ') + ' Attack:')
        .replace(/\{@h\}/g, 'Hit: ')
        .replace(/\{@recharge ([^}]+)\}/g, '(Recharge $1–6)')
        .replace(/\{@hit ([^}]+)\}/g, '+$1')
        .replace(/\{@dc ([^}]+)\}/g, 'DC $1')
        .replace(/\{@(?:damage|dice) ([^}]+)\}/g, '$1')
        .replace(/\{@[a-z]+ ([^|}]+)[^}]*\}/g, '$1')
        .replace(/\{@[^}]+\}/g, '');
    }
    function sbEntries(entries) {
      if (!entries) return '';
      return entries.map(e => {
        if (typeof e === 'string') return `<p>${sbCleanText(e)}</p>`;
        if (e.type === 'entries') return `${e.name ? `<p><strong>${e.name}</strong></p>` : ''}${sbEntries(e.entries || [])}`;
        if (e.type === 'list') return `<ul>${(e.items || []).map(i => `<li>${typeof i === 'string' ? sbCleanText(i) : sbEntries(i.entries || []).replace(/<\/?p>/g, '')}</li>`).join('')}</ul>`;
        if (e.type === 'table') {
          const head = e.colLabels ? `<tr>${e.colLabels.map(l => `<th>${sbCleanText(l)}</th>`).join('')}</tr>` : '';
          const rows = (e.rows || []).map(r => `<tr>${r.map(cell => `<td>${typeof cell === 'string' ? sbCleanText(cell) : cell?.roll ? `${cell.roll.min}–${cell.roll.max}` : ''}</td>`).join('')}</tr>`).join('');
          return `<table><thead>${head}</thead><tbody>${rows}</tbody></table>`;
        }
        if (typeof e === 'object' && e.entries) return sbEntries(e.entries);
        return '';
      }).join('');
    }
    function sbTraits(traits, heading) {
      if (!traits || !traits.length) return '';
      return `<div class="detail-section"><div class="detail-section-title">${heading}</div>
        ${traits.map(t => `<div class="trait-block"><span class="trait-name">${t.name}.</span><div class="trait-body">${sbEntries(t.entries || [])}</div></div>`).join('')}
      </div>`;
    }
    function renderMonster(m) {
      const type = [m.size, typeof m.type === 'object' ? m.type.type : m.type].filter(Boolean).join(' ');
      const ac = Array.isArray(m.ac) ? m.ac.map(a => typeof a === 'object' ? `${a.ac}${a.from ? ' (' + a.from.map(sbCleanText).join(', ') + ')' : ''}` : `${a}`).join(', ') : `${m.ac || '—'}`;
      const hp = m.hp ? `${m.hp.average} (${m.hp.formula})` : '—';
      const saves = m.save ? Object.entries(m.save).map(([k, v]) => `${k.toUpperCase()} ${v}`).join(', ') : '—';
      const skills = m.skill ? Object.entries(m.skill).map(([k, v]) => `${k} ${v}`).join(', ') : '—';
      const imm = m.immune ? m.immune.map(i => typeof i === 'object' ? i.immune?.join(', ') : i).filter(Boolean).join(', ') : '—';
      const res = m.resist ? m.resist.map(r => typeof r === 'object' ? r.resist?.join(', ') : r).filter(Boolean).join(', ') : '—';
      const strip = ['str', 'dex', 'con', 'int', 'wis', 'cha'].map(a => { const sc = m[a] || 10, mod = Math.floor((sc - 10) / 2); return `<div class="ability-cell"><span class="ability-cell-label">${a.toUpperCase()}</span><span class="ability-cell-score">${sc}</span><span class="ability-cell-mod">${mod >= 0 ? '+' : ''}${mod}</span></div>`; }).join('');
      return `<div class="detail-name">${m.name}</div><div class="detail-meta">${type} · CR ${bstFmtCR(m.cr)}</div><hr class="detail-rule">
        <div class="detail-stats">
          <div class="detail-stat"><span class="detail-stat-label">AC</span><span class="detail-stat-val">${ac}</span></div>
          <div class="detail-stat"><span class="detail-stat-label">HP</span><span class="detail-stat-val">${hp}</span></div>
          <div class="detail-stat"><span class="detail-stat-label">Speed</span><span class="detail-stat-val">${fmtSpeed(m.speed)}</span></div>
          ${saves !== '—' ? `<div class="detail-stat"><span class="detail-stat-label">Saving Throws</span><span class="detail-stat-val">${saves}</span></div>` : ''}
          ${skills !== '—' ? `<div class="detail-stat"><span class="detail-stat-label">Skills</span><span class="detail-stat-val">${skills}</span></div>` : ''}
          ${imm !== '—' ? `<div class="detail-stat"><span class="detail-stat-label">Immunities</span><span class="detail-stat-val">${imm}</span></div>` : ''}
          ${res !== '—' ? `<div class="detail-stat"><span class="detail-stat-label">Resistances</span><span class="detail-stat-val">${res}</span></div>` : ''}
          <div class="detail-stat"><span class="detail-stat-label">Senses</span><span class="detail-stat-val">${(m.senses || []).join(', ') || '—'}</span></div>
          <div class="detail-stat"><span class="detail-stat-label">Languages</span><span class="detail-stat-val">${m.languages || '—'}</span></div>
        </div><hr class="detail-rule">
        <div class="ability-strip">${strip}</div>
        ${sbTraits(m.trait || [], 'Traits')}${sbTraits(m.action || [], 'Actions')}${sbTraits(m.bonus || [], 'Bonus Actions')}${sbTraits(m.reaction || [], 'Reactions')}${sbTraits(m.legendary || [], 'Legendary Actions')}
        <div class="source-note">Source: ${m.source || 'MM'}${m.page ? ', p.' + m.page : ''}</div>`;
    }

    // The on-demand statblock drawer. Opened from a token's Manage tab via the
    // module-scope openStatblock(c); no permanent tab (DM info, not a fixture).
    let openStatblock = null;
    function buildStatblockPanel() {
      const panel = document.createElement('div');
      panel.className = 'statblock-panel';
      stage.appendChild(panel);
      const backdrop = document.createElement('div');
      backdrop.className = 'gc-backdrop sb-backdrop';
      stage.appendChild(backdrop);
      function close() { panel.classList.remove('open'); backdrop.classList.remove('open'); }
      backdrop.addEventListener('click', close);
      openStatblock = (c) => {
        if (!c || !c.statblock) return;
        panel.innerHTML = `<span class="sb-close">✕</span>` + renderMonster(c.statblock);
        panel.querySelector('.sb-close').addEventListener('click', close);
        panel.scrollTop = 0;
        panel.classList.add('open');
        backdrop.classList.add('open');
      };
    }

    // ── initiative & turn tracker (Phase C1) ────────────────────────────────
    let stripEl = null;
    const BURNT_SEEDS = [3, 7, 12, 19, 5, 14, 21, 9];
    function chipSeed(id) {                                  // stable per-combatant grain
      let h = 0; const s = String(id || '');
      for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) | 0;
      return BURNT_SEEDS[Math.abs(h) % BURNT_SEEDS.length];
    }
    // Participants in the active encounter (in_combat). Rolled combatants sort
    // by initiative (highest first); pending ones — in the fight, no roll yet —
    // sit at the tail until their number lands. Drives the strip render.
    function initRoster() {
      return COMBS.filter(c => c.in_combat).slice().sort((a, b) => {
        const ap = a.initiative == null, bp = b.initiative == null;
        if (ap !== bp) return ap ? 1 : -1;                    // pending → tail
        return (b.initiative - a.initiative) || (a.side === 'party' ? -1 : 1) || String(a.name).localeCompare(String(b.name));
      });
    }
    // The turn cycle steps only through rolled participants; a pending PC has no
    // slot until they enter a number, then re-sorts in on the next advance.
    function turnOrder() { return initRoster().filter(c => c.initiative != null); }
    function rollValue(c) {
      let mod = 0;
      if (c.side === 'party' && c.source_key && typeof CHARACTERS !== 'undefined' && CHARACTERS[c.source_key]) {
        const cc = CHARACTERS[c.source_key];
        mod = (cc.combat && typeof cc.combat.initiative === 'number') ? cc.combat.initiative
            : (cc.abilities && cc.abilities.dex && cc.abilities.dex.mod) || 0;
      } else if (c.statblock && typeof c.statblock.dex === 'number') {
        mod = Math.floor((c.statblock.dex - 10) / 2);
      }
      return Math.floor(Math.random() * 20) + 1 + mod;
    }
    async function setInitiative(id, val) {
      const c = COMBS.find(k => k.id === id); if (!c) return false;
      const prev = c.initiative; c.initiative = val; renderInitStrip();
      const { error } = await SB.from('combatants').update({ initiative: val }).eq('id', id);
      if (error) { c.initiative = prev; renderInitStrip(); console.error('[init] write failed:', error.message); return false; }
      return true;
    }
    function rollInitiative(c) { return setInitiative(c.id, rollValue(c)); }
    // Resolve the active combatant's player key for the HUD: a party source_key
    // when it's a PC's turn, else null (monster turn / nobody seated).
    function activeSourceKey() {
      if (!ENC || !ENC.active_combatant_id) return null;
      const c = COMBS.find(x => x.id === ENC.active_combatant_id);
      return (c && c.side === 'party' && c.source_key) ? c.source_key : null;
    }
    // Forward shared round + whose-turn to the HUD (marquee + economy-on-start).
    function pushTurnToHud() {
      if (window.__battle && window.__battle.setTurn)
        window.__battle.setTurn({ round: (ENC && ENC.round) || 1, activeKey: activeSourceKey() });
    }
    async function setActive(id, round) {
      if (!ENC) return;
      ENC.active_combatant_id = id; if (round != null) ENC.round = round;
      document.getElementById('combat-round').textContent = ENC.round ?? 1;
      renderInitStrip();
      pushTurnToHud();
      const patch = { active_combatant_id: id }; if (round != null) patch.round = round;
      const { error } = await SB.from('encounters').update(patch).eq('id', ENC.id);
      if (error) console.error('[init] turn write failed:', error.message);
    }
    async function advanceTurn() {
      const order = turnOrder(); if (!order.length) return;
      const i = order.findIndex(c => c.id === (ENC && ENC.active_combatant_id));
      const next = i < 0 ? 0 : (i + 1) % order.length;
      let round = (ENC && ENC.round) || 1;
      if (i >= 0 && next === 0) round++;
      await setActive(order[next].id, round);
    }
    // DM "Roll all": rolls every non-party participant; party PCs are seated as
    // pending (in_combat, initiative cleared) so their owners enter their own
    // number. Seats everyone on the board for now — the roster picker (#1) will
    // later choose who's in_combat before this runs.
    function rollAllInitiative() {
      COMBS.forEach(c => {
        c.in_combat = true;
        c.initiative = (c.side === 'party') ? null : rollValue(c);
      });
      const top = turnOrder()[0];
      if (ENC) { ENC.active_combatant_id = top ? top.id : null; ENC.round = 1; }
      document.getElementById('combat-round').textContent = 1;
      renderInitStrip();
      pushTurnToHud();
      COMBS.forEach(c => SB.from('combatants').update({ in_combat: c.in_combat, initiative: c.initiative }).eq('id', c.id)
        .then(({ error }) => { if (error) console.error('[init] write failed:', error.message); }));
      if (ENC) SB.from('encounters').update({ active_combatant_id: ENC.active_combatant_id, round: 1 }).eq('id', ENC.id)
        .then(({ error }) => { if (error) console.error('[init] turn write failed:', error.message); });
    }

    // ── combat lifecycle ────────────────────────────────────────────────────
    // "In combat" = anyone is seated. Start seats + rolls (PCs pending); End
    // clears everyone and the strip hides again. startCombat() is the seam the
    // roster picker (#1) will later front instead of rolling the whole board.
    function inCombat() { return COMBS.some(c => c.in_combat); }
    function startCombat() { rollAllInitiative(); }
    function endCombat() {
      COMBS.forEach(c => { c.in_combat = false; c.initiative = null; });
      if (ENC) { ENC.active_combatant_id = null; ENC.round = 1; }
      document.getElementById('combat-round').textContent = 1;
      renderInitStrip();
      pushTurnToHud();
      COMBS.forEach(c => SB.from('combatants').update({ in_combat: false, initiative: null }).eq('id', c.id)
        .then(({ error }) => { if (error) console.error('[combat] end write failed:', error.message); }));
      if (ENC) SB.from('encounters').update({ active_combatant_id: null, round: 1 }).eq('id', ENC.id)
        .then(({ error }) => { if (error) console.error('[combat] end turn write failed:', error.message); });
    }

    function chipHtml(c, isActive) {
      const isParty = c.side === 'party';
      const art = isParty ? (PORTRAITS[c.source_key] || TOKENS[c.source_key] || '') : (monsterTokenUrl(c) || '');
      const initial = (c.name || '?').trim().charAt(0).toUpperCase();
      const seed = chipSeed(c.id);
      const pct = c.max_hp ? Math.max(0, Math.min(100, Math.round((c.hp / c.max_hp) * 100))) : 100;
      const hpC = pct > 50 ? '#4a9a52' : pct > 25 ? '#c9a14a' : '#b23b3b';
      const foe = c.hidden && !isParty;
      const pending = c.in_combat && c.initiative == null;          // in the fight, hasn't rolled
      return `<div class="init-chip ${isParty ? 'party' : 'enemy'}${isActive ? ' active' : ''}${foe ? ' hidden-foe' : ''}${pending ? ' pending' : ''}" data-id="${c.id}">
        <div class="ic-zone" style="filter:url(#burnt-${seed})">
          <div class="ic-bg ${isParty ? 'party' : 'enemy'}"></div>
          ${art ? `<img class="ic-art" src="${art}" alt="" draggable="false" onerror="this.remove()">` : ''}
          <span class="ic-initial">${initial}</span>
          <div class="ic-dots"></div>
          <div class="ic-fade"></div>
        </div>
        <span class="ic-init" data-edit="${c.id}">${pending ? '…' : (c.initiative ?? '–')}</span>
        <div class="ic-plate">
          <div class="ic-name">${c.name || '?'}</div>
          <div class="ic-hp"><i style="width:${pct}%;background:${hpC}"></i></div>
        </div>
      </div>`;
    }
    function mysteryChipHtml() {
      return `<div class="init-chip enemy active hidden-foe" data-mystery="1">
        <div class="ic-zone"><div class="ic-bg enemy"></div><span class="ic-initial">?</span><div class="ic-dots"></div><div class="ic-fade"></div></div>
        <div class="ic-plate"><div class="ic-name" style="font-style:italic;color:#8a7a52">???</div></div>
      </div>`;
    }

    function buildInitStrip() {
      let defs = `<svg width="0" height="0" style="position:absolute;overflow:hidden" aria-hidden="true"><defs>`;
      BURNT_SEEDS.forEach(seed => {
        defs += `<filter id="burnt-${seed}" x="-15%" y="-15%" width="130%" height="130%" color-interpolation-filters="sRGB">
          <feTurbulence type="turbulence" baseFrequency="0.024" numOctaves="3" seed="${seed}" result="turb"/>
          <feDisplacementMap in="SourceGraphic" in2="turb" scale="1" xChannelSelector="R" yChannelSelector="G" result="warped"/>
          <feTurbulence type="fractalNoise" baseFrequency="0.68" numOctaves="3" stitchTiles="stitch" result="grain"/>
          <feColorMatrix type="saturate" values="0" in="grain" result="gGrain"/>
          <feBlend in="warped" in2="gGrain" mode="overlay" result="final"/>
          <feComposite in="final" in2="SourceGraphic" operator="in"/></filter>`;
      });
      defs += `</defs></svg>`;
      const holder = document.createElement('div');
      holder.innerHTML = defs;
      stage.appendChild(holder.firstChild);

      stripEl = document.createElement('div');
      stripEl.className = 'init-strip empty';
      stage.appendChild(stripEl);
      renderInitStrip();
    }

    function renderInitStrip() {
      if (!stripEl) return;
      syncCombatChrome();          // keep the right-side Combat menu in step
      const ordered = initRoster();
      const visible = ordered.filter(tokenVisible);
      const staff = effectiveStaff();
      const activeId = ENC && ENC.active_combatant_id;
      const activeC = COMBS.find(c => c.id === activeId) || null;
      const activeHiddenToMe = activeC && !tokenVisible(activeC);

      // The strip is on the map only during combat — nothing seated → hidden for
      // everyone (staff start/end combat from the right-side Combat tab).
      if (!visible.length) { stripEl.className = 'init-strip empty'; stripEl.innerHTML = ''; return; }

      let chips = '';
      if (activeHiddenToMe && !staff) chips += mysteryChipHtml();   // someone's acting, unseen
      chips += visible.map(c => chipHtml(c, c.id === activeId)).join('');

      let side = `<div class="init-side"><div style="text-align:center"><div class="init-round-l">ROUND</div><div class="init-round-n">${(ENC && ENC.round) || 1}</div></div>`;
      if (staff) side += `<button class="init-btn" data-turn="next">Next ▸</button><button class="init-btn ghost" data-roll="all">↻ Roll all</button><button class="init-btn ghost" data-combat="end">⊗ End</button>`;
      side += `</div>`;

      stripEl.className = 'init-strip';
      stripEl.innerHTML = `<div class="init-track">${chips}</div>${side}`;
      wireStrip();
    }

    function wireStrip() {
      stripEl.querySelectorAll('.init-chip[data-id]').forEach(chip =>
        chip.addEventListener('click', (e) => {
          if (e.target.closest('.ic-init') || e.target.closest('.ic-edit')) return;   // editing the number
          selectToken(chip.dataset.id);
        }));
      stripEl.querySelectorAll('.ic-init[data-edit]').forEach(badge =>
        badge.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = badge.dataset.edit;
          const c = COMBS.find(k => k.id === id); if (!c) return;
          if (!(effectiveStaff() || c.side === 'party')) return;   // players: party only
          const inp = document.createElement('input');
          inp.className = 'ic-edit'; inp.value = c.initiative ?? ''; inp.type = 'number';
          badge.replaceWith(inp); inp.focus(); inp.select();
          const commit = () => { const v = parseInt(inp.value, 10); if (!isNaN(v)) setInitiative(id, v); else renderInitStrip(); };
          inp.addEventListener('keydown', (ev) => { if (ev.key === 'Enter') inp.blur(); if (ev.key === 'Escape') renderInitStrip(); });
          inp.addEventListener('blur', commit);
        }));
      const next = stripEl.querySelector('[data-turn="next"]');
      if (next) next.addEventListener('click', advanceTurn);
      stripEl.querySelectorAll('[data-roll="all"]').forEach(b => b.addEventListener('click', rollAllInitiative));
      const endBtn = stripEl.querySelector('[data-combat="end"]');
      if (endBtn) endBtn.addEventListener('click', endCombat);
    }

    // ── left tool rail (DM) — Select / Pencil(reveal) / Eraser(hide), with a
    // contextual options slide-out. Future drawing tools (shapes, spell
    // templates) slot in as more rail buttons, each opening their own options. ──
    const TOOL_ICON = {
      select: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 3v15l4-4 3 6 2-1-3-6h5z"/></svg>',
      circle: '<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="2"/></svg>',
      cone:   '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3 L21 21 L3 21 Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>',
      pencil: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 20h4L19 9l-4-4L4 16zm13-17 4 4-2 2-4-4z"/></svg>',
      eraser: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 15l7-7 7 7-4 4H7zm4 6h12v1.6H7z"/></svg>',
      square: '<svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="4" width="16" height="16" rx="1" fill="none" stroke="currentColor" stroke-width="2"/></svg>',
      pen:    '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 18c2-6 5-6 7-3s4 4 6-1 3-6 5-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>',
    };
    function buildToolRail() {
      const rail = document.createElement('div');
      rail.className = 'tool-rail';

      // Tools collapse into groups. A group is ONE rail button showing its
      // currently-active member's icon; clicking it opens the slide-out with the
      // member icons in a row plus that group's options. Adding a shape later
      // (rectangle / line / freehand) = one more entry in `members`.
      const groups = [
        { id: 'select', kind: 'single', icon: TOOL_ICON.select, title: 'Select / move' },
        { id: 'shapes', kind: 'group', opts: 'draw', title: 'Shapes', members: [
            { id: 'circle', icon: TOOL_ICON.circle, title: 'Circle / radius' },
            { id: 'cone',   icon: TOOL_ICON.cone,   title: 'Cone' },
            { id: 'rect',   icon: TOOL_ICON.square, title: 'Square / rectangle' },
            { id: 'pen',    icon: TOOL_ICON.pen,    title: 'Free draw' },
          ] },
      ];
      if (IS_STAFF) groups.push(
        { id: 'fog', kind: 'group', opts: 'fog', title: 'Fog', members: [
            { id: 'hide',   icon: TOOL_ICON.pencil, title: 'Draw fog (hide map)' },
            { id: 'reveal', icon: TOOL_ICON.eraser, title: 'Erase fog (reveal map)' },
          ] });

      // remembered per-group selection → drives each rail button's icon
      const lastMember = {};
      groups.forEach(g => { if (g.kind === 'group') lastMember[g.id] = g.members[0].id; });

      const opts = document.createElement('div');
      opts.className = 'tool-options';

      function railIcon(g) {
        return g.kind === 'single' ? g.icon
          : g.members.find(m => m.id === lastMember[g.id]).icon;
      }
      function renderRail() {
        rail.innerHTML = groups.map(g =>
          `<button class="tool-btn" data-group="${g.id}" title="${g.title}">${railIcon(g)}</button>`).join('');
        rail.querySelectorAll('.tool-btn').forEach(b =>
          b.addEventListener('click', () => onGroup(b.dataset.group)));
      }
      function markGroup(id) {
        rail.querySelectorAll('.tool-btn').forEach(b =>
          b.classList.toggle('active', b.dataset.group === id));
      }

      function fogOptsHtml() { return `
          <p class="gc-sub">Fog brush <span class="gc-tag">DM</span></p>
          <div class="gc-row"><label for="tr-size">Brush</label>
            <input type="range" id="tr-size" min="0" max="4" step="1"></div>
          <div class="gc-row gc-fog-bulk">
            <button class="gc-btn" id="tr-all">Reveal all</button>
            <button class="gc-btn" id="tr-none">Hide all</button>
          </div>`; }
      function drawOptsHtml() { return `
          <p class="gc-sub">Colour</p>
          <div class="gc-row"><label for="tr-color">Pick</label>
            <input type="color" id="tr-color" value="${DRAW.color}"></div>
          <p class="tr-hint">Tap &amp; drag the map to place. Use Select to remove yours.</p>`; }
      function wireOpts(kind) {
        if (kind === 'fog') {
          const s = opts.querySelector('#tr-size'); s.value = FOG.size;
          s.addEventListener('input', () => { FOG.size = parseInt(s.value, 10); });
          opts.querySelector('#tr-all').addEventListener('click', revealAllFog);
          opts.querySelector('#tr-none').addEventListener('click', hideAllFog);
        } else if (kind === 'draw') {
          opts.querySelector('#tr-color').addEventListener('input', e => { DRAW.color = e.target.value; });
        }
      }

      function openGroup(g) {
        const row = `<div class="tool-subrow">` + g.members.map(m =>
          `<button class="tool-btn${m.id === lastMember[g.id] ? ' active' : ''}" data-tool="${m.id}" title="${m.title}">${m.icon}</button>`).join('') + `</div>`;
        opts.innerHTML = row + (g.opts === 'fog' ? fogOptsHtml() : drawOptsHtml());
        wireOpts(g.opts);
        opts.querySelectorAll('.tool-subrow .tool-btn').forEach(b =>
          b.addEventListener('click', () => {
            lastMember[g.id] = b.dataset.tool;
            setTool(b.dataset.tool);
            opts.querySelectorAll('.tool-subrow .tool-btn').forEach(x =>
              x.classList.toggle('active', x.dataset.tool === b.dataset.tool));
            renderRail(); markGroup(g.id);            // rail icon now reflects the pick
          }));
        opts.classList.add('open');
      }

      function onGroup(id) {
        const g = groups.find(x => x.id === id);
        if (g.kind === 'single') { setTool(id); opts.classList.remove('open'); markGroup(id); return; }
        setTool(lastMember[g.id]);                    // group button = its current member
        markGroup(id);
        openGroup(g);
      }

      function setTool(t) {
        TOOL = t;
        const fog = (t === 'reveal' || t === 'hide');
        const draw = (t === 'circle' || t === 'cone');
        FOG.editing = fog;
        if (fog) FOG.brush = t;
        stage.classList.toggle('fog-edit', fog || draw);   // crosshair for paint + draw
        if (boardEl) boardEl.classList.toggle('tool-select', t === 'select');  // reveals delete handles
      }

      renderRail();
      stage.appendChild(rail);
      stage.appendChild(opts);
      onGroup('select');
    }
  })();
  </script>
</body>
</html>
