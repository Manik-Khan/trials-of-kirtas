        if (pts.length) { hx = ox0 + pts[0][0] * cp; hy = oy0 + pts[0][1] * cp; }
      }
      let handle = '';
      if (editable && !preview && d.id) {
        const hr = cp * 0.3, k = cp * 0.12;
        handle = `<g class="draw-del" data-id="${d.id}">
          <circle cx="${hx}" cy="${hy}" r="${hr}" fill="#1a1a1a" stroke="${d.color}" stroke-width="${sw}"/>
          <path d="M${hx-k},${hy-k} L${hx+k},${hy+k} M${hx+k},${hy-k} L${hx-k},${hy+k}" stroke="#fff" stroke-width="${Math.max(1, cp*0.04)}" stroke-linecap="round"/>
        </g>`;
      }
      return body + handle;
    }
    function drawSvg(meta) {
      const W = meta.nativeW, H = meta.nativeH;
      const shapes = DRAWINGS.map(d => shapeSvg(d, meta, canEditDrawing(d), false)).join('');
      const prev = drawPreview ? shapeSvg(drawPreview, meta, false, true) : '';
      return `<svg class="board-draw" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">${shapes}${prev}</svg>`;
    }
    function redrawDrawings() {
      if (!boardEl || !META) return;
      const old = boardEl.querySelector('.board-draw');
      if (old) old.remove();
      // below fog (fog hides shapes in the dark) and below tokens
      const anchor = boardEl.querySelector('.board-fog') || boardEl.querySelector('.board-tokens');
      if (anchor) anchor.insertAdjacentHTML('beforebegin', drawSvg(META));
    }
    async function createDrawing(kind, geometry) {
      if (!SB || !ENC) return;
      const row = { encounter_id: ENC.id, owner: ME ? ME.id : null, kind, geometry, color: DRAW.color };
      const { data, error } = await SB.from('drawings').insert(row).select().single();
      if (error) { console.error('draw insert failed:', error.message); return; }
      if (!DRAWINGS.some(d => d.id === data.id)) DRAWINGS.push(data);
      redrawDrawings();
    }
    async function deleteDrawing(id) {
      const prev = DRAWINGS;
      DRAWINGS = DRAWINGS.filter(d => d.id !== id);
      redrawDrawings();
      const { error } = await SB.from('drawings').delete().eq('id', id);
      if (error) { console.error('draw delete failed:', error.message); DRAWINGS = prev; redrawDrawings(); }
    }

    // ── token rendering ──
    // `me` is the viewer's profile (role drives whether teased tokens are shown
    // as ??? ). Players never receive `hidden` rows at all (RLS), so any hidden
    // row reaching us means we're staff.
    function tokenHtml(c, meta, isStaff) {
      const W = meta.nativeW;
      const H = meta.nativeH;
      // cell-centre in native px → percentage of the board
      const cx = ((meta.originX + (c.x + 0.5) * meta.cellPx) / W) * 100;
      const cy = ((meta.originY + (c.y + 0.5) * meta.cellPx) / H) * 100;
      const sizePct = (meta.cellPx / W) * 100 * TOKEN.size * (SIZE_MUL[c.size] || 1);   // one cell × viewer multiplier × creature size

      const teasedForPlayer = c.tease && !isStaff;       // player sees the veil
      const isParty = c.side === 'party';
      const ring = isParty ? (CHAR_COLOR[c.source_key] || '#888') : ENEMY_COLOR;
      // dedicated token first, then portrait, then nothing (→ dot-initial)
      const img = TOKENS[c.source_key] || (isParty ? PORTRAITS[c.source_key] : null);
      // per-character art style wins; global control is the fallback default
      const style = TOKEN_STYLE[c.source_key] || TOKEN.style;
      // enemy monster art (5etools), only when no other art applies
      const monImg = (!isParty && !teasedForPlayer && !img) ? monsterTokenUrl(c) : null;

      let disc;
      if (teasedForPlayer) {
        disc = `<div class="token-disc mystery"><span class="token-initial">?</span></div>`;
      } else if (monImg) {  // enemy: monster token over the initial fallback (onerror → initial)
        const initial = (c.name || '?').trim().charAt(0).toUpperCase();
        disc = `<div class="token-disc ring" style="--ring:${ring}"><span class="token-initial">${initial}</span><img class="token-monimg" src="${monImg}" alt="" draggable="false" onerror="this.remove()"></div>`;
      } else if (img && style === 'cutout') {
        const base = TOKEN.ring ? `<div class="token-base" style="--ring:${ring}"></div>` : '';
        disc = `<div class="token-cutout">${base}<img class="token-cutimg" src="${img}" alt="" draggable="false"></div>`;
      } else if (img) {  // circle mode — crop into a framed disc
        disc = `<div class="token-disc${TOKEN.ring ? ' ring' : ''}" style="--ring:${ring}"><img src="${img}" alt="" draggable="false"></div>`;
      } else {           // no art → coloured dot with initial
        const initial = (c.name || '?').trim().charAt(0).toUpperCase();
        disc = `<div class="token-disc ring" style="--ring:${ring}"><span class="token-initial">${initial}</span></div>`;
      }

      // DM-only concealment badges (never rendered for players)
      let badge = '';
      if (isStaff && c.hidden) badge = `<span class="token-badge" title="Hidden from players">∅</span>`;
      else if (isStaff && c.tease) badge = `<span class="token-badge" title="Teased (players see ???)">?</span>`;

      const label = teasedForPlayer ? '???' : (c.name || '');
      // Aura ring (combatants.aura {r, color}) — radius measured outward from
      // the token's edge, 5 ft per cell. Drawn inside the token element so it
      // follows drags/moves for free; pointer-events:none keeps hits clean.
      let aura = '';
      if (c.aura && c.aura.r && !teasedForPlayer) {
        const cells = SIZE_MUL[c.size] || 1;
        const pct = ((cells + 2 * (c.aura.r / 5)) / cells) * 100;
        const col = c.aura.color || '#b8952a';
        aura = `<div class="token-aura" style="width:${pct}%;--ac:${col}"></div>`;
      }
      const movable = canMove(c);
      const cls = 'token'
        + (isStaff && c.hidden ? ' is-hidden' : '')
        + (movable ? '' : ' no-move')
        + (c.id === SELECTED ? ' selected' : '');

      return `
        <div class="${cls}" data-id="${c.id}" style="left:${cx}%; top:${cy}%; width:${sizePct}%">
          ${aura}${disc}${badge}
          <span class="token-name">${label}</span>
          ${teasedForPlayer ? '' : condBadgesHtml(c)}
        </div>`;
    }

    // Re-render just the token layer (after a display-control change).
    function renderTokens() {
      if (!boardEl || !META) return;
      const layer = boardEl.querySelector('.board-tokens');
      if (layer) layer.innerHTML = COMBS.filter(tokenVisible).map(c => tokenHtml(c, META, effectiveStaff())).join('');
      if (TRAY_UI) paintTokensPane();   // keep the Party shelf's on-board state honest
    }

    // ── build (or rebuild) the board from current ENC/META/COMBS/DRAWINGS ──
    // SCENES-V2: extracted from boot so a live scene switch can re-render.
    // Safe to call repeatedly: interactions are delegated on #stage, so the
    // old boardEl can simply be replaced.
    function buildBoard() {
      // Same map image → preserve the current view (calibration previews,
      // recalibration realtime echoes). A real scene switch fits-to-view.
      const keep = (boardEl && boardEl.dataset.scene === String(META.publicId))
                 ? { zoom, panX, panY } : null;
      if (boardEl) boardEl.remove();
      boardEl = document.createElement('div');
      boardEl.className = 'board';
      boardEl.dataset.scene = META.publicId;
      const tokensHtml = COMBS.filter(tokenVisible).map(c => tokenHtml(c, META, effectiveStaff())).join('');
      boardEl.innerHTML =
        `<img class="board-map" alt="${ENC.map_ref}" draggable="false" src="${mapUrl(META.publicId)}"
              onerror="this.classList.add('missing')">
         ${gridSvg(META)}
         ${drawSvg(META)}
         ${fogSvg(META)}
         <div class="board-tokens">${tokensHtml}</div>
         ${measureSvg(META)}`;
      stage.appendChild(boardEl);
      fitBoard(META, keep);
    }

    // SCENES-V2: the active encounter's map changed (staff picked a new scene).
    // Refetch calibration, swap META, rebuild. Fog was cleared by the same
    // UPDATE that changed map_ref (interim rule until per-scene fog), so
    // loadFog() has already run in the realtime handler by the time we land.
    async function switchScene(newKey) {
      const { data: scn, error } = await SB
        .from('scenes').select('*').eq('key', newKey).maybeSingle();
      if (error || !scn) { console.warn('switchScene: no scenes row for', newKey, error); return; }
      META = sceneMeta(scn);
      if (META.grid) GRID = Object.assign(GRID, META.grid);
      buildBoard();
      paintScenesPane();          // refresh the Active badge if the pane is open
    }

    // ── fit the board into the stage, preserving the map's aspect ratio ──
    function fitBoard(meta, keep) {      const aspect = (meta.nativeW) / (meta.nativeH);
      const availW = stage.clientWidth;
      const availH = stage.clientHeight;
      let w = availW, h = w / aspect;
      if (h > availH) { h = availH; w = h * aspect; }
      w = Math.floor(w); h = Math.floor(h);
      boardEl.style.width  = w + 'px';
      boardEl.style.height = h + 'px';
      if (keep) {
        // same scene rebuilt — keep the user's zoom/pan (calibration nudges,
        // span previews, the post-save echo, another staff window recalibrating)
        zoom = keep.zoom; panX = keep.panX; panY = keep.panY;
      } else {
        // reset to "fit": zoom 1, board centred in the stage
        zoom = 1;
        panX = Math.round((availW - w) / 2);
        panY = Math.round((availH - h) / 2);
      }
      applyTransform();
    }

    // ── board transform (zoom/pan) ──
    let _wcTimer = null;
    function applyTransform() {
      if (boardEl) {
        boardEl.style.willChange = 'transform';                       // promote for a smooth gesture
        boardEl.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
        clearTimeout(_wcTimer);
        _wcTimer = setTimeout(() => { if (boardEl) boardEl.style.willChange = 'auto'; }, 220);  // settled → drop the cache, re-raster crisp at this zoom
      }
      renderCursors();
    }
    const clampZ = z => Math.max(MINZ, Math.min(MAXZ, z));
    function zoomAt(factor, sx, sy) {        // sx,sy = stage-local point to keep fixed
      const z2 = clampZ(zoom * factor);
      if (z2 === zoom) return;
      const bx = (sx - panX) / zoom, by = (sy - panY) / zoom;
      zoom = z2;
      panX = sx - bx * zoom;
      panY = sy - by * zoom;
      applyTransform();
    }

    // ── coordinate helpers ──
    function screenToCell(clientX, clientY) {
      const rect = stage.getBoundingClientRect();
      const bx = (clientX - rect.left - panX) / zoom;   // board-local px (base size)
      const by = (clientY - rect.top  - panY) / zoom;
      const W = META.nativeW, H = META.nativeH;
      const fx = bx / boardEl.offsetWidth, fy = by / boardEl.offsetHeight;
      let col = Math.floor((fx * W - META.originX) / META.cellPx);
      let row = Math.floor((fy * H - META.originY) / META.cellPx);
      col = Math.max(0, Math.min(META.cols - 1, col));
      row = Math.max(0, Math.min(META.rows - 1, row));
      return { col, row };
    }
    // fractional cell coords (no snap) — sub-cell precision for freehand pen + live cursors
    function screenToCellF(clientX, clientY) {
      const rect = stage.getBoundingClientRect();
      const bx = (clientX - rect.left - panX) / zoom;
      const by = (clientY - rect.top  - panY) / zoom;
      const W = META.nativeW, H = META.nativeH;
      const fx = bx / boardEl.offsetWidth, fy = by / boardEl.offsetHeight;
      return { col: (fx * W - META.originX) / META.cellPx,
               row: (fy * H - META.originY) / META.cellPx };
    }
    function cellCenterPct(col, row) {
      const W = META.nativeW, H = META.nativeH;
      return {
        x: ((META.originX + (col + 0.5) * META.cellPx) / W) * 100,
        y: ((META.originY + (row + 0.5) * META.cellPx) / H) * 100,
      };
    }

    // ── live cursors ──
    const TOOL_GLYPH = { circle: '○', cone: '△', rect: '▢', pen: '✎', hide: '▦', reveal: '☀' };
    function cellToScreen(col, row) {     // fractional cell coords → stage-local px (inverse of screenToCellF)
      const W = META.nativeW, H = META.nativeH;
      const fx = (col * META.cellPx + META.originX) / W;
      const fy = (row * META.cellPx + META.originY) / H;
      return { x: fx * boardEl.offsetWidth * zoom + panX, y: fy * boardEl.offsetHeight * zoom + panY };
    }
    function ensureCursorLayer() {
      if (cursorLayer || !stage) return;
      cursorLayer = document.createElement('div');
      cursorLayer.className = 'rt-cursors';
      stage.appendChild(cursorLayer);
    }
    function makeCursorEl() {
      const el = document.createElement('div');
      el.className = 'rt-cursor';
      el.innerHTML = '<svg class="rt-arrow" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 2l16 7-6.4 1.8L9 19z"/></svg><span class="rt-label"></span>';
      return el;
    }
    function paintCursor(cur) {
      cur.el.style.setProperty('--cc', cur.color || '#c0703c');
      const glyph = TOOL_GLYPH[cur.tool] ? ' ' + TOOL_GLYPH[cur.tool] : '';
      cur.el.querySelector('.rt-label').textContent = (cur.name || '?') + glyph;
    }
    function positionCursor(cur) {
      if (!META || !boardEl) return;
      const p = cellToScreen(cur.col, cur.row);
      const s = Math.max(0.5, Math.min(1, zoom));   // shrink when zoomed out; constant when zoomed in
      cur.el.style.transform = `translate(${p.x}px, ${p.y}px) scale(${s})`;
    }
    function renderCursors() { CURSORS.forEach(positionCursor); }
    function removeCursor(id) { const c = CURSORS.get(id); if (c) { c.el.remove(); CURSORS.delete(id); } }
    function onCursor(p) {
      if (!p || p.id === MY_ID) return;            // never draw my own
      if (p.staff && !effectiveStaff()) return;            // staff cursors hidden from players
      ensureCursorLayer();
      let cur = CURSORS.get(p.id);
      if (!cur) { cur = { el: makeCursorEl() }; CURSORS.set(p.id, cur); cursorLayer.appendChild(cur.el); }
      cur.name = p.name; cur.color = p.color; cur.tool = p.tool;
      cur.col = p.col; cur.row = p.row; cur.seen = performance.now();
      paintCursor(cur); positionCursor(cur);
    }
    function sendCursor(clientX, clientY) {
      if (!RT || !META) return;
      const now = performance.now();
      if (now - lastCursorSent < 50) return;        // ~20/sec
      lastCursorSent = now;
      const f = screenToCellF(clientX, clientY);
      RT.send({ type: 'broadcast', event: 'cursor',
        payload: { id: MY_ID, name: MY_NAME, color: DRAW.color, tool: TOOL, staff: IS_STAFF, col: f.col, row: f.row } });
    }
    setInterval(() => {                             // sweep cursors that went silent (dropped without a clean leave)
      const now = performance.now();
      CURSORS.forEach((c, id) => { if (now - (c.seen || 0) > 12000) removeCursor(id); });
    }, 5000);
    // ── movement measurement overlay ──
    // An empty SVG layer in native map coords; populated during a drag, cleared on end.
    function measureSvg(meta) {
      const W = meta.nativeW, H = meta.nativeH;
      return `<svg class="measure-layer" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none"
                   xmlns="http://www.w3.org/2000/svg"></svg>`;
    }
    function cellCenterNative(col, row) {
      return {
        x: META.originX + (col + 0.5) * META.cellPx,
        y: META.originY + (row + 0.5) * META.cellPx,
      };
    }
    // Draw origin-tile highlight + a line to the current cell + a running ft label.
    // Distance = Chebyshev cells × 5 (diagonals count 5 ft — PHB default, table-confirmed).
    function showMeasure(oCol, oRow, cCol, cRow, sourceKey) {
      const svg = boardEl && boardEl.querySelector('.measure-layer'); if (!svg) return;
      const cp   = META.cellPx;
      const cells = Math.max(Math.abs(cCol - oCol), Math.abs(cRow - oRow));
      const feet  = cells * 5;
      const o = cellCenterNative(oCol, oRow);
      const p = cellCenterNative(cCol, cRow);
      const speed = SPEED[sourceKey];
      const over  = (speed != null) && (feet > speed);
      const oc    = over ? ' over' : '';
      const lw    = Math.max(2, cp * 0.07);
      const fs    = Math.max(11, cp * 0.5);
      // label sits just above the moving end; flip below if it would clear the top edge
      let ly = p.y - cp * 0.62;
      if (ly < META.originY + cp * 0.5) ly = p.y + cp * 0.72;
      svg.innerHTML =
        `<rect class="measure-cell" x="${META.originX + oCol * cp}" y="${META.originY + oRow * cp}"
               width="${cp}" height="${cp}"/>`
      + (feet > 0
          ? `<line class="measure-line${oc}" x1="${o.x}" y1="${o.y}" x2="${p.x}" y2="${p.y}" stroke-width="${lw}"/>`
          + `<text class="measure-label${oc}" x="${p.x}" y="${ly}" font-size="${fs}" stroke-width="${fs * 0.16}">${feet} ft</text>`
          : '');
    }
    function clearMeasure() {
      const svg = boardEl && boardEl.querySelector('.measure-layer'); if (svg) svg.innerHTML = '';
    }

    function tokenEl(id) { return boardEl && boardEl.querySelector(`.token[data-id="${id}"]`); }
    function updateTokenPos(c) {
      const el = tokenEl(c.id); if (!el) return;
      const p = cellCenterPct(c.x, c.y);
      el.style.left = p.x + '%'; el.style.top = p.y + '%';
    }
    // Re-apply only a token's width after a size change (local or realtime) —
    // mirrors the sizePct math in tokenHtml; avoids a rebuild that drops drag state.
    function updateTokenSize(c) {
      const el = tokenEl(c.id); if (!el || !META) return;
      const W = META.nativeW;
      el.style.width = ((META.cellPx / W) * 100 * TOKEN.size * (SIZE_MUL[c.size] || 1)) + '%';
    }
    function canMove(c) {
      return effectiveStaff() || !!(ME && ME.id && c.owner && c.owner === ME.id);
    }

    // ── selection ──
    // Host object the token-orbs engine (combat-orbs.js) calls back into for live
    // data: staff/edit gates, sheet open, the live-HP write (same backend the HUD
    // uses, so it syncs to all clients), and CharacterData for resource pip state.
    const ORB_HOST = {
      staff: () => effectiveStaff(),
      canEdit: (c) => canMove(c),
      openSheet: (c) => { if (c.source_key) window.CombatSheets?.open?.(c.source_key, c.name); else openStatblock?.(c); },
      hpSave: (c, hp) => {
        const key = c.source_key || ('mon:' + c.id);
        return (window.__battle && window.__battle.backend && window.__battle.backend.save)
          ? window.__battle.backend.save(key, { hp })
          : SB.from('combatants').update({ hp }).eq('id', c.id);
      },
      characterData: window.CharacterData,
      tokenEl: tokenEl
    };
    function selectToken(id) {
      SELECTED = id;
      boardEl.querySelectorAll('.token.selected').forEach(t => t.classList.remove('selected'));
      const el = tokenEl(id); if (el) el.classList.add('selected');
      const c = COMBS.find(k => k.id === id);
      if (c && el && window.CombatOrbs) window.CombatOrbs.show(c, el, ORB_HOST);
    }
    function deselect() {
      SELECTED = null;
      boardEl.querySelectorAll('.token.selected').forEach(t => t.classList.remove('selected'));
      window.CombatOrbs?.hide?.();
    }

    // ── write a move to Supabase (optimistic; reverts on error) ──
    async function moveCombatant(id, col, row) {
      const c = COMBS.find(k => k.id === id); if (!c) return;
      const px = c.x, py = c.y;
      c.x = col; c.y = row; updateTokenPos(c);
      const { error } = await SB.from('combatants').update({ x: col, y: row }).eq('id', id);
      if (error) { c.x = px; c.y = py; updateTokenPos(c); console.error('move failed:', error.message); }
      // Replay: in-combat moves only (pre-fight positions come from the
      // combat_start snapshot). Hidden foes are only movable by staff, so the
      // hidden:true insert is always legal here.
      else if (c.in_combat) logEvent('move', { id: c.id, from: [px, py], to: [col, row] },
        `${escapeHtml(c.name)} moves`, !!(c.hidden && c.side !== 'party'));
    }

    // ── write a creature's size to Supabase (staff-only; optimistic, reverts) ──
    async function setSize(id, size) {
      const c = COMBS.find(k => k.id === id); if (!c) return false;
      const prev = c.size;
      c.size = size; updateTokenSize(c);
      const { error } = await SB.from('combatants').update({ size }).eq('id', id);
      if (error) { c.size = prev; updateTokenSize(c); console.error('size write failed:', error.message); return false; }
      return true;
    }

    // ── conditions: badge cluster + write + per-token context menu ──

    // Build the little condition-badge cluster under a token from its array.
    function condBadgesHtml(c) {
      const list = Array.isArray(c.conditions) ? c.conditions : [];
      if (!list.length) return '';
      const MAX = 4;
      const shown = list.slice(0, MAX);
      const extra = list.length - shown.length;
      const chips = shown.map(n => {
        const d = COND_BY[n]; if (!d) return '';
        return `<span class="cond-badge" style="--c:${d.color}" title="${n}">`
             + `<svg viewBox="0 0 24 24" aria-hidden="true">${d.icon}</svg></span>`;
      }).join('');
      const more = extra > 0
        ? `<span class="cond-badge more" title="${list.slice(MAX).join(', ')}">+${extra}</span>` : '';
      return `<span class="token-conds">${chips}${more}</span>`;
    }

    // Re-render only a token's condition cluster (after a local toggle or a
    // realtime change) — avoids a full token rebuild that would drop drag state.
    function updateTokenConditions(c) {
      const el = tokenEl(c.id); if (!el) return;
      const old = el.querySelector('.token-conds'); if (old) old.remove();
      if (c.tease && !effectiveStaff()) return;            // respect the player veil
      const html = condBadgesHtml(c);
      if (html) el.insertAdjacentHTML('beforeend', html);
    }

    // Toggle a condition on a combatant: optimistic local update + Supabase
    // write (revert on error). Open model — RLS lets any player write
    // conditions on any visible token; the guard trigger blocks everything else.
    async function toggleCondition(id, name) {
      const c = COMBS.find(k => k.id === id); if (!c) return false;
      const cur = Array.isArray(c.conditions) ? c.conditions.slice() : [];
      const i = cur.indexOf(name);
      if (i >= 0) cur.splice(i, 1); else cur.push(name);
      const prev = c.conditions;
      c.conditions = cur;
      updateTokenConditions(c);
      const { error } = await SB.from('combatants').update({ conditions: cur }).eq('id', id);
      if (error) { c.conditions = prev; updateTokenConditions(c); console.error('condition write failed:', error.message); return false; }
      // Replay: snapshot of the full array (snapshots re-apply more robustly
      // than deltas when scrubbing).
      if (c.in_combat) logEvent('condition', { id: c.id, conditions: cur },
        `${escapeHtml(c.name)}: ${cur.length ? cur.join(', ') : 'conditions cleared'}`, !!(c.hidden && c.side !== 'party'));
      return true;
    }

    // Flip a combatant's hidden flag (staff). Optimistic + rollback; re-render so
    // the staff badge updates and players get the appear/disappear via realtime.
    async function setHidden(id, hidden) {
      const c = COMBS.find(k => k.id === id); if (!c) return false;
      const prev = c.hidden; c.hidden = hidden; renderTokens(); renderInitStrip();
      const { error } = await SB.from('combatants').update({ hidden }).eq('id', id);
      if (error) { c.hidden = prev; renderTokens(); renderInitStrip(); console.error('hidden write failed:', error.message); return false; }
      return true;
    }

    // Delete a combatant row (staff). Optimistic local removal; the DELETE
    // realtime echo (idempotent filter) removes it for everyone else.
    async function removeCombatant(id) {
      const { error } = await SB.from('combatants').delete().eq('id', id);
      if (error) { console.error('delete failed:', error.message); return false; }
      COMBS = COMBS.filter(k => k.id !== id); renderTokens(); renderInitStrip();
      return true;
    }

    // ── context menu (conditions for now; built to grow staff actions later) ──
    let ctxEl = null, ctxRO = null;
    function closeCtxMenu() {
      if (ctxRO) { ctxRO.disconnect(); ctxRO = null; }
      if (ctxEl) { ctxEl.remove(); ctxEl = null; }
      document.removeEventListener('pointerdown', ctxOutside, true);
      window.removeEventListener('scroll', closeCtxMenu, true);
      window.removeEventListener('resize', closeCtxMenu);
    }
    function ctxOutside(e) { if (ctxEl && !ctxEl.contains(e.target)) closeCtxMenu(); }
    function placeCtxMenu(sx, sy) {            // fixed, clamped to the viewport
      const r = ctxEl.getBoundingClientRect();
      let x = sx, y = sy;
      if (x + r.width  > window.innerWidth  - 8) x = window.innerWidth  - r.width  - 8;
      if (y + r.height > window.innerHeight - 8) y = window.innerHeight - r.height - 8;
      ctxEl.style.left = Math.max(8, x) + 'px';
      ctxEl.style.top  = Math.max(8, y) + 'px';
    }
    // Body builder for the Conditions tab — the toggle rows.

    // Body builder for the Manage tab (staff only) — per-creature size,
    // visibility (hidden from players), and removal.

    function openCtxMenu(c, sx, sy) {
      closeCtxMenu();
      if (!c) return;

      // One flat menu (approved mockup): info line, useful actions first,
      // staff Manage in the middle, Aura + Conditions as collapsed expanders,
      // Remove last. Expander state lives per menu instance.
      const exp = { aura: false, conds: false, orbs: false };
      const staff = () => effectiveStaff();

      function infoLine() {
        const bits = [];
        const showVitals = c.side === 'party' || staff();   // monster vitals are DM info
        if (showVitals) bits.push(`<b>${c.hp ?? '—'}/${c.max_hp ?? '—'}</b> hp`, `AC ${c.ac ?? '—'}`);
        if (staff() && c.hidden) bits.push('⊘ hidden');
        if (c.in_combat) bits.push('in the fight');
        return bits.length ? `<div class="ctx-info">${bits.join(' · ')}</div>` : '<div class="ctx-info"></div>';
      }
      function auraBody() {
        const cur = c.aura || {};
        const radii = [5, 10, 15, 20, 30, 60];
        const colors = ['#9d4edd', '#c0001a', '#1d9e75', '#b8952a', '#2d7dd2', '#e8d9b8'];
        return `<div class="ctx-aura-lbl">RADIUS</div>
          <div class="ctx-aura-row">${radii.map(r => `<button class="ctx-ar${cur.r === r ? ' on' : ''}" data-aura-r="${r}">${r}</button>`).join('')}</div>
          <div class="ctx-aura-lbl">COLOR</div>
          <div class="ctx-aura-row">${colors.map(x => `<span class="ctx-ac${(cur.color || '#b8952a') === x ? ' on' : ''}" data-aura-c="${x}" style="background:${x}"></span>`).join('')}</div>
          ${cur.r ? `<button class="ctx-aura-off" data-act="aura-off">✕ Remove aura</button>` : ''}`;
      }
      function condsBody() {
        const active = Array.isArray(c.conditions) ? c.conditions : [];
        return COND.map(d => `
          <div class="ctx-cond${active.includes(d.name) ? ' active' : ''}" data-cond="${d.name}">
            <span class="ctx-chip" style="--c:${d.color}"><svg viewBox="0 0 24 24" aria-hidden="true">${d.icon}</svg></span>
            <span class="ctx-label">${d.name}</span>
            <span class="ctx-check">✓</span>
          </div>`).join('');
      }
      function orbsBody() { return window.CombatOrbs ? window.CombatOrbs.configHtml(c, ORB_HOST) : ''; }
      function expander(id, ico, label, count, body) {
        return `<div class="ctx-exp${exp[id] ? ' open' : ''}" data-exp="${id}">
          <div class="ctx-exp-head"><span class="ctx-ico">${ico}</span> ${label}
            ${count ? `<span class="ctx-exp-count">${count}</span>` : ''}<span class="ctx-chev">▶</span></div>
          <div class="ctx-exp-body">${exp[id] ? body() : ''}</div>
        </div>`;
      }

      ctxEl = document.createElement('div');
      ctxEl.className = 'ctx-menu';
      document.body.appendChild(ctxEl);
      // keep the menu fully on-screen as it grows (expanders, async orb config, forms)
      if (window.ResizeObserver) { ctxRO = new ResizeObserver(() => { if (ctxEl) placeCtxMenu(sx, sy); }); ctxRO.observe(ctxEl); }
      // wheel over the menu scrolls the menu — never bubbles out to zoom the board
      ctxEl.addEventListener('wheel', (e) => { e.stopPropagation(); }, { passive: true });

      function render() {
        const isParty = c.side === 'party';
        const canAura = staff() || isParty;   // guard mirrors this server-side
        const nConds = Array.isArray(c.conditions) ? c.conditions.length : 0;

        let top = '';
        if (staff() && c.statblock) top += `<div class="ctx-item" data-act="stat"><span class="ctx-ico">📖</span> Stat block</div>`;
        if (isParty && c.source_key) top += `<div class="ctx-item" data-act="open-sheet"><span class="ctx-ico">📋</span> Open sheet</div>`;
        if (isParty && c.source_key) top += `<div class="ctx-item" data-act="drive-pc"><span class="ctx-ico">▶</span> Battle HUD</div>`;
        else if (!isParty && staff()) top += c.in_combat
          ? `<div class="ctx-item" data-act="drive"><span class="ctx-ico">▶</span> Battle HUD</div>`
          : `<div class="ctx-item ctx-dim"><span class="ctx-ico">▶</span> Battle HUD — seat them first</div>`;

        let manage = '';
        if (staff()) {
          const cur = c.size || 'medium';
          manage = `<div class="ctx-divider"></div><div class="ctx-sub">Manage</div>
            <div class="ctx-item" data-act="vis"><span class="ctx-ico">${c.hidden ? '👁' : '⊘'}</span> ${c.hidden ? 'Reveal to players' : 'Hide from players'}</div>
            <div class="ctx-item" data-act="rollinit"><span class="ctx-ico">⚔</span> Roll initiative</div>
            <div class="ctx-sizes">` + SIZE_ORDER.map(z =>
              `<button class="ctx-size${z === cur ? ' active' : ''}" data-size="${z}">${SIZE_LABEL[z]}</button>`).join('') + `</div>`;
        }

        const lower = `<div class="ctx-divider"></div>`
          + (canAura ? expander('aura', '◎', 'Aura', c.aura && c.aura.r ? c.aura.r + ' ft' : '', auraBody) : '')
          + expander('conds', '⚑', 'Conditions', nConds || '', condsBody)
          + ((window.CombatOrbs && isParty && c.source_key) ? expander('orbs', '◉', 'Token Orbs', '', orbsBody) : '')
          + (staff() ? `<div class="ctx-divider"></div><div class="ctx-item ctx-danger" data-act="del"><span class="ctx-ico">✕</span> Remove from board</div>` : '');

        ctxEl.innerHTML = `<div class="ctx-head">${c.name || 'Token'}</div>` + infoLine() + top + manage + lower;
        wire();
        placeCtxMenu(sx, sy);
      }

      async function setAura(patch) {
        const next = patch === null ? null : Object.assign({ r: 10, color: '#b8952a' }, c.aura || {}, patch);
        const prevAura = c.aura;
        c.aura = next; renderTokens();   // optimistic
        const { error } = await SB.from('combatants').update({ aura: next }).eq('id', c.id);
        if (error) { c.aura = prevAura; renderTokens(); console.warn('[aura] save failed:', error.message); return; }
        render();
      }

      function wire() {
        ctxEl.querySelectorAll('.ctx-exp-head').forEach(h =>
          h.addEventListener('click', () => { const id = h.parentElement.dataset.exp; exp[id] = !exp[id]; render(); }));
        // Token Orbs config (add / remove / reorder) — engine owns the controls.
        if (exp.orbs && window.CombatOrbs) window.CombatOrbs.wireConfig(ctxEl, c, ORB_HOST);
        // Conditions toggles — menu stays open so several can be set in a row.
        ctxEl.querySelectorAll('.ctx-cond').forEach(rowEl =>
          rowEl.addEventListener('click', async () => {
            if (await toggleCondition(c.id, rowEl.dataset.cond)) rowEl.classList.toggle('active');
          }));
        ctxEl.querySelectorAll('[data-aura-r]').forEach(b =>
          b.addEventListener('click', () => setAura({ r: parseInt(b.dataset.auraR, 10) })));
        ctxEl.querySelectorAll('[data-aura-c]').forEach(b =>
          b.addEventListener('click', () => setAura({ color: b.dataset.auraC })));
        ctxEl.querySelectorAll('.ctx-size').forEach(b =>
          b.addEventListener('click', async () => {
            if (await setSize(c.id, b.dataset.size)) render();
          }));
        ctxEl.querySelectorAll('[data-act]').forEach(b =>
          b.addEventListener('click', async () => {
            if (b.dataset.act === 'vis') {
              if (await setHidden(c.id, !c.hidden)) render();
            } else if (b.dataset.act === 'rollinit') {
              rollInitiative(c); closeCtxMenu();
            } else if (b.dataset.act === 'drive') {
              window.__battle?.drive?.('mon:' + c.id); closeCtxMenu();
            } else if (b.dataset.act === 'drive-pc') {
              window.__battle?.drive?.(c.source_key); closeCtxMenu();
            } else if (b.dataset.act === 'open-sheet') {
              window.CombatSheets?.open?.(c.source_key, c.name); closeCtxMenu();
            } else if (b.dataset.act === 'stat') {
              openStatblock?.(c); closeCtxMenu();
            } else if (b.dataset.act === 'aura-off') {
              setAura(null);
            } else if (b.dataset.act === 'del') {
              if (b.dataset.confirm) { if (await removeCombatant(c.id)) closeCtxMenu(); }
              else { b.dataset.confirm = '1'; b.innerHTML = '<span class="ctx-ico">✕</span> Confirm remove'; }
            }
          }));
      }

      render();
      // dismissal (added next tick so the opening press doesn't self-close it)
      setTimeout(() => document.addEventListener('pointerdown', ctxOutside, true), 0);
      window.addEventListener('scroll', closeCtxMenu, true);
      window.addEventListener('resize', closeCtxMenu);
    }

    // ── pointer (mouse + touch): drag tokens, pan, pinch-zoom, tap-select ──
    function initInteractions() {
      const pointers = new Map();
      let mode = null, dragCell = null, moved = false;
      let start = { x: 0, y: 0 }, last = { x: 0, y: 0 }, tapId = null, pinch = null;
      let lpTimer = null, longPressed = false, downX = 0, downY = 0;   // long-press → context menu
      let fogPainting = false;                                         // DM fog brush stroke in progress
      let drawing = false, drawOX = 0, drawOY = 0, drawPts = null;      // shape placement (drawPts = freehand pen points)
      const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
      const mid  = (a, b) => ({ x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 });

      stage.addEventListener('pointerdown', (e) => {
        if (e.button > 0) return;                 // right/middle mouse → handled by contextmenu
        // never let board pan/drag steal interactions meant for the UI panels
        if (e.target.closest('.zoom-bar, .tool-rail, .tool-options, .gc-backdrop, #tok-rail, .tr-handle, .roll-ticker, .statblock-panel, .init-strip, .draw-del')) return;
        if (FOG.editing && IS_STAFF) {                 // fog paint mode → paint cells, skip token/pan logic
          try { stage.setPointerCapture(e.pointerId); } catch (_) {}
          fogPainting = true;
          const cell = screenToCell(e.clientX, e.clientY);
          paintCell(cell.col, cell.row);
          return;
        }
        if (TOOL === 'circle' || TOOL === 'cone' || TOOL === 'rect' || TOOL === 'pen') {  // shape placement → skip token/pan logic
          try { stage.setPointerCapture(e.pointerId); } catch (_) {}
          drawing = true;
          const c = screenToCell(e.clientX, e.clientY);
          drawOX = c.col; drawOY = c.row;
          if (TOOL === 'pen') {
            const f = screenToCellF(e.clientX, e.clientY);
            drawPts = [[f.col, f.row]];
            drawPreview = { kind: 'pen', color: DRAW.color, geometry: { pts: drawPts } };
          } else if (TOOL === 'circle') {
            drawPreview = { kind: 'circle', color: DRAW.color, geometry: { cx: drawOX, cy: drawOY, r: 1 } };
          } else if (TOOL === 'cone') {
            drawPreview = { kind: 'cone', color: DRAW.color, geometry: { ox: drawOX, oy: drawOY, angle: 0, len: 1 } };
          } else {
            drawPreview = { kind: 'rect', color: DRAW.color, geometry: { x: drawOX, y: drawOY, w: 1, h: 1 } };
          }
          redrawDrawings();
          return;
        }
        // self-heal: the first finger of a fresh gesture clears any pointer left
        // stranded by a dropped up/cancel (iOS capture quirk) — otherwise a stale
        // entry makes the next single touch read as a 2-finger pinch.
        if (e.isPrimary) { pointers.clear(); mode = null; pinch = null; }
        try { stage.setPointerCapture(e.pointerId); } catch (_) {}
        pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

        if (pointers.size === 2) {                       // second finger → pinch
          if (mode === 'drag' && dragId != null) {       // abort an in-progress drag
            const c = COMBS.find(k => k.id === dragId); if (c) updateTokenPos(c);
            const el = tokenEl(dragId); if (el) el.classList.remove('dragging');
            clearMeasure(); dragOrigin = null;
          }
          dragId = null; mode = 'pinch';
          clearTimeout(lpTimer); lpTimer = null; longPressed = false;
          const p = [...pointers.values()]; const m = mid(p[0], p[1]);
          pinch = { dist: dist(p[0], p[1]), x: m.x, y: m.y };
          return;
        }
        if (pointers.size !== 1) return;

        start = last = { x: e.clientX, y: e.clientY }; moved = false;
        const tokEl = e.target.closest('.token');
        tapId = tokEl ? tokEl.dataset.id : null;
        if (tokEl) {
          const c = COMBS.find(k => k.id === tapId);
          longPressed = false; downX = e.clientX; downY = e.clientY;
          if (e.pointerType !== 'mouse') {            // touch/pen: hold to open the menu
            clearTimeout(lpTimer);
            lpTimer = setTimeout(() => {
              lpTimer = null; longPressed = true;
              const el = tokenEl(tapId); if (el) el.classList.remove('dragging');
              clearMeasure(); dragOrigin = null;
              mode = 'menu'; dragId = null; dragCell = null;   // menu open → disarm drag (no ghost-follow, no half-move)
              selectToken(tapId);
              openCtxMenu(c, downX, downY);
            }, 500);
          }
          if (c && canMove(c)) { mode = 'drag'; dragId = tapId; dragOrigin = { col: c.x, row: c.y }; } else { mode = 'tap'; }
        } else { mode = 'pan'; }
      });

      stage.addEventListener('pointermove', (e) => {
        sendCursor(e.clientX, e.clientY);
        if (fogPainting) { const cell = screenToCell(e.clientX, e.clientY); paintCell(cell.col, cell.row); return; }
        if (drawing) {
          if (TOOL === 'pen') {
            const f = screenToCellF(e.clientX, e.clientY);
            const lp = drawPts[drawPts.length - 1];
            if (Math.hypot(f.col - lp[0], f.row - lp[1]) > 0.12) drawPts.push([f.col, f.row]);  // sample by distance
            drawPreview = { kind: 'pen', color: DRAW.color, geometry: { pts: drawPts } };
          } else {
            const c = screenToCell(e.clientX, e.clientY);
            const dx = c.col - drawOX, dy = c.row - drawOY;
            const dist = Math.max(1, Math.round(Math.hypot(dx, dy)));
            if (TOOL === 'circle')    drawPreview = { kind: 'circle', color: DRAW.color, geometry: { cx: drawOX, cy: drawOY, r: dist } };
            else if (TOOL === 'cone') drawPreview = { kind: 'cone',   color: DRAW.color, geometry: { ox: drawOX, oy: drawOY, angle: Math.atan2(dy, dx), len: dist } };
            else                      drawPreview = { kind: 'rect',   color: DRAW.color,
                                        geometry: { x: Math.min(drawOX, c.col), y: Math.min(drawOY, c.row),
                                                    w: Math.abs(c.col - drawOX) + 1, h: Math.abs(c.row - drawOY) + 1 } };
          }
          redrawDrawings();
          return;
        }
        if (!pointers.has(e.pointerId)) return;
        pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
        const rect = stage.getBoundingClientRect();

        if (mode === 'pinch' && pointers.size >= 2) {
          const p = [...pointers.values()]; const d = dist(p[0], p[1]); const m = mid(p[0], p[1]);
          if (pinch && pinch.dist > 0) {
            zoomAt(d / pinch.dist, m.x - rect.left, m.y - rect.top);
            panX += (m.x - pinch.x); panY += (m.y - pinch.y); applyTransform();
          }
          pinch = { dist: d, x: m.x, y: m.y };
          return;
        }

        const dx = e.clientX - last.x, dy = e.clientY - last.y;
        if (!moved && Math.hypot(e.clientX - start.x, e.clientY - start.y) > 4) { moved = true; clearTimeout(lpTimer); lpTimer = null; }

        if (mode === 'drag' && dragId != null && moved) {
          const { col, row } = screenToCell(e.clientX, e.clientY);
          const p = cellCenterPct(col, row); const el = tokenEl(dragId);
          if (el) { el.style.left = p.x + '%'; el.style.top = p.y + '%'; el.classList.add('dragging'); }
          dragCell = { col, row };
          if (dragOrigin) {
            const dc = COMBS.find(k => k.id === dragId);
            showMeasure(dragOrigin.col, dragOrigin.row, col, row, dc && dc.source_key);
          }
        } else if (mode === 'pan' && moved) {
          panX += dx; panY += dy; applyTransform();
        }
        last = { x: e.clientX, y: e.clientY };
      });

      function endPointer(e) {
        if (fogPainting) { fogPainting = false; try { stage.releasePointerCapture(e.pointerId); } catch (_) {} flushFog(); return; }
        if (drawing) {
          drawing = false;
          try { stage.releasePointerCapture(e.pointerId); } catch (_) {}
          const p = drawPreview; drawPreview = null;
          const okPen = !p || p.kind !== 'pen' || (p.geometry.pts && p.geometry.pts.length >= 2);
          if (p && okPen) createDrawing(p.kind, p.geometry); else redrawDrawings();
          drawPts = null;
          return;
        }
        if (!pointers.has(e.pointerId)) return;
        pointers.delete(e.pointerId);
        try { stage.releasePointerCapture(e.pointerId); } catch (_) {}
        clearTimeout(lpTimer); lpTimer = null;
        if (mode === 'pinch') { if (pointers.size < 2) { mode = pointers.size === 1 ? 'pan' : null; pinch = null; } return; }

        if (longPressed) {                               // menu already opened; no select/move
          longPressed = false;
        } else if (!moved) {                             // tap → (de)select
          if (tapId) selectToken(tapId); else deselect();
        } else if (mode === 'drag' && dragId != null && dragCell) {
          const el = tokenEl(dragId); if (el) el.classList.remove('dragging');
          clearMeasure();
          moveCombatant(dragId, dragCell.col, dragCell.row);
          selectToken(dragId);
        }
        if (pointers.size === 0) { mode = null; dragId = null; dragCell = null; dragOrigin = null; }
      }
      stage.addEventListener('pointerup', endPointer);
      stage.addEventListener('pointercancel', endPointer);
      stage.addEventListener('lostpointercapture', endPointer);   // capture yanked → clean the pointer too
      stage.addEventListener('click', (e) => {                    // ✕ handle on a drawing → remove it
        const del = e.target.closest('.draw-del');
        if (del) { e.stopPropagation(); deleteDrawing(del.dataset.id); }
      });

      // desktop double-click → drive the token's actor in the HUD
      stage.addEventListener('dblclick', (e) => {
        const tokEl = e.target.closest('.token');
        if (!tokEl) return;
        const c = COMBS.find(k => k.id === tokEl.dataset.id);
        if (!c) return;
        if (c.side === 'party' && c.source_key) {
          window.__battle?.drive?.(c.source_key);
        } else if (effectiveStaff()) {
          if (c.in_combat) window.__battle?.drive?.('mon:' + c.id);
          else openStatblock?.(c);
        } else {
          // UX-AUDIT-2: a player double-clicking an enemy used to be dead
          // air — show a read-only chip (name + conditions) instead. Only
          // visible tokens render for players, so the name can't leak.
          showTokenChip(c, e.clientX, e.clientY);
        }
      });

      // desktop right-click → context menu
      stage.addEventListener('contextmenu', (e) => {
        const tokEl = e.target.closest('.token');
        if (!tokEl) return;
        e.preventDefault();
        const c = COMBS.find(k => k.id === tokEl.dataset.id);
        selectToken(tokEl.dataset.id);
        openCtxMenu(c, e.clientX, e.clientY);
      });

      stage.addEventListener('wheel', (e) => {
        // inside a scrollable UI panel → let it scroll natively, don't zoom
        if (e.target.closest('.ctx-menu, #tok-rail, .tr-handle, .statblock-panel, .init-strip, .tool-options, .tool-rail')) return;
        e.preventDefault();
        const rect = stage.getBoundingClientRect();
        // 1.07/tick (was 1.1) — ~30% gentler wheel zoom. Pinch (distance-driven)
        // and the zoom-bar buttons (deliberate clicks) keep their own rates.
        zoomAt(e.deltaY < 0 ? 1.07 : 1 / 1.07, e.clientX - rect.left, e.clientY - rect.top);
      }, { passive: false });

      // arrow keys nudge the selected token one cell
      window.addEventListener('keydown', (e) => {
        if (!SELECTED) return;
        const D = { ArrowUp:[0,-1], ArrowDown:[0,1], ArrowLeft:[-1,0], ArrowRight:[1,0] }[e.key];
        if (!D) return;
        const c = COMBS.find(k => k.id === SELECTED); if (!c || !canMove(c)) return;
        e.preventDefault();
        const col = Math.max(0, Math.min(META.cols - 1, c.x + D[0]));
        const row = Math.max(0, Math.min(META.rows - 1, c.y + D[1]));
        if (col !== c.x || row !== c.y) moveCombatant(SELECTED, col, row);
      });
    }

    // ── realtime: a move on any client updates every other board live ──
    let HUD_ONCHANGE = null;   // HUD live-in callback; invoked from the combatants UPDATE handler

    function initRealtime() {
      if (!SB || !ENC) return;
      MY_ID = (ME && ME.id) || ('anon-' + Math.random().toString(36).slice(2));
      MY_NAME = (ME && ME.characterKey)
        ? ME.characterKey.charAt(0).toUpperCase() + ME.characterKey.slice(1)
        : 'DM';
      ensureCursorLayer();
      RT = SB.channel('combat-' + ENC.id, { config: { presence: { key: MY_ID } } });
      RT.on('postgres_changes',
          { event: 'UPDATE', schema: 'public', table: 'combatants', filter: 'encounter_id=eq.' + ENC.id },
          ({ new: row }) => {
            if (!row || row.id === dragId) return;       // ignore the echo of my own drag
            const c = COMBS.find(k => k.id === row.id);
            if (!c) {                                    // row just became visible to us (e.g. DM revealed it)
              COMBS.push(row); renderTokens(); renderInitStrip(); return;
            }
            // a row we can see was re-hidden from us (non-staff, not ours) → drop it
            if (!IS_STAFF && row.hidden && !(ME && row.owner === ME.id)) {
              COMBS = COMBS.filter(k => k.id !== row.id); renderTokens(); renderInitStrip(); return;
            }
            const hiddenChanged = c.hidden !== row.hidden;
            const initChanged   = c.initiative !== row.initiative;
            const inCombatChanged = c.in_combat !== row.in_combat;
            const auraChanged = JSON.stringify(c.aura || null) !== JSON.stringify(row.aura || null);
            c.x = row.x; c.y = row.y; c.hp = row.hp; c.conditions = row.conditions; c.size = row.size; c.hidden = row.hidden; c.initiative = row.initiative; c.in_combat = row.in_combat; c.aura = row.aura;
            if (hiddenChanged || auraChanged) {
              renderTokens();                            // staff badge (∅) appears/clears
            } else {
              updateTokenPos(c);
              updateTokenConditions(c);
              updateTokenSize(c);
              reconcileTokenVisibility(c);               // moved into / out of the light?
            }
            if (hiddenChanged || initChanged || inCombatChanged) renderInitStrip();
            if (HUD_ONCHANGE && c.side === 'party' && c.source_key)
              HUD_ONCHANGE({ key: c.source_key, combat: { hp: row.hp, conditions: row.conditions, initiative: row.initiative, in_combat: row.in_combat } });
            else if (HUD_ONCHANGE && !c.source_key)
              HUD_ONCHANGE({ key: 'mon:' + c.id, combat: { hp: row.hp, conditions: row.conditions, initiative: row.initiative, in_combat: row.in_combat } });
          })
        // New / removed combatants (e.g. a DM dropping or clearing an enemy).
        // Same channel as the UPDATE above — never a second postgres_changes
        // channel on this table. We keep COMBS in sync and re-render the layer.
        .on('postgres_changes',
          { event: 'INSERT', schema: 'public', table: 'combatants', filter: 'encounter_id=eq.' + ENC.id },
          ({ new: row }) => {
            if (!row || COMBS.some(k => k.id === row.id)) return;   // dedupe my own drop echo
            COMBS.push(row);
            renderTokens();
            renderInitStrip();
          })
        .on('postgres_changes',
          { event: 'DELETE', schema: 'public', table: 'combatants', filter: 'encounter_id=eq.' + ENC.id },
          ({ old }) => {
            if (!old || !old.id) return;
            COMBS = COMBS.filter(k => k.id !== old.id);
            renderTokens();
            renderInitStrip();
          })
        .on('postgres_changes',
          { event: 'UPDATE', schema: 'public', table: 'encounters', filter: 'id=eq.' + ENC.id },
          ({ new: row }) => {
            if (!row) return;
            const mapChanged = row.map_ref !== ENC.map_ref;   // SCENES-V2
            ENC.map_ref = row.map_ref;
            // TOAST guard: an UPDATE that didn't touch revealed_cells omits the
            // (toasted) jsonb from the realtime payload entirely — adopting the
            // absence as [] wiped everyone's fog. Adopt only what actually arrived.
            if (Array.isArray(row.revealed_cells)) ENC.revealed_cells = row.revealed_cells;
            ENC.active_combatant_id = row.active_combatant_id;
            ENC.round = row.round;
            document.getElementById('combat-round').textContent = row.round ?? 1;
            if (mapChanged) { loadFog(); switchScene(row.map_ref); return; }  // rebuild covers fog+tokens
            loadFog(); redrawFog(); renderTokens();      // fog moved → re-veil + re-evaluate token visibility
            renderInitStrip();                            // turn pointer / round changed
            pushTurnToHud();                              // forward round + whose-turn to the HUD
          })
        .on('postgres_changes',
          { event: '*', schema: 'public', table: 'drawings', filter: 'encounter_id=eq.' + ENC.id },
          (payload) => {
            const { eventType, new: row, old } = payload;
            if (eventType === 'INSERT')      { if (!DRAWINGS.some(d => d.id === row.id)) DRAWINGS.push(row); }
            else if (eventType === 'UPDATE') { const i = DRAWINGS.findIndex(d => d.id === row.id); if (i >= 0) DRAWINGS[i] = row; }
            else if (eventType === 'DELETE') { DRAWINGS = DRAWINGS.filter(d => d.id !== (old && old.id)); }
            redrawDrawings();
          })
        .on('postgres_changes',
          { event: '*', schema: 'public', table: 'scenes' },
          ({ eventType, new: row }) => {                        // SCENES-V2/V3
            if (eventType === 'UPDATE' && row && row.key === ENC.map_ref) {
              META = sceneMeta(row);                            // live recalibration / image swap
              if (META.grid) GRID = Object.assign(GRID, META.grid);
              buildBoard();
            }
            if (SCENES_UI) loadScenes();                        // keep the pane list fresh (staff only)
          })
        .on('broadcast', { event: 'cursor' }, ({ payload }) => onCursor(payload))
        .on('presence', { event: 'leave' }, ({ leftPresences }) =>
          (leftPresences || []).forEach(pr => pr && pr.id && removeCursor(pr.id)))
        .subscribe((status) => { if (status === 'SUBSCRIBED') RT.track({ id: MY_ID }); });

      // ── characters-realtime: a vitals / structural change on ANY client refreshes
      //    the open orb ring + the open floating-sheet tab. Option A: characters is
      //    the source of truth; HP rides the combatants mirror, but slots / temp-HP /
      //    concentration live SOLELY here, so they need this stream (party.html has
      //    the twin 'party-display' sub; combat.html was the one missing it). Separate
      //    channel — different table from combatants, so no postgres_changes conflict.
      //    Both handlers self-filter (no-op unless that PC's ring/sheet is open).
      if (!CHARS_RT) {
        CHARS_RT = SB.channel('combat-characters')
          .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'characters' },
            ({ new: row }) => {
              if (!row || !row.key) return;
              const parse = (x) => { if (typeof x === 'string') { try { return JSON.parse(x); } catch (_) { return undefined; } } return x; };
              const norm = { key: row.key, vitals: parse(row.vitals), structural: parse(row.structural) };
              if (window.CombatOrbs && window.CombatOrbs.applyRow) window.CombatOrbs.applyRow(row.key, norm);
              if (window.CombatSheets && window.CombatSheets.refresh) window.CombatSheets.refresh(row.key);
            })
          .subscribe();
      }
    }

    // ── SCENES-V2: scenes pane — list, switch, register, calibrate ──────────
    // Staff-only dock pane. "Set active" rewrites the live encounter's map_ref
    // (clearing fog — interim rule until per-scene fog); realtime does the rest
    // on every client, ours included. Calibration: drag a box across a run of
    // N squares (longer runs divide the slop), then nudge origin/cell to taste;
    // Save writes the scenes row and streams to everyone.
    let SCENES = [];
    let SCENES_UI = null;   // { pane, list, cal: {bar, valEl}, } — null for players
    let SCN_EDIT = null;    // key of the scene being edited in the form, or null
    const CAL = { on: false, span: 5, tool: 'span', space: false, pend: null, boxEl: null, sx: 0, sy: 0 };

    function sceneThumb(publicId) {
      return `https://res.cloudinary.com/${CLOUDINARY_CLOUD}/image/upload/w_300,q_auto,f_auto/${publicId}.jpg`;
    }

    async function loadScenes() {
      const { data, error } = await SB.from('scenes').select('*').order('created_at');
      if (error) { console.warn('loadScenes', error); return; }
      SCENES = data || [];
      paintScenesPane();
      // category autocomplete grows out of use
      const dl = SCENES_UI && SCENES_UI.pane.querySelector('#sc-cats');
      if (dl) dl.innerHTML = [...new Set(SCENES.map(s => s.category).filter(Boolean))]
        .map(c => `<option value="${c}">`).join('');
    }

    const CAT_CLOSED = new Set();   // collapsed category headers (session-local)

    function paintScenesPane() {
      if (!SCENES_UI) return;
      // group by category; uncategorized last
      const groups = {};
      SCENES.forEach(s => { (groups[s.category || ''] ||= []).push(s); });
      const cats = Object.keys(groups).sort((a, b) =>
        (a === '') - (b === '') || a.localeCompare(b));
      SCENES_UI.list.innerHTML = cats.map(cat => {
        const head = cat || 'Uncategorized';
        const closed = CAT_CLOSED.has(cat);
        const cards = closed ? '' : groups[cat].map(s => {
          const active = s.key === ENC.map_ref;
          return `<div class="scene-card${active ? ' active' : ''}">
            <img alt="${s.name || s.key}" loading="lazy" src="${sceneThumb(s.public_id)}"
                 onerror="this.style.display='none'">
            <div class="sc-meta">
              <div>
                <div class="sc-nm">${s.name || s.key}</div>
                <div class="sc-dims">${s.cols} × ${s.rows} · ${(+s.cell_px).toFixed(s.cell_px % 1 ? 1 : 0)}px cells</div>
              </div>
              <div class="sc-acts">
                ${active ? '<span class="sc-badge">● Active</span>'
                         : `<button class="sc-set" data-scene="${s.key}">Set active</button>`}
                <button class="sc-ico" data-edit="${s.key}" title="Edit scene">✎</button>
                ${active ? '' : `<button class="sc-ico" data-del="${s.key}" title="Delete scene">🗑</button>`}
              </div>
            </div>
          </div>`;
        }).join('');
        return `<div class="sc-cat${closed ? ' closed' : ''}" data-cat="${cat}">${head}</div>${cards}`;
      }).join('') || '<div class="sr-hint" style="padding:.4rem">No scenes yet — register one below.</div>';
    }

    async function setActiveScene(key) {
      if (key === ENC.map_ref) return;
      const seated = COMBS.some(c => c.in_combat);
      if (seated && !confirm('Combat is seated — tokens keep their grid squares and will need re-placing on the new map. Switch anyway?')) return;
      // One write: map change + fog reset (old map\u2019s holes must not leak).
      const { error } = await SB.from('encounters')
        .update({ map_ref: key, revealed_cells: [] }).eq('id', ENC.id);
      if (error) alert('Could not switch scene: ' + error.message);
      // No local mutation — our own UPDATE comes back on the realtime channel
      // and runs the same switchScene() path every other client runs.
    }

    // Cloudinary fl_getinfo: returns JSON (not pixels) describing the delivered
    // asset; with no other transforms width/height are the original dimensions.
    async function fetchNativeSize(publicId) {
      const url = `https://res.cloudinary.com/${CLOUDINARY_CLOUD}/image/upload/fl_getinfo/${publicId}.jpg`;
      const j = await (await fetch(url)).json();
      const o = j.output || j.input || {};
      if (!o.width || !o.height) throw new Error('no dimensions in fl_getinfo reply');
      return { w: o.width, h: o.height };
    }

    function calDerived(p) {   // cols/rows that fit the calibrated grid
      return {
        cols: Math.max(1, Math.round((p.nativeW - p.originX) / p.cellPx)),
        rows: Math.max(1, Math.round((p.nativeH - p.originY) / p.cellPx)),
      };
    }

    function calPreview() {    // apply pending calibration locally + redraw
      const p = CAL.pend; if (!p) return;
      const d = calDerived(p);
      META = Object.assign({}, META, { cellPx: p.cellPx, originX: p.originX, originY: p.originY }, d);
      buildBoard();
      SCENES_UI.cal.valEl.textContent =
        `${p.cellPx.toFixed(1)}px · origin ${Math.round(p.originX)},${Math.round(p.originY)} · ${d.cols}×${d.rows}`;
    }

    function calNudge(field, delta) {
      if (!CAL.pend) CAL.pend = { cellPx: META.cellPx, originX: META.originX, originY: META.originY,
                                  nativeW: META.nativeW, nativeH: META.nativeH };
      CAL.pend[field] += delta;
      if (field === 'cellPx') CAL.pend.cellPx = Math.max(4, CAL.pend.cellPx);
      // keep origins inside one cell — they are phase, not position
      const c = CAL.pend.cellPx;
      CAL.pend.originX = ((CAL.pend.originX % c) + c) % c;
      CAL.pend.originY = ((CAL.pend.originY % c) + c) % c;
      calPreview();
    }

    async function calSave() {
      const p = CAL.pend; if (!p) { calEnd(); return; }
      const d = calDerived(p);
      CAL.undo = CAL.orig;                                  // what this save overwrites
      const { error } = await SB.from('scenes').update({
        cell_px: p.cellPx, origin_x: p.originX, origin_y: p.originY, cols: d.cols, rows: d.rows,
      }).eq('key', ENC.map_ref);
      if (error) { alert('Could not save calibration: ' + error.message); CAL.undo = null; }
      else {
        loadScenes();   // refresh card dims; board already previews the result
        const u = SCENES_UI.pane.querySelector('[data-cal="undo"]');
        if (u) u.style.display = '';
      }
      calEnd();
    }

    async function calUndo() {
      const o = CAL.undo; if (!o) return;
      const d = calDerived(o);
      const { error } = await SB.from('scenes').update({
        cell_px: o.cellPx, origin_x: o.originX, origin_y: o.originY, cols: d.cols, rows: d.rows,
      }).eq('key', o.key);
      if (error) { alert('Could not undo: ' + error.message); return; }
      CAL.undo = null;
      const u = SCENES_UI.pane.querySelector('[data-cal="undo"]');
      if (u) u.style.display = 'none';
      loadScenes();     // board rebuild arrives via the scenes realtime echo
    }

    function calBegin() {
      CAL.on = true; CAL.pend = null;
      // starting point — Reset returns here; a Save records it for Undo
      CAL.orig = { key: ENC.map_ref, cellPx: META.cellPx, originX: META.originX,
                   originY: META.originY, nativeW: META.nativeW, nativeH: META.nativeH };
      stage.classList.add('cal-edit');
      calSetTool('span');                  // span-draw is the default each entry
      SCENES_UI.cal.bar.classList.add('on');
      SCENES_UI.cal.valEl.textContent = 'drag a box across a run of full squares…';
    }
    // leave calibration AND discard any unsaved preview
    function calAbort() { calEnd(); switchScene(ENC.map_ref); }
    function calEnd() {
      CAL.on = false; CAL.pend = null; CAL.space = false;
      stage.classList.remove('cal-edit'); stage.classList.remove('cal-pan');
      if (SCENES_UI) SCENES_UI.cal.bar.classList.remove('on');
      if (CAL.boxEl) { CAL.boxEl.remove(); CAL.boxEl = null; }
    }

    // ⊞ Span vs ✋ Pan: with pan active the capture listeners step aside and
    // the pointer falls through to the normal grab/pinch machine untouched.
    function calSetTool(t) {
      CAL.tool = t;
      stage.classList.toggle('cal-pan', t === 'pan' || CAL.space);
      if (SCENES_UI) SCENES_UI.cal.bar.querySelectorAll('[data-cal^="tool:"]')
        .forEach(b => b.classList.toggle('on', b.dataset.cal === 'tool:' + t));
    }

    // screen → native map px (the board's coordinate space)
    function calNative(e) {
      const r = boardEl.getBoundingClientRect();
      return { x: (e.clientX - r.left) / r.width  * META.nativeW,
               y: (e.clientY - r.top)  / r.height * META.nativeH };
    }

    // Capture-phase listeners: when calibration is armed they own the pointer
    // and stop the normal pan/draw/fog machine from ever seeing it.
    function calWireStage() {
      // Esc is the always-available exit — the pane's buttons disappear if the
      // user switches dock tabs mid-calibration, which trapped the pointer.
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && CAL.on) calAbort();
        // hold Space to pan temporarily (desktop nicety; the ✋ chip covers touch)
        if (e.code === 'Space' && CAL.on && !e.repeat) {
          const tg = e.target, tag = tg && tg.tagName;
          if (tag === 'INPUT' || tag === 'TEXTAREA' || (tg && tg.isContentEditable)) return;
          CAL.space = true; stage.classList.add('cal-pan');
          e.preventDefault();          // don't activate a focused button / scroll
        }
      });
      document.addEventListener('keyup', (e) => {
        if (e.code === 'Space' && CAL.space) {
          CAL.space = false;
          stage.classList.toggle('cal-pan', CAL.tool === 'pan');
        }
      });
      stage.addEventListener('pointerdown', (e) => {
        if (!CAL.on || !boardEl) return;
        // pane hidden (user switched dock tabs) → calibration silently ends and
        // this pointer goes to the normal pan/draw machine untouched
        if (!SCENES_UI.pane.offsetParent) { calAbort(); return; }
        if (CAL.tool === 'pan' || CAL.space) return;   // hand the pointer to the normal pan machine
        e.stopImmediatePropagation(); e.preventDefault();
        const n = calNative(e); CAL.sx = n.x; CAL.sy = n.y;
        if (CAL.boxEl) CAL.boxEl.remove();
        CAL.boxEl = document.createElement('div');
        CAL.boxEl.className = 'cal-box';
        boardEl.appendChild(CAL.boxEl);
      }, true);
      stage.addEventListener('pointermove', (e) => {
        if (!CAL.on || !CAL.boxEl) return;
        e.stopImmediatePropagation();
        const n = calNative(e);
        const x = Math.min(CAL.sx, n.x), y = Math.min(CAL.sy, n.y);
        const w = Math.abs(n.x - CAL.sx), h = Math.abs(n.y - CAL.sy);
        Object.assign(CAL.boxEl.style, {
          left:  (x / META.nativeW * 100) + '%', top:    (y / META.nativeH * 100) + '%',
          width: (w / META.nativeW * 100) + '%', height: (h / META.nativeH * 100) + '%',
        });
      }, true);
      stage.addEventListener('pointerup', (e) => {
        if (!CAL.on || !CAL.boxEl) return;
        e.stopImmediatePropagation();
        const n = calNative(e);
        const x0 = Math.min(CAL.sx, n.x), y0 = Math.min(CAL.sy, n.y);
        const w = Math.abs(n.x - CAL.sx), h = Math.abs(n.y - CAL.sy);
        CAL.boxEl.remove(); CAL.boxEl = null;
        if (w < 8 && h < 8) return;                       // a click, not a box
        const cell = ((w + h) / 2) / CAL.span;            // squares are square: average both axes
        CAL.pend = { cellPx: cell,
                     originX: ((x0 % cell) + cell) % cell,
                     originY: ((y0 % cell) + cell) % cell,
                     nativeW: META.nativeW, nativeH: META.nativeH };
        calPreview();
      }, true);
    }

    function buildScenesPane() {
      const pane = dockRegister('scenes', { icon: '🗺', title: 'Scenes', staff: true, onOpen: loadScenes });
      pane.innerHTML = `
        <div class="scenes-list"></div>
        <div class="cal-bar">
          <div class="cb-row"><span class="cb-lbl">tool</span>
            <button class="cb-tool on" data-cal="tool:span">⊞ Span</button>
            <button class="cb-tool" data-cal="tool:pan">✋ Pan</button></div>
          <div class="cb-row"><span class="cb-lbl">span</span>
            <button data-cal="span:1">1</button><button data-cal="span:2">2</button>
            <button class="on" data-cal="span:5">5</button><button data-cal="span:10">10</button>
            <span class="cb-val"></span></div>
          <div class="cb-row"><span class="cb-lbl">cell px</span>
            <button data-cal="cell:-1">−1</button><button data-cal="cell:-0.1">−.1</button>
            <button data-cal="cell:0.1">+.1</button><button data-cal="cell:1">+1</button></div>
          <div class="cb-row"><span class="cb-lbl">origin</span>
            <button data-cal="ox:-1">←</button><button data-cal="ox:1">→</button>
            <button data-cal="oy:-1">↑</button><button data-cal="oy:1">↓</button>
            <span class="sr-hint">hold Shift ×10</span></div>
          <div class="cb-row">
            <button class="cb-save" data-cal="save">Save calibration</button>
            <button data-cal="reset">Reset</button>
            <button data-cal="cancel">Cancel</button></div>
          <div class="sr-hint">Esc exits calibration. Reset returns to the values
          you started from. ✋ Pan (or hold Space) to move around the map —
          your zoom stays put while you nudge.</div>
        </div>
        <details class="scene-reg">
          <summary>＋ Register scene</summary>
          <div class="sr-grid">
            <label class="full">key (unique handle — fixed once created)<input data-sr="key" placeholder="G_SunkenCrypt_Night"></label>
            <label class="full">display name<input data-sr="name" placeholder="Sunken Crypt — Night"></label>
            <label class="full">category<input data-sr="cat" list="sc-cats" placeholder="Battle maps"><datalist id="sc-cats"></datalist></label>
            <label class="full">Cloudinary publicId<input data-sr="pid" placeholder="kirtas/maps/G_SunkenCrypt_Night"></label>
            <label>cell px (guess ok)<input data-sr="cell" type="number" value="140"></label>
            <label>native W×H (blank = auto)<input data-sr="wh" placeholder="5460 x 7840"></label>
            <label class="full"><button class="sr-save" data-sr="save">Save scene</button></label>
            <label class="full" data-sr="cancelwrap" style="display:none"><button class="sr-save" style="background:transparent" data-sr="canceledit">Cancel edit</button></label>
          </div>
          <div class="sr-hint">Native size is fetched from Cloudinary automatically.
          Cell px can be rough — activate the scene and use Calibrate to lock the
          grid by eye.</div>
        </details>
        <div class="scene-reg" style="border-top:none;padding-top:0">
          <button class="sr-save" data-cal="begin">Calibrate active scene’s grid</button>
          <button class="sr-save" data-cal="undo" style="display:none;background:transparent;margin-top:.35rem">↩ Undo last calibration save</button>
        </div>`;
      SCENES_UI = {
        pane,
        list:  pane.querySelector('.scenes-list'),
        cal:   { bar: pane.querySelector('.cal-bar'), valEl: pane.querySelector('.cb-val') },
      };
      calWireStage();

      const fld = (k) => pane.querySelector(`[data-sr="${k}"]`);
      function editScene(key) {        // enter edit mode: prefill, lock the key
        const s = SCENES.find(x => x.key === key); if (!s) return;
        SCN_EDIT = key;
        fld('key').value = s.key;   fld('key').disabled = true;
        fld('name').value = s.name || '';
        fld('cat').value  = s.category || '';
        fld('pid').value  = s.public_id;
        fld('wh').value   = (s.native_w && s.native_h) ? `${s.native_w} x ${s.native_h}` : '';
        fld('save').textContent = 'Update scene';
        fld('cancelwrap').style.display = '';
        const det = pane.querySelector('.scene-reg'); det.open = true;
        det.querySelector('summary').textContent = `✎ Editing ${s.name || s.key}`;
      }
      function endEdit() {
        SCN_EDIT = null;
        ['key','name','cat','pid','wh'].forEach(k => fld(k).value = '');
        fld('key').disabled = false;
        fld('save').textContent = 'Save scene';
        fld('cancelwrap').style.display = 'none';
        pane.querySelector('.scene-reg summary').textContent = '＋ Register scene';
      }

      pane.addEventListener('click', async (e) => {
        const cat = e.target.closest('.sc-cat');
        if (cat) {
          const c = cat.dataset.cat;
          CAT_CLOSED.has(c) ? CAT_CLOSED.delete(c) : CAT_CLOSED.add(c);
          paintScenesPane(); return;
        }
        const ed = e.target.closest('[data-edit]');
        if (ed) { editScene(ed.dataset.edit); return; }
        const del = e.target.closest('[data-del]');
        if (del) {
          const key = del.dataset.del;
          if (key === ENC.map_ref) return;   // active scene is undeletable (no button anyway)
          if (!confirm(`Delete scene "${key}"? Past encounters that fought on it will show "no scenes row" if replayed. The Cloudinary image is not touched.`)) return;
          const { error } = await SB.from('scenes').delete().eq('key', key);
          if (error) alert('Could not delete: ' + error.message);
          if (SCN_EDIT === key) endEdit();
          loadScenes(); return;
        }
        if (e.target.closest('[data-sr="canceledit"]')) { endEdit(); return; }
        const set = e.target.closest('[data-scene]');
        if (set) { setActiveScene(set.dataset.scene); return; }
        const act = e.target.closest('[data-cal]');
        if (act) {
          const v = act.dataset.cal, mul = e.shiftKey ? 10 : 1;
          if (v === 'begin')        calBegin();
          else if (v === 'cancel')  calAbort();                              // discard preview
          else if (v === 'save')    calSave();
          else if (v === 'undo')    calUndo();
          else if (v === 'reset')   { CAL.pend = Object.assign({}, CAL.orig); calPreview(); }
          else if (v.startsWith('tool:')) calSetTool(v.slice(5));
          else if (v.startsWith('span:')) {
            CAL.span = +v.slice(5) || 1;
            SCENES_UI.cal.bar.querySelectorAll('[data-cal^="span:"]')
              .forEach(b => b.classList.toggle('on', b === act));
          }
          else if (v.startsWith('cell:')) calNudge('cellPx', +v.slice(5) * mul);
          else if (v.startsWith('ox:'))   calNudge('originX', +v.slice(3) * mul);
          else if (v.startsWith('oy:'))   calNudge('originY', +v.slice(3) * mul);
          return;
        }
        const sr = e.target.closest('[data-sr="save"]');
        if (sr) {
          const g = (k) => fld(k).value.trim();
          const key = g('key'), name = g('name'), category = g('cat'), pid = g('pid'), cell = +g('cell') || 140;
          const hint = pane.querySelector('.scene-reg .sr-hint');
          if (!key || !pid) { hint.textContent = '⚠ key and publicId are required.'; return; }
          sr.disabled = true; sr.textContent = SCN_EDIT ? 'Updating…' : 'Saving…';
          try {
            // manual "W x H" wins; otherwise ask Cloudinary (fl_getinfo)
            const sizeOf = async () => {
              const m = g('wh').match(/(\d+)\s*[x×,\s]\s*(\d+)/i);
              if (m) return { w: +m[1], h: +m[2] };
              return fetchNativeSize(pid).catch(err => {
                throw new Error('size lookup failed (' + (err.message || err) +
                  ') — check the publicId, or enter native W×H manually');
              });
            };
            if (SCN_EDIT) {
              // ── update: name/category always; an image swap refetches size
              //    and rescales cols/rows around the EXISTING cell_px — if the
              //    new art's grid differs, Calibrate after. The key never moves:
              //    it is the join handle historical encounters point at. ──
              const s = SCENES.find(x => x.key === SCN_EDIT);
              const patch = { name, category };
              if (s && pid !== s.public_id) {
                const { w, h } = await sizeOf();
                Object.assign(patch, {
                  public_id: pid, native_w: w, native_h: h,
                  cols: Math.max(1, Math.round(w / s.cell_px)),
                  rows: Math.max(1, Math.round(h / s.cell_px)),
                });
              }
              const { error } = await SB.from('scenes').update(patch).eq('key', SCN_EDIT);
              if (error) throw error;
              hint.textContent = '✓ Updated.';
              endEdit();
            } else {
              const { w, h } = await sizeOf();
              const cols = Math.max(1, Math.round(w / cell)), rows = Math.max(1, Math.round(h / cell));
              const { error } = await SB.from('scenes').insert({
                key, name, category, public_id: pid, cell_px: cell, origin_x: 0, origin_y: 0,
                cols, rows, native_w: w, native_h: h,
              });
              if (error) throw error;
              ['key','name','cat','pid','wh'].forEach(k => fld(k).value = '');
              hint.textContent = '✓ Registered. Set it active to test, then Calibrate.';
            }
            loadScenes();
          } catch (err) {
            console.error('save scene:', err);
            hint.textContent = '⚠ ' + (err.message || err);
          }
          sr.disabled = false; sr.textContent = SCN_EDIT ? 'Update scene' : 'Save scene';
        }
      });
    }

    // ── zoom toolbar ──
    function buildZoomBar() {
      const bar = document.createElement('div');
      bar.className = 'zoom-bar';
      bar.innerHTML = `<button id="z-in" title="Zoom in">+</button>
                       <button id="z-out" title="Zoom out">−</button>
                       <button id="z-fit" class="fit" title="Fit to screen">FIT</button>`;
      stage.appendChild(bar);
      const c = () => ({ x: stage.clientWidth / 2, y: stage.clientHeight / 2 });
      bar.querySelector('#z-in').onclick  = () => { const m = c(); zoomAt(1.25, m.x, m.y); };
      bar.querySelector('#z-out').onclick = () => { const m = c(); zoomAt(1 / 1.25, m.x, m.y); };
      bar.querySelector('#z-fit').onclick = () => fitBoard(META);
    }

    // ── main ──
    whenReady(async function () {
      const sb = window.__tok.sb;  SB = sb;
      const me = window.__tok.ready ? await window.__tok.ready : null;  ME = me;
      const isStaff = !!(me && (me.role === 'overseer' || me.role === 'dm'));
      IS_STAFF = isStaff;

      // ── RAIL-DOCK: the dock retired into the rail's Battle tab. The RAIL
      // owns the feed surface now (same tables, its own realtime + composer);
      // this page keeps the feed WRITERS (feedInsert / feedLogRoll / logEvent)
      // and its always-on channel purely to drive the roll ticker. renderFeed
      // no-ops (feedListEl never mounts) and the pane-unread branches guard
      // themselves out — the dead reader code sweeps in the feed-core
      // extraction (increment 3). buildFeed() is deliberately NOT called;
      // it also carried an onRSChange OVERWRITE the rail's chained listener
      // replaces safely. ──
      await loadCampaign();
      buildDock();
      initFeedRealtime();

      // active encounter (RLS: all authenticated can read)
      const { data: enc, error: encErr } = await sb
        .from('encounters').select('*').eq('status', 'active').maybeSingle();
      if (encErr) { showMsg('Could not load the encounter', encErr.message, false); return; }
      if (!enc)   { showMsg('No active encounter', 'When the DM starts a fight, the battlefield appears here.', false); return; }
      ENC = enc;
      loadFog();          // mirror encounters.revealed_cells into FOG.cells

      // SCENES-V1: calibration comes from the scenes table; encounters.map_ref
      // matches scenes.key (same human handle the manifest used).
      const { data: scn, error: scnErr } = await sb
        .from('scenes').select('*').eq('key', enc.map_ref).maybeSingle();
      if (scnErr) { showMsg('Could not load the scene', scnErr.message, false); return; }
      if (!scn)   { showMsg('Unknown map', `No scenes row with key "${enc.map_ref}".`, false); return; }
      META = sceneMeta(scn);
      if (META.grid) GRID = Object.assign(GRID, META.grid);

      // combatants (RLS auto-filters: players never receive hidden rows)
      const { data: combs, error: cErr } = await sb
        .from('combatants').select('*').eq('encounter_id', enc.id);
      if (cErr) { showMsg('Could not load combatants', cErr.message, false); return; }

      // header
      document.getElementById('combat-name').textContent  = enc.name || 'Encounter';
      document.getElementById('combat-round').textContent = enc.round ?? 1;
      barEl.style.display = 'flex';

      // build the board
      hideMsg();
      COMBS = combs || [];
      const { data: draws } = await sb.from('drawings').select('*').eq('encounter_id', enc.id);
      DRAWINGS = draws || [];
      buildBoard();

      // wire interactions (drag / pan / pinch / keys), realtime sync, zoom UI
      initInteractions();
      initRealtime();
      buildZoomBar();

      // grid controls (demonstrates the opacity / style / colour answer live)
      buildGridControls();
      buildToolRail();
      if (IS_STAFF) buildBestiary();
      if (IS_STAFF) buildViewToggle();
      if (IS_STAFF) buildCombatTab();
      if (IS_STAFF) buildTokensPane();
      if (IS_STAFF) buildScenesPane();
      if (IS_STAFF) buildStatblockPanel();
      buildInitStrip();

      // ── HUD ↔ combat bridge (shared: any user drives any party character) ──
      // battle.js is backend-agnostic; we hand it a Supabase combatants backend
      // keyed by the *selected* character (source_key), so the HUD's built-in
