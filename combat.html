      // switcher is the live control. Read, live-in, and write all hit the same
      // row the token uses. Enemies aren't driven here — they stay on the
      // on-board context menu. (RLS lets any player write party rows; the column
      // guard still limits changes to hp/conditions/x,y.)
      if (window.__battle) {
        if (ME && ME.characterKey) window.__battle.setChar(ME.characterKey);
        // One resolver for both actor families: PC keys bind by source_key,
        // 'mon:<uuid>' keys (M2 — staff driving monsters) bind by row id.
        function hudComb(key) {
          if (window.MonsterActor && MonsterActor.isMonsterKey(key))
            return COMBS.find(x => x.id === MonsterActor.idFromKey(key));
          return COMBS.find(x => x.side === 'party' && x.source_key === key);
        }
        // Events about a hidden foe must not leak to players.
        const evHidden = c => !!(c.hidden && c.side !== 'party');
        const hudBackend = window.makeCombatantsBackend({
          sb: SB,
          resolve: hudComb,
          esc: escapeHtml,
          evHidden: evHidden,
          logEvent: (kind, data, text, hid) => logEvent(kind, data, text, hid),
          logRoll: (o) => feedLogRoll(o),
          isStaff: () => IS_STAFF,
          afterInitiative: () => renderInitStrip(),
          // Durable full vitals for PCs (temp HP, max bonus, slots, concentration).
          saveVitals: async (key, combat) => {
            const c = hudComb(key);
            if (c && c.side === 'party' && c.source_key) {
              const { error } = await SB.from('characters').update({ vitals: combat }).eq('key', c.source_key);
              if (error) console.warn('[hud] vitals save failed:', error.message);
            }
          },
          // End Turn advances the shared tracker; non-staff only on their own turn.
          advanceTurn: (key) => {
            if (!IS_STAFF) {
              const active = COMBS.find(x => x.id === (ENC && ENC.active_combatant_id));
              if (!active || !key || hudComb(key) !== active) { console.warn('[hud] off-turn advance blocked (driving', key, ')'); return; }
            }
            advanceTurn();
          },
          // Keep feeding HUD live-in from combat.html's existing combatants channel
          // (realtime handler still calls HUD_ONCHANGE — untouched).
          onSubscribe: (onChange) => { HUD_ONCHANGE = onChange; },
        });
        window.__battle.useBackend(hudBackend);
        window.__battle.backend = hudBackend;   // token-orb HP writes reuse this (combat-orbs.js)
      }
      pushTurnToHud();   // seed HUD round + whose-turn now the backend is wired

      // UX-AUDIT-2 first-use hint: the board's main verb is undiscoverable
      if (!IS_STAFF && COMBS.some(c => c.side === 'party'))
        hintOnce('tok_hint_drive', "Tip — double-click your character's token to drive it in the Battle HUD.");

      // keep the board fitted on resize/orientation change (grid + tokens are
      // %/viewBox-based, so only the board's px size needs recomputing)
      let rt;
      window.addEventListener('resize', () => {
        clearTimeout(rt);
        rt = setTimeout(() => { if (boardEl && META) fitBoard(META); }, 120);
      });
      // MOBILE-TRIAGE: iOS never shrinks the layout viewport for the on-screen
      // keyboard — visualViewport is the only honest signal. --kb is the
      // overlap in px (0 on desktop); the mobile dock's bottom rides it.
      if (window.visualViewport) {
        const vvSync = () => {
          const vv = window.visualViewport;
          const kb = Math.max(0, window.innerHeight - vv.height - vv.offsetTop);
          document.documentElement.style.setProperty('--kb', Math.round(kb) + 'px');
          // (the dock's feed keyboard-pin retired with the dock — the rail
          // owns its own composer; --kb still drives the ticker + pg-toast)
        };
        window.visualViewport.addEventListener('resize', vvSync);
        window.visualViewport.addEventListener('scroll', vvSync);
        vvSync();
      }
    });

    // ── grid controls panel ──
    // ── RAIL-DOCK ADAPTER (BATTLE TAB) ──────────────────────────────────
    // The dock retired; its sections ride the rail. buildDock() builds the
    // sub-strip + body DETACHED (so the pane builders below run in their
    // shipped order, before the rail necessarily exists), then registers
    // ONE contextual tab through rail.js's own seam — the rail owns the
    // Battle tab button and the pane slot; this page owns the contents.
    // DOCK keeps its shipped shape ({panes:{id:{btn,pane,title,onOpen}},
    // open, last, corner, ticker}) so every downstream reference —
    // paintCombatMenu, the view-toggle fallback, tokensPaneOpen — is
    // untouched. dockOpen() now switches the SUB-strip; the rail handles
    // open/collapse itself, so the panel/handle halves are gone.
    let DOCK = null;
    function buildDock() {
      const host = document.createElement('div');
      host.className = 'bd-host';
      const strip = document.createElement('div');
      strip.className = 'bd-strip';
      const corner = document.createElement('div');
      corner.className = 'bd-corner';
      strip.appendChild(corner);
      const body = document.createElement('div');
      body.className = 'dock-body';           // shipped class — pane CSS untouched
      host.appendChild(strip);
      host.appendChild(body);
      // the roll ticker survives as-is: a floating strip over the map,
      // now gated on the RAIL's feed visibility. Click → the rail's Feed.
      const ticker = document.createElement('div');
      ticker.className = 'roll-ticker';
      ticker.title = 'Open the feed';
      ticker.innerHTML = `<span>🎲</span><span class="twho"></span><span class="twhat"></span>`;
      stage.appendChild(ticker);
      ticker.addEventListener('click', () => { if (window.TokRail) window.TokRail.show('feed'); });
      DOCK = { host, strip, corner, body, ticker, panes: {}, open: null, last: null };
      // register with the rail — now, or when it announces itself
      const SWORD = '<svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M3.5 14.5L12 6l2.5-3.5L11 5 2.5 13.5zM11.5 11.5l3 3M10 14.5h3.5V11"/></svg>';
      const reg = () => {
        window.TokRail.registerTab({
          id: 'battle', label: 'Battle', icon: SWORD, order: 20,
          onMount: (pane) => { pane.appendChild(host); },
          onShow: () => { if (!DOCK.open) dockOpen(DOCK.last || firstDockPane()); syncTicker(); },
          onHide: () => syncTicker(),
        });
      };
      if (window.TokRail && window.TokRail.ready) reg();
      else document.addEventListener('tok-rail:ready', reg, { once: true });
      // rail tab clicks / collapse re-gate the ticker; the rail emits no
      // change event, so a delegated listener + microtask re-sync is the
      // page-side glue (cheap: only fires on clicks inside the rail chrome).
      document.addEventListener('click', (e) => {
        if (e.target.closest && e.target.closest('#tok-rail, .tr-handle')) setTimeout(syncTicker, 0);
      });
    }
    function firstDockPane() {
      const k = Object.keys(DOCK.panes);
      return k.length ? k[0] : null;
    }
    function dockRegister(id, { icon, title, staff, onOpen, tab }) {
      // sub-strip button: label-only (the strip is the Feed-toggle chrome,
      // not the old icon-over-label tabs). `staff` class kept — the
      // view-as-player fallback keys off it.
      const btn = document.createElement('button');
      btn.className = 'bd-tab' + (staff ? ' staff' : '');
      btn.title = title;
      btn.textContent = tab || title;
      DOCK.strip.insertBefore(btn, DOCK.corner);
      const pane = document.createElement('div');
      pane.className = 'dock-pane';            // shipped class — pane CSS untouched
      DOCK.body.appendChild(pane);
      DOCK.panes[id] = { btn, pane, title, onOpen };
      btn.addEventListener('click', (e) => { e.stopPropagation(); dockOpen(id); });
      if (!DOCK.open) dockOpen(id);            // first registered section shows
      return pane;
    }
    function dockOpen(id) {
      if (id && !DOCK.panes[id]) id = null;
      DOCK.open = id;
      if (id) DOCK.last = id;
      Object.entries(DOCK.panes).forEach(([k, p]) => {
        p.btn.classList.toggle('on', k === id);
        p.pane.classList.toggle('show', k === id);
      });
      if (id && DOCK.panes[id].onOpen) DOCK.panes[id].onOpen();
      syncTicker();
    }
    // ── END RAIL-DOCK ADAPTER ───────────────────────────────────────────

    // ── roll ticker: the latest roll, visible whenever the RAIL's Feed isn't
    // (another rail tab, or the rail collapsed). Sourced from the shared
    // feed — logRoll already carries everyone's rolls, and hidden rolls never
    // reach players under RLS, so masking is inherited for free. ──
    function railFeedVisible() {
      const R = window.__tokRail;
      return !!(R && R.open && R.tab === 'feed');
    }
    function syncTicker() {
      if (!DOCK || !DOCK.ticker) return;
      const R = window.__tokRail;
      DOCK.ticker.classList.toggle('show', !railFeedVisible() && DOCK.ticker.dataset.has === '1');
      DOCK.ticker.classList.toggle('rail-open', !!(R && R.open));
    }
    function tickerUpdate(row, flash) {
      if (!DOCK || !row) return;
      const tmp = document.createElement('div');
      tmp.innerHTML = row.body || '';
      const text = tmp.textContent.replace(/\s+/g, ' ').trim();   // feed bodies are HTML; ticker is plain text
      if (!text) return;
      DOCK.ticker.dataset.has = '1';
      DOCK.ticker.querySelector('.twho').textContent = (row.actor_name || '').toUpperCase();
      DOCK.ticker.querySelector('.twhat').textContent = text;
      syncTicker();
      if (flash) { DOCK.ticker.classList.remove('flash'); void DOCK.ticker.offsetWidth; DOCK.ticker.classList.add('flash'); }
    }

    function buildGridControls() {
      const panel = document.createElement('div');
      panel.className = 'grid-controls';

      // a circle/cutout selector per party character present in the encounter
      const partyRows = COMBS
        .filter(c => c.side === 'party' && c.source_key)
        .map(c => {
          const cur = TOKEN_STYLE[c.source_key] || TOKEN.style;
          return `<div class="gc-row">
              <label title="${c.name}">${(c.name || c.source_key).split(' ')[0]}</label>
              <select data-char="${c.source_key}" class="gc-cstyle">
                <option value="cutout"${cur === 'cutout' ? ' selected' : ''}>Cutout</option>
                <option value="circle"${cur === 'circle' ? ' selected' : ''}>Circle</option>
              </select>
            </div>`;
        }).join('');

      panel.innerHTML = `
        <div class="gc-body">
          <p class="gc-sub">Grid <span class="gc-tag">global</span></p>
          <div class="gc-row">
            <label for="gc-style">Style</label>
            <select id="gc-style">
              <option value="lines">Lines</option>
              <option value="dots">Dots</option>
              <option value="none">Off</option>
            </select>
          </div>
          <div class="gc-row">
            <label for="gc-opacity">Opacity</label>
            <input type="range" id="gc-opacity" min="0" max="1" step="0.02">
          </div>
          <div class="gc-row">
            <label for="gc-color">Colour</label>
            <input type="color" id="gc-color">
          </div>
          <div class="gc-sep"></div>
          <p class="gc-sub">Token style <span class="gc-tag">per character</span></p>
          ${partyRows || '<p class="gc-empty">No party tokens.</p>'}
          <div class="gc-sep"></div>
          <p class="gc-sub">Tokens <span class="gc-tag">view</span></p>
          <div class="gc-row">
            <label for="gc-tsize">Size</label>
            <input type="range" id="gc-tsize" min="0.6" max="1.8" step="0.05">
          </div>
          <div class="gc-row">
            <label for="gc-tring">Ring / base</label>
            <input type="checkbox" id="gc-tring">
          </div>
        </div>`;
      dockRegister('display', { icon: '⚙', title: 'Display' }).appendChild(panel);

      const styleSel = panel.querySelector('#gc-style');
      const opac     = panel.querySelector('#gc-opacity');
      const color    = panel.querySelector('#gc-color');
      styleSel.value = GRID.style;
      opac.value     = GRID.opacity;
      color.value    = GRID.color;

      styleSel.addEventListener('change', () => { GRID.style = styleSel.value; redrawGrid(); });
      opac.addEventListener('input',      () => { GRID.opacity = parseFloat(opac.value); redrawGrid(); });
      color.addEventListener('input',     () => { GRID.color = color.value; redrawGrid(); });

      // per-character token style → updates TOKEN_STYLE and re-renders
      panel.querySelectorAll('.gc-cstyle').forEach(sel => {
        sel.addEventListener('change', () => {
          TOKEN_STYLE[sel.dataset.char] = sel.value;
          renderTokens();
        });
      });

      const tsize  = panel.querySelector('#gc-tsize');
      const tring  = panel.querySelector('#gc-tring');
      tsize.value    = TOKEN.size;
      tring.checked  = TOKEN.ring;
      tsize.addEventListener('input',   () => { TOKEN.size = parseFloat(tsize.value); renderTokens(); });
      tring.addEventListener('change',  () => { TOKEN.ring = tring.checked; renderTokens(); });
    }

    // ── bestiary picker (DM only) — search the 5etools bestiary and drop a
    // monster onto the board as a HIDDEN enemy combatant. The full monster JSON
    // is SNAPSHOT onto combatants.statblock (self-contained, survives homebrew);
    // hp/max_hp/ac/size are denormalised so the board/HUD never parse jsonb.
    // Same CDN source as compendium.html. New token appears live via the
    // combatants INSERT realtime handler. ──
    const BEST_BASE = 'https://raw.githubusercontent.com/5etools-mirror-3/5etools-2014-src/main/data';
    const BEST_SOURCES = [
      { label: 'Monster Manual', file: 'bestiary/bestiary-mm.json' },
      { label: "Volo's Guide",   file: 'bestiary/bestiary-vgm.json' },
      { label: "Mordenkainen's", file: 'bestiary/bestiary-mtf.json' },
      { label: 'DMG',            file: 'bestiary/bestiary-dmg.json' },
    ];
    const BEST_CR = [
      { label: 'All', val: null }, { label: '0–½', val: 'low' }, { label: '1–4', val: 'mid' },
      { label: '5–10', val: 'high' }, { label: '11+', val: 'deadly' },
    ];
    const SIZE_CODE = { T: 'tiny', S: 'small', M: 'medium', L: 'large', H: 'huge', G: 'gargantuan' };

    function bstFmtCR(cr)  { if (cr === 0) return '0'; if (!cr) return '—'; return typeof cr === 'object' ? (cr.cr || '—') : cr; }
    function bstParseCR(cr){ const s = bstFmtCR(cr); if (s === '1/8') return 0.125; if (s === '1/4') return 0.25; if (s === '1/2') return 0.5; return parseFloat(s) || 0; }
    function bstAC(ac) {
      if (typeof ac === 'number') return ac;
      if (Array.isArray(ac) && ac.length) { const a = ac[0]; return typeof a === 'object' ? (a.ac ?? null) : a; }
      return null;
    }
    function bstSize(sz) { return SIZE_CODE[Array.isArray(sz) ? sz[0] : sz] || 'medium'; }

    // dropMonster hoisted to sibling scope (was nested in buildBestiary) so
    // BOTH the bestiary list AND the saved-monsters shelf spawn through one path.
    // nameOverride lets a saved variant ("Sister Garaele") spawn under its custom
    // name while keeping the base statblock; numbering keys off the shown name.
    async function dropMonster(m, nameOverride) {
      const avg = (m.hp && typeof m.hp.average === 'number') ? m.hp.average : 1;
      // number duplicates on the board: Goblin, Goblin 2, Goblin 3 …
      const base = (nameOverride && nameOverride.trim()) || m.name;
      const re = new RegExp('^' + base.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ' \\d+$');
      const dupes = COMBS.filter(c => c.side === 'enemy' && (c.name === base || re.test(c.name || ''))).length;
      const name = dupes ? `${base} ${dupes + 1}` : base;
      const insertRow = {
        encounter_id: ENC.id, owner: null, name, side: 'enemy', hidden: true,
        hp: avg, max_hp: avg, ac: bstAC(m.ac), conditions: [], size: bstSize(m.size),
        statblock: m, x: Math.floor(META.cols / 2), y: Math.floor(META.rows / 2),
      };
      const { data, error } = await SB.from('combatants').insert(insertRow).select().single();
      if (error) { console.error('[bestiary] drop failed:', error.message); return false; }
      // Optimistic local add; the INSERT realtime echo dedupes on id — which
      // means the realtime handler's repaints never run for our own drop, so
      // repaint here too (roster pane + strip + HUD push all hang off this).
      if (data && !COMBS.some(k => k.id === data.id)) { COMBS.push(data); renderTokens(); renderInitStrip(); }
      return true;
    }

    function buildBestiary() {
      const cache = {};
      let all = [], crFilter = null, srcIdx = 0;

      const panel = document.createElement('div');
      panel.className = 'bestiary-panel';
      panel.innerHTML = `
        <select class="bst-source" id="bst-source">
          ${BEST_SOURCES.map((s, i) => `<option value="${i}">${s.label}</option>`).join('')}
        </select>
        <input class="bst-search" id="bst-search" type="text" placeholder="Search monsters…" autocomplete="off">
        <div class="bst-cr">
          ${BEST_CR.map(f => `<button data-cr="${f.val}"${f.val === null ? ' class="on"' : ''}>${f.label}</button>`).join('')}
        </div>
        <div class="bst-list" id="bst-list"><div class="bst-state">Open to load…</div></div>`;
      dockRegister('bestiary', { icon: '☷', title: 'Bestiary', staff: true,
        onOpen: () => { if (!all.length) loadSrc(); } }).appendChild(panel);

      const listEl = panel.querySelector('#bst-list');

      async function loadSrc() {
        const url = `${BEST_BASE}/${BEST_SOURCES[srcIdx].file}`;
        listEl.innerHTML = '<div class="bst-state">Loading…</div>';
        try {
          if (!cache[url]) {
            const res = await fetch(url);
            if (!res.ok) throw new Error('HTTP ' + res.status);
            cache[url] = await res.json();
          }
          all = (cache[url].monster || []).map(m => ({ raw: m, name: m.name, cr: bstParseCR(m.cr) }));
          renderList();
        } catch (e) {
          listEl.innerHTML = `<div class="bst-state">Failed to load.<br><small>${e.message}</small></div>`;
        }
      }

      function renderList() {
        const q = (panel.querySelector('#bst-search').value || '').toLowerCase().trim();
        const shown = all.filter(e => {
          if (q && !e.name.toLowerCase().includes(q)) return false;
          if (crFilter === 'low')    return e.cr <= 0.5;
          if (crFilter === 'mid')    return e.cr >= 1 && e.cr <= 4;
          if (crFilter === 'high')   return e.cr >= 5 && e.cr <= 10;
          if (crFilter === 'deadly') return e.cr >= 11;
          return true;
        }).sort((a, b) => a.name.localeCompare(b.name));
        if (!shown.length) { listEl.innerHTML = '<div class="bst-state">No results.</div>'; return; }
        listEl.innerHTML = shown.map((e, i) => {
          const n = variants(e.name);
          return `
          <div class="bst-row">
            <span class="bst-row-name">${e.name}</span>
            <span class="bst-row-cr">CR ${bstFmtCR(e.raw.cr)}</span>
            <button class="bst-save${n ? ' on' : ''}" data-i="${i}" title="Save a copy to the shelf">${n ? '★' : '☆'}${n > 1 ? `<span class="ct">${n}</span>` : ''}</button>
            <button class="bst-drop" data-i="${i}">Drop</button>
          </div>`;
        }).join('');
        listEl.querySelectorAll('.bst-save').forEach(btn => {
          btn.addEventListener('click', async () => {
            const ok = await saveMonsterCopy(shown[+btn.dataset.i].raw);   // additive: stamps a copy
            if (ok) { btn.classList.add('flash'); renderList(); }          // renderList bumps the count
          });
        });
        listEl.querySelectorAll('.bst-drop').forEach(btn => {
          btn.addEventListener('click', async () => {
            btn.disabled = true; btn.textContent = '…';
            const ok = await dropMonster(shown[+btn.dataset.i].raw);
            if (ok) hintOnce('tok_hint_hiddendrop',
              "Dropped hidden — players can't see it until you use the token's right-click menu → Reveal to players.");
            btn.textContent = ok ? 'Added ✓' : 'Retry';
            btn.disabled = false;
            // re-arm so you can drop another of the same monster (Goblin ×3, etc.)
            if (ok) setTimeout(() => { btn.textContent = 'Drop'; }, 1000);
          });
        });
      }

      panel.querySelector('#bst-search').addEventListener('input', renderList);
      panel.querySelector('#bst-source').addEventListener('change', (e) => { srcIdx = +e.target.value; all = []; loadSrc(); });
      panel.querySelectorAll('.bst-cr button').forEach(b => {
        b.addEventListener('click', () => {
          crFilter = b.dataset.cr === 'null' ? null : b.dataset.cr;
          panel.querySelectorAll('.bst-cr button').forEach(x => x.classList.remove('on'));
          b.classList.add('on');
          renderList();
        });
      });
    }

    // ── "view as player" toggle (staff only) — flips a visual-only preview:
    // hidden enemies vanish, fog covers solid, DM panels hide, the context-menu
    // Manage tab disappears, and moves drop to player permissions. Real role is
    // unchanged; toggle back to act as DM. ──
    function buildViewToggle() {
      const EYE_OPEN  = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5C5 5 1 12 1 12s4 7 11 7 11-7 11-7-4-7-11-7zm0 11a4 4 0 110-8 4 4 0 010 8z"/></svg>';
      const btn = document.createElement('button');
      btn.className = 'corner-btn view-toggle';
      btn.innerHTML = EYE_OPEN;
      function paint() {
        btn.classList.toggle('on', VIEW_AS_PLAYER);
        btn.title = VIEW_AS_PLAYER ? 'Showing what a player sees — click for DM view' : 'Preview what players see';
      }
      btn.addEventListener('click', () => {
        VIEW_AS_PLAYER = !VIEW_AS_PLAYER;
        stage.classList.toggle('view-as-player', VIEW_AS_PLAYER);
        if (DOCK && DOCK.strip) DOCK.strip.classList.toggle('hide-staff', VIEW_AS_PLAYER);
        if (VIEW_AS_PLAYER) {
          // leaving DM tooling cleanly: stop fog painting, close DM surfaces.
          // A staff sub-tab falls back to Display (players' section) — the
          // rail's Feed is a different tab entirely now, not the fallback.
          FOG.editing = false; stage.classList.remove('fog-edit');
          if (DOCK && DOCK.open && DOCK.panes[DOCK.open].btn.classList.contains('staff')) dockOpen('display');
          closeCtxMenu();
        }
        redrawFog();      // veil opacity (translucent ↔ solid)
        renderTokens();   // hidden enemies + badges
        renderInitStrip(); // strip visibility + staff controls
        paint();
      });
      paint();
      DOCK.corner.appendChild(btn);   // eye sits in the sub-strip corner (minimize retired with the dock)
    }

    // ── combat pane (staff) — the roster picker. Out of combat: checkboxes
    // pick the opening fight + two start modes. During: the checkbox IS
    // in_combat — mid-fight joins (second wave) and removals ride the same
    // rows. PICK_OFF stores DESELECTED ids so newly-dropped monsters default
    // to checked; it persists across fights (the hermit stays benched). ──
    let PICK_OFF = new Set();
    function buildCombatTab() {
      const pane = dockRegister('combat', { icon: '⚔', title: 'Combat', tab: 'Tracker', staff: true });
      const wrap = document.createElement('div');
      wrap.className = 'roster-wrap';
      pane.appendChild(wrap);
      wrap.addEventListener('click', (e) => {
        const sel = e.target.closest('[data-grp]');
        if (sel && !inCombat()) {
          COMBS.filter(c => (sel.dataset.grp === 'party') === (c.side === 'party'))
            .forEach(c => sel.dataset.sel === 'all' ? PICK_OFF.delete(c.id) : PICK_OFF.add(c.id));
          paintCombatMenu(); return;
        }
        const row = e.target.closest('.roster-row[data-pick]');
        if (row) {
          const id = row.dataset.pick;
          if (!inCombat()) { PICK_OFF.has(id) ? PICK_OFF.delete(id) : PICK_OFF.add(id); paintCombatMenu(); }
          else {
            // During combat only the CHECKBOX seats/unseats — a name click
            // selects the token (mirrors the strip chips), never ejects anyone.
            const c = COMBS.find(k => k.id === id); if (!c) return;
            if (e.target.closest('.roster-check')) { if (c.in_combat) unseatOne(id); else seatOne(id); }
            else selectToken(id);
          }
          return;
        }
        const b = e.target.closest('button[data-act]'); if (!b || b.disabled) return;
        if (b.dataset.act === 'start-roll')      startCombat('roll');
        else if (b.dataset.act === 'start-auto') startCombat('auto');
        else if (b.dataset.act === 'reroll')     rollAllInitiative();
        else if (b.dataset.act === 'end')        endCombat();
      });
      paintCombatMenu();
    }
    function rosterRowHtml(c, on, showInit) {
      const isParty = c.side === 'party';
      const art = isParty ? (PORTRAITS[c.source_key] || TOKENS[c.source_key] || '') : (monsterTokenUrl(c) || '');
      const initial = (c.name || '?').trim().charAt(0).toUpperCase();
      const eye = (c.hidden && !isParty) ? `<span class="roster-eye" title="Hidden from players">⊘</span>` : '';
      let init = '';
      if (showInit) {
        const pending = c.initiative == null;
        init = `<span class="roster-init${pending ? ' pending' : ''}">${pending ? '…' : c.initiative}</span>`;
      }
      return `<div class="roster-row${on ? ' on' : ''}" data-pick="${c.id}">
        <span class="roster-check">${on ? '✓' : ''}</span>
        <span class="roster-disc${isParty ? ' party' : ''}">${art ? `<img src="${art}" alt="" draggable="false" onerror="this.remove()">` : initial}</span>
        <span class="roster-name">${escapeHtml(c.name || '?')}</span>${eye}${init}</div>`;
    }
    function paintCombatMenu() {
      const p = DOCK && DOCK.panes.combat ? DOCK.panes.combat.pane : null; if (!p) return;
      const wrap = p.querySelector('.roster-wrap'); if (!wrap) return;
      let scroll = '', acts = '';
      if (!inCombat()) {
        const party  = COMBS.filter(c => c.side === 'party');
        const others = COMBS.filter(c => c.side !== 'party');
        const picked = COMBS.filter(c => !PICK_OFF.has(c.id)).length;
        const grp = (label, key, list) => list.length
          ? `<div class="roster-grp"><span class="roster-grp-l">${label}</span><span class="roster-grp-sel"><span data-grp="${key}" data-sel="all">all</span> · <span data-grp="${key}" data-sel="none">none</span></span></div>`
            + list.map(c => rosterRowHtml(c, !PICK_OFF.has(c.id), false)).join('')
          : '';
        scroll = (grp('Party', 'party', party) + grp('Others', 'others', others))
          || `<div class="roster-empty">No one on the board yet.</div>`;
        acts = `<button class="dock-act" data-act="start-roll"${picked ? '' : ' disabled'}>▶ &nbsp;Start — players roll <span class="roster-count">(${picked})</span></button>`
             + `<button class="dock-act" data-act="start-auto"${picked ? '' : ' disabled'}>⚄ &nbsp;Start — auto-roll everyone</button>`;
      } else {
        const seated = initRoster();
        const bench  = COMBS.filter(c => !c.in_combat);
        scroll = `<div class="roster-grp"><span class="roster-grp-l">In the fight — round ${(ENC && ENC.round) || 1}</span></div>`
          + seated.map(c => rosterRowHtml(c, true, true)).join('')
          + (bench.length
              ? `<div class="roster-grp"><span class="roster-grp-l">On the board — check to join</span></div>`
                + bench.map(c => rosterRowHtml(c, false, false)).join('')
              : '');
        acts = `<button class="dock-act" data-act="reroll">↻ &nbsp;Re-roll the seated</button>`
             + `<button class="dock-act" data-act="end">⊗ &nbsp;End combat</button>`;
      }
      wrap.innerHTML = `<div class="roster-scroll">${scroll}</div><div class="dock-acts roster-acts">${acts}</div>`;
    }
    function syncCombatChrome() { paintCombatMenu(); }

    // ── Token tray (Party shelf) ── the source you pull party tokens from, so a
    // PC removed from the board can be put back, any time, without re-seeding.
    // v1 = party characters (from CHARACTERS); the Saved-monsters shelf lands next.
    let TRAY_UI = null;
    // Saved-monsters shelf state (staff-only). SAVED = the persisted statblocks;
    // SM_FILTER = active tag filter (OR-match); SM_EDIT = id of the row whose
    // inline tag editor is open. CR is never stored — derived from the statblock.
    // PARTY = party characters from the table (drives the Party shelf list).
    let SAVED = [], SM_FILTER = new Set(), SM_EDIT = null, PARTY = [];
    function buildTokensPane() {
      const pane = dockRegister('tokens', { icon: '👥', title: 'Tokens', tab: 'Tokens', staff: true, onOpen: tokensPaneOpen });
      const wrap = document.createElement('div');
      wrap.className = 'tray-wrap';
      pane.appendChild(wrap);
      TRAY_UI = { pane, wrap };
      wrap.addEventListener('click', onTokensClick);
      wrap.addEventListener('contextmenu', (e) => {        // M2: right-click a party row → open its sheet
        const row = e.target.closest('.tray-row[data-key]');
        if (!row) return;
        e.preventDefault();
        window.CombatSheets?.open?.(row.dataset.key);
      });
      wrap.addEventListener('keydown', (e) => {
        if (e.key !== 'Enter') return;
        if (e.target.classList.contains('te-input')) {
          e.preventDefault();
          const v = e.target.value.trim().toLowerCase();
          if (v) addTagToSaved(e.target.dataset.tagfor, v);
          e.target.value = '';
        } else if (e.target.classList.contains('re-name')) {
          e.preventDefault();
          renameSaved(e.target.dataset.namefor, e.target.value, true);   // persist + repaint, editor stays open
        }
      });
      // commit a rename when focus leaves the name field (tabbing to tags, etc.)
      wrap.addEventListener('focusout', (e) => {
        if (e.target.classList && e.target.classList.contains('re-name'))
          renameSaved(e.target.dataset.namefor, e.target.value, false);
      });
      tokensPaneOpen();
    }
    // Delegated click for the Tokens pane: party rows AND the saved-monster
    // shelf (filter chips, in-editor tag chips, +Add / ⌗ / ×) on one listener.
    function onTokensClick(e) {
      const chip = e.target.closest('.tchip');            // tag filter
      if (chip) {
        if (chip.dataset.all) SM_FILTER.clear();
        else { const t = chip.dataset.t; SM_FILTER.has(t) ? SM_FILTER.delete(t) : SM_FILTER.add(t); }
        paintTokensPane(); return;
      }
      const rmtag = e.target.closest('[data-rmtag]');     // remove a tag (in the open editor)
      if (rmtag) { removeTagFromSaved(rmtag.dataset.editid, rmtag.dataset.rmtag); return; }
      const sm = e.target.closest('.tray-row[data-id]');  // saved-monster row
      if (sm) {
        const id = sm.dataset.id;
        if (e.target.closest('[data-act="rm"]'))  { unsaveMonster(id); return; }
        if (e.target.closest('[data-act="edit"]')) { SM_EDIT = (SM_EDIT === id ? null : id); paintTokensPane(); return; }
        if (e.target.closest('.tray-add'))         { spawnSaved(id, sm); return; }
        return;
      }
      const row = e.target.closest('.tray-row[data-key]');  // party row
      if (!row) return;
      if (row.classList.contains('on')) removePartyToken(row.dataset.key);
      else addPartyToken(row.dataset.key);
    }
    function paintTokensPane() {
      if (!TRAY_UI) return;
      const onBoard = new Set(COMBS.filter(c => c.side === 'party' && c.source_key).map(c => c.source_key));
      // Source the shelf from the characters TABLE (so a 5th/6th PC appears once
      // its row exists); fall back to the legacy CHARACTERS map if the load is
      // empty/failed. PORTRAITS still wins for the original four; a new PC uses
      // its structural.portrait (board token art for new keys is battle.js's job
      // and falls back to a letter disc until that's table-fed too).
      const partyList = (PARTY && PARTY.length)
        ? PARTY.map(c => ({ key: c.key, name: c.name || c.key,
            art: PORTRAITS[c.key] || (typeof TOKENS !== 'undefined' && TOKENS[c.key]) || (c.structural && c.structural.portrait) || '' }))
        : Object.keys((typeof CHARACTERS !== 'undefined' && CHARACTERS) || {}).map(key => ({ key, name: (CHARACTERS[key] || {}).name || key,
            art: PORTRAITS[key] || (typeof TOKENS !== 'undefined' && TOKENS[key]) || '' }));
      const rows = partyList.map(p => {
        const on = onBoard.has(p.key);
        const initial = (p.name || '?').trim().charAt(0).toUpperCase();
        return `<div class="tray-row${on ? ' on' : ''}" data-key="${p.key}">
          <span class="roster-disc party">${p.art ? `<img src="${p.art}" alt="" draggable="false" onerror="this.remove()">` : escapeHtml(initial)}</span>
          <span class="roster-name">${escapeHtml(p.name)}</span>
          <span class="tray-act">${on ? '✓ On board' : '+ Add'}</span></div>`;
      }).join('');
      TRAY_UI.wrap.innerHTML =
        `<div class="roster-grp"><span class="roster-grp-l">Party</span></div>`
        + `<div class="tray-list">${rows || '<div class="roster-empty">No party characters found.</div>'}</div>`
        + `<div class="roster-grp"><span class="roster-grp-l">Saved monsters</span></div>`
        + savedShelfHtml();
      if (SM_EDIT) {
        const nm = TRAY_UI.wrap.querySelector('.re-name');
        if (nm) { nm.focus(); nm.setSelectionRange(nm.value.length, nm.value.length); }
      }
    }
    // The saved-monsters shelf: a tag-filter chip row (OR-match) + CR-grouped
    // rows. Each row: +Add (spawn via dropMonster), ⌗ (inline tag editor; the
    // glyph lights gold when tagged), × (unsave). CR comes from the statblock.
    function savedShelfHtml() {
      if (!SAVED.length)
        return `<div class="tray-hint">★ Save a monster from the Bestiary to keep it here.</div>`;
      const tags = [...new Set(SAVED.flatMap(s => Array.isArray(s.tags) ? s.tags : []))].sort();
      const filterHtml = tags.length
        ? `<div class="tag-filter"><span class="tchip${SM_FILTER.size ? '' : ' on'}" data-all="1">All</span>`
          + tags.map(t => `<span class="tchip${SM_FILTER.has(t) ? ' on' : ''}" data-t="${escapeHtml(t)}">${escapeHtml(t)}</span>`).join('')
          + `</div>`
        : '';
      let list = SAVED.slice();
      if (SM_FILTER.size) list = list.filter(s => (s.tags || []).some(t => SM_FILTER.has(t)));
      if (!list.length) return filterHtml + `<div class="roster-empty">No saved monsters match that filter.</div>`;
      list.sort((a, b) => bstParseCR(a.statblock && a.statblock.cr) - bstParseCR(b.statblock && b.statblock.cr)
        || (a.name || '').localeCompare(b.name || ''));
      let rowsHtml = '', lastCr = null;
      list.forEach(s => {
        const crLabel = bstFmtCR(s.statblock && s.statblock.cr);
        if (crLabel !== lastCr) { rowsHtml += `<div class="cr-grp">CR ${escapeHtml(String(crLabel))}</div>`; lastCr = crLabel; }
        const initial = (s.name || '?').trim().charAt(0).toUpperCase();
        const hasTags = (s.tags || []).length > 0;
        // token art keys on the ORIGINAL statblock name/source, so a renamed
        // variant still shows its base's token (layered over the letter fallback).
        const art = monsterTokenUrl({ statblock: s.statblock });
        const disc = `${escapeHtml(initial)}${art ? `<img class="disc-art" src="${art}" alt="" draggable="false" onerror="this.remove()">` : ''}`;
        rowsHtml += `<div class="tray-row" data-id="${s.id}">
          <span class="roster-disc">${disc}</span>
          <span class="roster-name">${escapeHtml(s.name || '')}</span>
          <span class="tray-add">+ Add</span>
          <button class="tray-edit-btn${hasTags ? ' has' : ''}" data-act="edit" title="Rename & tag">✎</button>
          <button class="tray-rm" data-act="rm" title="Unsave">×</button></div>`;
        if (SM_EDIT === s.id) {
          const base = (s.statblock && s.statblock.name) || '';
          rowsHtml += `<div class="row-edit">`
            + `<span class="re-label">Name</span>`
            + `<input class="re-name" value="${escapeHtml(s.name || '')}" data-namefor="${s.id}" autocomplete="off">`
            + `<span class="re-base">stat block &amp; token art: ${escapeHtml(base)}</span>`
            + `<span class="re-label">Tags</span>`
            + `<div class="tagwrap">`
            + (s.tags || []).map(t => `<span class="te-chip">${escapeHtml(t)}<b data-editid="${s.id}" data-rmtag="${escapeHtml(t)}" title="Remove tag">×</b></span>`).join('')
            + `<input class="te-input" placeholder="add tag…" data-tagfor="${s.id}" autocomplete="off"></div></div>`;
        }
      });
      return filterHtml + `<div class="tray-list">${rowsHtml}</div>`;
    }
    async function addPartyToken(key) {
      if (!ENC || !ENC.id) { pageToast('Open a scene first.'); return; }
      if (COMBS.some(c => c.side === 'party' && c.source_key === key)) return;  // already on board
      // prefer the table row (name + structural.combat.hpMax); fall back to CHARACTERS
      const pc = (PARTY && PARTY.find(c => c.key === key)) || null;
      const ch = pc
        ? { name: pc.name, combat: (pc.structural && pc.structural.combat) || {} }
        : ((typeof CHARACTERS !== 'undefined' && CHARACTERS[key]) || {});
      const hpMax = (ch.combat && Number.isFinite(ch.combat.hpMax)) ? ch.combat.hpMax : null;
      const row = {
        encounter_id: ENC.id, owner: null, name: ch.name || key, side: 'party', hidden: false,
        source_key: key, conditions: [],
        x: Math.floor(META.cols / 2), y: Math.floor(META.rows / 2),
      };
      if (hpMax != null) { row.hp = hpMax; row.max_hp = hpMax; }   // HUD bridge reconciles live HP
      const { data, error } = await SB.from('combatants').insert(row).select().single();
      if (error) { console.error('[tray] add party failed:', error.message); pageToast('Could not add ' + (ch.name || key)); return; }
      if (data && !COMBS.some(k => k.id === data.id)) { COMBS.push(data); renderTokens(); renderInitStrip(); }
      paintTokensPane(); paintCombatMenu();
    }
    async function removePartyToken(key) {
      const c = COMBS.find(k => k.side === 'party' && k.source_key === key);
      if (!c) return;
      const { error } = await SB.from('combatants').delete().eq('id', c.id);
      if (error) { console.error('[tray] remove failed:', error.message); pageToast('Could not remove that token'); return; }
      COMBS = COMBS.filter(k => k.id !== c.id); renderTokens(); renderInitStrip();
      paintTokensPane(); paintCombatMenu();
    }

    // ── Saved-monsters shelf data layer (staff-only; RLS enforces server-side).
    // The shelf persists the FULL statblock plus an editable display name, so one
    // base stat block can become several named variants ("Sister Garaele" off an
    // Acolyte). Spawning uses the custom name; stats + token art come from the
    // shared statblock (whose original name never changes). ───────────────────
    function variants(baseName) {   // how many saved entries derive from this base
      return SAVED.filter(s => s.statblock && s.statblock.name === baseName).length;
    }
    async function loadSavedMonsters() {
      if (!IS_STAFF) { SAVED = []; return; }
      const { data, error } = await SB.from('saved_monsters').select('id,name,statblock,tags').order('name');
      if (error) { console.warn('[saved] load failed:', error.message); return; }
      SAVED = data || [];
    }
    // Party characters from the table (CharacterData.loadParty). On failure PARTY
    // stays empty and paintTokensPane falls back to the legacy CHARACTERS map.
    async function loadPartyChars() {
      if (!IS_STAFF || !window.CharacterData) return;
      try { PARTY = await window.CharacterData.loadParty() || []; }
      catch (e) { console.warn('[party] load failed:', (e && e.message) || e); PARTY = []; }
    }
    // Paint from cache first (no flash), then refresh party + saved from the DB
    // and repaint (picks up rows another staff member added). Wired to tab onOpen.
    function tokensPaneOpen() {
      paintTokensPane();
      Promise.all([loadPartyChars(), loadSavedMonsters()]).then(paintTokensPane);
    }
    // ★ is ADDITIVE: each press saves a fresh copy (default name = the stat
    // block's name) that you rename on the shelf. Returns true on success so the
    // bestiary can flash + bump its variant count.
    async function saveMonsterCopy(statblock) {
      if (!statblock || !statblock.name) return false;
      const { data, error } = await SB.from('saved_monsters')
        .insert({ name: statblock.name, statblock, tags: [] }).select().single();
      if (error) { console.error('[saved] save failed:', error.message); pageToast('Could not save'); return false; }
      if (data) SAVED.push(data);
      paintTokensPane();
      return true;
    }
    async function unsaveMonster(id) {
      const { error } = await SB.from('saved_monsters').delete().eq('id', id);
      if (error) { console.error('[saved] unsave failed:', error.message); pageToast('Could not unsave'); return; }
      SAVED = SAVED.filter(s => s.id !== id);
      if (SM_EDIT === id) SM_EDIT = null;
      paintTokensPane();
    }
    // Persist a renamed display name (empty → fall back to the stat block's name).
    async function renameSaved(id, name, repaint) {
      const s = SAVED.find(x => x.id === id); if (!s) return;
      const next = (name && name.trim()) || (s.statblock && s.statblock.name) || 'Monster';
      if (next === s.name) { if (repaint) paintTokensPane(); return; }
      const prev = s.name; s.name = next;          // optimistic so the row updates at once
      if (repaint) paintTokensPane();
      const { error } = await SB.from('saved_monsters').update({ name: next }).eq('id', id);
      if (error) { console.error('[saved] rename failed:', error.message); pageToast('Could not rename'); s.name = prev; paintTokensPane(); }
    }
    // Spawn an instance onto the board under the variant's custom name — same
    // path as the bestiary Drop (numbering comes free). A scene must be open.
    async function spawnSaved(id, rowEl) {
      const s = SAVED.find(x => x.id === id);
      if (!s || !s.statblock) return;
      if (!ENC || !ENC.id) { pageToast('Open a scene first.'); return; }
      const ok = await dropMonster(s.statblock, s.name);
      const add = rowEl && rowEl.querySelector('.tray-add');
      if (add) {
        rowEl.classList.toggle('flash', ok);
        add.textContent = ok ? 'Added ✓' : 'Retry';
        setTimeout(() => { rowEl.classList.remove('flash'); const a = rowEl.querySelector('.tray-add'); if (a) a.textContent = '+ Add'; }, 900);
      }
    }
    async function persistTags(id, tags) {
      const { error } = await SB.from('saved_monsters').update({ tags }).eq('id', id);
      if (error) { console.error('[saved] tag write failed:', error.message); pageToast('Could not save tags'); return false; }
      const s = SAVED.find(x => x.id === id); if (s) s.tags = tags;
      return true;
    }
    async function addTagToSaved(id, tag) {
      const s = SAVED.find(x => x.id === id); if (!s) return;
      const tags = Array.isArray(s.tags) ? s.tags.slice() : [];
      if (tags.includes(tag)) return;
      tags.push(tag);
      if (await persistTags(id, tags)) paintTokensPane();
    }
    async function removeTagFromSaved(id, tag) {
      const s = SAVED.find(x => x.id === id); if (!s) return;
      const tags = (s.tags || []).filter(t => t !== tag);
      if (await persistTags(id, tags)) paintTokensPane();
    }

    // ── shared feed (Phase 1) — realtime game log. One Supabase table, three
    // tabs. /roll → combat; plain text → chronicle. Foundation for the session
    // archive / replay (channel + kind carry the future shape). ──
    let FEED = [], feedEl = null, feedListEl = null, feedTab = 'all', feedPostHidden = false;
    // Rendering extracted to feed-render.js (FEED-RENDER-V1) — shared with the
    // chronicle's server browser so rolls look identical on both pages.
    // escapeHtml/stripTags remain as hoisted wrappers: used widely above.
    // ── page toast + one-shot hints + token info chip (UX-AUDIT-2).
    // Top-level on purpose: callers live in different scopes (init wiring,
    // the dblclick handler, the bestiary pane) — defining these inside any
    // one of them is a runtime ReferenceError for the others.
    let PG_TOAST_T = null;
    function pageToast(msg, ms = 4200) {
      let el = document.querySelector('.pg-toast');
      if (!el) { el = document.createElement('div'); el.className = 'pg-toast'; document.body.appendChild(el); }
      el.textContent = msg;
      requestAnimationFrame(() => el.classList.add('show'));
      clearTimeout(PG_TOAST_T);
      PG_TOAST_T = setTimeout(() => el.classList.remove('show'), ms);
    }
    function hintOnce(key, msg) {   // a hint fires once per browser, ever
      try { if (localStorage.getItem(key)) return; localStorage.setItem(key, '1'); } catch (e) {}
      pageToast(msg);
    }
    function showTokenChip(c, x, y) {
      document.querySelector('.tok-chip')?.remove();
      const chip = document.createElement('div');
      chip.className = 'tok-chip';
      const conds = (Array.isArray(c.conditions) ? c.conditions : []).join(', ');
      chip.innerHTML = `<div class="tc-name">${escapeHtml(c.name)}</div>`
        + `<div class="tc-conds">${conds ? escapeHtml(conds) : 'No conditions'} · DM controls this creature</div>`;
      document.body.appendChild(chip);
      const pad = 8, w = chip.offsetWidth, h = chip.offsetHeight;
      chip.style.left = Math.min(Math.max(pad, x + 12), window.innerWidth - w - pad) + 'px';
      chip.style.top  = Math.min(Math.max(pad, y - h - 12), window.innerHeight - h - pad) + 'px';
      const kill = () => { chip.remove(); document.removeEventListener('pointerdown', kill, true); };
      setTimeout(kill, 2600);
      document.addEventListener('pointerdown', kill, true);
    }
    function escapeHtml(s) { return FeedRender.escapeHtml(s); }
    function stripTags(s) { return FeedRender.stripTags(s); }
    function feedActor() {
      const key = (ME && ME.characterKey) || null;
      const name = (key && typeof CHARACTERS !== 'undefined' && CHARACTERS[key] && CHARACTERS[key].name)
        || (key ? key.charAt(0).toUpperCase() + key.slice(1) : 'Dungeon Master');
      return { key, name };
    }
    const FR = FeedRender.create({
      characters: typeof CHARACTERS !== 'undefined' ? CHARACTERS : {},
      canDelete: canDeleteRow,   // hoisted below
    });
    // Mirror the RLS so the ✕ only appears where the delete will succeed:
    // staff anything; authors their own (non-hidden) chronicle rows.
    function canDeleteRow(row) {
      if (IS_STAFF) return true;

    async function feedDelete(id) {

    function renderFeed() {

      // (dock feed-unread retired — the rail flags its own Feed unread)
      // hidden rolls only ever arrive for staff (RLS); view-as-player preview

    }
    function onFeedUpdate(row) {
      if (!row) return;

    }
    function onFeedDelete(id) {

    // ── campaign config (one row): which session we're on. Stamped onto every
    // feed insert so the archive is organized session → encounter. ──
    let CAMPAIGN = { current_session: 0 };
    async function loadCampaign() {
      if (!SB) return;
      const { data, error } = await SB.from('campaign').select('current_session').eq('id', 1).maybeSingle();
      if (error) { console.warn('[campaign] load failed:', error.message); return; }
      if (data) CAMPAIGN.current_session = data.current_session;
    }
    // The feed's own always-on channel — deliberately NOT the per-encounter
    // combat channel, so the log streams (and the chronicle page's edits and
    // session bumps land) even when no encounter is active. RLS still filters
    // hidden rows out of player sockets. Phase-1's limitation, lifted.
    let FEEDRT = null;
    function initFeedRealtime() {
      if (!SB) return;
      FEEDRT = SB.channel('feed-live')
        .on('postgres_changes',
          { event: 'INSERT', schema: 'public', table: 'feed' },
          ({ new: row }) => { if (row) onFeedInsert(row); })
        .on('postgres_changes',
          { event: 'UPDATE', schema: 'public', table: 'feed' },
          ({ new: row }) => { if (row) onFeedUpdate(row); })
        .on('postgres_changes',
          { event: 'DELETE', schema: 'public', table: 'feed' },
          ({ old }) => { if (old && old.id != null) onFeedDelete(old.id); })
        .on('postgres_changes',
          { event: 'UPDATE', schema: 'public', table: 'campaign' },
          ({ new: row }) => { if (row) CAMPAIGN.current_session = row.current_session; })
        .subscribe();
    }
    async function loadFeed() {
      if (!SB) return;
      // kind:'event' rows are replay data, not chat — excluded here so the
      // 120-row budget stays visible content.
      const { data, error } = await SB.from('feed').select('*').neq('kind', 'event').order('created_at', { ascending: false }).limit(120);
      if (error) { console.warn('[feed] load failed:', error.message); return; }
      (data || []).forEach(r => { if (!FEED.some(x => x.id === r.id)) FEED.push(r); });
      renderFeed();
      // seed the ticker with the newest roll already in the archive (no flash)
      const seed = (data || []).find(r => r.kind === 'roll' && (!r.hidden || effectiveStaff()));
      if (seed) tickerUpdate(seed, false);
    }
    async function feedInsert(partial) {
      if (!SB) return;

      const row = Object.assign(
        { actor_key: a.key, actor_name: a.name, channel: 'combat', kind: 'roll', hidden: false,
          encounter_id: (ENC && ENC.id) || null, session: CAMPAIGN.current_session },
        partial);
      const { error } = await SB.from('feed').insert(row);   // realtime echoes it back to everyone (incl. us)
      if (error) console.warn('[feed] insert failed:', error.message);
    }
    // ── Phase 3 events — structured rows for the replay scrubber. kind:
    // 'event'; result carries the machine data ({type,...}); body is the human
    // line. The live feed SKIPS kind:'event' (moves would drown the chat) —
    // recorded, not displayed. Player-initiated events (moves, HP, turn
    // advances) must be hidden:false (RLS blocks player hidden inserts);
    // hidden-foe events come from staff and go hidden:true so nothing leaks.
    function logEvent(type, data, body, hidden) {
      return feedInsert({ actor_key: null, actor_name: 'System', channel: 'combat',
        kind: 'event', result: Object.assign({ type: type }, data), body, hidden: !!hidden });
    }
    // Roster snapshot — the replay's opening/closing position.
    function rosterSnapshot() {
      return COMBS.filter(c => c.in_combat).map(c => ({
        id: c.id, key: c.source_key || null, name: c.name, side: c.side,
        x: c.x, y: c.y, hp: c.hp, max_hp: c.max_hp, initiative: c.initiative }));
    }
    // HUD seam: battle.js attack/init rolls land in the combat channel.
    function feedLogRoll(o) {
      const body = (o.body != null) ? o.body
        : `${escapeHtml(stripTags(o.name || 'Roll'))}: ${stripTags(o.main || '')}${o.dmg ? ' · ' + stripTags(o.dmg) : ''}`;
      const key = (o.actorKey !== undefined) ? o.actorKey : feedActor().key;
      const name = o.actorName
        || (key && typeof CHARACTERS !== 'undefined' && CHARACTERS[key] && CHARACTERS[key].name)
        || (key ? key.charAt(0).toUpperCase() + key.slice(1) : 'Dungeon Master');

    // Dice parser: NdM, +K/-K, multiple terms, khN/klN (advantage/disadvantage).
    function parseDice(expr) {
      const clean = String(expr || '').trim().replace(/\s+/g, '');
      if (!clean || !/^[0-9dk hl+\-]+$/i.test(clean)) return null;
      const re = /([+-]?)(\d*)d(\d+)(k[hl]\d+)?|([+-]?\d+)/gi;
      let m, total = 0, parts = [], anyDice = false, consumed = 0;
      while ((m = re.exec(clean)) !== null) {
        consumed += m[0].length;
        if (m[3] === undefined) { const f = parseInt(m[5], 10); total += f; parts.push({ flat: f }); continue; }
        anyDice = true;
        const sign = m[1] === '-' ? -1 : 1;
        const n = m[2] ? parseInt(m[2], 10) : 1, sides = parseInt(m[3], 10);
        if (n < 1 || n > 100 || sides < 2 || sides > 1000) return null;
        const rolls = Array.from({ length: n }, () => Math.floor(Math.random() * sides) + 1);
        let kept = rolls.slice();
        if (m[4]) {
          const keepN = Math.max(1, parseInt(m[4].slice(2), 10));
          const sorted = rolls.slice().sort((a, b) => b - a);
          kept = m[4][1].toLowerCase() === 'h' ? sorted.slice(0, keepN) : sorted.slice(-keepN);
        }
        total += kept.reduce((a, b) => a + b, 0) * sign;
        parts.push({ sides, rolls, kept, sign });
      }
      if (!anyDice || consumed !== clean.length) return null;
      return { total, parts, formula: clean };
    }
    function dicePieces(parsed) {
      return parsed.parts.map(p => {
        if (p.flat !== undefined) return (p.flat >= 0 ? '+ ' : '− ') + Math.abs(p.flat);
        const keptCopy = p.kept.slice();
        const shown = p.rolls.map(r => { const i = keptCopy.indexOf(r); if (i >= 0) { keptCopy.splice(i, 1); return `<span class="ft-die">${r}</span>`; } return `<span class="ft-drop">${r}</span>`; }).join(' ');
        return `${p.sign < 0 ? '− ' : ''}[${shown}]`;
      }).join(' ');
    }
    function diceBody(parsed) {
      return `${escapeHtml(parsed.formula)} → ${dicePieces(parsed)} = <span class="ft-tot">${parsed.total}</span>`;
    }
    // Button dice (quick row + left tray) honor the feed's ADV/DIS/BLESS/GUIDE
    // toggles — the same RS state battle.js's HUD rolls read. d20s only:
    // adv/dis upgrades a SINGLE d20 to 2d20kh1/kl1; bless 🙏 / guidance ✦
    // each append a d4, spelled out in the breakdown. Typed /roll expressions
    // stay verbatim (kh/kl and +1d4 are already in the player's hands there).
    function feedRollWithMods(n, d) {
      const rs = (window.__battle && window.__battle.getRS) ? window.__battle.getRS() : null;
      let formula = `${n}d${d}`;
      if (rs && d === 20 && n === 1 && (rs.advantage || rs.disadvantage)) {
        formula = rs.advantage ? '2d20kh1' : '2d20kl1';
      }
      const parsed = parseDice(formula);
      if (!parsed) return;
      let total = parsed.total, extra = '', dbFormula = formula;
      if (rs && d === 20) {
        if (rs.bless)    { const b = Math.floor(Math.random() * 4) + 1; total += b; extra += ` + [<span class="ft-die">${b}</span>]🙏`; dbFormula += '+1d4'; }
        if (rs.guidance) { const g = Math.floor(Math.random() * 4) + 1; total += g; extra += ` + [<span class="ft-die">${g}</span>]✦`; dbFormula += '+1d4'; }
      }
      const body = `${escapeHtml(formula)} → ${dicePieces(parsed)}${extra} = <span class="ft-tot">${total}</span>`;
      feedInsert({ channel: 'combat', kind: 'roll', formula: dbFormula, result: { total }, body, hidden: feedPostHidden && effectiveStaff() });
    }
    function feedSubmit(raw) {
      const t = String(raw || '').trim(); if (!t) return;
      const staffHide = feedPostHidden && effectiveStaff();

        const parsed = parseDice(cmd[2]);

      }

    }
    function buildFeed() {
      if (!SB) return;

        + `<div class="feed-body" id="feed-list"></div>`
        + `<div class="feed-mods">${[['advantage','Adv'],['disadvantage','Dis'],['bless','Bless'],['guidance','Guide']].map(([k, l]) => `<button class="feed-mod" data-mod="${k}">${l}</button>`).join('')}</div>`
        + `<div class="feed-dice">${[4, 6, 8, 10, 12, 20, 100].map(d => `<button class="feed-die" data-die="${d}">d${d}</button>`).join('')}</div>`
        + `<div class="feed-input">${IS_STAFF ? `<button class="feed-hidden-tog" title="Post hidden (DM only)">hide</button>` : ''}<input type="text" maxlength="300" placeholder="/roll 2d20kh1+4 or say something…"></div>`;

    // ── monster statblock (Phase B) ────────────────────────────────────────
    // Token art: 5etools serves token webps by source + name. We layer the img
    // over the initial-disc fallback (onerror removes it → initial shows).
    function monsterTokenUrl(c) {
      const m = c.statblock;
      if (!m || !m.source || !m.name) return null;

    // Statblock renderer — lifted from compendium.html's monster detail view
    // (uses bstFmtCR for CR; same 5etools entry shape we snapshot on drop).
    function fmtSpeed(s) {
      if (!s) return '—';
      if (typeof s === 'number') return `${s} ft.`;
      return Object.entries(s).map(([k, v]) => { const n = typeof v === 'object' ? v.number : v; return k === 'walk' ? `${n} ft.` : `${k} ${n} ft.`; }).join(', ');
    }
    function sbCleanText(str) {
      const ATK = { mw: 'Melee Weapon', rw: 'Ranged Weapon', ms: 'Melee Spell', rs: 'Ranged Spell', m: 'Melee', r: 'Ranged' };
      return (str || '')
        .replace(/\{@b ([^}]+)\}/g, '<strong>$1</strong>')
        .replace(/\{@i ([^}]+)\}/g, '<em>$1</em>')
        .replace(/\{@(?:spell|creature|item) ([^|}]+)[^}]*\}/g, '<span style="color:var(--gold-light)">$1</span>')
        .replace(/\{@condition ([^|}]+)[^}]*\}/g, '<em>$1</em>')
        .replace(/\{@atk ([^}]+)\}/g, (_, codes) => codes.split(',').map(c => ATK[c.trim()] || c.trim()).join(' or ') + ' Attack:')
        .replace(/\{@h\}/g, 'Hit: ')
        .replace(/\{@recharge ([^}]+)\}/g, '(Recharge $1–6)')
        .replace(/\{@hit ([^}]+)\}/g, '+$1')
        .replace(/\{@dc ([^}]+)\}/g, 'DC $1')
        .replace(/\{@(?:damage|dice) ([^}]+)\}/g, '$1')
        .replace(/\{@[a-z]+ ([^|}]+)[^}]*\}/g, '$1')
        .replace(/\{@[^}]+\}/g, '');
    }
    function sbEntries(entries) {
      if (!entries) return '';
      return entries.map(e => {
        if (typeof e === 'string') return `<p>${sbCleanText(e)}</p>`;
        if (e.type === 'entries') return `${e.name ? `<p><strong>${e.name}</strong></p>` : ''}${sbEntries(e.entries || [])}`;
        if (e.type === 'list') return `<ul>${(e.items || []).map(i => `<li>${typeof i === 'string' ? sbCleanText(i) : sbEntries(i.entries || []).replace(/<\/?p>/g, '')}</li>`).join('')}</ul>`;
        if (e.type === 'table') {
          const head = e.colLabels ? `<tr>${e.colLabels.map(l => `<th>${sbCleanText(l)}</th>`).join('')}</tr>` : '';
          const rows = (e.rows || []).map(r => `<tr>${r.map(cell => `<td>${typeof cell === 'string' ? sbCleanText(cell) : cell?.roll ? `${cell.roll.min}–${cell.roll.max}` : ''}</td>`).join('')}</tr>`).join('');

    }
    function sbTraits(traits, heading) {

    function renderMonster(m) {

      const hp = m.hp ? `${m.hp.average} (${m.hp.formula})` : '—';

      const skills = m.skill ? Object.entries(m.skill).map(([k, v]) => `${k} ${v}`).join(', ') : '—';
      const imm = m.immune ? m.immune.map(i => typeof i === 'object' ? i.immune?.join(', ') : i).filter(Boolean).join(', ') : '—';
      const res = m.resist ? m.resist.map(r => typeof r === 'object' ? r.resist?.join(', ') : r).filter(Boolean).join(', ') : '—';
      const strip = ['str', 'dex', 'con', 'int', 'wis', 'cha'].map(a => { const sc = m[a] || 10, mod = Math.floor((sc - 10) / 2); return `<div class="ability-cell"><span class="ability-cell-label">${a.toUpperCase()}</span><span class="ability-cell-score">${sc}</span><span class="ability-cell-mod">${mod >= 0 ? '+' : ''}${mod}</span></div>`; }).join('');
      return `<div class="detail-name">${m.name}</div><div class="detail-meta">${type} · CR ${bstFmtCR(m.cr)}</div><hr class="detail-rule">
        <div class="detail-stats">

          <div class="detail-stat"><span class="detail-stat-label">Speed</span><span class="detail-stat-val">${fmtSpeed(m.speed)}</span></div>
          ${saves !== '—' ? `<div class="detail-stat"><span class="detail-stat-label">Saving Throws</span><span class="detail-stat-val">${saves}</span></div>` : ''}
          ${skills !== '—' ? `<div class="detail-stat"><span class="detail-stat-label">Skills</span><span class="detail-stat-val">${skills}</span></div>` : ''}
          ${imm !== '—' ? `<div class="detail-stat"><span class="detail-stat-label">Immunities</span><span class="detail-stat-val">${imm}</span></div>` : ''}
          ${res !== '—' ? `<div class="detail-stat"><span class="detail-stat-label">Resistances</span><span class="detail-stat-val">${res}</span></div>` : ''}
          <div class="detail-stat"><span class="detail-stat-label">Senses</span><span class="detail-stat-val">${(m.senses || []).join(', ') || '—'}</span></div>
          <div class="detail-stat"><span class="detail-stat-label">Languages</span><span class="detail-stat-val">${m.languages || '—'}</span></div>

    // The on-demand statblock drawer. Opened from a token's Manage tab via the
    // module-scope openStatblock(c); no permanent tab (DM info, not a fixture).
    let openStatblock = null;
    function buildStatblockPanel() {
      const panel = document.createElement('div');
      panel.className = 'statblock-panel';
