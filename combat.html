<!DOCTYPE html>
<html lang="en" data-theme="parchment">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
  <title>Combat — The Trials of Kirtas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="theme.css">
  <!-- M2: floating tabbed character sheet over the board -->
  <link rel="stylesheet" href="sheet-mount.css">
  <link rel="stylesheet" href="combat-sheet-float.css">
  <style>
    /* ── page-scoped; relies on theme.css variables ── */
    html, body { height: 100%; }
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;   /* MOBILE-TRIAGE: tracks mobile browser chrome; vh above is the fallback */
      overflow: hidden;                 /* the stage scrolls, not the page */
      background: var(--ink-deep);
    }
    /* On mobile nav.js makes the nav position:fixed and adds body padding-top:52px,
       which pushes our flex content (bar + stage) below the bar automatically —
       so no extra offset is needed here. */

    /* ── encounter header strip (under the nav) ── */
    .combat-bar {
      flex-shrink: 0;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.9rem;
      background: rgba(0,0,0,0.55);
      border-bottom: 1px solid var(--gold-dim);
    }
    .combat-name {
      font-family: var(--font-title);
      font-size: 0.6rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--gold-light);
    }
    .combat-round {
      font-family: var(--font-title);
      font-size: 0.52rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .combat-round b { color: var(--aged); font-weight: 600; }

    /* ── the board stage ── */
    .stage {
      flex: 1;
      position: relative;
      overflow: hidden;                 /* we manage zoom/pan ourselves via transform */
      background:
        radial-gradient(circle at 50% 40%, rgba(184,149,42,0.04), transparent 70%),
        var(--ink-deep);
      touch-action: none;               /* we handle pinch/pan; stop the browser hijacking it */
      user-select: none;                /* panning the map must not text-select token labels */
      -webkit-user-select: none;
    }

    .board {
      position: absolute;
      top: 0; left: 0;
      transform-origin: 0 0;            /* zoom/pan via translate()+scale() from here */
      /* NOTE: will-change is toggled *dynamically* in applyTransform(), not set here.
         A static hint keeps the board cached as one GPU texture rasterised at base size,
         which scale() then upscales — soft at zoom > 1, snapping sharp only on an
         incidental repaint. Promoting only during a gesture keeps panning smooth while
         the resting frame re-rasterises crisp at the current zoom. */
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      background: var(--smoke);         /* shows through until/if the map loads */
      outline: 1px solid var(--gold-dim);
    }
    .board-map {
      display: block;
      width: 100%;
      height: 100%;
      user-select: none;
      -webkit-user-drag: none;
      -webkit-touch-callout: none;
      pointer-events: none;             /* map is backdrop; pan is handled on the stage */
    }
    .board-map.missing { opacity: 0; }  /* hide the broken-image glyph; grid still proves the math */

    /* grid overlay — viewBox is in NATIVE map coords, so it scales perfectly
       with the board no matter the rendered size. */
    .board-grid {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    /* fog of war — native-coord SVG over the grid, below tokens; painting is
       handled on the stage pointer handler, so the layer itself ignores pointers */
    .board-fog {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    /* drawings (shapes / spell templates) — below fog, below tokens */
    .board-draw { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
    .draw-del { pointer-events: auto; cursor: pointer; display: none; }
    .board.tool-select .draw-del { display: inline; }
    .tr-hint { font-size: 0.42rem; line-height: 1.5; color: var(--muted); margin: 0.45rem 0 0; text-transform: none; letter-spacing: 0.02em; }

    /* tokens — positioned in %, so they ride the board through any resize */
    .board-tokens { position: absolute; inset: 0; pointer-events: none; }
    .token {
      position: absolute;
      transform: translate(-50%, -50%);   /* box centre pinned to the cell centre */
      aspect-ratio: 1 / 1;                 /* a one-cell square (width set inline) */
      container-type: inline-size;
      pointer-events: auto;                /* clickable, though the layer is none */
      cursor: pointer;
    }
    /* iOS: a token is an interactive control, not a saveable picture — kill the
       native long-press callout (Save/Copy/Share) + drag so the hold opens our
       menu instead of the system sheet. (.board-map already does this for the map.) */
    .token, .token img {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-user-drag: none;
    }
    .token-disc {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.7);
      background: var(--ring, #555);
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
    }
    .token-disc.ring { border: 2px solid var(--ring, #fff); }
    .token-disc img { width: 100%; height: 100%; object-fit: cover; }

    /* cutout mode — transparent PNG contained within the cell, standing on the floor */
    .token-cutout {
      width: 100%;
      height: 100%;
      position: relative;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    .token-cutimg {
      position: relative;
      z-index: 1;
      max-width: 100%;
      max-height: 100%;                    /* fit inside the one-cell square */
      width: auto;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 2px 3px rgba(0,0,0,0.85));
      display: block;
    }
    .token-base {                        /* colored ground ellipse = team identity */
      position: absolute;
      bottom: 3%; left: 50%;
      transform: translateX(-50%);
      width: 72%; height: 18%;
      border-radius: 50%;
      background: var(--ring, #888);
      opacity: 0.5;
      filter: blur(1px);
      z-index: 0;
    }
    .token-initial {
      font-family: var(--font-title);
      font-weight: 600;
      color: #fff;
      line-height: 1;
      font-size: 50cqw;                 /* half the disc width */
    }
    .token-name {
      position: absolute;
      top: 102%;                          /* just below the square; doesn't shift the disc */
      left: 50%;
      transform: translateX(-50%);
      display: none;                      /* revealed when the token is selected */
      font-family: var(--font-title);
      font-size: clamp(5px, 28cqw, 15px); /* scales with the token, capped so it's never huge */
      letter-spacing: 0.04em;
      color: var(--parchment);
      white-space: nowrap;
      background: rgba(10,8,5,0.88);
      border: 1px solid var(--gold-dim);
      padding: 0.12em 0.5em;
      border-radius: 0.25em;
      pointer-events: none;
      z-index: 50;
    }
    /* concealment badges — DM view only */
    .token.is-hidden { opacity: 0.5; }
    .token-badge {
      position: absolute;
      top: -4px; right: -4px;
      font-size: 0.55rem;
      line-height: 1;
      background: var(--ink-deep);
      border: 1px solid var(--gold-mid);
      border-radius: 50%;
      width: 14px; height: 14px;
      display: flex; align-items: center; justify-content: center;
      color: var(--gold-light);
    }
    /* the ??? a *player* sees for a teased token */
    .token-disc.mystery {
      background: repeating-linear-gradient(45deg, #2a2620, #2a2620 4px, #1c1a16 4px, #1c1a16 8px);
      border: 2px solid var(--muted);
    }

    /* selection + drag feedback */
    .token.selected { z-index: 30; }
    .token.selected .token-disc,
    .token.selected .token-cutout {
      filter: drop-shadow(0 0 2px var(--gold-light)) drop-shadow(0 0 5px var(--gold));
    }
    /* Option A — the name and the orb ring are separate modes. Hover an *unselected*
       token to peek its name; selecting it (opening the orbs) hides the name, so the
       two never share the lower arc. Touch has no hover and shows nothing here on the
       board — the long-press context menu names the token instead. */
    @media (hover: hover) { .token:hover:not(.selected) .token-name { display: block; } }
    .token.dragging { opacity: 0.85; cursor: grabbing; }
    .token.no-move { cursor: default; }

    /* ── movement measurement (shown only while a token is being dragged) ──
       Lives in its own SVG layer in NATIVE map coords (like the grid), so it
       scales with the board and rides the zoom/pan transform for free. */
    .measure-layer {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      overflow: visible;                 /* let the label show near board edges */
    }
    .measure-cell {                      /* the tile you started from, left lit */
      fill: var(--gold-light); fill-opacity: 0.16;
      stroke: var(--gold-light); stroke-opacity: 0.55;
    }
    .measure-line { stroke: var(--gold-light); stroke-linecap: round; fill: none; }
    .measure-label {
      fill: var(--gold-light);
      paint-order: stroke;               /* dark halo under the glyphs = legible on any map */
      stroke: rgba(10,8,5,0.92); stroke-linejoin: round;
      font-family: var(--font-title); font-weight: 600;
      text-anchor: middle; dominant-baseline: middle;
    }
    .measure-line.over  { stroke: #e2574c; }   /* soft "past your speed" cue — never blocks */
    .measure-label.over { fill: #e2574c; }

    /* ── condition badges (cluster under a token) ── */
    .token-conds {
      position: absolute;
      left: 50%; bottom: -6%;
      transform: translateX(-50%);
      display: flex; gap: 6cqw;
      pointer-events: none;
      z-index: 40;
    }
    .cond-badge {
      width: 26cqw; height: 26cqw;
      min-width: 9px; min-height: 9px;
      border-radius: 50%;
      background: var(--c, #888);
      border: 1px solid rgba(0,0,0,0.55);
      box-shadow: 0 1px 2px rgba(0,0,0,0.6);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
    }
    .cond-badge svg { width: 70%; height: 70%; fill: currentColor; stroke: none; display: block; }
    .cond-badge.more {
      background: var(--ink-deep); color: var(--gold-light);
      font-family: var(--font-title); font-size: 16cqw; font-weight: 600;
    }

    /* ── per-token context menu (right-click / long-press) ── */
    .ctx-menu {
      position: fixed; z-index: 200;
      min-width: 188px; max-height: 70vh; overflow-y: auto;
      background: var(--nav-bg);
      border: 1px solid var(--nav-border);
      border-radius: 6px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.6);
      padding: 0.45rem 0;
      font-family: var(--font-title);
    }
    .ctx-head {
      font-size: 0.46rem; letter-spacing: 0.26em; text-transform: uppercase;
      color: var(--gold-light); padding: 0.2rem 0.7rem 0.4rem;
      border-bottom: 1px solid var(--gold-dim); margin-bottom: 0.35rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    /* ── flat token menu (redesign) ── */
    .ctx-info { font-size: 11px; color: var(--muted, #6b5d4a); padding: 0 12px 7px; border-bottom: 1px solid rgba(184,149,42,0.18); }
    .ctx-info b { color: #c8a020; font-weight: 600; }
    .ctx-item { display: flex; align-items: center; gap: 9px; padding: 7px 12px; cursor: pointer; font-size: 13px; color: #e8d9b8; }
    .ctx-item:hover { background: rgba(184,149,42,0.15); }
    .ctx-item .ctx-ico, .ctx-exp-head .ctx-ico { width: 16px; text-align: center; flex: none; font-size: 13px; }
    .ctx-item.ctx-dim { opacity: 0.5; cursor: default; }
    .ctx-item.ctx-dim:hover { background: none; }
    .ctx-item.ctx-danger { color: #c07060; }
    .ctx-item.ctx-danger:hover { background: rgba(192,80,80,0.12); }
    .ctx-divider { border-top: 1px solid rgba(184,149,42,0.18); margin: 4px 0; }
    .ctx-exp-head { display: flex; align-items: center; gap: 9px; padding: 7px 12px; cursor: pointer; font-size: 13px; color: #e8d9b8; user-select: none; }
    .ctx-exp-head:hover { background: rgba(184,149,42,0.15); }
    .ctx-chev { margin-left: auto; font-size: 9px; color: #6b5d4a; transition: transform 0.15s; }
    .ctx-exp.open .ctx-chev { transform: rotate(90deg); }
    .ctx-exp-count { margin-left: auto; font-size: 10px; color: #d4ac3a; background: rgba(184,149,42,0.15); border-radius: 8px; padding: 1px 7px; }
    .ctx-exp.open .ctx-exp-count, .ctx-exp-head .ctx-exp-count + .ctx-chev { margin-left: 6px; }
    .ctx-exp-body { display: none; padding: 2px 12px 9px; }
    .ctx-exp.open .ctx-exp-body { display: block; }
    .ctx-aura-lbl { font-size: 9px; color: #6b5d4a; letter-spacing: 1.5px; margin: 6px 0 3px; }
    .ctx-aura-row { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
    .ctx-ar { border: 1px solid rgba(184,149,42,0.25); background: none; color: #c9b48a; border-radius: 4px; font-size: 11px; padding: 3px 8px; cursor: pointer; }
    .ctx-ar:hover { border-color: rgba(184,149,42,0.5); }
    .ctx-ar.on { border-color: #b8952a; color: #d4ac3a; background: rgba(184,149,42,0.15); }
    .ctx-ac { width: 17px; height: 17px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; display: inline-block; }
    .ctx-ac.on { border-color: #f0e6ce; }
    .ctx-aura-off { margin-top: 7px; font-size: 11px; color: #c07060; cursor: pointer; background: none; border: none; padding: 0; display: block; }
    /* token aura ring — painted before the disc, scales with the token */
    .token-aura {
      position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
      aspect-ratio: 1 / 1; border-radius: 50%; pointer-events: none;
      border: 1.5px dashed color-mix(in srgb, var(--ac) 60%, transparent);
      background: radial-gradient(circle, color-mix(in srgb, var(--ac) 20%, transparent) 0%, color-mix(in srgb, var(--ac) 10%, transparent) 65%, transparent 73%);
    }
    .ctx-sub {
      font-size: 0.4rem; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--muted); padding: 0.15rem 0.7rem 0.25rem;
    }
    /* tab bar — only rendered when 2+ tabs exist; a single tab uses .ctx-sub above */
    .ctx-tabs {
      display: flex; gap: 0.15rem;
      padding: 0 0.5rem 0.35rem;
      border-bottom: 1px solid var(--gold-dim);
      margin-bottom: 0.35rem;
    }
    .ctx-tab {
      flex: 1;
      background: none; border: 0; cursor: pointer;
      font-family: var(--font-title);
      font-size: 0.4rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--muted); padding: 0.3rem 0.25rem;
      border-bottom: 2px solid transparent;
    }
    .ctx-tab:hover { color: var(--parchment); }
    .ctx-tab.active { color: var(--gold-light); border-bottom-color: var(--gold-light); }
    /* size selector (Manage tab) */
    .ctx-sizes {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.2rem;
      padding: 0.15rem 0.6rem 0.35rem;
    }
    .ctx-size {
      background: none; cursor: pointer;
      border: 1px solid var(--gold-dim); border-radius: 4px;
      font-family: var(--font-title);
      font-size: 0.4rem; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--muted); padding: 0.32rem 0.2rem;
    }
    .ctx-size:hover { color: var(--parchment); border-color: var(--gold-light); }
    .ctx-size.active { color: var(--ink-deep); background: var(--gold-light); border-color: var(--gold-light); }
    .ctx-cond {
      display: flex; align-items: center; gap: 0.55rem;
      padding: 0.32rem 0.7rem; cursor: pointer; user-select: none;
    }
    .ctx-cond:hover { background: var(--gold-dim); }
    .ctx-chip {
      width: 18px; height: 18px; flex-shrink: 0;
      border-radius: 50%;
      background: var(--c, #888); color: #fff;
      display: flex; align-items: center; justify-content: center;
      opacity: 0.32; filter: grayscale(0.55);
    }
    .ctx-chip svg { width: 70%; height: 70%; fill: currentColor; stroke: none; }
    .ctx-cond.active .ctx-chip { opacity: 1; filter: none; }
    .ctx-label { font-size: 0.62rem; letter-spacing: 0.06em; color: var(--muted); flex: 1; }
    .ctx-cond.active .ctx-label { color: var(--parchment); }
    .ctx-check { font-size: 0.7rem; color: var(--gold-light); opacity: 0; }
    .ctx-cond.active .ctx-check { opacity: 1; }
    /* action buttons (Manage tab): visibility toggle, remove */
    .ctx-act {
      display: block; width: calc(100% - 1.2rem); margin: 0.2rem 0.6rem;
      background: none; cursor: pointer; text-align: left;
      border: 1px solid var(--gold-dim); border-radius: 4px;
      font-family: var(--font-title);
      font-size: 0.5rem; letter-spacing: 0.08em;
      color: var(--parchment2); padding: 0.4rem 0.55rem;
    }
    .ctx-act:hover { color: var(--parchment); border-color: var(--gold-light); }
    .ctx-act.ctx-danger { color: var(--blood, #c0001a); border-color: rgba(192,0,26,0.4); }
    .ctx-act.ctx-danger:hover { color: #fff; background: var(--blood, #c0001a); border-color: var(--blood, #c0001a); }

    /* ── RAIL-DOCK (BATTLE TAB): the dock retired into the rail. combat's
       former right panel registers ONE contextual tab ('battle', order 20)
       through TokRail.registerTab; its sections ride a segmented sub-strip
       inside the pane (the same pattern as the rail Feed's Combat|Chronicle
       toggle). Chrome selectors are #tok-rail-prefixed on purpose — the
       pane lives inside the rail, and page CSS must never leak past it.
       Pane CONTENT keeps the shipped .dock-body/.dock-pane classes, so the
       roster/bestiary/scenes/grid-controls CSS below is untouched. ── */
    #tok-rail .bd-host { flex: 1; min-height: 0; display: flex; flex-direction: column; }
    #tok-rail .bd-strip { display: flex; align-items: stretch; margin: 10px 12px 0; border: 1px solid rgba(199,154,74,0.34); flex: none; }
    #tok-rail .bd-tab {
      flex: 1 1 0; min-width: 0; padding: 6px 2px 5px; background: transparent; border: 0;
      font-family: var(--font-title, "Oswald", sans-serif); letter-spacing: 0.1em; text-transform: uppercase;
      font-size: 0.55rem; color: #8b8473; cursor: pointer;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    #tok-rail .bd-tab:hover { color: #b9b09a; }
    #tok-rail .bd-tab.on { background: #e7c279; color: #182826; font-weight: 600; }
    #tok-rail .bd-corner { display: flex; align-items: center; padding: 0 2px; border-left: 1px solid rgba(199,154,74,0.34); flex: none; }
    #tok-rail .corner-btn {
      width: 24px; height: 24px; border: 1px solid transparent;
      background: none; color: #8b8473; cursor: pointer; font-size: 13px;
      display: flex; align-items: center; justify-content: center; flex: none;
    }
    #tok-rail .corner-btn:hover { color: #ece2cd; }
    #tok-rail .corner-btn.on { color: #e7c279; }
    #tok-rail .corner-btn svg { width: 15px; height: 15px; fill: currentColor; }
    #tok-rail .bd-body { flex: 1; min-height: 0; display: flex; padding: 8px 0 0; }
    .roll-ticker {
      /* right offset clears the rail's reopen handle (22px) when the rail is
         collapsed; .rail-open pushes it past the 384px rail when it's out */
      position: absolute; right: 36px; bottom: 96px; z-index: 24;
      display: none; align-items: center; gap: 0.5rem;
      background: var(--nav-bg); border: 1px solid var(--nav-border); border-radius: 8px;
      padding: 0.32rem 0.6rem; font-size: 0.76rem; cursor: pointer;
      box-shadow: 0 4px 18px rgba(0,0,0,0.45);
      max-width: 330px; white-space: nowrap; overflow: hidden;
    }
    .roll-ticker.show { display: flex; }
    .roll-ticker.rail-open { right: 396px; } /* clears the open rail */
    .roll-ticker .twho { color: var(--gold-light); font-size: 0.7rem; letter-spacing: 0.05em; flex: none; }
    .roll-ticker .twhat { color: var(--parchment2); overflow: hidden; text-overflow: ellipsis; }
    .roll-ticker.flash { animation: tflash 0.8s ease; }
    @keyframes tflash { 0% { border-color: var(--gold-light); box-shadow: 0 0 14px rgba(212,172,58,0.45); } 100% {} }
    /* MOBILE-TRIAGE: on phones the dock is a full-screen sheet — a 320px
       strip floating over a map you can't really use helps nobody; ✕ returns
       to the board. v2: "phone" means narrow OR SHORT — a landscape iPhone is
       ~900px wide but only ~430px tall, so a width-only breakpoint missed it
       and left the composer cut off at the screen edge. bottom rides --kb
       (set from visualViewport) so the feed composer stays above the
       on-screen keyboard instead of underneath it. */
    @media (max-width: 640px), (max-height: 500px) {
      /* the dock's full-screen mobile sheet retired with the dock — the rail
         owns mobile now. The ticker still rides --kb over the keyboard. */
      .roll-ticker { bottom: calc(96px + var(--kb, 0px)); }
    }
    /* ── page toast + token info chip (UX-AUDIT-2) ── */
    .pg-toast {
      position: fixed; left: 50%; bottom: calc(104px + var(--kb, 0px)); transform: translateX(-50%);
      z-index: 60; background: var(--nav-bg); border: 1px solid var(--gold-mid); border-radius: 8px;
      color: var(--parchment2); font-size: 0.8rem; padding: 0.45rem 0.8rem; max-width: min(92vw, 440px);
      box-shadow: 0 6px 24px rgba(0,0,0,0.5); opacity: 0; transition: opacity 0.25s; pointer-events: none;
    }
    .pg-toast.show { opacity: 1; }
    .tok-chip {
      position: fixed; z-index: 60; background: var(--nav-bg); border: 1px solid var(--nav-border);
      border-radius: 8px; padding: 0.4rem 0.6rem; font-size: 0.76rem; color: var(--parchment2);
      box-shadow: 0 6px 24px rgba(0,0,0,0.5); max-width: 240px; pointer-events: none;
    }
    .tok-chip .tc-name { color: var(--gold-light); letter-spacing: 0.04em; }
    .tok-chip .tc-conds { color: var(--aged); font-size: 0.7rem; margin-top: 0.15rem; }
    .dock-body { flex: 1; min-height: 0; display: flex; }
    .dock-pane { display: none; flex: 1; min-width: 0; min-height: 0; flex-direction: column; overflow: hidden; }
    .dock-pane.show { display: flex; }

    /* SCENES-V2: scenes pane */
    .scenes-list { flex: 1; overflow-y: auto; padding: .6rem; display: flex; flex-direction: column; gap: .6rem; }
    .sc-cat { margin: .2rem 0 -.2rem; font-size: .72rem; color: var(--gold); font-variant: small-caps; letter-spacing: .07em; cursor: pointer; user-select: none; }
    .sc-cat::before { content: '▾ '; color: var(--muted); }
    .sc-cat.closed::before { content: '▸ '; }
    .scene-card .sc-acts { display: flex; gap: .25rem; align-items: center; }
    .scene-card .sc-ico { font-size: .8rem; padding: .15rem .35rem; border-radius: 5px; border: 1px solid transparent; background: transparent; color: var(--muted); cursor: pointer; }
    .scene-card .sc-ico:hover { border-color: var(--gold-dim); color: var(--gold-light); }
    .scene-card { border: 1px solid var(--gold-dim); border-radius: 8px; overflow: hidden; background: var(--smoke); }
    .scene-card.active { border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold-mid); }
    .scene-card img { width: 100%; aspect-ratio: 4/3; object-fit: cover; object-position: top; display: block; background: #11151c; }
    .scene-card .sc-meta { padding: .45rem .6rem .55rem; display: flex; align-items: center; justify-content: space-between; gap: .5rem; }
    .scene-card .sc-nm { font-size: .92rem; color: var(--parchment2); }
    .scene-card .sc-dims { font-size: .7rem; color: var(--muted); }
    .scene-card .sc-badge { font-size: .66rem; padding: .14rem .5rem; border-radius: 99px; border: 1px solid var(--gold-mid); color: var(--gold-light); white-space: nowrap; }
    .scene-card button, .scene-reg button { font-family: inherit; cursor: pointer; }
    .scene-card .sc-set { font-size: .72rem; padding: .25rem .6rem; border-radius: 6px; border: 1px solid var(--gold-dim); background: transparent; color: var(--aged); }
    .scene-card .sc-set:hover { border-color: var(--gold); color: var(--gold-light); }
    .scene-reg { border-top: 1px solid var(--gold-dim); padding: .6rem; }
    .scene-reg summary { color: var(--gold-light); cursor: pointer; font-size: .88rem; }
    .scene-reg .sr-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .4rem; margin-top: .5rem; }
    .scene-reg label { display: flex; flex-direction: column; gap: .18rem; font-size: .68rem; color: var(--muted); }
    .scene-reg label.full { grid-column: 1 / -1; }
    .scene-reg input { background: var(--ink-deep); border: 1px solid var(--gold-dim); border-radius: 6px; color: var(--parchment); padding: .32rem .45rem; font-size: .78rem; font-family: inherit; min-width: 0; }
    .scene-reg .sr-save { margin-top: .55rem; width: 100%; padding: .42rem; border-radius: 7px; border: 1px solid var(--gold-mid); background: var(--gold-dim); color: var(--gold-light); }
    .scene-reg .sr-hint { font-size: .66rem; color: var(--muted); margin-top: .35rem; line-height: 1.4; }
    /* calibration */
    .cal-bar { border-top: 1px solid var(--gold-dim); padding: .6rem; display: none; flex-direction: column; gap: .45rem; }
    .cal-bar.on { display: flex; }
    .cal-bar .cb-row { display: flex; align-items: center; gap: .4rem; flex-wrap: wrap; }
    .cal-bar .cb-lbl { font-size: .7rem; color: var(--muted); min-width: 4.2rem; }
    .cal-bar button { padding: .2rem .55rem; border-radius: 6px; border: 1px solid var(--gold-dim); background: transparent; color: var(--aged); font-size: .75rem; }
    .cal-bar button.on { border-color: var(--gold); color: var(--gold-light); background: var(--gold-dim); }
    .cal-bar button:hover { border-color: var(--gold); color: var(--gold-light); }
    .cal-bar .cb-val { font-size: .75rem; color: var(--parchment2); min-width: 5.5rem; }
    .cal-bar select { background: var(--ink-deep); border: 1px solid var(--gold-dim); border-radius: 6px; color: var(--parchment); font-family: inherit; font-size: .75rem; padding: .2rem; }
    .cal-bar .cb-save { border-color: var(--gold-mid); background: var(--gold-dim); color: var(--gold-light); }
    .stage.cal-edit { cursor: crosshair; }
    .stage.cal-edit.cal-pan { cursor: grab; }
    .cal-bar .cb-tool { padding: .26rem .7rem; }
    .cal-box { position: absolute; border: 2px dashed var(--gold-light); background: rgba(212,172,58,0.12); pointer-events: none; z-index: 40; }
    /* combat pane action buttons */
    .dock-acts { padding: 0.7rem; display: flex; flex-direction: column; gap: 7px; }
    .dock-act {
      background: var(--ink); border: 1px solid var(--section-border); border-radius: 5px;
      color: var(--parchment); cursor: pointer; text-align: left;
      font-family: var(--font-title); font-size: 0.62rem; letter-spacing: 0.06em;
      padding: 9px 11px;
    }
    .dock-act:hover:not(:disabled) { border-color: var(--gold-light); background: rgba(184,149,42,0.1); }
    .dock-act:disabled { color: var(--muted); opacity: 0.4; cursor: default; }
    /* combat pane roster (the picker): out of combat the checkboxes pick the
       opening fight; during combat the checkbox IS in_combat (joins/removals) */
    .roster-wrap { flex: 1; min-width: 0; min-height: 0; display: flex; flex-direction: column; }
    .roster-scroll { flex: 1; min-height: 0; overflow-y: auto; padding: 4px 0 8px; }
    .roster-grp { display: flex; justify-content: space-between; align-items: baseline; padding: 9px 12px 4px; }
    .roster-grp-l { font-family: var(--font-title); font-size: 0.42rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
    .roster-grp-sel { font-size: 0.6rem; color: var(--gold); user-select: none; }
    .roster-grp-sel span { cursor: pointer; }
    .roster-grp-sel span:hover { color: var(--gold-light); }
    .roster-row { display: flex; align-items: center; gap: 8px; padding: 4px 12px; cursor: pointer; user-select: none; }
    .roster-row:hover { background: var(--gold-dim); }
    .roster-check { width: 14px; height: 14px; flex: none; border: 1px solid var(--muted); border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 9px; color: var(--gold-light); }
    .roster-row.on .roster-check { border-color: var(--gold); background: rgba(184,149,42,0.18); }
    .roster-disc { width: 22px; height: 22px; border-radius: 50%; flex: none; overflow: hidden; background: var(--ink); border: 1.5px solid var(--blood); color: var(--aged); display: flex; align-items: center; justify-content: center; font-size: 0.58rem; }
    .roster-disc.party { border-color: var(--gold); }
    .roster-disc img { width: 100%; height: 100%; object-fit: cover; }
    .roster-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 0.72rem; color: var(--parchment2); }
    .roster-row:not(.on) .roster-name { color: var(--muted); }
    .roster-eye { flex: none; color: var(--muted); font-size: 0.68rem; }
    .roster-init { flex: none; min-width: 18px; text-align: right; font-size: 0.68rem; color: var(--gold-light); }
    .roster-init.pending { color: var(--muted); }
    .roster-count { color: var(--muted); font-size: 0.55rem; }
    .roster-acts { border-top: 1px solid var(--section-border); }
    .roster-empty { padding: 10px 12px; font-size: 0.65rem; color: var(--muted); }
    /* ── token tray (Party shelf) ── */
    .tray-wrap { flex: 1; min-height: 0; overflow-y: auto; padding: 4px 0 8px; }
    .tray-list { padding-bottom: 4px; }
    .tray-row { display: flex; align-items: center; gap: 8px; padding: 5px 12px; cursor: pointer; user-select: none; }
    .tray-row:hover { background: var(--gold-dim); }
    .tray-row .roster-name { flex: 1; }
    .tray-act { flex: none; font-family: var(--font-title); font-size: 0.58rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gold-light); border: 1px solid var(--gold-mid); border-radius: 999px; padding: 2px 8px; }
    .tray-row.on .tray-act { color: var(--hp-good); border-color: rgba(90,154,106,0.45); background: rgba(90,154,106,0.12); }
    .tray-row:not(.on) .roster-name { color: var(--muted); }
    .tray-hint { padding: 8px 12px 12px; font-size: 0.6rem; color: var(--muted); font-style: italic; }
    /* ── saved-monsters shelf (sibling of the Party shelf in the Tokens pane) ── */
    .tray-row[data-id] { cursor: default; }
    .tray-row[data-id] .roster-name { color: var(--parchment2); }   /* not muted like un-added party rows */
    .roster-disc { position: relative; }
    .roster-disc .disc-art { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .cr-grp { font-family: var(--font-title); font-size: 0.46rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--aged); padding: 7px 12px 3px; opacity: 0.85; border-top: 1px solid var(--section-border); }
    .cr-grp:first-child { border-top: none; }
    .tag-filter { display: flex; flex-wrap: wrap; gap: 5px; padding: 6px 12px 8px; }
    .tchip { font-family: var(--font-title); font-size: 0.5rem; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; color: var(--muted); border: 1px solid var(--gold-dim); border-radius: 999px; padding: 2px 8px; }
    .tchip:hover { color: var(--gold-light); border-color: var(--gold-mid); }
    .tchip.on { color: var(--ink-deep); background: var(--gold); border-color: var(--gold); }
    .tray-add { flex: none; font-family: var(--font-title); font-size: 0.58rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gold-light); border: 1px solid var(--gold-mid); border-radius: 999px; padding: 2px 9px; cursor: pointer; }
    .tray-row.flash .tray-add { color: var(--hp-good); border-color: rgba(90,154,106,0.45); background: rgba(90,154,106,0.12); }
    .tray-edit-btn { flex: none; cursor: pointer; background: none; border: none; color: var(--muted); font-size: 0.8rem; line-height: 1; padding: 2px 3px; }
    .tray-edit-btn.has { color: var(--gold); }
    .tray-edit-btn:hover { color: var(--gold-light); }
    .tray-rm { flex: none; cursor: pointer; background: none; border: none; color: var(--muted); font-size: 0.92rem; line-height: 1; padding: 2px 4px; border-radius: 4px; opacity: 0.55; transition: opacity 0.12s, color 0.12s; }
    .tray-row:hover .tray-rm { opacity: 1; }              /* touch-safe: visible by default, brighter on hover */
    .tray-rm:hover { color: var(--blood); }
    /* row editor: name field + tag editor */
    .row-edit { padding: 6px 12px 10px; background: rgba(0,0,0,0.18); display: flex; flex-direction: column; gap: 7px; }
    .re-label { font-family: var(--font-title); font-size: 0.44rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
    .re-name { background: var(--ink-deep); color: var(--parchment2); border: 1px solid var(--gold-dim); border-radius: 4px; font-family: inherit; font-size: 0.84rem; padding: 4px 7px; }
    .re-base { font-size: 0.62rem; color: var(--muted); font-style: italic; }
    .tagwrap { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
    .te-chip { font-size: 0.62rem; color: var(--parchment2); background: var(--gold-dim); border: 1px solid var(--gold-mid); border-radius: 999px; padding: 2px 6px 2px 8px; display: flex; align-items: center; gap: 4px; }
    .te-chip b { cursor: pointer; color: var(--muted); font-weight: 400; }
    .te-chip b:hover { color: var(--blood); }
    .te-input { flex: 1; min-width: 90px; background: var(--ink-deep); color: var(--parchment2); border: 1px solid var(--gold-dim); border-radius: 4px; font-family: inherit; font-size: 0.74rem; padding: 3px 6px; }
    /* bestiary ★ save-a-copy (additive) + variant count */
    .bst-save { cursor: pointer; background: none; border: none; color: var(--muted); font-size: 0.95rem; line-height: 1; padding: 2px 4px; flex: none; display: flex; align-items: center; gap: 2px; transition: color 0.12s, transform 0.12s; }
    .bst-save:hover { color: var(--gold-light); transform: scale(1.15); }
    .bst-save.on { color: var(--gold-light); }
    .bst-save.flash { color: var(--hp-good); }
    .bst-save .ct { font-family: var(--font-title); font-size: 0.5rem; }
    /* staff "view as player" toggle (rail icon) + preview-mode UI suppression */
    .view-toggle.on { background: var(--gold); color: var(--ink-deep); border-color: var(--gold); }
    /* the strip lives in the rail (outside .stage), so the preview hide is
       driven by JS: the eye toggles .hide-staff on the strip itself */
    #tok-rail .bd-strip.hide-staff .bd-tab.staff { display: none !important; }
    .stage.view-as-player .tool-rail,
    .stage.view-as-player .bestiary-tab,
    .stage.view-as-player .bestiary-panel,
    .stage.view-as-player .statblock-panel,
    .stage.view-as-player .sb-backdrop,
    .stage.view-as-player .bst-backdrop { display: none !important; }

    /* zoom toolbar */
    .zoom-bar {
      position: absolute;
      bottom: 12px; right: 12px;   /* UX-AUDIT-1: the icon rail is gone */
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .zoom-bar button {
      width: 30px; height: 30px;
      background: var(--nav-bg);
      border: 1px solid var(--nav-border);
      color: var(--gold-light);
      font-family: var(--font-title);
      font-size: 0.9rem;
      line-height: 1;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .zoom-bar button:hover { background: var(--gold-dim); }
    .zoom-bar button.fit { font-size: 0.5rem; letter-spacing: 0.06em; }

    /* thin divider + checkbox accent in the controls panel */
    .gc-sep { height: 1px; background: var(--gold-dim); margin: 0.5rem 0; }
    .gc-row input[type=checkbox] { accent-color: var(--gold); width: 14px; height: 14px; }
    .gc-sub {
      font-size: 0.44rem; letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--muted); margin: 0 0 0.4rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .gc-tag {
      font-size: 0.4rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--ink-deep); background: var(--gold-mid);
      padding: 1px 5px; border-radius: 3px; font-weight: 600;
    }
    .gc-empty { font-size: 0.5rem; color: var(--muted); margin: 0 0 0.3rem; }

    /* ── grid controls panel ── */
    /* Display is a right slide-out drawer (compendium pattern), opened by a tab */
    .grid-controls {
      flex: 1; min-height: 0;
      padding: 0.6rem 0.7rem;
      overflow-y: auto;
      font-family: var(--font-title);
    }
    .gc-backdrop {
      position: absolute; inset: 0; z-index: 21;
      background: rgba(0,0,0,0.35);
      opacity: 0; pointer-events: none; transition: opacity 0.28s;
    }
    .gc-backdrop.open { opacity: 1; pointer-events: auto; }
    .grid-controls h4 {
      font-size: 0.46rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--gold-dim);
      padding-bottom: 0.3rem;
      margin-bottom: 0.5rem;
      font-weight: 600;
    }
    .gc-row { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; margin-bottom: 0.45rem; }
    .gc-row:last-child { margin-bottom: 0; }
    .gc-row label {
      font-size: 0.5rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--aged);
    }
    .gc-row input[type=range] { width: 78px; accent-color: var(--gold); }
    .gc-row select {
      background: var(--ink); color: var(--parchment2);
      border: 1px solid var(--section-border); border-radius: 4px;
      font-family: var(--font-title); font-size: 0.5rem; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 2px 4px;
    }
    .gc-row input[type=color] {
      width: 26px; height: 18px; padding: 0; border: 1px solid var(--section-border);
      background: var(--ink); border-radius: 4px; cursor: pointer;
    }
    .grid-controls.collapsed .gc-body { display: none; }
    .gc-toggle { cursor: pointer; float: right; color: var(--muted); }
    /* fog controls */
    .gc-btn {
      flex: 1; cursor: pointer;
      background: var(--ink); color: var(--parchment2);
      border: 1px solid var(--section-border); border-radius: 4px;
      font-family: var(--font-title); font-size: 0.46rem; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 4px 4px;
    }
    .gc-btn:hover { border-color: var(--gold-light); color: var(--parchment); }
    .gc-btn.on   { background: var(--gold); color: var(--ink-deep); border-color: var(--gold); }
    .gc-fog-brush, .gc-fog-bulk { gap: 0.3rem; }
    .stage.fog-edit { cursor: crosshair; }
    /* ── RAIL-DOCK: the Display pane at rail size. The gc-* sizes above were
       tuned for the 320px dock; inside the 384px rail they read miniature.
       Everything here is #tok-rail-scoped — the classes upsize ONLY when the
       pane lives in the rail, nothing else on the page moves. ── */
    #tok-rail .grid-controls { padding: 0.9rem 1.1rem; }
    #tok-rail .gc-sub {
      font-size: 0.66rem; letter-spacing: 0.24em; color: var(--gold-light);
      padding-bottom: 0.35rem; border-bottom: 1px solid var(--gold-dim);
      margin: 1.1rem 0 0.7rem;
    }
    #tok-rail .gc-sub:first-child { margin-top: 0; }
    #tok-rail .gc-tag { font-size: 0.5rem; letter-spacing: 0.18em; }
    #tok-rail .gc-row { margin-bottom: 0.7rem; gap: 0.8rem; }
    #tok-rail .gc-row label { font-size: 0.66rem; letter-spacing: 0.16em; color: var(--parchment2); }
    #tok-rail .gc-row input[type=range] { width: 140px; }
    #tok-rail .gc-row select {
      font-size: 0.62rem; padding: 5px 8px; min-width: 96px;
    }
    #tok-rail .gc-row input[type=color] { width: 34px; height: 24px; }
    #tok-rail .gc-row input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--gold); }
    #tok-rail .gc-btn { font-size: 0.6rem; padding: 7px 6px; }
    /* Bestiary at rail size */
    #tok-rail .bestiary-panel { padding: 0.9rem 1.1rem; }
    #tok-rail .bst-source { font-size: 0.62rem; padding: 6px 8px; }
    #tok-rail .bst-search { font-size: 0.78rem; padding: 6px 8px; }
    #tok-rail .bst-cr { gap: 5px; margin-bottom: 0.7rem; }
    #tok-rail .bst-cr button { font-size: 0.56rem; padding: 5px 9px; }
    #tok-rail .bst-row { padding: 7px 6px; gap: 0.6rem; }
    #tok-rail .bst-row-name { font-size: 0.8rem; }
    #tok-rail .bst-row-cr { font-size: 0.56rem; }
    #tok-rail .bst-drop { font-size: 0.56rem; padding: 5px 10px; }
    #tok-rail .bst-save .ct { font-size: 0.62rem; }
    #tok-rail .bst-state { font-size: 0.72rem; }
    /* Tracker (roster) + Tokens (tray) at rail size — shared row classes */
    #tok-rail .roster-grp-l { font-size: 0.56rem; letter-spacing: 0.18em; }
    #tok-rail .roster-grp-sel { font-size: 0.7rem; }
    #tok-rail .roster-row { padding: 6px 14px; gap: 10px; }
    #tok-rail .roster-check { width: 17px; height: 17px; font-size: 11px; }
    #tok-rail .roster-disc { width: 27px; height: 27px; font-size: 0.7rem; }
    #tok-rail .roster-name { font-size: 0.85rem; }
    #tok-rail .roster-init { font-size: 0.82rem; min-width: 24px; }
    #tok-rail .roster-eye { font-size: 0.8rem; }
    #tok-rail .roster-empty { font-size: 0.78rem; }
    #tok-rail .tray-row { padding: 7px 14px; gap: 10px; }
    #tok-rail .tray-add { font-size: 0.66rem; padding: 3px 11px; }
    #tok-rail .tray-hint { font-size: 0.72rem; }
    #tok-rail .dock-act { font-size: 0.74rem; padding: 11px 13px; }
    /* Scenes reads fine at its shipped rem sizes — deliberately untouched. */
    /* ── bestiary picker (DM): lives in the dock's Bestiary pane ── */
    .bestiary-panel {
      flex: 1; min-height: 0;
      padding: 0.6rem 0.7rem; box-sizing: border-box;
      display: flex; flex-direction: column;
      font-family: var(--font-title);
    }
    /* ── shared feed (game log) — fills the dock's Feed pane ── */
    /* Page-specific overrides (per house rules, on the page — battle.js stays
       generic). The HUD's roll-history popup is redundant here: the feed IS
       the roll record, and its ADV/DIS/BLESS/GUIDE row replaces the roller's
       toggles (same RS state via the battle.js seam). The toast keeps living
       beside the HUD, off the dock's corner. battle.js injects its styles at
       runtime, after this sheet — hence the !important. */
    #b-roller { display: none !important; }
    @media (min-width: 601px) {
      #b-toast { left: 476px !important; right: auto !important; }
    }
    /* feed roll-modifier toggles (drive HUD rolls AND feed dice) */
    .feed-mods { display: flex; gap: 4px; padding: 6px 10px 0; }
    .feed-mod {
      flex: 1; padding: 4px 0; background: var(--ink); border: 1px solid var(--section-border);
      border-radius: 4px; color: var(--muted); cursor: pointer; text-align: center;
      font-family: var(--font-title); font-size: 0.46rem; letter-spacing: 0.1em; text-transform: uppercase;
    }
    .feed-mod:hover { color: var(--parchment); }
    .feed-mod.on { color: var(--gold-light); border-color: var(--gold); background: rgba(184,149,42,0.12); }
    .feed-mod[data-mod="advantage"].on    { color: #5a9a6a; border-color: #5a9a6a; background: rgba(90,154,106,0.12); }
    .feed-mod[data-mod="disadvantage"].on { color: #c05060; border-color: #c05060; background: rgba(192,80,96,0.12); }
    .feed-wrap { flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
    .feed-tabs { display: flex; border-bottom: 1px solid var(--nav-border); }
    .feed-tab { flex: 1; text-align: center; padding: 7px 0; font-family: var(--font-title); font-size: 0.46rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); cursor: pointer; background: transparent; border: none; }
    .feed-tab.on { color: var(--parchment); border-bottom: 2px solid var(--gold); }
    .feed-body { flex: 1; padding: 9px 11px; display: flex; flex-direction: column; gap: 11px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: rgba(184,149,42,0.2) transparent; }
    .feed-body::-webkit-scrollbar { width: 3px; }
    .feed-body::-webkit-scrollbar-thumb { background: rgba(184,149,42,0.2); }
    .feed-row { display: flex; gap: 8px; position: relative; }
    .feed-del {
      position: absolute; top: 0; right: 0; display: none;
      background: var(--nav-bg); border: 1px solid var(--nav-border); border-radius: 4px;
      color: var(--muted); cursor: pointer; font-size: 10px; line-height: 1; padding: 3px 5px;
    }
    .feed-row:hover .feed-del { display: block; }
    .feed-del:hover { color: var(--blood); border-color: var(--blood); }
    /* chronicle images land here via the unified feed — constrain them and
       open the full image in a lightbox on click (same idiom as chronicle) */
    .feed-text img {
      display: block; max-width: 100% !important; max-height: 120px;
      width: auto !important; height: auto; object-fit: cover;
      margin: 4px 0; border: 1px solid var(--nav-border); border-radius: 4px;
      cursor: zoom-in;
    }
    .lightbox-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.2s ease; cursor: zoom-out;
    }
    .lightbox-overlay.open { opacity: 1; pointer-events: all; }
    .lightbox-img {
      max-width: 90vw; max-height: 88vh; width: auto; height: auto;
      border: 1px solid var(--gold-dim); border-radius: 2px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.8);
      transform: scale(0.96); transition: transform 0.2s ease; cursor: default;
    }
    .lightbox-overlay.open .lightbox-img { transform: scale(1); }
    .lightbox-close {
      position: absolute; top: 16px; right: 20px; background: none; border: none;
      color: var(--muted); font-size: 1.5rem; cursor: pointer; line-height: 1; transition: color 0.15s;
    }
    .lightbox-close:hover { color: var(--parchment); }
    .feed-av { flex: none; width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid var(--gold); overflow: hidden; display: flex; align-items: center; justify-content: center; background: var(--ink); }
    .feed-av-i { font-family: var(--font-display); font-size: 13px; color: var(--parchment2); }
    .feed-av-dm { color: var(--gold); font-size: 11px; }
    .feed-meta { font-size: 11px; color: var(--muted); }
    .feed-name { font-weight: 500; }
    .feed-text { font-size: 13px; color: var(--parchment); margin-top: 1px; word-break: break-word; }
    .feed-text .ft-tot { color: var(--gold); font-weight: 500; }
    .feed-text .ft-die { color: var(--parchment2); }
    .feed-text .ft-drop { color: var(--muted); }
    .feed-dice { display: flex; flex-wrap: wrap; gap: 4px; padding: 7px 10px; border-top: 1px solid var(--nav-border); }
    .feed-die { font-size: 11px; color: var(--parchment); border: 1px solid var(--nav-border); background: transparent; border-radius: 4px; padding: 3px 7px; cursor: pointer; font-family: var(--font-title); }
    .feed-die:hover { border-color: var(--gold-dim); color: var(--gold); }
    .feed-input { display: flex; align-items: center; gap: 6px; padding: 8px 10px; border-top: 1px solid var(--nav-border); }
    .feed-input input { flex: 1; min-width: 0; background: var(--ink); border: 1px solid var(--nav-border); border-radius: 5px; color: var(--parchment); font-size: 12px; padding: 6px 9px; }

    .feed-hidden-tog { flex: none; font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); border: 1px solid var(--nav-border); border-radius: 4px; padding: 5px 6px; cursor: pointer; background: transparent; }
    .feed-hidden-tog.on { color: var(--gold); border-color: var(--gold); }

    .bestiary-panel h4 {
      font-size: 0.46rem; letter-spacing: 0.32em; text-transform: uppercase;
      color: var(--muted); border-bottom: 1px solid var(--gold-dim);
      padding-bottom: 0.3rem; margin: 0 0 0.5rem; font-weight: 600;
    }
    .bst-source, .bst-search {
      width: 100%; box-sizing: border-box; margin-bottom: 0.45rem;

      font-family: var(--font-title); padding: 4px 6px;

      cursor: pointer; background: var(--ink); color: var(--parchment2);
      border: 1px solid var(--section-border); border-radius: 4px;

      cursor: pointer; background: var(--ink); color: var(--gold);

    .bst-state { padding: 0.8rem 0.4rem; color: var(--muted); font-size: 0.55rem; text-align: center; line-height: 1.5; }
    /* ── statblock panel (DM): opened from a token's Manage tab ── */
    .statblock-panel {
      position: absolute; top: 0; right: 0; bottom: 0; z-index: 24;   /* UX-AUDIT-1: no rail to clear */
      width: 360px; max-width: 94vw;
      background: var(--nav-bg); border-left: 1px solid var(--nav-border);
      padding: 0.9rem 1rem; box-sizing: border-box; overflow-y: auto;
      transform: translateX(100%);
      /* visibility gate: when closed, translateX(100%) parks this panel just
         off the right edge, exactly where the dock handle and ticker live —
         it must not paint or eat clicks there (this bug shipped once).
         The 0s/.28s delay keeps the slide animation intact. */
      visibility: hidden;
      transition: transform 0.28s cubic-bezier(0.4,0,0.2,1), visibility 0s 0.28s;
      box-shadow: -8px 0 40px rgba(0,0,0,0.5);

    .statblock-panel.open { transform: translateX(0); visibility: visible;
      transition: transform 0.28s cubic-bezier(0.4,0,0.2,1), visibility 0s 0s; }
    .sb-close {
      position: sticky; top: 0; float: right; cursor: pointer;

    .sb-close:hover { color: var(--parchment); }
    /* lifted from compendium's monster detail view, scoped to the panel */

    .statblock-panel .detail-meta { font-family: var(--font-title); font-size: 0.5rem; letter-spacing: 0.22em; color: var(--gold); text-transform: uppercase; margin-bottom: 0.8rem; }
    .statblock-panel .detail-rule { border: none; height: 1px; background: linear-gradient(90deg, var(--gold-dim), transparent); margin: 0.85rem 0; }
    .statblock-panel .detail-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 0.45rem; margin-bottom: 0.85rem; }
    .statblock-panel .detail-stat { background: rgba(0,0,0,0.2); border: 1px solid var(--gold-dim); padding: 0.35rem 0.55rem; }
    .statblock-panel .detail-stat-label { font-family: var(--font-title); font-size: 0.42rem; letter-spacing: 0.18em; color: var(--muted); text-transform: uppercase; display: block; margin-bottom: 0.12rem; }
    .statblock-panel .detail-stat-val { font-size: 0.8rem; color: var(--parchment2); }

    .statblock-panel .detail-section-title { font-family: var(--font-title); font-size: 0.5rem; letter-spacing: 0.28em; color: var(--gold); text-transform: uppercase; border-bottom: 1px solid var(--gold-dim); padding-bottom: 0.3rem; margin-bottom: 0.55rem; }
    .statblock-panel .ability-strip { display: grid; grid-template-columns: repeat(6,1fr); gap: 0.35rem; margin-bottom: 0.85rem; }
    .statblock-panel .ability-cell { text-align: center; background: rgba(0,0,0,0.2); border: 1px solid var(--gold-dim); padding: 0.35rem 0.15rem; }
    .statblock-panel .ability-cell-label { font-family: var(--font-title); font-size: 0.42rem; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; display: block; }
    .statblock-panel .ability-cell-score { font-family: var(--font-title); font-size: 0.92rem; color: var(--parchment); display: block; }
    .statblock-panel .ability-cell-mod   { font-family: var(--font-title); font-size: 0.6rem; color: var(--gold-light); display: block; }
    .statblock-panel .trait-block { margin-bottom: 0.75rem; }
    .statblock-panel .trait-name { font-family: var(--font-title); font-size: 0.72rem; color: var(--gold-light); font-style: italic; }
    .statblock-panel .trait-body { font-size: 0.82rem; color: var(--parchment2); line-height: 1.6; margin-top: 0.2rem; }
    .statblock-panel .trait-body p { margin: 0.3rem 0; }
    .statblock-panel .source-note { font-size: 0.66rem; color: var(--muted); font-style: italic; margin-top: 1.2rem; padding-top: 0.6rem; border-top: 1px solid var(--gold-dim); }
    .statblock-panel table { width: 100%; border-collapse: collapse; margin: 0.5rem 0; font-size: 0.78rem; color: var(--parchment2); }
    .statblock-panel th, .statblock-panel td { border: 1px solid var(--gold-dim); padding: 0.25rem 0.4rem; text-align: left; }
    /* monster token art (5etools), layered over the initial fallback */
    .token-monimg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    /* ── initiative strip (everyone; staff controls gated) ── */
    .init-strip {
      position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
      z-index: 17; max-width: calc(100% - 210px);
      overflow-x: auto;                       /* crowded fights scroll, never clip */
      display: flex; align-items: stretch; gap: 9px;
      padding: 8px 9px; border-radius: 9px;
      background: rgba(16,14,10,0.92); border: 1px solid #5a4a22;
      box-shadow: 0 6px 24px rgba(0,0,0,0.45);
    }
    .init-strip.empty { display: none; }
    .init-track { display: flex; gap: 8px; align-items: stretch; overflow-x: auto; max-width: 100%; }
    .init-track::-webkit-scrollbar { height: 5px; }
    .init-track::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 3px; }
    .init-chip {
      position: relative; width: 60px; height: 88px; flex: none; cursor: pointer;
      border: 1px solid #3a3119; border-radius: 6px; overflow: hidden; background: #1a1510;
      transition: transform 0.18s, border-color 0.18s;
    }
    .init-chip.enemy { border-color: #5a3030; }
    .init-chip:hover { border-color: var(--gold-dim); }
    .init-chip.active { border: 2px solid var(--gold); transform: scale(1.06); transform-origin: top; }
    .init-chip.hidden-foe { border-style: dashed; opacity: 0.8; }
    .init-chip.pending { border-style: dashed; border-color: #6a5f48; opacity: 0.62; filter: saturate(0.55); }
    .init-chip.pending .ic-init { background: #1a1510; color: #8a7a52; border: 1px dashed #6a5f48; }
    .ic-zone { position: absolute; inset: 0; }
    .ic-bg { position: absolute; inset: 0; background: linear-gradient(160deg,#2a2018 0%,#1a1410 55%,#0d0a07 100%); }
    .ic-bg.party { background: linear-gradient(160deg,#26303a,#141d24 60%,#0a0f13); }
    .ic-bg.enemy { background: linear-gradient(160deg,#3a2422,#1f1210 60%,#0d0807); }
    .ic-art { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center top; }
    .ic-initial { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 30px; color: rgba(240,230,207,0.32); }
    .ic-dots { position: absolute; inset: 0; background-image: radial-gradient(circle, rgba(0,0,0,0.4) 1px, transparent 1px); background-size: 4px 4px; mix-blend-mode: multiply; }
    .ic-fade { position: absolute; inset: 0; background: linear-gradient(to top,#0d0a07 8%,rgba(13,10,7,0.2) 42%,transparent 62%); }
    .ic-init { position: absolute; top: 2px; right: 2px; min-width: 17px; height: 17px; padding: 0 3px; box-sizing: border-box; border-radius: 50%; background: #6b5a30; color: #f0e6cf; font-family: var(--font-title); font-size: 10px; display: flex; align-items: center; justify-content: center; z-index: 2; }
    .init-chip.active .ic-init { background: var(--gold); color: var(--ink-deep); }

    .ic-hp > i { display: block; height: 100%; }
    .ic-edit { position: absolute; top: 2px; right: 2px; z-index: 3; width: 38px; box-sizing: border-box; font-size: 11px; text-align: center; padding: 1px; background: var(--ink); color: var(--parchment2); border: 1px solid var(--gold); border-radius: 3px; font-family: var(--font-title); }
    .init-side { display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 6px; padding-left: 9px; border-left: 1px solid #3a3119; min-width: 62px; }
    .init-round-l { font-family: var(--font-title); font-size: 9px; letter-spacing: 0.2em; color: var(--muted); }
    .init-round-n { font-family: var(--font-display); font-size: 18px; color: #f0e6cf; line-height: 1; }
    .init-btn { background: var(--gold); color: var(--ink-deep); border: none; border-radius: 5px; padding: 5px 9px; font-family: var(--font-title); font-size: 10px; font-weight: 600; letter-spacing: 0.05em; cursor: pointer; white-space: nowrap; }
    .init-btn.ghost { background: var(--ink); color: var(--gold); border: 1px solid var(--gold-dim); }
    .init-btn:hover { filter: brightness(1.08); }
    .init-empty-cta { font-family: var(--font-title); font-size: 10px; letter-spacing: 0.06em; color: var(--muted); padding: 2px 4px; }
    .stage.view-as-player .init-strip .init-side .init-btn { display: none; }
    /* ── left tool rail + contextual options (DM) ── */
    .tool-rail {
      position: absolute; top: 10px; left: 10px; z-index: 20;
      display: flex; flex-direction: column; gap: 0.25rem;
      background: var(--nav-bg); border: 1px solid var(--nav-border); padding: 0.3rem;

    .dice-tray { overflow: hidden; max-height: 0; transition: max-height 0.25s ease; }
    .dice-tray.open { max-height: 430px; }

      display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px;
      border-top: 1px solid var(--nav-border); margin-top: 0.25rem; padding: 0.3rem 0 0.2rem;

    .dice-count button:hover { color: var(--parchment); }

      display: block; width: 34px; margin: 2px auto; padding: 5px 0;

      color: var(--parchment2); cursor: pointer; text-align: center;
    }
    .dice-die:hover { color: var(--gold-light); border-color: var(--gold-light); }
    .tool-btn {
      width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
      background: transparent; border: 1px solid transparent; border-radius: 4px;
      color: var(--muted); cursor: pointer; transition: color .15s, border-color .15s, background .15s;
    }
    .tool-btn svg { width: 18px; height: 18px; fill: currentColor; }
    .tool-btn:hover { color: var(--parchment); border-color: var(--gold-dim); }
    .tool-btn.active { color: var(--ink-deep); background: var(--gold); border-color: var(--gold); }
    .tool-options {
      position: absolute; top: 10px; left: 58px; z-index: 19;
      min-width: 150px; background: var(--nav-bg); border: 1px solid var(--nav-border);
      padding: 0.5rem 0.6rem; font-family: var(--font-title);
      transform: translateX(-8px); opacity: 0; pointer-events: none;
      transition: transform .2s ease, opacity .2s ease;
    }
    .tool-options.open { transform: translateX(0); opacity: 1; pointer-events: auto; }
    .tool-subrow { display: flex; gap: 0.25rem; margin-bottom: 0.5rem; }
    .tool-subrow .tool-btn { width: 30px; height: 30px; border-color: var(--nav-border); }
    .tool-subrow .tool-btn svg { width: 16px; height: 16px; }
    .rt-cursors { position: absolute; inset: 0; z-index: 18; pointer-events: none; overflow: hidden; }
    .rt-cursor { position: absolute; top: 0; left: 0; transform-origin: 0 0; will-change: transform; transition: transform .05s linear; }
    .rt-cursor .rt-arrow { width: 20px; height: 20px; display: block; fill: var(--cc, #c0703c);
      filter: drop-shadow(0 1px 1px rgba(0,0,0,.55)); }
    .rt-cursor .rt-label { position: absolute; left: 15px; top: 13px; white-space: nowrap;
      font-family: var(--font-title); font-size: 0.68rem; line-height: 1; color: #fff;
      background: var(--cc, #c0703c); padding: 2px 6px; border-radius: 3px;
      box-shadow: 0 1px 2px rgba(0,0,0,.4); }

    /* ── status / empty states ── */
    .stage-msg {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      text-align: center;
      padding: 2rem;
      color: var(--muted);
    }
    .stage-msg h2 {
      font-family: var(--font-display);
      font-size: 1.1rem;
      color: var(--gold);
      font-weight: 700;
    }
    .stage-msg p { font-family: var(--font-body); font-size: 0.95rem; max-width: 360px; }
    .spinner {
      width: 34px; height: 34px; border-radius: 50%;
      border: 3px solid var(--gold-dim); border-top-color: var(--gold);
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

  <script>
  (function () {
    'use strict';

    // ── config ──
    const CLOUDINARY_CLOUD = 'df0tgoiyb';           // same cloud as the portraits
    const MAP_DISPLAY_W     = 2048;                 // Cloudinary width cap (decoded ≈ 24MB, not 163MB)
    // SCENES-V1: grid calibration lives in the scenes table (was maps/manifest.json)

    // party portraits + ring colours (mirrors battle.js — kept in sync manually for now)
    const PORTRAITS = {
      cosmere:   'https://res.cloudinary.com/df0tgoiyb/image/upload/v1779833033/kirtas/characters/cosmere.png',
      caim:      'https://res.cloudinary.com/df0tgoiyb/image/upload/v1779833008/kirtas/characters/caim.png',
      liadan:    'https://res.cloudinary.com/df0tgoiyb/image/upload/v1779732202/kirtas/portraits/liadan.png',
      vesperian: 'https://res.cloudinary.com/df0tgoiyb/image/upload/v1779833079/kirtas/characters/vesperian.png',
    };
    const CHAR_COLOR = { cosmere: '#9d4edd', caim: '#c0001a', liadan: '#1d9e75', vesperian: '#b8952a' };
    const ENEMY_COLOR = '#a23b2d';

    // Per-character render style for the token art, since it depends on the art:
    //   'circle' = crop into a framed disc (for art composed for a round frame)
    //   'cutout' = place the transparent PNG as-is (for a standing figure)
    // Overrides the global Style control per token. Anything not listed (e.g.
    // enemies, until the bestiary sets their own) falls back to the global default.
    // >>> Confirm these match the actual art you uploaded. <<<
    const TOKEN_STYLE = {
      cosmere:   'circle',
      caim:      'cutout',
      liadan:    'cutout',
      vesperian: 'circle',
    };

    // Dedicated battle tokens (transparent cutout PNGs) keyed by character key.
    // Preferred over PORTRAITS when present; the renderer falls back
    // portrait → dot-initial. Versionless + transform = same form as the map
    // (proven on this account); w_400 keeps tokens light and f_auto preserves
    // PNG transparency while serving WebP/AVIF where supported.
    const TOKENS = {
      cosmere:   'https://res.cloudinary.com/df0tgoiyb/image/upload/w_400,q_auto,f_auto/kirtas/tokens/cosmere.png',
      caim:      'https://res.cloudinary.com/df0tgoiyb/image/upload/w_400,q_auto,f_auto/kirtas/tokens/caim.png',
      liadan:    'https://res.cloudinary.com/df0tgoiyb/image/upload/w_400,q_auto,f_auto/kirtas/tokens/liadan.png',
      vesperian: 'https://res.cloudinary.com/df0tgoiyb/image/upload/w_400,q_auto,f_auto/kirtas/tokens/vesperian.png',
    };

    // Base walking speed (ft) per character, for the movement-measurement tint.
    // Mirrors CHARACTERS[key].combat.speed in characters.js — kept in sync manually,
    // same as PORTRAITS / CHAR_COLOR / TOKENS above. A missing key = no tint (fine
    // for enemies and any future token). The tint is a soft cue, never a gate.
    const SPEED = { cosmere: 30, caim: 40, liadan: 20, vesperian: 30 };

    // The eight conditions the HUD already uses — same label strings, so board
    // and HUD share one vocabulary (and the later merge onto this column is a
    // no-op). Each carries a colour + a small inline-SVG glyph (original art,
    // swappable for game-icons later). Stored on combatants.conditions as an
    // array of these names, e.g. ["Poisoned","Prone"].
    const COND = [
      { name: 'Poisoned',      color: '#5a9a6a', icon: '<path d="M12 3 C12 3 6 11 6 15 a6 6 0 0 0 12 0 C18 11 12 3 12 3Z"/>' },
      { name: 'Frightened',    color: '#9d6bd0', icon: '<path d="M5 12 a7 7 0 0 1 14 0 v8 l-2.3-2 -2.3 2 -2.4-2 -2.3 2 -2.4-2 z"/>' },
      { name: 'Paralyzed',     color: '#d4b020', icon: '<path d="M13 2 L5 13 h5 l-2 9 9-13 h-5 z"/>' },
      { name: 'Prone',         color: '#a0763d', icon: '<path d="M12 21 l-7-8 h4 V4 h6 v9 h4 z"/>' },
      { name: 'Stunned',       color: '#e08a2a', icon: '<path fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" d="M12 7 a5 5 0 1 1 -5 5 a3 3 0 1 0 3 -3"/>' },
      { name: 'Concentration', color: '#4a90c0', icon: '<circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="2.4"/><circle cx="12" cy="12" r="2.6"/>' },
      { name: 'Blinded',       color: '#8a8d95', icon: '<path fill="none" stroke="currentColor" stroke-width="2.2" d="M3 12 s3.5-5 9-5 9 5 9 5"/><circle cx="12" cy="12.5" r="2.2"/><line x1="4" y1="5" x2="20" y2="20" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>' },
      { name: 'Deafened',      color: '#6f7682', icon: '<path d="M4 9 h3 l4-4 v14 l-4-4 H4 z"/><line x1="14" y1="6" x2="20" y2="18" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>' },
    ];
    const COND_BY = Object.fromEntries(COND.map(c => [c.name, c]));

    function mapUrl(publicId) {
      return `https://res.cloudinary.com/${CLOUDINARY_CLOUD}/image/upload/`
           + `w_${MAP_DISPLAY_W},q_auto,f_auto/${publicId}.jpg`;
    }

    // SCENES-V1: shape a scenes-table row into the META object the render code
    // eats. The camelCase names predate the table — adapting here is cheaper
    // (and safer) than touching every meta.cellPx site below.
    // SCENES-V2: the board's native coordinate space is the IMAGE's true pixel
    // size (native_w/native_h), not cols*cellPx — calibrated grids may be
    // fractional and offset, so the old identity no longer holds. Rows from
    // before the v2 delta fall back to the old math.
    function sceneMeta(s) {
      return { publicId: s.public_id, cols: s.cols, rows: s.rows,
               cellPx: s.cell_px, originX: s.origin_x, originY: s.origin_y,
               nativeW: s.native_w || s.cols * s.cell_px,
               nativeH: s.native_h || s.rows * s.cell_px,
               grid: s.grid || null };
    }

    // ── wait for nav.js: it confirms the session, exposes window.__tok.sb, then
    //    fires nav:ready. If we registered too late and it already fired, the
    //    presence of __tok.sb tells us we can go. ──
    function whenReady(cb) {
      if (window.__tok && window.__tok.sb) { cb(); return; }
      document.addEventListener('nav:ready', function once() {
        document.removeEventListener('nav:ready', once);
        cb();
      });
    }

    const stage   = document.getElementById('stage');
    const msgEl    = document.getElementById('stage-msg');
    const barEl    = document.getElementById('combat-bar');

    function showMsg(title, body, withSpinner) {
      msgEl.innerHTML =
        (withSpinner ? '<div class="spinner"></div>' : '') +
        (title ? `<h2>${title}</h2>` : '') +
        (body  ? `<p>${body}</p>`   : '');
      msgEl.style.display = 'flex';
    }
    function hideMsg() { msgEl.style.display = 'none'; }

    // ── grid state (seeded from the scenes table, adjustable via the controls) ──
    let GRID = { style: 'lines', color: '#ffffff', opacity: 0.32 };
    // ── token display state (adjustable via the controls) ──
    //   style: 'cutout' = place the PNG as-is | 'circle' = crop into a framed disc
    //   size : multiplier on the 1-cell footprint    ring: show ring (circle) / base (cutout)
    let TOKEN = { style: 'cutout', size: 1, ring: true };
    // Per-creature size (DM authority, shared in the DB). Multiplies the viewer's
    // TOKEN.size. v1 = visual scale only, centred on the cell; multi-cell footprint
    // occupancy is a deliberate later pass.
    const SIZE_MUL   = { tiny: 0.5, small: 0.85, medium: 1, large: 2, huge: 3, gargantuan: 4 };
    const SIZE_ORDER = ['tiny', 'small', 'medium', 'large', 'huge', 'gargantuan'];
    const SIZE_LABEL = { tiny: 'Tiny', small: 'Small', medium: 'Medium', large: 'Large', huge: 'Huge', gargantuan: 'Garg' };
    let META = null;     // active map's calibration (scenes row via sceneMeta)
    let boardEl = null;
    let COMBS = [];      // cached combatant rows, for re-rendering on control changes
    let IS_STAFF = false;
    // Staff "view as player" preview (visual only — staff still hold the data).
    // effectiveStaff() gates VISIBILITY (what's drawn); real IS_STAFF gates
    // identity/permissions. Toggling re-renders tokens + fog.
    let VIEW_AS_PLAYER = false;
    const effectiveStaff = () => IS_STAFF && !VIEW_AS_PLAYER;
    let ME = null;       // viewer profile { role, characterKey, ... }
    let SB = null;       // shared supabase client (from nav.js)
    let ENC = null;      // active encounter row

    // ── fog of war state ──
    // FOG.cells = Set of "x,y" revealed-cell keys (fast lookup). Source of truth
    // is encounters.revealed_cells (a JSON array of [x,y]); we mirror it locally.
    const FOG = { editing: false, brush: 'reveal', size: 1, cells: new Set() };
    const fogKey = (x, y) => x + ',' + y;
    const isRevealed = (x, y) => FOG.cells.has(fogKey(x, y));
    function loadFog() {
      const arr = (ENC && Array.isArray(ENC.revealed_cells)) ? ENC.revealed_cells : [];
      FOG.cells = new Set(arr.map(p => fogKey(p[0], p[1])));
    }
    function fogArray() { return [...FOG.cells].map(k => k.split(',').map(Number)); }
    // A token shows for a player only where the fog is lifted (or it's their own
    // token, or they're staff) — the cheap, client-side concealment tier.
    function tokenVisible(c) {
      // In player-view, staff must explicitly drop hidden enemies they still hold.
      if (!effectiveStaff() && c.hidden && !(ME && ME.id && c.owner === ME.id)) return false;
      return effectiveStaff() || isRevealed(c.x, c.y) || !!(ME && ME.id && c.owner === ME.id);
    }

    // ── drawings (shapes & spell templates) state ──
    let TOOL = 'select';                 // active tool: select | circle | cone | reveal | hide
    const DRAW = { color: '#c0703c' };   // current draw colour (per user, change anytime)
    let DRAWINGS = [];                   // rows from the drawings table
    let drawPreview = null;              // in-progress shape while placing
    const canEditDrawing = (d) => IS_STAFF || !!(ME && ME.id && d.owner === ME.id);
    let SELECTED = null; // selected combatant id
    let dragId = null;   // combatant id currently being dragged
    let dragOrigin = null; // {col,row} the drag started from — anchors the measurement
    let zoom = 1, panX = 0, panY = 0;   // board transform (zoom/pan)

    // live cursors (ephemeral; realtime broadcast + presence, never persisted)
    let RT = null;                      // the realtime channel
    let CHARS_RT = null;                // characters-table channel (sheet/orb vitals sync)
    let cursorLayer = null;             // overlay holding other people's cursors
    let MY_ID = null, MY_NAME = '';     // this viewer's cursor identity
    let lastCursorSent = 0;             // broadcast throttle
    const CURSORS = new Map();          // id → { name, color, tool, col, row, seen, el }
    const MINZ = 0.25, MAXZ = 8;

    // Build the grid SVG markup. viewBox is NATIVE map coords so it scales with
    // the board automatically. Uses a <pattern> tile = one cell, offset by the
    // origin — a handful of elements regardless of grid size.
    function gridSvg(meta) {
      const W = meta.nativeW;
      const H = meta.nativeH;
      const sw = Math.max(2, Math.round(meta.cellPx * 0.018)); // stroke ~ scales with cell
      const cp = meta.cellPx;
      let tile;
      if (GRID.style === 'dots') {
        const r = Math.max(2, Math.round(cp * 0.045));
        tile = `<circle cx="0" cy="0" r="${r}" fill="${GRID.color}"/>`
             + `<circle cx="${cp}" cy="0" r="${r}" fill="${GRID.color}"/>`
             + `<circle cx="0" cy="${cp}" r="${r}" fill="${GRID.color}"/>`
             + `<circle cx="${cp}" cy="${cp}" r="${r}" fill="${GRID.color}"/>`;
      } else { // lines
        tile = `<path d="M ${cp} 0 L 0 0 0 ${cp}" fill="none" `
             + `stroke="${GRID.color}" stroke-width="${sw}"/>`;
      }
      const opacity = (GRID.style === 'none') ? 0 : GRID.opacity;
      return `
        <svg class="board-grid" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none"
             xmlns="http://www.w3.org/2000/svg">
          <defs>
            <pattern id="cell" width="${cp}" height="${cp}" patternUnits="userSpaceOnUse"
                     patternTransform="translate(${meta.originX} ${meta.originY})">
              ${tile}
            </pattern>
          </defs>
          <rect x="0" y="0" width="${W}" height="${H}" fill="url(#cell)" opacity="${opacity}"/>
        </svg>`;
    }

    function redrawGrid() {
      if (!boardEl || !META) return;
      const old = boardEl.querySelector('.board-grid');
      if (old) old.remove();
      // insert grid just above the map, below the tokens
      const tokens = boardEl.querySelector('.board-tokens');
      tokens.insertAdjacentHTML('beforebegin', gridSvg(META));
    }

    // ── fog render + paint ──
    // SVG mask: a full-board veil with revealed cells punched out. Hole count =
    // revealed cells; a fully-revealed board renders no veil at all.
    function fogSvg(meta) {
      const W = meta.nativeW, H = meta.nativeH;
      if (FOG.cells.size >= meta.cols * meta.rows) return '';   // fully revealed → no veil
      const holes = [...FOG.cells].map(k => {
        const [x, y] = k.split(',').map(Number);
        return `<rect x="${meta.originX + x * meta.cellPx}" y="${meta.originY + y * meta.cellPx}" width="${meta.cellPx}" height="${meta.cellPx}" fill="black"/>`;
      }).join('');
      const op = effectiveStaff() ? 0.45 : 0.985;   // DM: translucent shroud (sees through); player: solid cover
      const feather = Math.max(2, meta.cellPx * 0.38);   // soft edge width, in map units
      return `
        <svg class="board-fog" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <filter id="fogfeather" filterUnits="userSpaceOnUse" x="0" y="0" width="${W}" height="${H}">
              <feGaussianBlur stdDeviation="${feather}"/>
            </filter>
            <mask id="fogmask" maskUnits="userSpaceOnUse" x="0" y="0" width="${W}" height="${H}">
              <rect x="0" y="0" width="${W}" height="${H}" fill="white"/>
              <g filter="url(#fogfeather)">${holes}</g>
            </mask>
          </defs>
          <rect x="0" y="0" width="${W}" height="${H}" fill="#06060c" opacity="${op}" mask="url(#fogmask)"/>
        </svg>`;
    }
    function redrawFog() {
      if (!boardEl || !META) return;
      const old = boardEl.querySelector('.board-fog');
      if (old) old.remove();
      const html = fogSvg(META);
      if (!html) return;
      // fog sits above the grid, below the tokens (revealed tokens render over it)
      const tokens = boardEl.querySelector('.board-tokens');
      if (tokens) tokens.insertAdjacentHTML('beforebegin', html);
    }
    // Add/remove just one token's element to match its current fog visibility —
    // used when a token moves into or out of the light (avoids a full rebuild).
    function reconcileTokenVisibility(c) {
      if (!boardEl) return;
      const el = tokenEl(c.id), show = tokenVisible(c);
      if (show && !el) {
        const layer = boardEl.querySelector('.board-tokens');
        if (layer) layer.insertAdjacentHTML('beforeend', tokenHtml(c, META, effectiveStaff()));
      } else if (!show && el) { el.remove(); }
    }
    // Toggle one cell under the brush; only redraw on an actual change.
    // Paint the round brush footprint (radius FOG.size cells) under the cursor;
    // only redraw if at least one cell actually changed.
    function paintCell(col, row) {
      const r = FOG.size, reveal = FOG.brush === 'reveal', lim = (r + 0.5) * (r + 0.5);
      let changed = false;
      for (let dy = -r; dy <= r; dy++) {
        for (let dx = -r; dx <= r; dx++) {
          if (dx * dx + dy * dy > lim) continue;                 // round, not square
          const x = col + dx, y = row + dy;
          if (x < 0 || y < 0 || x >= META.cols || y >= META.rows) continue;
          const k = fogKey(x, y), had = FOG.cells.has(k);
          if (reveal) { if (!had) { FOG.cells.add(k); changed = true; } }
          else        { if (had)  { FOG.cells.delete(k); changed = true; } }
        }
      }
      if (changed) redrawFog();
    }
    async function flushFog() {
      if (!SB || !ENC) return;
      const cells = fogArray();
      ENC.revealed_cells = cells;
      const { error } = await SB.from('encounters').update({ revealed_cells: cells }).eq('id', ENC.id);
      if (error) console.error('fog write failed:', error.message);
    }
    function revealAllFog() {
      FOG.cells = new Set();
      for (let y = 0; y < META.rows; y++) for (let x = 0; x < META.cols; x++) FOG.cells.add(fogKey(x, y));
      redrawFog(); renderTokens(); flushFog();
    }
    function hideAllFog() { FOG.cells = new Set(); redrawFog(); renderTokens(); flushFog(); }

    // ── drawings render + create/delete ──
    // geometry is in board cell coords: circle {cx,cy,r}, cone {ox,oy,angle,len}.
    function shapeSvg(d, meta, editable, preview) {
      const g = d.geometry || {}, cp = meta.cellPx, ox0 = meta.originX, oy0 = meta.originY;
      const sw = Math.max(1, cp * 0.06);
      let body = '', hx = 0, hy = 0;
      if (d.kind === 'circle') {
        const cx = ox0 + (g.cx + 0.5) * cp, cy = oy0 + (g.cy + 0.5) * cp, r = (g.r || 1) * cp;
        body = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${d.color}" fill-opacity="0.22" stroke="${d.color}" stroke-opacity="0.9" stroke-width="${sw}"/>`;
        hx = cx; hy = cy;
      } else if (d.kind === 'cone') {
        const ox = ox0 + (g.ox + 0.5) * cp, oy = oy0 + (g.oy + 0.5) * cp;
        const L = (g.len || 1) * cp, a = g.angle || 0;
        const fx = ox + Math.cos(a) * L, fy = oy + Math.sin(a) * L;
        const px = -Math.sin(a), py = Math.cos(a);
        body = `<polygon points="${ox},${oy} ${fx + px*L/2},${fy + py*L/2} ${fx - px*L/2},${fy - py*L/2}" fill="${d.color}" fill-opacity="0.22" stroke="${d.color}" stroke-opacity="0.9" stroke-width="${sw}"/>`;
        hx = ox; hy = oy;
      } else if (d.kind === 'rect') {
        const x = ox0 + g.x * cp, y = oy0 + g.y * cp, w = (g.w || 1) * cp, h = (g.h || 1) * cp;
        body = `<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="${d.color}" fill-opacity="0.22" stroke="${d.color}" stroke-opacity="0.9" stroke-width="${sw}"/>`;
        hx = x + w / 2; hy = y + h / 2;
      } else if (d.kind === 'pen') {
        const pts = g.pts || [];
        const path = pts.map(p => `${ox0 + p[0] * cp},${oy0 + p[1] * cp}`).join(' ');
        body = `<polyline points="${path}" fill="none" stroke="${d.color}" stroke-opacity="0.9" stroke-width="${sw * 1.4}" stroke-linecap="round" stroke-linejoin="round"/>`;
