  const bioFields = [
    ['personality', 'Personality Traits', 3],
    ['ideals',      'Ideals',             3],
    ['bonds',       'Bonds',              3],
    ['flaws',       'Flaws',              3],
    ['backstory',   'Backstory',          5],
  ];

  return `
  <div class="tab-panel" id="tab-bio">
    <div class="cs-sync-bar">
      <div class="cs-sync-dot" id="cs-sync-dot-bio"></div>
      <span id="cs-sync-label-bio">Up to date</span>
    </div>
    <div class="bio-layout" style="padding:0.75rem 1rem">
      <div>
        <div class="bio-portrait">
          <img src="${C.portrait}" alt="${C.name}" onerror="this.style.display='none'">
        </div>
        <div class="s-section" style="margin-top:0.8rem">
          <div class="s-title">Appearance</div>
          <div class="appear-grid">
            ${[['age','Age'],['height','Height'],['weight','Weight'],['eyes','Eyes'],['hair','Hair'],['skin','Skin']].map(([k,lbl])=>`
              <div class="pill">
                <span class="pill-label">${lbl}</span>
                <span class="pill-value" style="font-size:0.72rem">${app[k]||'—'}</span>
              </div>`).join('')}
          </div>
        </div>
        <div class="s-section">
          <div class="s-title">Background — ${C.background||'Unknown'}</div>
          ${C.alignment ? `<span style="font-family:var(--font-title);font-size:0.5rem;letter-spacing:0.2em;color:var(--muted);text-transform:uppercase">Alignment</span><br><span style="font-size:0.85rem">${C.alignment}</span>` : ''}

      <div class="bio-fields">
        ${bioFields.map(([k, lbl, rows]) => `
          <div class="cs-bio-field">
            <label class="cs-bio-label" for="cs-bio-${k}">${lbl}</label>
            <textarea class="cs-notes-area" id="cs-bio-${k}" rows="${rows}"
              placeholder="${lbl}…"
              oninput="csBioChanged('${k}', this.value)"
            >${escapeHtml(bio[k]||'')}</textarea>
          </div>`).join('')}
      </div>
    </div>
  </div>`;
}

// Escape helper
function escapeHtml(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Init — load this character's live data from GitHub via Netlify function
// NOTE: onUpdate is subscribed BEFORE load() so we catch the completion event
// and re-render equipment/bio tabs with live data. Without this, those tabs
// build during initSheet() before the async load finishes and show empty data.
if (typeof CharacterStore !== 'undefined' && charKey) {
  CharacterStore.onUpdate(({ type, status }) => {
    if (type === 'status') {
      csUpdateSyncUI(status);
    }
    // Rebuild editable tabs on first successful load — triggered by either
    // the 'idle' status event or the 'data' event that fires right after load
    if ((type === 'data' || (type === 'status' && status === 'idle')) && !window._csFirstLoadDone) {
      window._csFirstLoadDone = true;
      csRebuildEquipmentTab();
      csRebuildBioTab();
      // Enrich inventory in background after first load
      setTimeout(csEnrichInventory, 500);
    }
  });
  CharacterStore.load(charKey);
  // Fallback: if load never completes (network error, store not defined, etc.),
  // rebuild tabs after 5s using whatever data is available (static fallback)
  setTimeout(() => {
    if (!window._csFirstLoadDone) {
      window._csFirstLoadDone = true;
      csRebuildEquipmentTab();
      csRebuildBioTab();
      setTimeout(csEnrichInventory, 500);
    }
  }, 5000);
  window.addEventListener('beforeunload', () => CharacterStore.flush());
}

// Sync status indicator — updates the dot + label on Equipment and Bio tabs
function csUpdateSyncUI(status) {
  ['', '-bio'].forEach(suffix => {
    const dot   = document.getElementById('cs-sync-dot' + suffix);
    const label = document.getElementById('cs-sync-label' + suffix);
    if (!dot || !label) return;
    dot.className = 'cs-sync-dot ' + status;
    label.textContent = {
      idle:    'Up to date',
      loading: 'Loading…',
      saving:  'Saving…',
      saved:   'Saved',
      error:   'Error — changes not saved',
    }[status] || status;
  });
}

// ── Item search via Netlify function (bypasses CORS) ──
function csSearchItems(query) {
  clearTimeout(_itemSearchTimer);
  const resultsEl = document.getElementById('cs-item-results');
  if (!resultsEl) return;
  const q = query.trim();
  if (q.length < 2) {
    resultsEl.innerHTML = '<div class="cs-item-empty">Type at least 2 characters to search…</div>';
    return;
  }
  resultsEl.innerHTML = '<div class="cs-item-empty">Searching…</div>';
  _itemSearchTimer = setTimeout(async () => {
    try {
      const res  = await fetch(`/.netlify/functions/items2?q=${encodeURIComponent(q)}`);
      const json = await res.json();
      if (!res.ok) throw new Error(json.error || 'Search failed');
      if (!json.items.length) {
        resultsEl.innerHTML = '<div class="cs-item-empty">No items found.</div>';
        return;
      }
      _itemSearchResults = json.items;
      resultsEl.innerHTML = json.items.map((item, i) => csRenderItemResult(item, i)).join('');
    } catch(e) {
      resultsEl.innerHTML = `<div class="cs-item-empty">Search failed: ${e.message}</div>`;
    }
  }, 350);
}

const RARITY_COLORS = {
  'None':      '#9a9a9a',
  'Common':    '#9a9a9a',
  'Uncommon':  '#4a9a4a',
  'Rare':      '#4a6aaa',
  'Very Rare': '#7a4aaa',
  'Legendary': '#b8952a',
  'Artifact':  '#c8432a',
  'Varies':    '#9a9a9a',
};

function csRarityColor(rarity) {
  return RARITY_COLORS[rarity] || '#9a9a9a';
}

function csRenderItemResult(item, i) {
  const color  = csRarityColor(item.rarity);
  const rarity = item.rarity !== 'None' ? item.rarity : '';
  return `<div class="cs-item-result-wrap" id="cs-iresult-${i}">
    <button class="cs-item-result" onclick="csToggleItemDetail(${i})">
      <div class="cs-item-result-main">
        <span class="cs-item-result-name">${escapeHtml(item.name)}</span>
        ${rarity ? `<span class="cs-item-result-rarity" style="color:${color};border-color:${color}">${rarity}</span>` : ''}
      </div>
      ${item.detail ? `<span class="cs-item-result-meta">${escapeHtml(item.detail)}</span>` : ''}
    </button>
    <div class="cs-item-detail hidden" id="cs-idetail-${i}">
      ${csRenderItemDetail(item)}
      <button class="cs-item-add-btn" onclick="csAddItemByIndex(${i})">+ Add to Inventory</button>
    </div>
  </div>`;
}

function csAddItemByIndex(i) {
  const item = _itemSearchResults[i];
  if (!item) return;
  csAddItemFromSearch(item);
}

function csRenderItemDetail(item) {
  const catLine = (item.weaponCat || item.typeLabel)
    ? `<div style="font-size:0.75rem;color:var(--muted);font-style:italic;margin-bottom:0.35rem">${escapeHtml(item.weaponCat || item.typeLabel)}</div>`
    : '';
  const rows = [];
  if (item.price)    rows.push(['Price', item.price]);
  if (item.dmg1 && item.dmgType) rows.push(['Damage', `${item.dmg1} ${item.dmgType}${item.dmg2 ? ` / ${item.dmg2}` : ''}`]);
  if (item.range)    rows.push(['Range', `${item.range} ft.`]);
  if (item.ac !== null && item.ac !== undefined) rows.push(['AC', item.ac]);
  if (item.strength) rows.push(['Str required', item.strength]);
  if (item.stealth)  rows.push(['Stealth', 'Disadvantage']);
  if (item.weight)   rows.push(['Weight', `${item.weight} lb`]);
  if (item.reqAttune) rows.push(['Attunement', item.reqAttune]);
  if (item.sourceFull || item.source) rows.push(['Source', item.sourceFull || item.source]);
  const statsHtml = `<div class="cs-idet-stats">${rows.map(([k,v]) =>
    `<div class="cs-idet-row"><span class="cs-idet-label">${escapeHtml(k)}</span><span>${escapeHtml(String(v))}</span></div>`
  ).join('')}</div>`;
  const props = Array.isArray(item.properties) ? item.properties : [];
  const propsHtml = props.length
    ? `<div style="margin:0.3rem 0">${props.map(p =>
        `<div style="margin-bottom:0.25rem">
          <span style="font-family:var(--font-title);font-size:0.72rem;color:var(--gold-light)">${escapeHtml(p.name || p)}</span>
          ${p.desc ? `<div style="font-size:0.7rem;color:var(--muted)">${escapeHtml(p.desc)}</div>` : ''}
        </div>`).join('')}</div>`
    : '';
  const entries = Array.isArray(item.entries) ? item.entries : [];
  const desc = entries.length
    ? `<div class="cs-idet-desc">${entries.map(e => `<p>${escapeHtml(e)}</p>`).join('')}</div>`
    : '';
  return `${catLine}${statsHtml}${propsHtml}${desc}`;
}

function csToggleItemDetail(i) {
  const detail = document.getElementById(`cs-idetail-${i}`);
  if (!detail) return;
  const isHidden = detail.classList.contains('hidden');
  // Close any other open detail
  document.querySelectorAll('.cs-item-detail').forEach(el => el.classList.add('hidden'));
  if (isHidden) detail.classList.remove('hidden');
}

function csAddItemFromSearch(item) {
  const inv      = (_currentInv || []).map(i => ({ ...i }));
  const existing = inv.findIndex(i => i.name === item.name);
  if (existing >= 0) {
    inv[existing] = { ...inv[existing], qty: (inv[existing].qty||1) + 1 };
  } else {
    // Auto-populate container contents from 5etools entries if it looks like a pack/kit
    let contents = null;
    if (Array.isArray(item.contents) && item.contents.length > 0) {
      contents = item.contents;
    } else if (Array.isArray(item.entries) && item.entries.length > 0) {
      // Try to extract contents from description entries (packs list their contents)
      const contentLine = item.entries.find(e => typeof e === 'string' && e.toLowerCase().includes('contains'));
      if (contentLine) contents = [contentLine];
    }
    inv.push({
      name:       item.name,
      detail:     item.detail     || null,
      qty:        1,
      weight:     item.weight     || null,
      dmg1:       item.dmg1       || null,
      dmg2:       item.dmg2       || null,
      dmgType:    item.dmgType    || null,
      ac:         item.ac         || null,
      range:      item.range      || null,
      price:      item.price      || null,
      reqAttune:  item.reqAttune  || null,
      properties: item.properties || [],
      entries:    item.entries    || [],
      rarity:     item.rarity     || null,
      weaponCat:  item.weaponCat  || null,
      typeLabel:  item.typeLabel  || null,
      sourceFull: item.sourceFull || null,
      source:     item.source     || null,
      strength:   item.strength   || null,
      stealth:    item.stealth    || null,
      contents,
    });
  }
  _currentInv = inv;
  CharacterStore.save({ inventory: inv }, charKey);
  csRebuildEquipmentTab();
  const newIdx = inv.findIndex(i => i.name === item.name);
  if (newIdx >= 0) setTimeout(() => csShowItemDetail(newIdx), 50);
}

// Add item from 5etools result
function csAddItem(itemJson) {
  const item = JSON.parse(itemJson);
  const inv  = (_currentInv || []).map(i => ({ ...i }));
  const existing = inv.findIndex(i => i.name === item.name);
  if (existing >= 0) {
    inv[existing] = { ...inv[existing], qty: (inv[existing].qty||1) + 1 };
  } else {
    const dmg    = item.dmg1 && item.dmgType ? item.dmg1 + ' ' + item.dmgType : '';
    const detail = [item.weaponCategory, dmg, item.ac ? 'AC ' + item.ac : ''].filter(Boolean).join(' · ');
    inv.push({ name: item.name, detail: detail || null, qty: 1, weight: item.weight || null });
  }
  _currentInv = inv;
  CharacterStore.save({ inventory: inv }, charKey);
  csCloseItemSearch();
  csRebuildEquipmentTab();
}

// Update item quantity — 0 removes the item
function csUpdateQty(idx, val) {
  if (!_currentInv || _currentInv[idx] === undefined) return;
  const inv = _currentInv.map(i => ({ ...i }));
  const qty = parseInt(val);
  if (isNaN(qty) || qty <= 0) { inv.splice(idx, 1); _selectedItemIdx = null; }
  else { inv[idx] = { ...inv[idx], qty }; }
  _currentInv = inv;
  CharacterStore.save({ inventory: inv }, charKey);
  csRebuildEquipmentTab();
}

// Edit item — opens accordion with edit form
function csEditItem(idx) {
  const item = _currentInv[idx];
  if (!item) return;

  // Close any other open accordions
  document.querySelectorAll('.equip-item-accordion.open').forEach(a => {
    if (a.id !== `equip-acc-${idx}`) { a.classList.remove('open'); a.innerHTML = ''; }
  });
  document.querySelectorAll('.equip-item-row.editing').forEach(r => {
    if (r.id !== `equip-row-${idx}`) r.classList.remove('editing');
  });

  const row = document.getElementById(`equip-row-${idx}`);
  if (row) row.classList.add('editing');

  const acc = document.getElementById(`equip-acc-${idx}`);
  if (acc) {
    acc.innerHTML = csAccordionContent(item, idx, true);
    acc.classList.add('open');
  }
  setTimeout(() => document.getElementById(`acc-edit-name-${idx}`)?.focus(), 50);
}

// ── Drag and Drop reordering ──

function csDragStart(event, idx) {
  _dragIdx = idx;
  event.dataTransfer.effectAllowed = 'move';
  // Small delay so the drag image renders before we fade
  setTimeout(() => {
    const el = document.getElementById(`equip-wrap-${idx}`);
    if (el) el.classList.add('dragging');
  }, 0);
}

function csDragOver(event, idx) {
  event.preventDefault();
  event.dataTransfer.dropEffect = 'move';
  if (_dragIdx === null || _dragIdx === idx) return;
  document.querySelectorAll('.equip-item-wrap').forEach(el => {
    el.classList.remove('drag-over', 'drag-over-below');
  });
  const el = document.getElementById(`equip-wrap-${idx}`);
  if (el) el.classList.add(_dragIdx < idx ? 'drag-over-below' : 'drag-over');
}

function csDragLeave(event) {
  const el = event.currentTarget;
  if (el) { el.classList.remove('drag-over', 'drag-over-below'); }
}

function csDrop(event, toIdx) {
  event.preventDefault();
  document.querySelectorAll('.equip-item-wrap').forEach(el => {
    el.classList.remove('drag-over', 'drag-over-below', 'dragging');
  });
  if (_dragIdx === null || _dragIdx === toIdx) { _dragIdx = null; return; }
  csReorderItem(_dragIdx, toIdx);
  _dragIdx = null;
}

function csDragEnd(event) {
  _dragIdx = null;
  document.querySelectorAll('.equip-item-wrap').forEach(el => {
    el.classList.remove('drag-over', 'drag-over-below', 'dragging');
  });
}

// Touch drag — long press (600ms) activates drag mode
function csTouchDragStart(event, idx) {
  event.stopPropagation();
  clearTimeout(_touchTimer);
  _touchTimer = setTimeout(() => {
    _touchDragging = true;
    _dragIdx = idx;
    const el = document.getElementById(`equip-wrap-${idx}`);
    if (el) el.classList.add('dragging');
    // Bind touchmove and touchend to document
    document.addEventListener('touchmove', csTouchMove, { passive: false });
    document.addEventListener('touchend', csTouchEnd);
  }, 600);
}

function csTouchMove(event) {
  if (!_touchDragging) return;
  event.preventDefault();
  const touch = event.touches[0];
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  const wrap = el?.closest('.equip-item-wrap');
  if (!wrap) return;
  const toIdx = parseInt(wrap.id.replace('equip-wrap-', ''));
  if (isNaN(toIdx) || toIdx === _dragIdx) return;
  document.querySelectorAll('.equip-item-wrap').forEach(e => {
    e.classList.remove('drag-over', 'drag-over-below');
  });
  wrap.classList.add(_dragIdx < toIdx ? 'drag-over-below' : 'drag-over');
}

function csTouchEnd(event) {
  clearTimeout(_touchTimer);
  document.removeEventListener('touchmove', csTouchMove);
  document.removeEventListener('touchend', csTouchEnd);
  if (!_touchDragging) return;
  _touchDragging = false;
  const touch = event.changedTouches[0];
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  const wrap = el?.closest('.equip-item-wrap');
  document.querySelectorAll('.equip-item-wrap').forEach(e => {
    e.classList.remove('drag-over', 'drag-over-below', 'dragging');
  });
  if (wrap) {
    const toIdx = parseInt(wrap.id.replace('equip-wrap-', ''));
    if (!isNaN(toIdx) && toIdx !== _dragIdx) csReorderItem(_dragIdx, toIdx);
  }
  _dragIdx = null;
}

// The actual reorder logic — moves item from fromIdx to toIdx
function csReorderItem(fromIdx, toIdx) {
  const inv = _currentInv.map(i => ({ ...i }));
  const [moved] = inv.splice(fromIdx, 1);
  inv.splice(toIdx, 0, moved);
  _currentInv = inv;
  CharacterStore.save({ inventory: inv }, charKey);
  // Update selected index if it moved
  if (_selectedItemIdx === fromIdx) _selectedItemIdx = toIdx;
  else if (_selectedItemIdx !== null) {
    if (fromIdx < _selectedItemIdx && toIdx >= _selectedItemIdx) _selectedItemIdx--;
    else if (fromIdx > _selectedItemIdx && toIdx <= _selectedItemIdx) _selectedItemIdx++;
  }
  csRebuildEquipmentTab();
  // Restore selection if any
  if (_selectedItemIdx !== null) {
    setTimeout(() => csShowItemDetail(_selectedItemIdx), 50);
  }
}


// ── Background enrichment ──
// Fetches 5etools data for all inventory items that don't have it yet
async function csEnrichInventory() {
  if (!_currentInv || !_currentInv.length) return;
  const toEnrich = _currentInv.filter(item => !item._enriched && item.name);
  if (!toEnrich.length) return;

  for (const item of toEnrich) {
    const query = item.alias || item.name;
    try {
      const res  = await fetch(`/.netlify/functions/items2?q=${encodeURIComponent(query)}&limit=10`);
      const json = await res.json();
      if (!json.items || !json.items.length) continue;
      // Find exact name match first, then alias match, then first result
      const match = json.items.find(i => i.name.toLowerCase() === item.name.toLowerCase())
        || json.items.find(i => i.name.toLowerCase() === query.toLowerCase())
        || json.items[0];
      if (!match) continue;
      // Merge 5etools data into item, preserving any custom overrides
      const idx = _currentInv.indexOf(item);
      if (idx < 0) continue;
      _currentInv[idx] = {
        ...match,          // base 5etools data
        ..._currentInv[idx], // custom overrides take precedence
        _enriched: true,
        alias: item.alias || (_currentInv[idx].name !== match.name ? match.name : null),
      };
    } catch(e) {
      console.warn('[enrich] failed for', item.name, e.message);
    }
  }
  // If current detail panel is showing, refresh it with enriched data
  if (_selectedItemIdx !== null && _rightTab === 'detail') {
    csShowItemDetail(_selectedItemIdx);
  }
}

// Enrich a single item on demand (called when clicking an unenriched item)
async function csEnrichItem(idx) {
  const item = _currentInv[idx];
  if (!item || item._enriched) return;
  const query = item.alias || item.name;
  try {
    const res  = await fetch(`/.netlify/functions/items2?q=${encodeURIComponent(query)}&limit=10`);
    const json = await res.json();
    if (!json.items || !json.items.length) return;
    const match = json.items.find(i => i.name.toLowerCase() === item.name.toLowerCase())
      || json.items.find(i => i.name.toLowerCase() === query.toLowerCase())
      || json.items[0];
    if (!match) return;
    _currentInv[idx] = {
      ...match,
      ..._currentInv[idx],
      _enriched: true,
      alias: item.alias || (item.name !== match.name ? match.name : null),
    };
    // Refresh detail panel
    if (_selectedItemIdx === idx && _rightTab === 'detail') {
      const body = document.getElementById('equip-right-body');
      if (body) body.innerHTML = csRightPanelDetailHtml(_currentInv[idx]);
    }
  } catch(e) {
    console.warn('[enrich] failed for', item.name, e.message);
  }
}



// Close edit mode
function csCloseEdit(idx) {
  const row = document.getElementById(`equip-row-${idx}`);
  if (row) row.classList.remove('editing');
  const acc = document.getElementById(`equip-acc-${idx}`);
  if (acc) { acc.classList.remove('open'); acc.innerHTML = ''; }
}

// Show item detail in right panel when row is clicked
// Rich detail renderer for right panel
function csRightPanelDetailHtml(item) {
  if (!item) return '<div class="cs-item-empty">No item selected.</div>';
  const color  = csRarityColor(item.rarity || 'None');
  const rarity = item.rarity && item.rarity !== 'None'
    ? `<span class="equip-panel-rarity" style="color:${color};border-color:${color}">${escapeHtml(item.rarity)}</span>`
    : '';
  const catLine = (item.weaponCat || item.typeLabel)
    ? `<div class="equip-panel-item-type">${escapeHtml(item.weaponCat || item.typeLabel)}</div>`
    : '';
  const rows = [];
  if (item.price)   rows.push(['Price',   item.price]);
  if (item.dmgBonus) rows.push(['Bonus',  item.dmgBonus]);
  if (item.dmg1 && item.dmgType) {
    const dmgType = DMG_TYPES[item.dmgType] || item.dmgType;
    rows.push(['Damage', `${item.dmg1} ${dmgType}${item.dmg2 ? ` / ${item.dmg2}` : ''}`]);
  }
  if (item.extraDmg) rows.push(['Extra dmg', `${item.extraDmg.dice} ${DMG_TYPES[item.extraDmg.type]||item.extraDmg.type}`]);
  if (item.range)   rows.push(['Range',   `${item.range} ft.`]);
  if (item.ac !== undefined && item.ac !== null) rows.push(['AC', item.ac]);
  if (item.strength) rows.push(['Str req', item.strength]);
  if (item.stealth)  rows.push(['Stealth', 'Disadvantage']);
  if (item.weight)  rows.push(['Weight',  `${item.weight} lb`]);
  if (item.reqAttune) rows.push(['Attune', item.reqAttune]);
  if (item.attackStat) rows.push(['Attack', item.attackStat]);
  if (item.alias)   rows.push(['Base item', item.alias]);
  if (item.sourceFull || item.source) rows.push(['Source', item.sourceFull || item.source]);
  const statsHtml = rows.map(([k,v]) =>
    `<div class="equip-panel-stat"><span>${escapeHtml(k)}</span><span>${escapeHtml(String(v))}</span></div>`
  ).join('');
  const props = Array.isArray(item.properties) ? item.properties : [];
  const propsHtml = props.length ? `
    <div class="equip-panel-section">Properties</div>
    ${props.map(p => `
      <div style="margin-bottom:0.35rem">
        <span style="font-family:var(--font-title);font-size:0.75rem;color:var(--gold-light)">${escapeHtml(p.name||p)}</span>
        ${p.desc ? `<div style="font-size:0.72rem;color:var(--muted);margin-top:0.1rem">${escapeHtml(p.desc)}</div>` : ''}
      </div>`).join('')}` : '';
  const entries = Array.isArray(item.entries) ? item.entries : [];
  const desc = entries.length
    ? `<div class="equip-panel-desc">${entries.map(e=>`<p>${escapeHtml(e)}</p>`).join('')}</div>` : '';
  const flavor = item.flavor
    ? `<div class="equip-panel-section">Flavor</div><div style="font-size:0.78rem;color:var(--aged);font-style:italic">${escapeHtml(item.flavor)}</div>` : '';
  const notes = item.notes
    ? `<div class="equip-panel-section">Notes</div><div style="font-size:0.78rem;color:var(--parchment2);font-style:italic">${escapeHtml(item.notes)}</div>` : '';
  const contents = Array.isArray(item.contents) && item.contents.length
    ? `<div class="equip-panel-section">Contents</div>
       <div class="equip-container-list">${item.contents.map(c=>`
         <div class="equip-container-item">
           <span class="equip-container-item-name">${escapeHtml(typeof c==='string'?c:c.name)}</span>
           ${typeof c==='object'&&c.qty>1?`<span class="equip-container-item-qty">x${c.qty}</span>`:''}
         </div>`).join('')}</div>` : '';
  return `
    <div class="equip-panel-item-name">${escapeHtml(item.name)}</div>
    ${catLine}${rarity}
    ${statsHtml}${contents}${propsHtml}${desc}${flavor}${notes}`;
}

// Damage type display names
const DMG_TYPES = {
  S:'Slashing', P:'Piercing', B:'Bludgeoning',
  R:'Radiant', N:'Necrotic', T:'Thunder',
  F:'Fire', C:'Cold', L:'Lightning',
  A:'Acid', PS:'Poison', Psy:'Psychic', For:'Force',
};

// Show item detail — switches right panel to Detail tab
function csShowItemDetail(idx) {
  document.querySelectorAll('.equip-item-row').forEach(r => r.classList.remove('selected'));
  const row = document.getElementById(`equip-row-${idx}`);
  if (row) row.classList.add('selected');
  _selectedItemIdx = idx;
  _rightTab = 'detail';

  // Enable and activate Detail tab
  const detailBtn = document.getElementById('equip-tab-detail');
  const searchBtn = document.querySelector('.equip-right-tab:first-child');
  if (detailBtn) { detailBtn.disabled = false; detailBtn.classList.add('active'); }
  if (searchBtn) searchBtn.classList.remove('active');

  const body = document.getElementById('equip-right-body');
  const item = _currentInv[idx];
  if (body && item) body.innerHTML = csRightPanelDetailHtml(item);

  // If item needs enrichment, fetch it
  if (item && !item._enriched) csEnrichItem(idx);
}


// Add empty row to container contents in edit mode
function csAddContainerItem(idx) {
  const list = document.getElementById(`equip-cont-edit-list-${idx}`);
  if (!list) return;
  const ci = list.querySelectorAll('.equip-cont-edit-row').length;
  const row = document.createElement('div');
  row.className = 'equip-cont-edit-row';
  row.id = `equip-cont-edit-${idx}-${ci}`;
  row.innerHTML = `
    <input class="equip-acc-field" style="flex:1" placeholder="Item name" id="cont-name-${idx}-${ci}">
    <input class="equip-acc-field" style="width:40px;text-align:center" type="number" min="1" value="1" id="cont-qty-${idx}-${ci}">
    <button class="equip-acc-btn danger" style="padding:0.15rem 0.4rem" onclick="csRemoveContainerItem(${idx},${ci})">\u2715</button>`;
  list.appendChild(row);
  row.querySelector('input')?.focus();
}

// Remove a container item row in edit mode
function csRemoveContainerItem(idx, ci) {
  const row = document.getElementById(`equip-cont-edit-${idx}-${ci}`);
  if (row) row.remove();
}

// Save item edits including container contents
function csSaveItemEdit(idx) {
  const name       = document.getElementById(`acc-edit-name-${idx}`)?.value.trim();
  const alias      = document.getElementById(`acc-edit-alias-${idx}`)?.value.trim();
  const detail     = document.getElementById(`acc-edit-detail-${idx}`)?.value.trim();
  const attackStat = document.getElementById(`acc-edit-stat-${idx}`)?.value;
  const dmgType    = document.getElementById(`acc-edit-dmgtype-${idx}`)?.value;
  const dmgBonus   = document.getElementById(`acc-edit-dmgbonus-${idx}`)?.value.trim();
  const xDice      = document.getElementById(`acc-edit-xdice-${idx}`)?.value.trim();
  const xType      = document.getElementById(`acc-edit-xtype-${idx}`)?.value;
  const flavor     = document.getElementById(`acc-edit-flavor-${idx}`)?.value.trim();
  const notes      = document.getElementById(`acc-edit-notes-${idx}`)?.value.trim();
  if (!name) return;

  const contList = document.getElementById(`equip-cont-edit-list-${idx}`);
  const contents = [];
  if (contList) {
    contList.querySelectorAll('.equip-cont-edit-row').forEach((row, ci) => {
      const nameEl = row.querySelector(`#cont-name-${idx}-${ci}`);
      const qtyEl  = row.querySelector(`#cont-qty-${idx}-${ci}`);
      if (nameEl && nameEl.value.trim()) {
        const qty = parseInt(qtyEl?.value) || 1;
        contents.push(qty > 1 ? { name: nameEl.value.trim(), qty } : nameEl.value.trim());
      }
    });
  }

  const inv = _currentInv.map(i => ({ ...i }));
  inv[idx] = {
    ...inv[idx],
    name,
    alias:      alias      || null,
    detail:     detail     || null,
    attackStat: attackStat || null,
    dmgType:    dmgType    || inv[idx].dmgType || null,
    dmgBonus:   dmgBonus   || null,
    extraDmg:   (xDice && xType) ? { dice: xDice, type: xType } : null,
    flavor:     flavor     || null,
    notes:      notes      || null,
    contents:   contents.length ? contents : (inv[idx].contents || null),
    _enriched:  false, // re-enrich with new alias if changed
  };
  _currentInv = inv;
  CharacterStore.save({ inventory: inv }, charKey);
  csCloseEdit(idx);
  // Re-enrich if alias changed, then show detail
  csEnrichItem(idx).then(() => {
    setTimeout(() => csShowItemDetail(idx), 50);
  });
  const nameEl = document.querySelector(`#equip-row-${idx} .equip-item-name`);
  if (nameEl) nameEl.textContent = inv[idx].name;
}


// Update item quantity — 0 removes the item
function csUpdateQty(idx, val) {
  if (!_currentInv || !_currentInv[idx]) return;
  const inv = _currentInv.map(i => ({ ...i }));
  const qty = parseInt(val);
  if (qty <= 0) { inv.splice(idx, 1); } else { inv[idx] = { ...inv[idx], qty }; }
  _currentInv = inv;
  CharacterStore.save({ inventory: inv }, charKey);
}

// Delete item
function csDeleteItem(idx) {
  if (!_currentInv) return;
  const inv = _currentInv.map(i => ({ ...i }));
  inv.splice(idx, 1);
  _currentInv = inv;
  _selectedItemIdx = null;
  CharacterStore.save({ inventory: inv }, charKey);
  csRebuildEquipmentTab();
  // Reset right panel to search/default
  const panel = document.getElementById('equip-right-panel');
  if (panel) panel.innerHTML = csRightPanelDefault();
}

// Update currency
function csUpdateCurrency() {
  const currency = {};
  ['pp','gp','ep','sp','cp'].forEach(c => {
    const el = document.getElementById('cs-cur-' + c);
    currency[c] = el ? parseInt(el.value)||0 : (_currentCur?.[c] || 0);
  });
  _currentCur = currency;
  CharacterStore.save({ currency }, charKey);
}

// csCloseItemSearch — resets search results, called after adding an item
function csCloseItemSearch() {
  const input   = document.getElementById('equip-search-input');
  const results = document.getElementById('cs-item-results');
  if (input)   input.value = '';
  if (results) results.innerHTML = '<div class="cs-item-empty">Type to search all 5etools items…</div>';
}

function csRebuildEquipmentTab() {
  const panel = document.getElementById('tab-equipment');
  if (!panel) return;
  const wasActive = panel.classList.contains('active');
  panel.insertAdjacentHTML('afterend', buildEquipmentTab());
  panel.remove();
  const newPanel = document.getElementById('tab-equipment');
  if (wasActive && newPanel) newPanel.classList.add('active');
}

function csRebuildBioTab() {
  const panel = document.getElementById('tab-bio');
  if (!panel) return;
  const wasActive = panel.classList.contains('active');
  panel.insertAdjacentHTML('afterend', buildBioTab());
  panel.remove();
  const newPanel = document.getElementById('tab-bio');
  if (wasActive && newPanel) newPanel.classList.add('active');
}

// Toggle item search drawer
// Notes — debounced save
function csNotesChanged() {
  clearTimeout(_notesTimer);
  _notesTimer = setTimeout(() => {
    const val = document.getElementById('cs-notes')?.value || '';
    CharacterStore.save({ notes: val }, charKey);
  }, 800);
}

// Bio fields — debounced save per field
function csBioChanged(field, value) {
  clearTimeout(_bioTimers[field]);
  _bioTimers[field] = setTimeout(() => {
    CharacterStore.save({ bio: { [field]: value } }, charKey);
  }, 800);
}

// ══════════════════════════════════════════════════════════
const COMP_BASE = 'https://raw.githubusercontent.com/5etools-mirror-3/5etools-2014-src/main/data';

const COMP_SOURCES = {
  spells:     { label: "Player's Handbook", file: 'spells/spells-phb.json' },
  monsters:   { label: 'Monster Manual',    file: 'bestiary/bestiary-mm.json' },
  conditions: { label: 'All Conditions',    file: 'conditionsdiseases.json' },
  items:      { label: 'All Items',         netlify: true },
};

const COMP_SPELL_FILTERS = [
  { label:'All', val:null }, { label:'Cantrip', val:0 },
  { label:'1', val:1 }, { label:'2', val:2 }, { label:'3', val:3 },
  { label:'4', val:4 }, { label:'5', val:5 }, { label:'6+', val:6 },
];
const COMP_CR_FILTERS = [
  { label:'All', val:null }, { label:'0–½', val:'low' },
  { label:'1–4', val:'mid' }, { label:'5–10', val:'high' }, { label:'11+', val:'deadly' },
];


// ── Toggle panel ──
function toggleCompendium() {
  compOpen = !compOpen;
  document.getElementById('comp-panel').classList.toggle('open', compOpen);
  document.getElementById('comp-backdrop').classList.toggle('open', compOpen);
  document.getElementById('comp-tab-btn').classList.toggle('open', compOpen);
  // Move roller to bottom-left when compendium is open to avoid overlap
  const roller = document.getElementById('roller-panel');
  if (compOpen) {
    roller.style.right = 'auto';
    roller.style.left  = '1rem';
  } else {
    roller.style.left  = 'auto';
    roller.style.right = '1rem';
  }
  if (compOpen && !compAllEntries.length) compLoadSource();
}

// ── Category ──
function setCompCat(cat, btn) {
  compCat    = cat;
  compFilter = null;
  compAllEntries = [];
  compFiltered   = [];
  document.getElementById('comp-panel-search').value = '';
  document.querySelectorAll('.comp-panel-cat').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildCompFilters();
  compLoadSource();
}

function buildCompFilters() {
  const wrap = document.getElementById('comp-panel-filters');
  if (compCat === 'spells') {
    wrap.innerHTML = COMP_SPELL_FILTERS.map(f =>
      `<button class="comp-panel-filter-btn${f.val===null?' active':''}" onclick="setCompFilter(this,'${f.val}')">${f.label}</button>`
    ).join('');
  } else if (compCat === 'monsters') {
    wrap.innerHTML = COMP_CR_FILTERS.map(f =>
      `<button class="comp-panel-filter-btn${f.val===null?' active':''}" onclick="setCompFilter(this,'${f.val}')">${f.label}</button>`
    ).join('');
  } else {
    wrap.innerHTML = '';
  }
}

function setCompFilter(btn, val) {
  compFilter = val === 'null' ? null : val;
  document.querySelectorAll('.comp-panel-filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  compFilterList();
}

// ── Load data ──
async function compLoadSource() {
  const src = COMP_SOURCES[compCat];

  // Items use the Netlify proxy — search-driven, not bulk load
  if (src.netlify) {
    compAllEntries = [];
    compFiltered   = [];
    setCompListState('Type in the search box to find items…');
    return;
  }

  const url = `${COMP_BASE}/${src.file}`;
  setCompListState('<div class="comp-panel-spinner"></div> Loading…');

  try {
    if (!compCache[url]) {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      compCache[url] = await res.json();
    }
    compAllEntries = compParseData(compCache[url], compCat);
    compFilterList();
  } catch(e) {
    setCompListState(`Failed to load. ${e.message}`);
  }
}

function setCompListState(html) {
  document.getElementById('comp-panel-list').innerHTML =
    `<div class="comp-panel-state">${html}</div>`;
}

// ── Parse ──
function compParseData(data, cat) {
  if (cat === 'spells')
    return (data.spell || []).map(s => ({ raw:s, name:s.name, tag: s.level===0?'Cantrip':`Lv ${s.level}`, level:s.level }));
  if (cat === 'monsters')
    return (data.monster || []).map(m => ({ raw:m, name:m.name, tag:`CR ${compFormatCR(m.cr)}`, cr:compParseCR(m.cr) }));
  if (cat === 'conditions')
    return [...(data.condition||[]),...(data.disease||[])].map(c => ({ raw:c, name:c.name, tag:c.disease?'Disease':'Condition' }));
  if (cat === 'items')
    return (data.item||[]).map(i => ({ raw:i, name:i.name, tag:i.rarity||i.type||'Item' }));
  return [];
}

// ── Filter & render list ──
function compFilterList() {
  // Items use live search via Netlify function
  if (compCat === 'items') {
    const q = (document.getElementById('comp-panel-search').value||'').trim();
    clearTimeout(_compItemTimer);
    if (q.length < 2) {
      setCompListState('Type at least 2 characters to search items…');
      return;
    }
    setCompListState('<div class="comp-panel-spinner"></div> Searching…');
    _compItemTimer = setTimeout(() => compSearchItems(q), 350);
    return;
  }

  const q = (document.getElementById('comp-panel-search').value||'').toLowerCase().trim();
  compFiltered = compAllEntries.filter(e => {
    if (!e.name.toLowerCase().includes(q)) return false;
    if (compCat === 'spells' && compFilter !== null) {
      const lvl = parseInt(compFilter);
      return compFilter === '6' ? e.level >= 6 : e.level === lvl;
    }
    if (compCat === 'monsters' && compFilter !== null) {
      const cr = e.cr;
      if (compFilter === 'low')    return cr <= 0.5;
      if (compFilter === 'mid')    return cr >= 1 && cr <= 4;
      if (compFilter === 'high')   return cr >= 5 && cr <= 10;
      if (compFilter === 'deadly') return cr >= 11;
    }
    return true;
  });

  const list = document.getElementById('comp-panel-list');
  if (!compFiltered.length) {
    list.innerHTML = '<div class="comp-panel-state">No results.</div>';
    return;
  }
  list.innerHTML = compFiltered.slice(0, 200).map((e, i) =>
    `<div class="comp-panel-item" onclick="compSelectEntry(${i})" id="cp-item-${i}">
      <span class="comp-panel-item-name">${e.name}</span>
      <span class="comp-panel-item-tag">${e.tag}</span>
    </div>`
  ).join('');
}


async function compSearchItems(q) {
  try {
    const res  = await fetch(`/.netlify/functions/items2?q=${encodeURIComponent(q)}&limit=50`);
    const json = await res.json();
    if (!res.ok) throw new Error(json.error || 'Search failed');
    if (!json.items.length) { setCompListState('No items found.'); return; }

    _compItemResults = json.items;
    compFiltered = json.items.map(i => ({ raw: i, name: i.name, tag: i.rarity !== 'None' ? i.rarity : (i.typeText || 'Item') }));

    const list = document.getElementById('comp-panel-list');
    list.innerHTML = compFiltered.map((e, i) => {
      const color = csRarityColor(e.raw.rarity);
      return `<div class="comp-panel-item" onclick="compSelectEntry(${i})" id="cp-item-${i}">
        <span class="comp-panel-item-name">${escapeHtml(e.name)}</span>
        <span class="comp-panel-item-tag" style="color:${color};border-color:${color}40">${escapeHtml(e.tag)}</span>
      </div>`;
    }).join('');
  } catch(e) {
    setCompListState(`Search failed: ${e.message}`);
  }
}

// ── Select entry ──
function compSelectEntry(i) {
  document.querySelectorAll('.comp-panel-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(`cp-item-${i}`);
  if (el) { el.classList.add('active'); el.scrollIntoView({ block:'nearest' }); }
  const entry = compFiltered[i];
  if (!entry) return;
  const detail = document.getElementById('comp-panel-detail');
  if (compCat === 'spells')     detail.innerHTML = compRenderSpell(entry.raw);
  if (compCat === 'monsters')   detail.innerHTML = compRenderMonster(entry.raw);
  if (compCat === 'conditions') detail.innerHTML = compRenderCondition(entry.raw);
  if (compCat === 'items')      detail.innerHTML = compRenderItem(entry.raw, i);
}

// ── Renderers ──
function compCleanText(str) {
  return (str||'')
    .replace(/\{@b ([^}]+)\}/g,'<strong>$1</strong>')
    .replace(/\{@i ([^}]+)\}/g,'<em>$1</em>')
    .replace(/\{@spell ([^}]+)\}/g,'<span style="color:var(--gold-light)">$1</span>')
    .replace(/\{@creature ([^}]+)\}/g,'<span style="color:var(--gold-light)">$1</span>')
    .replace(/\{@condition ([^}]+)\}/g,'<em>$1</em>')
    .replace(/\{@damage ([^}]+)\}/g,'$1').replace(/\{@dice ([^}]+)\}/g,'$1')
    .replace(/\{@hit ([^}]+)\}/g,'+$1').replace(/\{@dc ([^}]+)\}/g,'DC $1')
    .replace(/\{@[a-z]+ ([^|}]+)[^}]*\}/g,'$1').replace(/\{@[^}]+\}/g,'');
}

function compRenderEntries(entries) {
  if (!entries) return '';
  return entries.map(e => {
    if (typeof e === 'string') return `<p>${compCleanText(e)}</p>`;
    if (e.type === 'entries') return `<p><strong>${e.name||''}</strong></p>${compRenderEntries(e.entries)}`;
    if (e.type === 'list')    return `<ul>${(e.items||[]).map(i=>`<li>${typeof i==='string'?compCleanText(i):compRenderEntries(i.entries||[])}</li>`).join('')}</ul>`;
    if (typeof e === 'object' && e.entries) return compRenderEntries(e.entries);
    return '';
  }).join('');
}

function compRenderSpell(s) {
  const level  = s.level===0 ? 'Cantrip' : `${s.level}${['th','st','nd','rd'][s.level]||'th'}-level`;
  const schools = {A:'Abjuration',C:'Conjuration',D:'Divination',E:'Enchantment',V:'Evocation',I:'Illusion',N:'Necromancy',T:'Transmutation'};
  const ritual = s.meta?.ritual ? ' · Ritual' : '';
  const conc   = s.duration?.some(d=>d.concentration) ? ' · Concentration' : '';
  const time   = s.time?.map(t=>`${t.number} ${t.unit}`).join(' or ') || '—';
  const range  = compFormatRange(s.range);
  const comp   = compFormatComp(s.components);
  const dur    = s.duration?.map(d=>compFormatDur(d)).join(' or ') || '—';
  const classes= (s.classes?.fromClassList||[]).map(c=>c.name).join(', ') || '—';
  const body   = compRenderEntries(s.entries||[]);
  const higher = s.entriesHigherLevel ? `<div class="cpd-section-title">At Higher Levels</div><div class="cpd-body">${compRenderEntries(s.entriesHigherLevel)}</div>` : '';
  return `<div class="cpd-name">${s.name}</div>
    <div class="cpd-meta">${level} ${schools[s.school]||''}${ritual}${conc}</div>
    <div class="cpd-stats">
      <div class="cpd-stat"><span class="cpd-stat-label">Casting Time</span><span class="cpd-stat-val">${time}</span></div>
      <div class="cpd-stat"><span class="cpd-stat-label">Range</span><span class="cpd-stat-val">${range}</span></div>
      <div class="cpd-stat"><span class="cpd-stat-label">Components</span><span class="cpd-stat-val">${comp}</span></div>
      <div class="cpd-stat"><span class="cpd-stat-label">Duration</span><span class="cpd-stat-val">${dur}</span></div>
      <div class="cpd-stat"><span class="cpd-stat-label">Classes</span><span class="cpd-stat-val">${classes}</span></div>
    </div>
    <hr class="cpd-rule">
    <div class="cpd-body">${body}</div>${higher}`;
}

function compRenderMonster(m) {
  const cr   = `CR ${compFormatCR(m.cr)}`;
  const type = [m.size, m.type?.type||m.type].filter(Boolean).join(' ');
  const ac   = Array.isArray(m.ac) ? m.ac.map(a=>typeof a==='object'?a.ac:a).join(', ') : m.ac||'—';
  const hp   = m.hp ? `${m.hp.average} (${m.hp.formula})` : '—';
  const spd  = compFormatSpeed(m.speed);
  const saves= m.save ? Object.entries(m.save).map(([k,v])=>`${k.toUpperCase()} ${v}`).join(', ') : '—';
  const strip= ['str','dex','con','int','wis','cha'].map(a=>{
    const sc=m[a]||10, mod=Math.floor((sc-10)/2);
    return `<div class="cpd-ability-cell"><span class="cpd-ability-label">${a.toUpperCase()}</span><span class="cpd-ability-score">${sc}</span><span class="cpd-ability-mod">${mod>=0?'+':''}${mod}</span></div>`;
  }).join('');
  const traits  = compRenderTraits(m.trait||[],'Traits');
  const actions = compRenderTraits(m.action||[],'Actions');
  const react   = compRenderTraits(m.reaction||[],'Reactions');
  const leg     = compRenderTraits(m.legendary||[],'Legendary Actions');
  return `<div class="cpd-name">${m.name}</div>
    <div class="cpd-meta">${type} · ${cr}</div>
    <div class="cpd-stats">
      <div class="cpd-stat"><span class="cpd-stat-label">AC</span><span class="cpd-stat-val">${ac}</span></div>
      <div class="cpd-stat"><span class="cpd-stat-label">HP</span><span class="cpd-stat-val">${hp}</span></div>
      <div class="cpd-stat"><span class="cpd-stat-label">Speed</span><span class="cpd-stat-val">${spd}</span></div>
      ${saves!=='—'?`<div class="cpd-stat"><span class="cpd-stat-label">Saves</span><span class="cpd-stat-val">${saves}</span></div>`:''}
    </div>
    <hr class="cpd-rule">
    <div class="cpd-ability-strip">${strip}</div>
    ${traits}${actions}${react}${leg}`;
}

function compRenderCondition(c) {
  return `<div class="cpd-name">${c.name}</div>
    <div class="cpd-meta">${c.disease?'Disease':'Condition'}</div>
    <hr class="cpd-rule">
    <div class="cpd-body">${compRenderEntries(c.entries||[])}</div>`;
}

function compRenderItem(item, idx) {
  const color  = csRarityColor(item.rarity || 'None');
  const detail = csRenderItemDetail(item);
  return `<div class="cpd-name">${escapeHtml(item.name)}</div>
    <div class="cpd-meta" style="color:${color}">${escapeHtml(item.rarity||'')}</div>
    <hr class="cpd-rule">
    ${detail}
    <button class="cs-item-add-btn" style="margin-top:1rem;width:100%" onclick="csAddCompItem(${idx})">+ Add to Inventory</button>`;
}

function csAddCompItem(idx) {
  const item = _compItemResults[idx];
  if (!item) return;
  csAddItemFromSearch(item);
}

function compRenderTraits(traits, heading) {
  if (!traits.length) return '';
  return `<div class="cpd-section-title">${heading}</div>
    ${traits.map(t=>`<p><span class="cpd-trait-name">${t.name}.</span> <span class="cpd-body" style="display:inline">${compRenderEntries(t.entries||[]).replace(/<\/?p>/g,' ')}</span></p>`).join('')}`;
}

// ── Format helpers ──
function compFormatRange(r) {
  if (!r) return '—';
  if (r.type==='point') {
    if (!r.distance||r.distance.type==='self') return 'Self';
    if (r.distance.type==='touch') return 'Touch';
    return `${r.distance.amount} ${r.distance.type}`;
  }
  if (r.type==='radius') return `Self (${r.distance?.amount}-${r.distance?.type} radius)`;
  return r.type||'—';
}
function compFormatComp(c) {
  if (!c) return '—';
  const p=[];
  if(c.v)p.push('V'); if(c.s)p.push('S');
  if(c.m)p.push(`M (${typeof c.m==='string'?c.m:c.m.text||'material'})`);
  return p.join(', ')||'—';
}
function compFormatDur(d) {
  if (!d) return '—';
  if (d.type==='instant') return 'Instantaneous';
  if (d.type==='permanent') return 'Until dispelled';
  const conc = d.concentration ? 'Conc, up to ' : '';
  if (d.duration) return `${conc}${d.duration.amount} ${d.duration.type}`;
  return d.type||'—';
}
function compFormatSpeed(spd) {
  if (!spd) return '—';
  if (typeof spd==='number') return `${spd} ft.`;
  return Object.entries(spd).map(([k,v])=>{
    const n = typeof v==='object'?v.number:v;
    return k==='walk'?`${n} ft.`:`${k} ${n} ft.`;
  }).join(', ');
}
function compFormatCR(cr) {
  if (!cr) return '—';
  return typeof cr==='object' ? cr.cr||'—' : cr;
}
function compParseCR(cr) {
  const s=compFormatCR(cr);
  if(s==='1/8')return 0.125; if(s==='1/4')return 0.25; if(s==='1/2')return 0.5;
  return parseFloat(s)||0;
}

  ];
  const current = (new URLSearchParams(window.location.search)).get('character') || 'tyros';
  chars.filter(c => c.key !== current).forEach(c => {
    const a = document.createElement('a');
    a.href = `sheet.html?character=${c.key}`;
    a.className = 'sheet-char-link';
    a.innerHTML = `
      <img class="sheet-char-portrait" src="${c.portrait}" alt="${c.label}" onerror="this.style.opacity='0.3'">
      <span class="sheet-char-name">${c.label}</span>
    `;
    popover.appendChild(a);
  });
  // Close on outside tap
  document.addEventListener('click', e => {
    if (!e.target.closest('#sheet-char-popover') && !e.target.closest('#sheet-char-btn')) {
      popover.classList.remove('open');
    }
  });
})();

function toggleCharPopover(e) {
  e.stopPropagation();
  document.getElementById('sheet-char-popover')?.classList.toggle('open');
}

// ── Mobile rail: track nav visibility so rail fills from top when nav hides ──
(function() {
  if (window.innerWidth > 600) return;
  const observer = new MutationObserver(() => {
    const navHidden = document.getElementById('site-nav')?.classList.contains('nav-hidden');
    document.body.classList.toggle('nav-hidden-state', !!navHidden);
  });
  // Wait for nav.js to inject the nav, then observe
  const check = setInterval(() => {
    const nav = document.getElementById('site-nav');
    if (nav) {
      clearInterval(check);
      observer.observe(nav, { attributes: true, attributeFilter: ['class'] });
    }
  }, 50);
})();
</script>
