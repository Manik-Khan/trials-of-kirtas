<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trials of Kirtas — Character Sheet</title>
<!--
  The legacy character sheet (sheet.html) has been retired in favor of the v11
  at-a-glance sheet (sheet-v2.html). This stub forwards any old link or bookmark
  — e.g. sheet.html?character=cosmere — straight to the new sheet, carrying the
  full query string (and hash) through verbatim. sheet-v2 reads ?character and
  defaults to cosmere when none is given.
-->
<style>
  html, body { margin: 0; height: 100%; background: #182826; color: #ece2cd;
               font: 15px/1.5 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  .wrap { height: 100%; display: flex; align-items: center; justify-content: center; }
  a { color: #e7c279; }
</style>
<script>
  // Use replace() so this stub never lands in browser history — Back skips it.
  location.replace('sheet-v2.html' + location.search + location.hash);
</script>
<noscript>
  <meta http-equiv="refresh" content="0; url=sheet-v2.html">
</noscript>
</head>
<body>
  <div class="wrap">
    <p>Redirecting to your character sheet&hellip; <a href="sheet-v2.html">Continue</a></p>
  </div>
</body>
</html>
