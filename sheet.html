<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Character Sheet — The Trials of Kirtas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="theme.css">
  <script src="characters.js"></script>
  <script src="character-store.js"></script>
  <style>
    /* ── Sheet-specific styles (layout, not colors — colors come from theme.css) ── */

    nav, .sheet-tabs, .sheet-body, footer {
      transition: background 0.3s, border-color 0.3s, color 0.3s;
    }

    /* ── Sheet tabs (desktop) ── */
    .sheet-tabs {
      display: flex;
      background: var(--ink);
      border-bottom: 1px solid var(--gold-dim);
      padding: 0 1.25rem;
      overflow-x: auto;
      scrollbar-width: none;
      position: sticky;
      top: 52px;
      z-index: 90;
    }
    .sheet-tabs::-webkit-scrollbar { display: none; }

    /* ── Mobile: left rail replaces tab bar ── */
    @media (max-width: 600px) {
      .sheet-tabs { display: none; }

      /* Page layout: rail on left, content fills right */
      body { display: flex; flex-direction: column; }
      .sheet-page-wrap {
        display: flex;
        flex: 1;
      }

      /* Rail — fixed to viewport, never overflows */
      .sheet-rail {
        position: fixed;
        left: 0;
        top: 52px;
        bottom: 0;
        width: 48px;
        background: var(--ink-deep);
        border-right: 1px solid var(--gold-dim);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 0.5rem 0;
        gap: 0.15rem;
        z-index: 150;
        transition: top 0.35s ease-out;
      }
      /* When nav is hidden, rail stretches to fill from top */
      body.nav-hidden-state .sheet-rail { top: 0; }

      .sheet-rail-btn {
        width: 40px;
        height: 46px;
        background: transparent;
        border: 1px solid transparent;
        color: var(--muted);
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 3px;
        transition: color 0.15s, border-color 0.15s, background 0.15s;
        flex-shrink: 0;
      }
      .sheet-rail-btn:hover  { color: var(--aged); border-color: var(--gold-dim); }
      .sheet-rail-btn.active {
        color: var(--gold-light);
        border-color: var(--gold-mid);
        background: rgba(184,149,42,0.1);
      }
      .sheet-rail-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
      .sheet-rail-label {
        font-family: var(--font-title);
        font-size: 0.27rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        line-height: 1;
      }
      .sheet-rail-divider {
        width: 28px;
        height: 1px;
        background: var(--gold-dim);
        opacity: 0.5;
        flex-shrink: 0;
        margin: 0.2rem 0;
      }

      /* Character switcher button — at bottom of rail */
      .sheet-rail-char-btn {
        width: 40px;
        height: 46px;
        background: transparent;
        border: 1px solid transparent;
        color: var(--muted);
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 3px;
        transition: color 0.15s, border-color 0.15s;
        flex-shrink: 0;
        margin-top: auto;
      }
      .sheet-rail-char-btn:hover { color: var(--aged); border-color: var(--gold-dim); }
      .sheet-rail-char-btn svg { width: 16px; height: 16px; }
      .sheet-rail-char-btn-label {
        font-family: var(--font-title);
        font-size: 0.27rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        line-height: 1;
      }

      /* Character popover — expands to the right of the rail */
      .sheet-char-popover {
        position: fixed;
        left: 52px;
        bottom: 60px;
        background: var(--ink-deep);
        border: 1px solid var(--gold-dim);
        border-radius: 0 6px 6px 0;
        padding: 8px 6px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        opacity: 0;
        pointer-events: none;
        transform: translateX(-8px);
        transition: opacity 0.2s ease, transform 0.2s ease;
        z-index: 160;
      }
      .sheet-char-popover.open {
        opacity: 1;
        pointer-events: all;
        transform: translateX(0);
      }
      .sheet-char-link {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        text-decoration: none;
      }
      .sheet-char-portrait {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        object-fit: cover;
        object-position: top center;
        border: 2px solid var(--gold-dim);
        display: block;
        transition: border-color 0.15s;
      }
      .sheet-char-link:hover .sheet-char-portrait { border-color: var(--gold); }
      .sheet-char-name {
        font-family: var(--font-title);
        font-size: 0.27rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
        line-height: 1;
      }

      /* Sheet body: offset by rail width */
      .sheet-body {
        margin-left: 48px;
        padding: 0.75rem 0.75rem calc(2rem + env(safe-area-inset-bottom));
        flex: 1;
        min-width: 0;
      }
    }

    @media (min-width: 601px) {
      .sheet-rail, .sheet-char-popover { display: none; }
      .sheet-page-wrap { display: contents; }
    }

    .tab-btn {
      font-family: var(--font-title);
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 0.7rem 1rem;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      white-space: nowrap;
    }
    .tab-btn:hover { color: var(--aged); }
    .tab-btn.active { color: var(--gold-light); border-bottom-color: var(--gold); }

    /* ── Sheet body ── */
    .sheet-body {
      max-width: 1320px;
      margin: 0 auto;
      padding: 1.25rem 1.25rem 8rem;
      /* Safe area inset for iPhone notch/home bar */
      padding-bottom: calc(8rem + env(safe-area-inset-bottom));
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Shared section ── */
    .s-section {
      background: var(--section-bg);
      border: 1px solid var(--section-border);
      padding: 0.8rem 1rem;
      margin-bottom: 0.8rem;
    }
    .s-section:last-child { margin-bottom: 0; }

    .s-title {
      font-family: var(--font-title);
      font-size: 0.52rem;
      letter-spacing: 0.4em;
      color: var(--gold);
      text-transform: uppercase;
      border-bottom: 1px solid var(--gold-dim);
      padding-bottom: 0.3rem;
      margin-bottom: 0.7rem;
    }

    /* ── CORE TAB — 3 columns ── */
    .core-layout {
      display: grid;
      grid-template-columns: 195px 1fr 1fr;
      gap: 1rem;
      align-items: start;
    }

    /* Left column */
    .left-col { display: flex; flex-direction: column; gap: 0.8rem; }

    .portrait-frame {
      width: 100%;
      aspect-ratio: 3/4;
      overflow: hidden;
      border: 1px solid var(--gold-dim);
      background: rgba(0,0,0,0.4);
    }
    .portrait-frame img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: top center;
    }

    .char-identity { text-align: center; }
    .char-name {
      font-family: var(--font-display);
      font-size: 0.9rem;
      color: var(--parchment);
      line-height: 1.3;
    }
    .char-class {
      font-family: var(--font-title);
      font-size: 0.52rem;
      letter-spacing: 0.15em;
      color: var(--gold);
      text-transform: uppercase;
      margin-top: 0.2rem;
    }
    .char-detail {
      font-size: 0.78rem;
      font-style: italic;
      color: var(--muted);
      margin-top: 0.1rem;
    }

    .pill-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.3rem;
    }
    .pill {
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--gold-dim);
      padding: 0.3rem 0.4rem;
      text-align: center;
    }
    .pill.full { grid-column: span 2; cursor: pointer; }
    .pill.full:hover { background: rgba(184,149,42,0.08); }
    .pill-label {
      font-family: var(--font-title);
      font-size: 0.44rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      display: block;
    }
    .pill-value {
      font-family: var(--font-title);
      font-size: 0.8rem;
      color: var(--parchment2);
    }

    /* Saves in left col */
    .save-row {
      display: flex; align-items: center; gap: 0.4rem;
      padding: 0.16rem 0.25rem;
      cursor: pointer; transition: background 0.15s;
    }
    .save-row:hover { background: rgba(184,149,42,0.06); }
    .save-name  { font-size: 0.78rem; color: var(--parchment2); flex: 1; }
    .save-bonus { font-family: var(--font-title); font-size: 0.72rem; color: var(--gold-light); min-width: 1.8rem; text-align: right; }

    /* Prof dot */
    .dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      border: 1px solid var(--muted);
      flex-shrink: 0;
    }
    .dot.full      { background: var(--prof-color); border-color: var(--prof-color); }
    .dot.half      { background: var(--half-color); border-color: var(--half-color); }
    .dot.expertise { background: var(--exp-color);  border-color: var(--exp-color); }

    /* Middle column */
    .mid-col { display: flex; flex-direction: column; gap: 0.8rem; }

    /* Ability score grid */
    .ability-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 0.4rem;
    }
    .ability-box {
      text-align: center;
      background: rgba(0,0,0,0.25);
      border: 1px solid var(--gold-dim);
      padding: 0.4rem 0.2rem;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .ability-box:hover { border-color: rgba(184,149,42,0.45); background: rgba(184,149,42,0.06); }
    .ability-label {
      font-family: var(--font-title);
      font-size: 0.44rem; letter-spacing: 0.18em;
      color: var(--muted); text-transform: uppercase;
      display: block; margin-bottom: 0.1rem;
    }
    .ability-score {
      font-family: var(--font-title);
      font-size: 1.5rem; color: var(--parchment);
      line-height: 1; display: block;
    }
    .ability-mod {
      font-family: var(--font-title);
      font-size: 0.7rem; color: var(--gold-light);
      display: block; margin-top: 0.1rem;
      border-top: 1px solid var(--gold-dim); padding-top: 0.1rem;
    }

    /* Combat stats */
    .combat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.4rem;
    }
    .c-stat {
      text-align: center;
      background: rgba(0,0,0,0.25);
      border: 1px solid var(--gold-dim);
      padding: 0.4rem 0.2rem;
    }
    .c-stat.clickable { cursor: pointer; transition: border-color 0.2s, background 0.2s; }
    .c-stat.clickable:hover { border-color: rgba(184,149,42,0.4); background: rgba(184,149,42,0.06); }
    .c-label {
      font-family: var(--font-title);
      font-size: 0.42rem; letter-spacing: 0.12em;
      color: var(--muted); text-transform: uppercase;
      display: block; margin-bottom: 0.12rem;
    }
    .c-value {
      font-family: var(--font-title);
      font-size: 1.1rem; color: var(--parchment);
    }

    /* HP tracker */
    .hp-bar-row { display: flex; align-items: center; gap: 0.45rem; margin-top: 0.2rem; }
    .hp-bar-track { flex: 1; height: 12px; background: rgba(0,0,0,0.45); border: 1px solid rgba(255,255,255,0.05); overflow: hidden; display: flex; }
    .hp-bar-seg { height: 100%; transition: width 0.3s ease, background 0.4s ease; }
    .hp-btn {
      width: 22px; height: 22px;
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--gold-dim);
      color: var(--aged); font-size: 0.9rem;
      cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      transition: background 0.15s; font-family: var(--font-title); line-height: 1;
      flex-shrink: 0;
    }
    .hp-btn:hover { background: rgba(184,149,42,0.15); }
    .hp-btn:active { transform: scale(0.92); }
    .hp-nums { display: flex; align-items: baseline; gap: 0.2rem; flex-shrink: 0; }
    .hp-current { font-family: var(--font-title); font-size: 1.3rem; line-height: 1; transition: color 0.4s; }
    .hp-sep     { color: var(--muted); font-size: 0.8rem; }
    .hp-max-val { font-family: var(--font-title); font-size: 0.78rem; color: var(--aged); }
    .hp-status  { font-family: var(--font-title); font-size: 0.44rem; letter-spacing: 0.18em; text-transform: uppercase; padding: 0.1rem 0.3rem; border: 1px solid; flex-shrink: 0; transition: all 0.3s; }
    .hp-legend  { display: flex; gap: 0.65rem; margin-top: 0.3rem; padding-left: 28px; }
    .hp-legend-item { display: flex; align-items: center; gap: 0.25rem; font-family: var(--font-title); font-size: 0.42rem; letter-spacing: 0.12em; text-transform: uppercase; }
    .hp-legend-dot  { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .hp-adj-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.4rem 0.5rem; margin-top: 0.6rem; min-width: 0; }
    .hp-adj-row  { display: flex; align-items: center; gap: 0.3rem; min-width: 0; }
    .hp-adj-label { font-family: var(--font-title); font-size: 0.44rem; letter-spacing: 0.12em; text-transform: uppercase; flex-shrink: 0; min-width: 46px; }
    .hp-adj-btn  { width: 17px; height: 17px; background: rgba(0,0,0,0.35); border: 1px solid var(--gold-dim); color: var(--aged); font-size: 0.78rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; font-family: var(--font-title); line-height: 1; flex-shrink: 0; }
    .hp-adj-btn:hover { background: rgba(184,149,42,0.15); }
    .hp-adj-val  { font-family: var(--font-title); font-size: 0.78rem; min-width: 1.4ch; text-align: center; }
    .hp-rest-row { display: flex; justify-content: center; align-items: center; gap: 0.6rem; }
    .hp-rest-btn { width: 28px; height: 28px; background: rgba(184,149,42,0.06); border: 1px solid var(--gold-dim); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s, border-color 0.2s; position: relative; flex-shrink: 0; }
    .hp-rest-btn:hover { background: rgba(184,149,42,0.14); border-color: var(--gold-mid); }
    .hp-rest-btn:active { transform: scale(0.92); }
    .hp-rest-btn svg { width: 14px; height: 14px; }
    .hp-rest-btn .hp-tip { position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%); background: var(--ink-deep); border: 1px solid var(--gold-dim); color: var(--aged); font-family: var(--font-title); font-size: 0.44rem; letter-spacing: 0.15em; text-transform: uppercase; padding: 0.15rem 0.4rem; white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity 0.15s 0.5s; }
    .hp-rest-btn:hover .hp-tip { opacity: 1; }

    /* Resource pips */
    .resource-row {
      display: flex; align-items: center;
      gap: 0.5rem; flex-wrap: wrap;
      margin-top: 0.3rem;
    }
    .resource-label {
      font-family: var(--font-title);
      font-size: 0.48rem; letter-spacing: 0.15em;
      color: var(--muted); text-transform: uppercase;
      flex-shrink: 0;
    }
    .pip {
      width: 14px; height: 14px;
      border-radius: 50%;
      border: 1px solid var(--gold-dim);
      background: transparent;
      cursor: pointer; transition: background 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .pip.used { background: var(--gold); border-color: var(--gold); }
    .pip:hover { border-color: var(--gold-mid); }

    /* Quick actions */
    .action-header {
      display: grid;
      grid-template-columns: 1fr 2.5rem 5.5rem 2rem;
      gap: 0.4rem; padding: 0 0.4rem 0.3rem;
    }
    .action-col-label {
      font-family: var(--font-title);
      font-size: 0.44rem; letter-spacing: 0.2em;
      color: var(--muted); text-transform: uppercase;
    }
    .action-slot {
      display: grid;
      grid-template-columns: 1fr 2.5rem 5.5rem 2rem;
      gap: 0.4rem; align-items: center;
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--gold-dim);
      padding: 0.35rem 0.4rem;
      margin-bottom: 0.35rem;
      transition: border-color 0.2s;
    }
    .action-slot:last-child { margin-bottom: 0; }
    .action-slot:focus-within { border-color: rgba(184,149,42,0.3); }
    .action-select {
      background: transparent; border: none;
      color: var(--parchment2);
      font-family: var(--font-body);
      font-size: 0.85rem; cursor: pointer; outline: none;
      width: 100%; appearance: none; -webkit-appearance: none;
    }
    .action-select option,
    .action-select optgroup { background: var(--ink); color: var(--parchment2); }
    .action-hit { font-family: var(--font-title); font-size: 0.7rem; color: var(--gold-light); text-align: center; }
    .action-dmg { font-size: 0.72rem; color: var(--parchment2); text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .action-roll-btn {
      background: rgba(184,149,42,0.1);
      border: 1px solid rgba(184,149,42,0.2);
      color: var(--gold); font-size: 0.85rem;
      cursor: pointer; padding: 0.15rem 0.3rem;
      transition: background 0.15s, border-color 0.15s; line-height: 1;
    }
    .action-roll-btn:hover { background: rgba(184,149,42,0.22); border-color: var(--gold); }
    .action-roll-btn:disabled { opacity: 0.2; cursor: default; }

    /* Right column — skills */
    .right-col { display: flex; flex-direction: column; }
    .skill-row {
      display: flex; align-items: center; gap: 0.38rem;
      padding: 0.14rem 0.25rem; cursor: pointer;
      transition: background 0.15s;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .skill-row:hover { background: rgba(184,149,42,0.06); }
    .skill-name  { font-size: 0.76rem; color: var(--parchment2); flex: 1; }
    .skill-attr  { font-size: 0.62rem; color: var(--muted); }
    .skill-bonus { font-family: var(--font-title); font-size: 0.7rem; color: var(--gold-light); min-width: 1.8rem; text-align: right; }

    /* ── COMBAT TAB ── */
    .combat-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    /* Full attack table */
    .atk-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .atk-table th {
      font-family: var(--font-title);
      font-size: 0.48rem; letter-spacing: 0.2em;
      color: var(--muted); text-transform: uppercase;
      text-align: left; padding: 0.3rem 0.5rem;
      border-bottom: 1px solid var(--gold-dim);
    }
    .atk-table td {
      padding: 0.35rem 0.5rem;
      color: var(--parchment2);
      border-bottom: 1px solid rgba(255,255,255,0.03);
      vertical-align: middle;
    }
    .atk-table tr:hover td { background: rgba(184,149,42,0.04); }
    .atk-roll-btn {
      background: rgba(184,149,42,0.1);
      border: 1px solid rgba(184,149,42,0.2);
      color: var(--gold); font-size: 0.75rem;
      cursor: pointer; padding: 0.1rem 0.3rem;
      transition: background 0.15s; line-height: 1;
    }
    .atk-roll-btn:hover { background: rgba(184,149,42,0.22); }
    .atk-roll-btn:disabled { opacity: 0.2; cursor: default; }

    /* Death saves */
    .death-saves {
      display: flex; gap: 1rem; margin-top: 0.5rem;
    }
    .death-group { display: flex; flex-direction: column; gap: 0.3rem; }
    .death-label {
      font-family: var(--font-title);
      font-size: 0.5rem; letter-spacing: 0.2em;
      color: var(--muted); text-transform: uppercase;
    }
    .death-pips { display: flex; gap: 0.35rem; }
    .death-pip {
      width: 16px; height: 16px; border-radius: 50%;
      border: 1px solid var(--gold-dim);
      cursor: pointer; transition: background 0.15s;
    }
    .death-pip.success.used { background: var(--hp-good); border-color: var(--hp-good); }
    .death-pip.failure.used { background: var(--hp-bad);  border-color: var(--hp-bad); }

    /* Conditions */
    .conditions-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.3rem;
    }
    .condition-btn {
      font-family: var(--font-title);
      font-size: 0.5rem; letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.25rem 0.4rem;
      border: 1px solid var(--gold-dim);
      background: transparent; color: var(--muted);
      cursor: pointer; transition: all 0.15s; text-align: center;
    }
    .condition-btn.active {
      background: rgba(122,31,31,0.25);
      border-color: var(--blood); color: #e08080;
    }
    .condition-btn:hover { border-color: var(--gold-mid); color: var(--aged); }

    /* ── SPELLS TAB ── */
    .spell-header {
      display: grid;
      grid-template-columns: 1fr auto auto auto auto;
      gap: 0.5rem; padding: 0.2rem 0.5rem 0.3rem;
      border-bottom: 1px solid var(--gold-dim);
      margin-bottom: 0.3rem;
    }
    .spell-col-label {
      font-family: var(--font-title);
      font-size: 0.44rem; letter-spacing: 0.18em;

    .equip-notes-area::placeholder { color: var(--muted); font-style: italic; }
    /* Sync bar */
    .cs-sync-bar { display:flex; align-items:center; gap:0.5rem; font-family:var(--font-title); font-size:0.42rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); padding:0.3rem 0.75rem; border-bottom:1px solid var(--gold-dim); background:rgba(0,0,0,0.15); }
    .cs-sync-dot { width:6px; height:6px; border-radius:50%; background:var(--muted); flex-shrink:0; transition:background 0.3s; }
    .cs-sync-dot.saving  { background:#c9b48a; }
    .cs-sync-dot.saved   { background:#5a9a6a; }
    .cs-sync-dot.error   { background:#c05060; }
    .cs-sync-dot.loading { background:#5a9aaa; }
    /* item search result styles (shared with compendium) */
    .cs-item-result-wrap { border: 1px solid var(--gold-dim); margin-bottom: 0.25rem; }
    .cs-item-result { display:flex; flex-direction:column; gap:0.1rem; padding:0.3rem 0.45rem; background:transparent; color:var(--parchment); font-family:var(--font-body); font-size:0.8rem; cursor:pointer; transition:all 0.1s; text-align:left; width:100%; border:none; }
    .cs-item-result:hover { background:rgba(184,149,42,0.08); }
    .cs-item-result-main { display:flex; align-items:center; gap:0.4rem; }
    .cs-item-result-name { flex:1; }
    .cs-item-result-rarity { font-family:var(--font-title); font-size:0.35rem; letter-spacing:0.12em; text-transform:uppercase; padding:0.08rem 0.25rem; border:1px solid; flex-shrink:0; }
    .cs-item-result-meta { font-size:0.7rem; color:var(--muted); font-style:italic; }
    .cs-item-detail { padding:0.5rem 0.6rem; background:rgba(0,0,0,0.2); border-top:1px solid var(--gold-dim); }
    .cs-item-detail.hidden { display:none; }
    .cs-idet-stats { display:grid; grid-template-columns:1fr 1fr; gap:0.2rem 0.4rem; margin-bottom:0.4rem; }
    .cs-idet-row { display:flex; flex-direction:column; }
    .cs-idet-label { font-family:var(--font-title); font-size:0.35rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); }
    .cs-idet-desc { font-size:0.75rem; color:var(--parchment2); line-height:1.6; margin-top:0.35rem; }
    .cs-idet-desc p { margin-bottom:0.25rem; }
    .cs-item-add-btn { font-family:var(--font-title); font-size:0.38rem; letter-spacing:0.1em; text-transform:uppercase; padding:0.25rem 0.7rem; border:1px solid var(--gold-dim); background:rgba(184,149,42,0.08); color:var(--gold); cursor:pointer; transition:all 0.12s; margin-top:0.4rem; display:block; }
    .cs-item-add-btn:hover { background:rgba(184,149,42,0.18); border-color:var(--gold); }
    .cs-item-empty { font-size:0.78rem; color:var(--muted); font-style:italic; padding:0.3rem 0.4rem; }

    /* ── BIO TAB ── */
    .bio-layout {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 1rem;
    }
    .bio-portrait {
      width: 100%; aspect-ratio: 3/4;
      overflow: hidden; border: 1px solid var(--gold-dim);
    }
    .bio-portrait img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
    .bio-fields { display: flex; flex-direction: column; gap: 0.8rem; }
    .bio-field-label {
      font-family: var(--font-title);
      font-size: 0.5rem; letter-spacing: 0.3em;
      color: var(--gold); text-transform: uppercase;
      display: block; margin-bottom: 0.3rem;
    }
    .bio-text {
      font-size: 0.92rem; color: var(--parchment2);
      line-height: 1.7; font-style: italic;
      padding: 0.5rem 0.75rem;
      background: rgba(0,0,0,0.15);
      border-left: 2px solid var(--gold-dim);
      min-height: 2.5rem;
    }
    .bio-text.empty { color: var(--muted); font-style: italic; }

    /* ── CharacterStore — editable equipment + bio + notes ── */
    .cs-sync-bar { display:flex; align-items:center; gap:0.5rem; font-family:var(--font-title); font-size:0.42rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); padding:0.3rem 0.75rem; border-bottom:1px solid var(--gold-dim); background:rgba(0,0,0,0.15); }
    .cs-sync-dot { width:6px; height:6px; border-radius:50%; background:var(--muted); flex-shrink:0; transition:background 0.3s; }
    .cs-sync-dot.saving  { background:#c9b48a; }
    .cs-sync-dot.saved   { background:#5a9a6a; }
    .cs-sync-dot.error   { background:#c05060; }
    .cs-sync-dot.loading { background:#5a9aaa; }
    .cs-section-label { font-family:var(--font-title); font-size:0.45rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); padding:0.5rem 0 0.4rem; border-bottom:1px solid var(--gold-dim); margin-bottom:0.6rem; display:block; }
    .cs-currency-row { display:grid; grid-template-columns:repeat(5,1fr); gap:0.5rem; margin-bottom:1.2rem; }
    .cs-currency-box { display:flex; flex-direction:column; align-items:center; gap:0.2rem; background:rgba(0,0,0,0.2); border:1px solid var(--gold-dim); padding:0.4rem 0.3rem; }
    .cs-currency-label { font-family:var(--font-title); font-size:0.4rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); }
    .cs-currency-input { width:100%; text-align:center; background:transparent; border:none; color:var(--parchment); font-family:var(--font-title); font-size:0.85rem; outline:none; padding:0; }
    .cs-currency-input:focus { border-bottom:1px solid var(--gold-mid); }
    .cs-currency-box.gp .cs-currency-label { color:var(--gold); }
    .cs-currency-box.gp .cs-currency-input { color:var(--gold-light); }
    .cs-inv-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:0.5rem; }
    .cs-add-btn { font-family:var(--font-title); font-size:0.42rem; letter-spacing:0.1em; text-transform:uppercase; padding:0.2rem 0.6rem; border:1px solid var(--gold-dim); background:transparent; color:var(--muted); cursor:pointer; transition:all 0.12s; }
    .cs-add-btn:hover { color:var(--aged); border-color:var(--gold-mid); }
    .cs-inv-table { width:100%; border-collapse:collapse; margin-bottom:0.5rem; }
    .cs-inv-table th { font-family:var(--font-title); font-size:0.38rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); text-align:left; padding:0.2rem 0.4rem 0.4rem; border-bottom:1px solid var(--gold-dim); }
    .cs-inv-table th.right { text-align:right; }
    .cs-inv-table td { padding:0.45rem 0.4rem; border-bottom:1px solid rgba(184,149,42,0.08); vertical-align:middle; }
    .cs-inv-name { font-family:var(--font-body); font-size:0.88rem; color:var(--parchment); }
    .cs-inv-detail { font-size:0.72rem; color:var(--muted); font-family:var(--font-body); font-style:italic; }
    .cs-inv-qty-input { width:40px; text-align:center; background:rgba(0,0,0,0.2); border:1px solid var(--gold-dim); color:var(--parchment); font-family:var(--font-title); font-size:0.8rem; padding:0.1rem 0.2rem; outline:none; }
    .cs-inv-wt { font-size:0.75rem; color:var(--muted); text-align:right; }
    .cs-inv-del { width:22px; height:22px; background:transparent; border:1px solid transparent; color:var(--muted); cursor:pointer; font-size:0.75rem; display:flex; align-items:center; justify-content:center; transition:all 0.12s; }
    .cs-inv-del:hover { color:#c05060; border-color:rgba(192,80,96,0.3); }
    .cs-weight-bar { display:flex; justify-content:space-between; font-size:0.75rem; color:var(--muted); padding:0.4rem 0; border-top:1px solid var(--gold-dim); margin-bottom:1rem; }
    .cs-weight-bar span { color:var(--aged); }
    .cs-item-search-wrap { background:rgba(0,0,0,0.25); border:1px solid var(--gold-dim); padding:0.75rem; margin-bottom:1rem; }
    .cs-item-search-wrap.hidden { display:none; }
    .cs-item-search { width:100%; background:rgba(0,0,0,0.3); border:1px solid var(--gold-dim); color:var(--parchment); font-family:var(--font-body); font-size:0.85rem; padding:0.35rem 0.6rem; outline:none; margin-bottom:0.5rem; }
    .cs-item-search:focus { border-color:var(--gold-mid); }
    .cs-item-search::placeholder { color:var(--muted); }
    .cs-item-results { max-height:180px; overflow-y:auto; display:flex; flex-direction:column; gap:0.25rem; }
    .cs-item-result-wrap { border: 1px solid var(--gold-dim); margin-bottom: 0.3rem; }
    .cs-item-result { display:flex; flex-direction:column; gap:0.15rem; padding:0.35rem 0.5rem; background:transparent; color:var(--parchment); font-family:var(--font-body); font-size:0.82rem; cursor:pointer; transition:all 0.1s; text-align:left; width:100%; border:none; }
    .cs-item-result:hover { background:rgba(184,149,42,0.08); }
    .cs-item-result-main { display:flex; align-items:center; gap:0.5rem; }
    .cs-item-result-name { flex:1; }
    .cs-item-result-rarity { font-family:var(--font-title); font-size:0.38rem; letter-spacing:0.12em; text-transform:uppercase; padding:0.1rem 0.3rem; border:1px solid; flex-shrink:0; }
    .cs-item-result-meta { font-size:0.72rem; color:var(--muted); font-style:italic; }
    .cs-item-detail { padding:0.6rem 0.75rem; background:rgba(0,0,0,0.2); border-top:1px solid var(--gold-dim); }
    .cs-item-detail.hidden { display:none; }
    .cs-idet-stats { display:grid; grid-template-columns:1fr 1fr; gap:0.25rem 0.5rem; margin-bottom:0.5rem; }
    .cs-idet-row { display:flex; flex-direction:column; }
    .cs-idet-label { font-family:var(--font-title); font-size:0.38rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); }
    .cs-idet-desc { font-size:0.78rem; color:var(--parchment2); line-height:1.6; margin-top:0.4rem; }
    .cs-idet-desc p { margin-bottom:0.3rem; }
    .cs-item-add-btn { font-family:var(--font-title); font-size:0.42rem; letter-spacing:0.1em; text-transform:uppercase; padding:0.3rem 0.8rem; border:1px solid var(--gold-dim); background:rgba(184,149,42,0.08); color:var(--gold); cursor:pointer; transition:all 0.12s; margin-top:0.5rem; display:block; }
    .cs-item-add-btn:hover { background:rgba(184,149,42,0.18); border-color:var(--gold); }

    .cs-item-empty { font-size:0.8rem; color:var(--muted); font-style:italic; padding:0.3rem 0.5rem; }
    .cs-notes-area { width:100%; min-height:100px; background:rgba(0,0,0,0.2); border:1px solid var(--gold-dim); color:var(--parchment); font-family:var(--font-body); font-size:0.9rem; line-height:1.65; padding:0.6rem 0.75rem; outline:none; resize:vertical; transition:border-color 0.15s; }
    .cs-notes-area:focus { border-color:var(--gold-mid); }
    .cs-notes-area::placeholder { color:var(--muted); }
    .cs-bio-field { margin-bottom:1rem; }
    .cs-bio-label { font-family:var(--font-title); font-size:0.4rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); display:block; margin-bottom:0.3rem; }

    .appear-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.4rem;
    }

    /* ── ROLLER PANEL ── */
    .roller-panel {
      position: fixed;
      bottom: 1rem; right: 1rem;
      width: 295px;
      background: linear-gradient(160deg, rgba(42,28,14,0.98) 0%, rgba(10,8,5,0.99) 100%);
      border: 1px solid rgba(184,149,42,0.35);
      box-shadow: 0 8px 40px rgba(0,0,0,0.7);
      z-index: 200;
      transition: background 0.3s;
    }
    /* Collapsed: tiny floating icon button */
    .roller-panel.collapsed {
      width: 36px;
      height: 36px;
      border: 1px solid rgba(184,149,42,0.25);
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      overflow: hidden;
    }
    .roller-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.45rem 0.7rem;
      border-bottom: 1px solid var(--gold-dim);
      cursor: pointer; user-select: none;
      white-space: nowrap;
    }
    .roller-panel.collapsed .roller-header {
      border-bottom: none;
      padding: 0;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .roller-title {
      font-family: var(--font-title);
      font-size: 0.56rem; letter-spacing: 0.25em;
      color: var(--gold); text-transform: uppercase;
    }
    /* Hide title and chevron when collapsed — show only the dice emoji */
    .roller-panel.collapsed .roller-title { display: none; }
    .roller-panel.collapsed .roller-chevron { display: none; }
    .roller-title-icon {
      font-size: 1.1rem;
      display: none;
      line-height: 1;
    }
    .roller-panel.collapsed .roller-title-icon { display: block; }
    .roller-chevron { color: var(--muted); font-size: 0.65rem; transition: transform 0.2s; }
    .roller-panel.collapsed .roller-toggles,
    .roller-panel.collapsed .roll-history { display: none; }

    .roller-toggles {
      display: flex; gap: 0.3rem; flex-wrap: wrap;
      padding: 0.45rem 0.7rem;
      border-bottom: 1px solid var(--gold-dim);
    }
    .tog-btn {
      font-family: var(--font-title);
      font-size: 0.48rem; letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.16rem 0.4rem;
      border: 1px solid var(--gold-dim);
      background: transparent; color: var(--muted);
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .tog-btn.on  { background: rgba(184,149,42,0.15); border-color: var(--gold); color: var(--gold-light); }
    .tog-btn.adv.on { background: rgba(90,154,106,0.15); border-color: #5a9a6a; color: #5a9a6a; }
    .tog-btn.dis.on { background: rgba(154,90,90,0.15); border-color: #9a5a5a; color: #9a5a5a; }
    .tog-btn.clr { border-color: rgba(107,93,74,0.3); margin-left: auto; }

    .roll-history {
      max-height: 260px; overflow-y: auto;
      padding: 0.45rem 0.7rem;
      display: flex; flex-direction: column; gap: 0.35rem;
    }
    .roll-history::-webkit-scrollbar { width: 3px; }
    .roll-history::-webkit-scrollbar-thumb { background: var(--gold-dim); }

    .roll-entry {
      border-bottom: 1px solid rgba(255,255,255,0.04);
      padding-bottom: 0.35rem;
      animation: slideIn 0.18s ease;
    }
    .roll-entry:last-child { border-bottom: none; }
    .roll-ename { font-family: var(--font-title); font-size: 0.54rem; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; }
    .roll-emain { font-size: 0.95rem; color: var(--parchment); line-height: 1.4; }
    .roll-total { font-family: var(--font-title); font-size: 1.15rem; color: var(--gold-light); }
    .roll-crit   { color: var(--crit-color); font-family: var(--font-title); font-size: 0.6rem; letter-spacing: 0.15em; margin-left: 0.25rem; }
    .roll-fumble { color: var(--hp-bad); font-family: var(--font-title); font-size: 0.6rem; letter-spacing: 0.15em; margin-left: 0.25rem; }
    .roll-kept   { color: var(--gold-light); font-weight: 600; }
    .roll-dropped{ color: var(--muted); text-decoration: line-through; }
    .roll-detail { font-size: 0.72rem; color: var(--muted); display: block; margin-top: 0.05rem; }
    .roll-dmgline{ font-size: 0.82rem; color: var(--parchment2); margin-top: 0.1rem; }
    .roll-empty  { font-style: italic; color: var(--muted); font-size: 0.8rem; text-align: center; padding: 0.75rem 0; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Not found ── */
    .not-found {
      text-align: center; padding: 4rem 2rem;
      color: var(--muted); font-style: italic;
    }
    .not-found h2 { font-family: var(--font-display); font-size: 1.5rem; color: var(--parchment); margin-bottom: 1rem; }

    footer {
      text-align: center; padding: 2rem;
      font-family: var(--font-title); font-size: 0.58rem;
      letter-spacing: 0.3em; color: var(--muted); text-transform: uppercase;
      border-top: 1px solid var(--gold-dim);
    }

    @media (max-width: 1000px) {
      .core-layout { grid-template-columns: 180px 1fr; }
      .right-col { display: none; }
      .combat-layout { grid-template-columns: 1fr; }
      .bio-layout { grid-template-columns: 1fr; }
      .equip-layout { grid-template-columns: 1fr; }
      .equip-right { border-left: none; border-top: 2px solid var(--gold-dim); }
    }
    @media (max-width: 600px) {
      .core-layout  { grid-template-columns: 1fr; }
      .ability-grid { grid-template-columns: repeat(3, 1fr); }
      .combat-grid  { grid-template-columns: repeat(2, 1fr); }
      .roller-panel { width: calc(100vw - 2rem); right: 1rem; }

      /* Sheet body padding tighter on mobile */
      .sheet-body { padding: 0.85rem 0.85rem calc(6rem + env(safe-area-inset-bottom)); }

      /* Tab buttons slightly smaller */
      .tab-btn { font-size: 0.55rem; padding: 0.65rem 0.75rem; letter-spacing: 0.12em; }

      /* Action slots: 2 columns instead of 4 */
      .actions-grid { grid-template-columns: repeat(2, 1fr) !important; }

      /* Spell slot grid: 2 cols */
      .slot-pips-row { flex-wrap: wrap; gap: 0.3rem; }

      /* Equipment: single column already handled at 1000px, just tighten padding */
      .equip-left, .equip-right { padding: 0.65rem; }
      .equip-footer { flex-direction: column; gap: 0.4rem; }
      .equip-footer > * { width: 100%; }

      /* Skills/saves: tighter rows */
      .skill-row, .save-row { font-size: 0.78rem; }

      /* Proficiencies accordion */
      .equip-prof-header { font-size: 0.52rem; }

      /* HP adjustment grid: full width */
      .hp-adj-grid { grid-template-columns: 1fr 1fr; }

      /* Roller panel: full width, from bottom */
      .roller-panel {
        width: 100vw;
        right: 0;
        bottom: env(safe-area-inset-bottom);
        border-radius: 0;
      }
    }

    /* ── Compendium tab button ── */
    .comp-tab-btn {
      margin-left: auto;
      color: var(--muted) !important;
      border-bottom: 2px solid transparent !important;
    }
    .comp-tab-btn.open { color: var(--gold-light) !important; border-bottom-color: var(--gold) !important; }
    .comp-tab-btn:hover { color: var(--aged) !important; }

    /* ── Compendium slide panel ── */
    .comp-panel {
      position: fixed;
      top: 52px;
      right: 0;
      bottom: 0;
      width: 420px;
      max-width: 95vw;
      background: linear-gradient(160deg, #1e1610 0%, #0d0a07 100%);
      border-left: 1px solid var(--gold-dim);
      z-index: 150;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
      box-shadow: -8px 0 40px rgba(0,0,0,0.6);
    }
    .comp-panel.open { transform: translateX(0); }

    .comp-panel-backdrop {
      position: fixed;
      inset: 52px 0 0 0;
      background: rgba(0,0,0,0.4);
      z-index: 149;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s;
    }
    .comp-panel-backdrop.open { opacity: 1; pointer-events: auto; }

    .comp-panel-header {
      flex-shrink: 0;
      border-bottom: 1px solid var(--gold-dim);
    }
    .comp-panel-cats {
      display: grid;
      grid-template-columns: repeat(4,1fr);
      border-bottom: 1px solid var(--gold-dim);
    }
    .comp-panel-cat {
      font-family: var(--font-title);
      font-size: 0.5rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 0.55rem 0.3rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .comp-panel-cat:hover { color: var(--aged); }
    .comp-panel-cat.active { color: var(--gold-light); border-bottom-color: var(--gold); }

    .comp-panel-search-row {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 0.75rem;
    }
    .comp-panel-search-icon { color: var(--muted); font-size: 0.9rem; flex-shrink: 0; }
    .comp-panel-search {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--parchment2);
      font-family: var(--font-title);
      font-size: 0.72rem;
      letter-spacing: 0.06em;
    }
    .comp-panel-search::placeholder { color: var(--muted); }
    .comp-panel-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.85rem;
      cursor: pointer;
      padding: 0.15rem 0.25rem;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    .comp-panel-close:hover { color: var(--gold-light); }

    .comp-panel-filters {
      display: flex;
      gap: 0.3rem;
      flex-wrap: wrap;
      padding: 0 0.75rem 0.5rem;
      min-height: 0;
    }
    .comp-panel-filter-btn {
      font-family: var(--font-title);
      font-size: 0.42rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.12rem 0.35rem;
      border: 1px solid var(--gold-dim);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .comp-panel-filter-btn:hover { color: var(--aged); border-color: var(--gold-mid); }
    .comp-panel-filter-btn.active { background: var(--gold-dim); border-color: var(--gold); color: var(--gold-light); }

    /* List + detail split */

    .cpd-rule { border: none; height: 1px; background: linear-gradient(90deg, var(--gold-dim), transparent); margin: 0.6rem 0; }
    .cpd-body { font-size: 0.82rem; color: var(--parchment2); line-height: 1.75; }
    .cpd-body p { margin-bottom: 0.5rem; }
    .cpd-body p:last-child { margin-bottom: 0; }
    .cpd-body ul { padding-left: 1.2rem; margin-bottom: 0.5rem; }

    .cpd-section-title {
      font-family: var(--font-title);
      font-size: 0.46rem;

<script>
// ══════════════════════════════════════════════════════════
// INIT — runs after all scripts and DOM are ready
// ══════════════════════════════════════════════════════════
// ── All state declared here so every function can access them ──
const RS         = { advantage: false, disadvantage: false, bless: false, guidance: false };
const pipState   = {};
const deathSaves = { success: 0, failure: 0 };
let rollHistory     = [];
let rollerCollapsed = true;
// C-dependent — values set after C is resolved below
let currentHP      = 0;
let maxHPVal       = 0;
let hasInspiration = false;
let slots          = ['empty','empty','empty','empty'];
let SLOTS_KEY      = 'kirtas-slots-default';
// Equipment tab state — tracks displayed inventory and currency
// Must be declared here (not near buildEquipmentTab) to avoid temporal dead zone
let _currentInv      = null;
let _currentCur      = null;
let _selectedItemIdx = null;
let _rightTab        = 'search';
let _dragIdx         = null;
let _touchTimer      = null;
let _touchDragging   = false;
let _itemSearchTimer = null;
let _itemSearchResults = [];
let _notesTimer      = null;
let _compItemTimer   = null;
let _compItemResults = [];
const _bioTimers     = {};
let compOpen         = false;
let compCat          = 'spells';
let compAllEntries   = [];
let compFiltered     = [];
let compFilter       = null;
let compCache        = {};

const params  = new URLSearchParams(window.location.search);
const charKey = params.get('character') || 'tyros';

// Safety check — characters.js must be loaded
if (typeof CHARACTERS === 'undefined') {
  document.getElementById('sheet-body').innerHTML = `
    <div class="not-found">
      <h2>characters.js not found</h2>
      <p>Make sure characters.js is uploaded to the same folder as sheet.html.</p>
      <p style="margin-top:1rem"><a href="party.html" style="color:var(--gold)">← Back to Party</a></p>
    </div>`;
  document.getElementById('loading')?.remove();
  throw new Error('characters.js not loaded');
}

const C = CHARACTERS[charKey];

if (!C) {
  document.getElementById('sheet-body').innerHTML = `
    <div class="not-found">
      <h2>Character Not Found</h2>
      <p>No character with the key <strong>"${charKey}"</strong> exists in characters.js.</p>
      <p style="margin-top:0.5rem;color:var(--muted);font-size:0.85rem">
        Available: ${Object.keys(CHARACTERS).join(', ')}
      </p>
      <p style="margin-top:1rem"><a href="party.html" style="color:var(--gold)">← Back to Party</a></p>
    </div>`;
  document.getElementById('loading')?.remove();
} else {
  // Initialise C-dependent state now that C is confirmed
  currentHP      = C.combat.hp;
  maxHPVal       = C.combat.hpMax;
  hasInspiration = C.inspiration;
  SLOTS_KEY      = `kirtas-slots-${charKey}`;
  try {
    const saved = localStorage.getItem(SLOTS_KEY);
    slots = saved ? JSON.parse(saved) : (C.defaultSlots || ['empty','empty','empty','empty']).slice(0,4);
  } catch(e) {
    slots = (C.defaultSlots || ['empty','empty','empty','empty']).slice(0,4);
  }
  document.title = `${C.name} — The Trials of Kirtas`;
  document.getElementById('site-footer').textContent =
    `The Trials of Kirtas · ${C.name} · ${C.classLabel}`;
  initSheet();
}



// ══════════════════════════════════════════════════════════
// ROLLER STATE
// ══════════════════════════════════════════════════════════


// ── Dice ──
const d = sides => Math.floor(Math.random() * sides) + 1;

function rollD20() {
  const r1 = d(20), r2 = d(20);
  let kept, dropped;
  if (RS.advantage)     { kept = Math.max(r1,r2); dropped = Math.min(r1,r2); }
  else if (RS.disadvantage) { kept = Math.min(r1,r2); dropped = Math.max(r1,r2); }
  else { kept = r1; dropped = r2; }
  return { kept, dropped, isCrit: kept===20, isFumble: kept===1,
           label: RS.advantage ? 'adv' : RS.disadvantage ? 'dis' : null };
}

function fmtD20(roll) {
  if (RS.advantage || RS.disadvantage)
    return `[<span class="roll-kept">${roll.kept}</span> <span class="roll-dropped">${roll.dropped}</span>]`;
  return `[<span class="roll-kept">${roll.kept}</span>]`;
}

function rollDice(diceStr, mod=0) {
  const m = diceStr.match(/(\d+)d(\d+)/);
  if (!m) return { rolls:[0], total: mod };
  const rolls = Array.from({length:parseInt(m[1])}, () => d(parseInt(m[2])));
  return { rolls, total: rolls.reduce((a,b)=>a+b,0) + mod };
}

function blessBonus()    { if (!RS.bless)    return {val:0,str:''}; const b=d(4); return {val:b,str:` +${b}🙏`}; }
function guidanceBonus() { if (!RS.guidance) return {val:0,str:''}; const g=d(4); return {val:g,str:` +${g}✦`}; }

function modStr(n) { return n >= 0 ? `+${n}` : `${n}`; }

// ── Roll functions ──
function rollAbility(name, mod) {
  const roll = rollD20(), guide = guidanceBonus();
  const total = roll.kept + mod + guide.val;
  const flag = roll.isCrit ? '<span class="roll-crit">★ NAT 20</span>' : roll.isFumble ? '<span class="roll-fumble">✗ NAT 1</span>' : '';
  addHistory({ name:`${name} Check`,
    main:`${fmtD20(roll)} ${modStr(mod)}${guide.str} = <span class="roll-total">${total}</span> ${flag}`,
    detail:`d20:${roll.kept}${roll.label?` (${roll.label})`:''}${guide.val?`, guidance +${guide.val}`:''}` });
}

function rollSave(name, mod) {
  const roll = rollD20(), bless = blessBonus();
  const total = roll.kept + mod + bless.val;
  const flag = roll.isCrit ? '<span class="roll-crit">★ NAT 20</span>' : roll.isFumble ? '<span class="roll-fumble">✗ NAT 1</span>' : '';
  addHistory({ name,
    main:`${fmtD20(roll)} ${modStr(mod)}${bless.str} = <span class="roll-total">${total}</span> ${flag}`,
    detail:`d20:${roll.kept}${roll.label?` (${roll.label})`:''}${bless.val?`, bless +${bless.val}`:''}` });
}

function rollSkill(name, mod) {
  // Jack of All Trades: if character has it and skill is 'half', bonus is already in the data
  const roll = rollD20(), guide = guidanceBonus();
  const total = roll.kept + mod + guide.val;
  const flag = roll.isCrit ? '<span class="roll-crit">★ NAT 20</span>' : roll.isFumble ? '<span class="roll-fumble">✗ NAT 1</span>' : '';
  addHistory({ name,
    main:`${fmtD20(roll)} ${modStr(mod)}${guide.str} = <span class="roll-total">${total}</span> ${flag}`,
    detail:`d20:${roll.kept}${roll.label?` (${roll.label})`:''}${guide.val?`, guidance +${guide.val}`:''}` });
}

function rollInit() {
  const mod = C.combat.initiative;
  const roll = rollD20();
  const total = roll.kept + mod;
  addHistory({ name:'Initiative',
    main:`${fmtD20(roll)} ${modStr(mod)} = <span class="roll-total">${total}</span>`,
    detail:`d20:${roll.kept}${roll.label?` (${roll.label})`:''}`});
}

function rollActionById(id) {
  const action = (C.actions || []).find(a => a.id === id);
  if (action) rollAction(action);
}

function rollAction(action) {
  if (!action || action.type === 'utility') return;
  if (action.type === 'damage-only') {
    if (!action.dmgDice) { addHistory({name:action.label, main:'No dice to roll', detail: action.note||''}); return; }
    const dmg = rollDice(action.dmgDice, action.dmgMod||0);
    addHistory({ name:action.label,
      main:`Dmg: [${dmg.rolls.join('][')}]${action.dmgMod?` ${modStr(action.dmgMod)}`:''} = <span class="roll-total">${dmg.total}</span>`,
      detail:`${action.dmgDice}${action.dmgMod?` ${modStr(action.dmgMod)}`:''} ${action.dmgType}` });
    return;
  }
  // Attack
  const roll = rollD20(), bless = blessBonus();
  const total = roll.kept + action.hitMod + bless.val;
  const isCrit = roll.isCrit;
  const dicStr = isCrit ? action.critDice : action.dmgDice;
  const dmg = rollDice(dicStr, action.dmgMod||0);
  const critStr = isCrit ? '<span class="roll-crit">★ CRIT</span>' : roll.isFumble ? '<span class="roll-fumble">✗ MISS</span>' : '';
  addHistory({ name:action.label,
    main:`${fmtD20(roll)} ${modStr(action.hitMod)}${bless.str} = <span class="roll-total">${total}</span> ${critStr}`,
    detail:`d20:${roll.kept}${roll.label?` (${roll.label})`:''} ${action.note||''}`,
    dmg:`${isCrit?'★ Crit dmg':'Dmg'}: [${dmg.rolls.join('][')}]${action.dmgMod?` ${modStr(action.dmgMod)}`:''} = <strong>${dmg.total}</strong> ${action.dmgType}` });
}

// ── History ──
function addHistory(entry) {
  rollHistory.unshift(entry);
  if (rollHistory.length > 25) rollHistory.pop();
  renderHistory();
  if (rollerCollapsed) toggleRoller();
}

function renderHistory() {
  const el = document.getElementById('roll-history');
  if (!rollHistory.length) {
    el.innerHTML = '<div class="roll-empty">Click any stat, skill, save, or action to roll.</div>';
    return;
  }
  el.innerHTML = rollHistory.map(e => `
    <div class="roll-entry">
      <div class="roll-ename">${e.name}</div>
      <div class="roll-emain">${e.main}</div>
      ${e.dmg ? `<div class="roll-dmgline">${e.dmg}</div>` : ''}
      <span class="roll-detail">${e.detail}</span>
    </div>`).join('');
}

function clearHistory() { rollHistory = []; renderHistory(); }
function toggleRoller() {
  rollerCollapsed = !rollerCollapsed;
  document.getElementById('roller-panel').classList.toggle('collapsed', rollerCollapsed);
}

// Apply initial collapsed state
document.getElementById('roller-panel').classList.add('collapsed');
function toggleAdv() { RS.advantage = !RS.advantage; if (RS.advantage) RS.disadvantage=false; updateToggles(); }
function toggleDis() { RS.disadvantage = !RS.disadvantage; if (RS.disadvantage) RS.advantage=false; updateToggles(); }
function toggleBuff(k, id) { RS[k]=!RS[k]; document.getElementById(id).classList.toggle('on',RS[k]); }
function updateToggles() {
  document.getElementById('tog-adv').classList.toggle('on',RS.advantage);
  document.getElementById('tog-dis').classList.toggle('on',RS.disadvantage);
}

// ══════════════════════════════════════════════════════════
// TAB SWITCHING
// ══════════════════════════════════════════════════════════
function switchTab(id, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  if (btn) btn.classList.add('active');
  // Sync mobile rail
  document.querySelectorAll('.sheet-rail-btn[data-tab]').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === id);
  });
}

// ══════════════════════════════════════════════════════════
// QUICK ACTION SLOTS
// ══════════════════════════════════════════════════════════

function saveSlots() { try { if(SLOTS_KEY) localStorage.setItem(SLOTS_KEY, JSON.stringify(slots)); } catch(e) {} }

function getAction(id) {
  if (!id || id === 'empty') return null;
  return (C.actions || []).find(a => a.id === id) || null;
}

function buildActionDropdown(selectedId) {
  const actions = C.actions || [];
  const groups = { 'attack': [], 'attack-cantrip': [], 'damage-only': [], 'utility': [] };
  const groupLabels = { 'attack':'── Attacks ──', 'attack-cantrip':'── Cantrips ──', 'damage-only':'── Other Rolls ──', 'utility':'── Utility ──' };
  actions.forEach(a => { if(groups[a.type]) groups[a.type].push(a); });
  let html = `<option value="empty">— Select —</option>`;
  for (const [type, acts] of Object.entries(groups)) {
    if (!acts.length) continue;
    html += `<optgroup label="${groupLabels[type]}">`;
    acts.forEach(a => {
      html += `<option value="${a.id}"${a.id===selectedId?' selected':''}>${a.label}</option>`;
    });
    html += `</optgroup>`;
  }
  return html;
}

function renderQuickActions() {
  const container = document.getElementById('quick-actions');
  if (!container) return;
  container.innerHTML = slots.map((slotId, i) => {
    const a = getAction(slotId);
    const canRoll = a && a.type !== 'utility';
    const hit = a ? (a.hitMod !== undefined ? modStr(a.hitMod) : '—') : '';
    const dmg = a ? `${a.dmgDice||''}${a.dmgMod?` ${modStr(a.dmgMod)}`:''} ${a.dmgType||a.note||''}`.trim() : '';
    return `
      <div class="action-slot">
        <select class="action-select" onchange="slotChange(${i},this.value)">
          ${buildActionDropdown(slotId)}
        </select>
        <span class="action-hit" id="ahit-${i}">${hit}</span>
        <span class="action-dmg" id="admg-${i}">${dmg}</span>
        <button class="action-roll-btn" onclick="rollSlot(${i})" ${!canRoll?'disabled':''}>🎲</button>
      </div>`;
  }).join('');
}

function slotChange(i, newId) {
  slots[i] = newId;
  saveSlots();
  const a = getAction(newId);
  const canRoll = a && a.type !== 'utility';
  document.getElementById(`ahit-${i}`).textContent = a ? (a.hitMod!==undefined?modStr(a.hitMod):'—') : '';
  document.getElementById(`admg-${i}`).textContent = a ? `${a.dmgDice||''}${a.dmgMod?` ${modStr(a.dmgMod)}`:''} ${a.dmgType||a.note||''}`.trim() : '';
  document.querySelectorAll('.action-roll-btn')[i].disabled = !canRoll;
}

function rollSlot(i) { rollAction(getAction(slots[i])); }

function initPips(key, max, used=0) {
  pipState[key] = used;
  return renderPips(key, max);
}

function renderPips(key, max) {
  return Array.from({length:max}, (_,i) => `
    <div class="pip${i < pipState[key] ? ' used':''}"
         onclick="togglePip('${key}',${i},${max})"></div>`).join('');
}

function togglePip(key, idx, max) {
  pipState[key] = (idx < pipState[key]) ? idx : idx + 1;
  document.getElementById(`pips-${key}`).innerHTML = renderPips(key, max);
}

// Death saves
function toggleDeathSave(type, idx) {
  deathSaves[type] = idx < deathSaves[type] ? idx : idx+1;
  renderDeathSaves();
}
function renderDeathSaves() {
  ['success','failure'].forEach(type => {
    const el = document.getElementById(`death-${type}`);
    if (!el) return;
    el.innerHTML = [0,1,2].map(i =>
      `<div class="death-pip ${type}${i < deathSaves[type]?' used':''}"
            onclick="toggleDeathSave('${type}',${i})"></div>`).join('');
  });
}

// HP tracker state
let hpTemp  = 0;
let hpBonus = 0;

function renderHP() {
  const max     = maxHPVal;
  const bonus   = hpBonus;
  const temp    = hpTemp;
  const cur     = currentHP;
  const effMax  = max + bonus;
  const total   = effMax + temp;
  const ratio   = max > 0 ? cur / max : 0;

  const COL_FULL  = '#5a9a6a';
  const COL_BLOOD = '#d4821a';
  const COL_CRIT  = '#c8432a';
  const COL_DEAD  = '#7a1f1f';

  let barCol, numCol, statusText;
  if (cur <= 0)          { barCol = COL_DEAD;  numCol = COL_DEAD;  statusText = 'Unconscious'; }
  else if (ratio < 0.2)  { barCol = COL_CRIT;  numCol = COL_CRIT;  statusText = 'Critical'; }
  else if (ratio < 0.5)  { barCol = COL_BLOOD; numCol = COL_BLOOD; statusText = 'Bloodied'; }
  else                   { barCol = COL_FULL;  numCol = COL_FULL;  statusText = ''; }

  const toW = hp => (total > 0 ? (hp / total * 100) : 0).toFixed(2) + '%';

  const bMain  = document.getElementById('hp-bar-main');
  const bTemp  = document.getElementById('hp-bar-temp');
  const bBonus = document.getElementById('hp-bar-bonus');
  if (bMain)  { bMain.style.width = toW(cur);   bMain.style.background = barCol; }
  if (bTemp)  { bTemp.style.width = toW(temp); }
  if (bBonus) { bBonus.style.width = toW(bonus); }

  const elCur = document.getElementById('hp-current');
  if (elCur)  { elCur.textContent = cur; elCur.style.color = numCol; }

  const elMax = document.getElementById('hp-max-disp');
  if (elMax)  elMax.textContent = effMax;

  const elTag = document.getElementById('hp-status');
  if (elTag) {
    if (statusText) {
      elTag.textContent = statusText;
      elTag.style.color = barCol;
      elTag.style.borderColor = barCol;
      elTag.style.background = barCol + '22';
      elTag.style.opacity = '1';
    } else {
      elTag.style.opacity = '0';
    }
  }

  const elTemp  = document.getElementById('hp-val-temp');
  const elBonus = document.getElementById('hp-val-bonus');
  const elMaxV  = document.getElementById('hp-val-max');
  if (elTemp)  elTemp.textContent  = temp;
  if (elBonus) elBonus.textContent = bonus;
  if (elMaxV)  elMaxV.textContent  = max;
}

function changeHP(delta) {
  const effMax = maxHPVal + hpBonus;
  currentHP = Math.max(0, Math.min(effMax, currentHP + delta));
  renderHP();
}

function adjHPTemp(d)  { hpTemp  = Math.max(0, Math.min(99, hpTemp  + d)); renderHP(); }
function adjHPBonus(d) { hpBonus = Math.max(0, Math.min(99, hpBonus + d)); renderHP(); }
function adjHPMax(d)   { maxHPVal = Math.max(1, maxHPVal + d); currentHP = Math.min(currentHP, maxHPVal + hpBonus); renderHP(); }

function hpLongRest()  { currentHP = maxHPVal + hpBonus; hpTemp = 0; renderHP(); }
function hpShortRest() { renderHP(); }

  const levelOrder = ['cantrip','1','2','3','4','5','6','7','8','9'];
  const levelLabels = {cantrip:'Cantrips','1':'Level 1','2':'Level 2','3':'Level 3','4':'Level 4','5':'Level 5','6':'Level 6','7':'Level 7','8':'Level 8','9':'Level 9'};

  if (!Object.keys(spells).length) {
    return `<div class="tab-panel" id="tab-spells">
      <div class="s-section" style="text-align:center;padding:3rem;color:var(--muted);font-style:italic">No spells listed.</div>
    </div>`;
  }

  // Spell save DC & attack
  let castingHeader = '';
  if (C.combat.spellSaveDC) {
    castingHeader = `
      <div class="s-section">
        <div class="s-title">Spellcasting</div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:0.5rem">
          <div class="c-stat"><span class="c-label">Spell Save DC</span><span class="c-value">${C.combat.spellSaveDC}</span></div>
          <div class="c-stat"><span class="c-label">Spell Attack</span><span class="c-value">${modStr(C.combat.spellAttackBonus)}</span></div>
          <div class="c-stat"><span class="c-label">Spell Slots</span>
            <div style="margin-top:0.2rem">
              ${cf.pactSlots ? `<div class="resource-row" style="justify-content:center"><span class="resource-label" style="margin-right:0.3rem">Pact</span><div class="slot-pips" id="pips-pact2">${renderPips('pact',cf.pactSlots.max)}</div></div>` : ''}
              ${cf.spellSlots ? Object.entries(cf.spellSlots).map(([lvl,s])=>`<div class="resource-row" style="justify-content:center"><span class="resource-label" style="margin-right:0.3rem">Lvl ${lvl}</span><div class="slot-pips" id="pips-slot${lvl}2">${renderPips(`slot${lvl}`,s.max)}</div></div>`).join('') : ''}
            </div>
          </div>
        </div>
      </div>`;
  }

  const spellBlocks = levelOrder.filter(l => spells[l]?.length).map(level => {
    const levelSpells = spells[level];
    return `
      <div class="s-section">
        <div class="s-title">${levelLabels[level]}</div>
        <div class="spell-header">
          <span class="spell-col-label">Spell</span>
          <span class="spell-col-label">Tags</span>
          <span class="spell-col-label">Casting Time</span>
          <span class="spell-col-label">Range</span>
          <span></span>
        </div>
        ${levelSpells.map(spell => {
          // Find matching action for roll button
          const matchAction = (C.actions||[]).find(a =>
            a.label.toLowerCase().replace(/[^a-z]/g,'') === spell.name.toLowerCase().replace(/[^a-z]/g,'')
          );
          const canRoll = matchAction && matchAction.type !== 'utility';
          return `
          <div class="spell-row">
            <span class="spell-name">${spell.name}</span>
            <span>
              ${spell.concentration ? '<span class="spell-tag conc">C</span> ' : ''}
              ${spell.ritual ? '<span class="spell-tag ritual">R</span>' : ''}
            </span>
            <span class="spell-time">${spell.castingTime}</span>
            <span class="spell-range">${spell.range}</span>
            <button class="spell-roll-btn" ${!canRoll?'disabled':''} onclick="${canRoll?`rollActionById('${matchAction.id}')`:''}" title="${canRoll?'Roll this spell':'No roll'}">
              ${canRoll ? '🎲' : '📖'}
            </button>
          </div>`;
        }).join('')}
      </div>`;
  }).join('');

  return `<div class="tab-panel" id="tab-spells">${castingHeader}${spellBlocks}</div>`;
}

// ── FEATURES TAB ──
function buildFeaturesTab() {
  const features = C.features || [];
  if (!features.length) return `<div class="tab-panel" id="tab-features"><div class="s-section" style="text-align:center;padding:3rem;color:var(--muted);font-style:italic">No features listed.</div></div>`;

  // Group by source
  const groups = {};
  features.forEach(f => {
    const src = f.source || 'Other';
    if (!groups[src]) groups[src] = [];
    groups[src].push(f);
  });

  return `
  <div class="tab-panel" id="tab-features">
    ${Object.entries(groups).map(([src, feats]) => `
      <div class="s-section">
        <div class="s-title">${src}</div>
        ${feats.map(f => `
          <div class="feature-card">
            <div class="feature-name">${f.name}</div>
            ${f.desc ? `<div class="feature-desc">${f.desc}</div>` : '<div class="feature-desc" style="color:var(--muted);font-style:italic">Description not yet added.</div>'}
          </div>`).join('')}
      </div>`).join('')}
  </div>`;
}

// ── EQUIPMENT TAB ──
// _currentInv tracks whatever inventory is currently displayed —
// either live data from the store or static fallback from characters.js.
// All edit functions (qty, delete, add) operate on this directly.
function buildEquipmentTab() {
  const live = CharacterStore.get() || {};
  const inv   = (live.inventory && live.inventory.length > 0) ? live.inventory : (C.inventory || []);
  const cur   = (live.currency && Object.values(live.currency).some(v => v > 0)) ? live.currency : (C.currency || {});
  const notes = live.notes || '';
  _currentInv = inv.map(i => ({ ...i }));
  _currentCur = { ...cur };

  const strScore    = C.abilities?.str?.score || C.abilityScores?.str || 10;
  const carryMax    = strScore * 15;
  const totalWeight = inv.reduce((sum, item) => sum + ((parseFloat(item.weight)||0) * (parseInt(item.qty)||1)), 0);
  const carryPct    = carryMax > 0 ? Math.min(totalWeight / carryMax, 1) : 0;
  const carryFace   = carryPct >= 1 ? "\u{1F62D}" : carryPct >= 0.9 ? "\u{1F61F}" : carryPct >= 0.75 ? "\u{1F610}" : "\u{1F604}";
  const barColor    = carryPct >= 1 ? "#c05060" : carryPct >= 0.9 ? "#c9824a" : carryPct >= 0.75 ? "#c9b44a" : "#5a9a6a";
  const barPct      = Math.round(carryPct * 100);

  const invRows = inv.map((item, i) => {
    const inlineStats = [
      item.dmg1 && item.dmgType ? `${item.dmg1} ${item.dmgType}` : null,
      Array.isArray(item.properties) && item.properties.length
        ? item.properties.map(p => p.name || p).join(', ')
        : null,
      item.weight ? `${item.weight} lb` : null,
      (!item.dmg1 && !(Array.isArray(item.properties) && item.properties.length) && item.detail) ? item.detail : null,
    ].filter(Boolean);
    const statLine = inlineStats.length
      ? `<div class="equip-item-sub">${escapeHtml(inlineStats.join(' · '))}</div>`
      : '';
    return `
      <div class="equip-item-wrap" id="equip-wrap-${i}"
        draggable="true"
        ondragstart="csDragStart(event, ${i})"
        ondragover="csDragOver(event, ${i})"
        ondragleave="csDragLeave(event)"
        ondrop="csDrop(event, ${i})"
        ondragend="csDragEnd(event)">
        <div class="equip-item-row" id="equip-row-${i}" onclick="csShowItemDetail(${i})">
          <span class="equip-drag-handle"
            title="Drag to reorder"
            ontouchstart="csTouchDragStart(event, ${i})"
            onclick="event.stopPropagation()">&#8801;&#8801;</span>
          <div class="equip-item-name-wrap" style="flex:1;min-width:0">
            <div class="equip-item-name">${escapeHtml(item.name)}</div>
            ${statLine}
          </div>
          <input class="equip-item-qty" type="number" min="0"
            value="${item.qty||1}"
            onchange="csUpdateQty(${i}, this.value)"
            onclick="event.stopPropagation()"
            aria-label="Qty">
          <span class="equip-item-wt">${item.weight ? item.weight + ' lb' : '—'}</span>
          <button class="equip-item-btn" onclick="event.stopPropagation();csEditItem(${i})" title="Edit">✎</button>
        </div>
        <div class="equip-item-accordion" id="equip-acc-${i}"></div>
      </div>`;
  }).join('');

  return `
  <div class="tab-panel" id="tab-equipment">
    <div class="cs-sync-bar">
      <div class="cs-sync-dot" id="cs-sync-dot"></div>
      <span id="cs-sync-label">Up to date</span>
    </div>
    <div class="equip-layout">
      <div class="equip-left">
        <div class="equip-inv-header">
          <span class="equip-inv-title">Inventory</span>
          <span class="equip-inv-count">${inv.length} item${inv.length!==1?"s":""}</span>
        </div>
        ${inv.length === 0
          ? `<div style="color:var(--muted);font-style:italic;font-size:0.82rem;padding:0.5rem 0">No items yet \u2014 search in the panel to the right.</div>`
          : invRows}
        <div style="padding-top:0.6rem;margin-top:0.6rem;border-top:1px solid var(--gold-dim)">
          <div class="equip-panel-section">Session Notes</div>
          <textarea class="equip-notes-area" id="cs-notes"
            placeholder="Ki points remaining, loot leads, reminders for next session…"
            oninput="csNotesChanged()">${escapeHtml(notes)}</textarea>
        </div>
      </div>
      <div class="equip-right" id="equip-right-panel">
        ${csRightPanelDefault()}
      </div>
      <div class="equip-footer">
        <div class="equip-carry">
          <span class="equip-carry-face">${carryFace}</span>
          <span class="equip-carry-text">${totalWeight.toFixed(1)} / ${carryMax} lb</span>
          <div class="equip-carry-bar-wrap">
            <div class="equip-carry-bar" style="width:${barPct}%;background:${barColor}"></div>
          </div>
        </div>
        <div class="equip-currency">
          ${[["pp","PP"],["gp","GP"],["ep","EP"],["sp","SP"],["cp","CP"]].map(([k,lbl]) => `
            <div class="equip-coin ${k}">
              <span class="equip-coin-label">${lbl}</span>
              <input class="equip-coin-input" type="number" min="0"
                value="${cur[k]||0}"
                id="cs-cur-${k}"
                onchange="csUpdateCurrency()"
                aria-label="${lbl}">
            </div>`).join("")}
        </div>
      </div>
    </div>
    ${csBuildProfAccordion()}
  </div>`;
}

// ── Right panel tab state ──

function csSetRightTab(tab) {
  _rightTab = tab;
  const body = document.getElementById('equip-right-body');
  const searchBtn = document.querySelector('.equip-right-tab:first-child');
  const detailBtn = document.getElementById('equip-tab-detail');
  if (!body) return;
  if (tab === 'search') {
    document.querySelectorAll('.equip-item-row').forEach(r => r.classList.remove('selected'));
    _selectedItemIdx = null;
    body.innerHTML = csRightPanelSearch();
    if (searchBtn) searchBtn.classList.add('active');
    if (detailBtn) { detailBtn.classList.remove('active'); detailBtn.disabled = true; }
  } else if (tab === 'detail' && _selectedItemIdx !== null) {
    if (searchBtn) searchBtn.classList.remove('active');
    if (detailBtn) { detailBtn.classList.add('active'); detailBtn.disabled = false; }
    body.innerHTML = csRightPanelDetailHtml(_currentInv[_selectedItemIdx]);
  }
}

function csRightPanelDefault() {
  _rightTab = 'search';
  return `
    <div class="equip-right-tabs">
      <button class="equip-right-tab active" onclick="csSetRightTab('search')">&#128269; Search</button>
      <button class="equip-right-tab" onclick="csSetRightTab('detail')" id="equip-tab-detail" disabled>Detail</button>
    </div>
    <div class="equip-right-body" id="equip-right-body">
      ${csRightPanelSearch()}
    </div>`;
}

function csBuildProfAccordion() {
  const profs = C.proficiencies || {};
  const entries = Object.entries(profs).filter(([,v])=>v);
  if (!entries.length) return '';
  const rows = entries.map(([k,v]) => `
    <div style="break-inside:avoid;margin-bottom:0.5rem">
      <div class="equip-prof-cat">${escapeHtml(k)}</div>
      <div class="equip-prof-item">${escapeHtml(v)}</div>
    </div>`).join('');
  return `
    <div class="equip-prof-accordion">
      <div class="equip-prof-toggle" onclick="csToggleProfAccordion(this)">
        <span>Proficiencies</span>
        <span class="equip-prof-toggle-arrow">&#9654;</span>
      </div>
      <div class="equip-prof-body">${rows}</div>
    </div>`;
}

function csToggleProfAccordion(btn) {
  const body  = btn.parentElement.querySelector('.equip-prof-body');
  const arrow = btn.querySelector('.equip-prof-toggle-arrow');
  body.classList.toggle('open');
  arrow.classList.toggle('open');
}


function csRightPanelSearch() {
  return `
    <input class="equip-search-input" id="equip-search-input"
      placeholder="Search items… e.g. Longsword"
      oninput="csSearchItems(this.value)"
      autocomplete="off">
    <div class="equip-search-results" id="cs-item-results">
      <div class="cs-item-empty">Type to search all 5etools items…</div>
    </div>`;
}


function csAccordionContent(item, i, editMode = false) {
  if (editMode) {
    const attackStats = ["STR","DEX","CHA","INT","WIS","CON"];
    const dmgTypeOpts = [
      ['S','Slashing'],['P','Piercing'],['B','Bludgeoning'],
      ['R','Radiant'],['N','Necrotic'],['T','Thunder'],
      ['F','Fire'],['C','Cold'],['L','Lightning'],
      ['A','Acid'],['PS','Poison'],['Psy','Psychic'],['For','Force'],
    ];
    const currentStat    = item.attackStat || "";
    const currentDmgType = item.dmgType    || "";
    const currentXType   = item.extraDmg?.type || "";
    const contents = Array.isArray(item.contents) ? item.contents : [];
    const contentsHtml = contents.map((c, ci) => {
      const name = typeof c === 'string' ? c : c.name;
      const qty  = typeof c === 'object' ? (c.qty || 1) : 1;
      return `<div class="equip-cont-edit-row" id="equip-cont-edit-${i}-${ci}">
        <input class="equip-acc-field" style="flex:1" value="${escapeHtml(name)}" id="cont-name-${i}-${ci}">
        <input class="equip-acc-field" style="width:40px;text-align:center" type="number" min="1" value="${qty}" id="cont-qty-${i}-${ci}">
        <button class="equip-acc-btn danger" style="padding:0.15rem 0.4rem" onclick="csRemoveContainerItem(${i},${ci})">\u2715</button>
      </div>`;
    }).join('');
    return `
      <div class="equip-acc-edit">
        <span class="equip-acc-field-label">Display name</span>
        <input class="equip-acc-field" id="acc-edit-name-${i}" value="${escapeHtml(item.name)}">
        <span class="equip-acc-field-label">5etools alias (for enrichment lookup)</span>
        <input class="equip-acc-field" id="acc-edit-alias-${i}" value="${escapeHtml(item.alias||'')}" placeholder="e.g. Longsword">
        <span class="equip-acc-field-label">Detail line</span>
        <input class="equip-acc-field" id="acc-edit-detail-${i}" value="${escapeHtml(item.detail||'')}" placeholder="e.g. martial \u00B7 1d8 S \u00B7 3 lb">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.4rem;margin-top:0.3rem">
          <div>
            <span class="equip-acc-field-label">Damage type override</span>
            <select class="equip-acc-select" id="acc-edit-dmgtype-${i}">
              <option value="">\u2014 keep base \u2014</option>
              ${dmgTypeOpts.map(([v,l])=>`<option value="${v}"${currentDmgType===v?' selected':''}>${l}</option>`).join('')}
            </select>
          </div>
          <div>
            <span class="equip-acc-field-label">Attack stat override</span>
            <select class="equip-acc-select" id="acc-edit-stat-${i}">
              <option value="">\u2014 default \u2014</option>
              ${attackStats.map(s=>`<option value="${s}"${currentStat===s?' selected':''}>${s}</option>`).join('')}
            </select>
          </div>
          <div>
            <span class="equip-acc-field-label">Damage bonus (e.g. +1)</span>
            <input class="equip-acc-field" id="acc-edit-dmgbonus-${i}" value="${escapeHtml(item.dmgBonus||'')}" placeholder="+1">
          </div>
          <div>
            <span class="equip-acc-field-label">Extra dmg dice (e.g. 1d6)</span>
            <input class="equip-acc-field" id="acc-edit-xdice-${i}" value="${escapeHtml(item.extraDmg?.dice||'')}" placeholder="1d6">
          </div>
          <div>
            <span class="equip-acc-field-label">Extra dmg type</span>
            <select class="equip-acc-select" id="acc-edit-xtype-${i}">
              <option value="">\u2014 none \u2014</option>
              ${dmgTypeOpts.map(([v,l])=>`<option value="${v}"${currentXType===v?' selected':''}>${l}</option>`).join('')}
            </select>
          </div>
        </div>
        <span class="equip-acc-field-label" style="margin-top:0.4rem">Flavor text</span>
        <textarea class="equip-acc-field" id="acc-edit-flavor-${i}" rows="2" style="resize:vertical" placeholder="Custom description or lore…">${escapeHtml(item.flavor||'')}</textarea>
        <span class="equip-acc-field-label">Session notes</span>
        <textarea class="equip-acc-field" id="acc-edit-notes-${i}" rows="2" style="resize:vertical">${escapeHtml(item.notes||'')}</textarea>
        <span class="equip-acc-field-label" style="margin-top:0.5rem">Container contents</span>
        <div id="equip-cont-edit-list-${i}">${contentsHtml}</div>
        <button class="equip-acc-btn" style="margin-top:0.3rem;width:100%" onclick="csAddContainerItem(${i})">+ Add item to container</button>
      </div>
      <div class="equip-acc-actions">
        <button class="equip-acc-btn primary" onclick="csSaveItemEdit(${i})">Save</button>
        <button class="equip-acc-btn" onclick="csCloseEdit(${i})">Cancel</button>
        <button class="equip-acc-btn danger" onclick="csDeleteItem(${i})" style="margin-left:auto">\u2715 Delete</button>
      </div>`;
  }
  const stats = [];
  if (item.price)  stats.push(["Price", item.price]);
  if (item.dmg1 && item.dmgType) stats.push(["Damage", `${item.dmg1} ${item.dmgType}${item.dmg2 ? ` / ${item.dmg2} (two-handed)` : ''}`]);
  if (item.range)  stats.push(["Range", `${item.range} ft.`]);
  if (item.ac !== undefined && item.ac !== null) stats.push(["AC", item.ac]);
  if (item.strength) stats.push(["Str required", item.strength]);
  if (item.stealth)  stats.push(["Stealth", "Disadvantage"]);
  if (item.weight) stats.push(["Weight", `${item.weight} lb`]);
  if (item.reqAttune) stats.push(["Attunement", item.reqAttune]);
  if (item.attackStat) stats.push(["Attack stat", item.attackStat]);
  if (item.sourceFull || item.source) stats.push(["Source", item.sourceFull || item.source]);
  const statsHtml = stats.map(([k,v]) =>
    `<div class="equip-acc-stat"><span>${escapeHtml(k)}</span><span>${escapeHtml(String(v))}</span></div>`
  ).join("");

  // Weapon category / type line
  const catLine = (item.weaponCat || item.typeLabel)
    ? `<div style="font-size:0.75rem;color:var(--muted);font-style:italic;margin-bottom:0.4rem">${escapeHtml(item.weaponCat || item.typeLabel)}</div>`
    : "";

  // Properties with descriptions
  const props = Array.isArray(item.properties) ? item.properties : [];
  const propsHtml = props.length ? `
    <div style="margin-top:0.4rem;margin-bottom:0.3rem">
      ${props.map(p => `
        <div style="margin-bottom:0.35rem">
          <span style="font-family:var(--font-title);font-size:0.75rem;color:var(--gold-light)">${escapeHtml(p.name || p)}</span>
          ${p.desc ? `<div style="font-size:0.72rem;color:var(--muted);margin-top:0.1rem">${escapeHtml(p.desc)}</div>` : ""}
        </div>`).join("")}
    </div>` : "";

  const entries = Array.isArray(item.entries) ? item.entries : [];
  const desc = entries.length
    ? `<div class="equip-acc-desc">${entries.map(e => `<p>${escapeHtml(e)}</p>`).join("")}</div>`
    : "";
  const contents = Array.isArray(item.contents) && item.contents.length > 0
    ? `<div class="equip-acc-section">Contents</div>
       <div class="equip-container-list" id="equip-cont-${i}">
         ${item.contents.map((c, ci) => `
           <div class="equip-container-item">
             <span class="equip-container-item-name">${escapeHtml(typeof c === 'string' ? c : c.name)}</span>
             ${typeof c === 'object' && c.qty > 1 ? `<span class="equip-container-item-qty">×${c.qty}</span>` : ''}
           </div>`).join('')}
       </div>` : '';
  return `
    ${catLine}${statsHtml}${contents}${propsHtml}${desc}
    <div class="equip-acc-actions">
      <button class="equip-acc-btn primary" onclick="csEditItem(${i})">\u270E Edit</button>
      <button class="equip-acc-btn" onclick="csReorderItem(${i}, ${i}-1 >= 0 ? ${i}-1 : 0)">\u2191 Up</button>
      <button class="equip-acc-btn" onclick="csReorderItem(${i}, ${i}+1)">\u2193 Down</button>
      <button class="equip-acc-btn danger" onclick="csDeleteItem(${i})">\u2715 Remove</button>
    </div>`;
}


// ── BIO TAB ──
