    bar.style.display = 'none';
  }
}

// ══════════════════════════════════════════════════════════
// FILTERS
// ══════════════════════════════════════════════════════════
function filterBySession(n) { activeFilters.session = n; renderSidebar(); renderEntries(); if(n!==null){const el=document.getElementById(`session-block-${n}`);if(el)el.scrollIntoView({behavior:'smooth'});} }
function filterByAuthor(a)  { activeFilters.author  = activeFilters.author===a?null:a; renderSidebar(); renderEntries(); }
function filterByTag(t)     { const tl=t.toLowerCase(); if(activeFilters.tags.includes(tl)){activeFilters.tags=activeFilters.tags.filter(x=>x!==tl);}else{activeFilters.tags.push(tl);} renderSidebar(); renderEntries(); }
function removeTagFilter(t) { activeFilters.tags=activeFilters.tags.filter(x=>x!==t); renderSidebar(); renderEntries(); }
function clearSearch()      { activeFilters.search=''; document.getElementById('c-search').value=''; renderEntries(); }
function clearAllFilters()  { activeFilters={session:null,author:null,tags:[],search:''}; document.getElementById('c-search').value=''; renderSidebar(); renderEntries(); }
function applyFilters()     { activeFilters.search=document.getElementById('c-search').value.trim(); renderEntries(); }

// ══════════════════════════════════════════════════════════
// ENTRY MENU
// ══════════════════════════════════════════════════════════
function toggleEntryMenu(id, e) {
  e.stopPropagation();
  document.querySelectorAll('.c-entry-dropdown').forEach(d=>{if(d.id!==`menu-${id}`)d.classList.remove('open');});
  document.getElementById(`menu-${id}`).classList.toggle('open');
}
document.addEventListener('click', ()=>document.querySelectorAll('.c-entry-dropdown').forEach(d=>d.classList.remove('open')));

function editEntry(id) {
  const entry = allEntries.find(e=>e.id===id);
  if (!entry) return;
  editingEntryId = id;
  document.getElementById('d-session').value  = entry.session||'';
  document.getElementById('d-title').value    = entry.sessionTitle||'';
  document.getElementById('d-location').value = entry.location||'';
  if (quill) quill.root.innerHTML = entry.text||'';
  if (!drawerOpen) toggleDrawer();
  setDrawerStatus(`Editing entry from ${new Date(entry.timestamp).toLocaleDateString()}`, 'loading');
}

async function deleteEntry(id) {
  if (!confirm('Delete this entry? This cannot be undone.')) return;
  const backup = [...allEntries];
  allEntries = allEntries.filter(e=>e.id!==id);
  renderSidebar();
  renderEntries();
  try {
    const res = await fetch(FUNCTION_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ _replaceAll: true, entries: allEntries, message: `Chronicle: deleted entry ${id}` }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  } catch(e) {
    // Revert on failure
    allEntries = backup;
    renderSidebar();
    renderEntries();
    alert('Delete failed: ' + e.message);
  }
}

// ══════════════════════════════════════════════════════════
// SUBMIT
// ══════════════════════════════════════════════════════════
async function submitEntry() {
  if (!currentIdentity) { openModal(); return; }

  // Apply mentionMap to any spans that weren't tagged by the DOM tagger
  // (catches cases where Quill re-rendered before the setTimeout ran)
  if (quill) {
    quill.root.querySelectorAll('span[style*="color"]').forEach(span => {
      const spanText = span.textContent.trim();
      const mapEntry = mentionMap[spanText];
      if (mapEntry && !span.dataset.mentionType) {
        span.dataset.mentionType = mapEntry.type;
        span.dataset.mentionKey  = mapEntry.key;
      }
    });
  }

  const sessionNum = parseInt(document.getElementById('d-session').value);
  const rawHTML    = quill ? quill.root.innerHTML : '';
  const text       = rawHTML.replace(/<p><br><\/p>/g,'').trim();

  if (!sessionNum && sessionNum !== 0) { setDrawerStatus('Please enter a session number.','error'); return; }
  if (!text || text === '<p></p>') { setDrawerStatus('Please write something before submitting.','error'); return; }

  // Extract #hashtags — always lowercase for consistent filtering
  const tagMatches = rawHTML.match(/#([a-zA-Z][a-zA-Z0-9_-]*)/g)||[];
  const hashTags = tagMatches
    .map(t => t.slice(1).toLowerCase().trim())
    .filter(t => !/^[0-9a-f]{3}$|^[0-9a-f]{6}$/i.test(t)); // exclude hex color codes

  // Extract resolved NPC and location mentions as tags (skip unresolved — not confirmed entries)
  const mentionTags = [];
  if (quill) {
    quill.root.querySelectorAll('[data-mention-type]').forEach(span => {
      const mtype = span.dataset.mentionType;
      const mkey  = span.dataset.mentionKey;
      if (mkey && mtype !== 'npc-unresolved' && mtype !== 'location-unresolved' && !mentionTags.includes(mkey.toLowerCase())) {
        mentionTags.push(mkey.toLowerCase());
      }
    });
  }

  const tags = [...new Set([...hashTags, ...mentionTags])];
  const cleanHTML = rawHTML.replace(/#[a-zA-Z][a-zA-Z0-9_-]* ?/g,'');
  const title    = document.getElementById('d-title').value.trim();
  const location = document.getElementById('d-location').value.trim();

  const entry = {
    id:           editingEntryId || Date.now().toString(),
    session:      sessionNum,
    ...(title    && { sessionTitle: title }),
    ...(location && { location }),
    author:       currentIdentity.name,
    character:    currentIdentity.character,
    color:        currentIdentity.color,
    timestamp:    editingEntryId ? (allEntries.find(e=>e.id===editingEntryId)?.timestamp||new Date().toISOString()) : new Date().toISOString(),
    text:         cleanHTML,
    ...(tags.length && { tags }),
  };

  setDrawerStatus('Submitting…','loading');
  document.getElementById('drawer-submit').disabled = true;

  try {
    if (editingEntryId) {
      allEntries = allEntries.map(e=>e.id===editingEntryId?entry:e);
    } else {
      allEntries = [entry, ...allEntries];
    }
    const res  = await fetch(FUNCTION_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(entry),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error||`HTTP ${res.status}`);
    editingEntryId = null;
    clearDraft();
    setDrawerStatus('Entry added — visible to everyone shortly.','success');
    renderSidebar();
    renderEntries();
    setTimeout(()=>{ const el=document.getElementById(`entry-${entry.id}`); if(el)el.scrollIntoView({behavior:'smooth',block:'center'}); },100);
  } catch(e) {
    setDrawerStatus(`Failed: ${e.message}`,'error');
    if (!editingEntryId) allEntries = allEntries.filter(x=>x.id!==entry.id);
  } finally {
    document.getElementById('drawer-submit').disabled = false;
  }
}

async function writeChronicle(message) {
  const res = await fetch(FUNCTION_URL, {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify({ _replaceAll: true, entries: allEntries, message }),
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
}

function setDrawerStatus(msg, type) {
  const el = document.getElementById('drawer-status');
  if (el) { el.textContent = msg; el.className = `c-drawer-status ${type}`; }
}

// ══════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  loadIdentity();
  updateDrawerIdentity();
  if (currentIdentity?.playerId === 'dm') document.getElementById('dm-session-ctrl').style.display = 'block';
  initQuill();
  loadChronicle();

  // Close inline dropdown on outside click
  document.addEventListener('click', e => {
    if (!document.getElementById('inline-dropdown').contains(e.target)) hideInlineDropdown();
  });

  // Save draft on field input
  ['d-session','d-title','d-location'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('input', saveDraft);
  });
});
