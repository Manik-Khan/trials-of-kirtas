<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Party — The Trials of Kirtas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="theme.css">
  <style>
    /* ============ PARTY MENU — takeover of the party page ============
       Live data via CharacterData (Supabase). Colors come from theme.css tokens
       so the page rides the active theme; under Phantom it reads like the mock. */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    .pm {
      --bg:      var(--ink);
      --field:   var(--ink-deep);
      --fg:      var(--parchment);
      --fg-dim:  var(--aged);
      --accent:  var(--blood);
      --accent2: var(--gold);
      --line:    var(--gold-dim);
      --f-disp:  'Cinzel', serif;
      --f-word:  'Barlow Condensed', sans-serif;
      --f-body:  var(--font-body, 'Crimson Pro', Georgia, serif);
      position: fixed; inset: 0; top: var(--pm-top, 52px);
      background: var(--bg); color: var(--fg);
      font-family: var(--f-word);
      overflow: hidden;
    }
    .pm .screen { position: absolute; inset: 0; display: none; }
    .pm .screen.on { display: block; }

    .pm-status { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 10px; color: var(--fg-dim); letter-spacing: .2em; font-size: 14px; }
    .pm-status .big { font-family: var(--f-disp); font-size: 22px; letter-spacing: .1em; color: var(--fg); }

    .pm .prompts { position: absolute; bottom: 0; left: 0; right: 0; height: 50px; display: flex;
      align-items: center; justify-content: flex-end; gap: 24px; padding: 0 28px; z-index: 6;
      font-size: 13px; letter-spacing: .18em; font-weight: 600; color: var(--fg-dim); }
    .pm .prompts .p { display: flex; align-items: center; gap: 7px; }
    .pm kbd { font-family: var(--f-word); font-weight: 600; font-size: 11px; min-width: 20px; height: 20px;
      padding: 0 6px; display: inline-flex; align-items: center; justify-content: center;
      background: var(--field); color: var(--fg); border: 1px solid var(--line); border-radius: 3px; }

    #pm-party .row { position: absolute; inset: 12px 0 50px 0; display: flex; }
    .pcard { position: relative; flex: 1 1 0; min-width: 0; cursor: pointer; overflow: hidden; outline: none;
      border-right: 1px solid var(--line); transition: flex .38s cubic-bezier(.22,.9,.3,1); background: var(--field); }
    .pcard:last-child { border-right: none; }
    .pcard.sel { flex: 1.55 1 0; }
    .pcard .portrait { position: absolute; inset: 0; background-size: cover; background-position: top center;
      filter: saturate(.85); transition: opacity .35s ease, filter .35s ease; }
    .pcard .wash { position: absolute; inset: 0; transition: opacity .35s ease;
      background: linear-gradient(to top, var(--field) 4%, rgba(0,0,0,0) 55%),
                  radial-gradient(120% 80% at 50% 0%, rgba(0,0,0,.45) 0%, rgba(0,0,0,0) 60%); }
    .pcard.dim { filter: saturate(.4); }
    .pcard.dim .portrait { opacity: .55; }
    .pcard .initial { position: absolute; top: 7%; left: 50%; transform: translateX(-50%);
      font-family: var(--f-disp); font-weight: 700; font-size: min(24vw, 280px); line-height: 1;
      color: var(--fg); opacity: .14; user-select: none; }
    .pcard.sel .initial { opacity: .2; }
    .badge { position: absolute; top: 14px; right: 0; font-weight: 700; font-size: 13px; letter-spacing: .26em;
      padding: 5px 13px 5px 16px; background: var(--field); color: var(--fg); border: 1px solid var(--line);
      border-right: none; transition: background .25s, color .25s; max-width: 90%; overflow: hidden;
      white-space: nowrap; text-overflow: ellipsis; }
    .pcard.sel .badge { background: var(--accent); color: var(--parchment); border-color: var(--accent); }
    .slash { position: absolute; inset: 0; pointer-events: none; opacity: 0; transition: opacity .3s;
      background: linear-gradient(115deg, transparent calc(50% - 1.5px), var(--accent) calc(50% - 1.5px) calc(50% + 1.5px), transparent calc(50% + 1.5px)); }
    .pcard.sel .slash { opacity: .85; }
    .plate { position: absolute; left: 0; right: 0; bottom: 0; padding: 16px 16px 18px;
      background: linear-gradient(to top, var(--field) 60%, rgba(0,0,0,0)); }
    .nm { font-family: var(--f-disp); font-weight: 700; font-size: clamp(15px, 1.8vw, 24px); letter-spacing: .04em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .epi { font-family: var(--f-body); font-style: italic; font-size: 13px; color: var(--fg-dim); margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .vit { display: flex; align-items: center; gap: 12px; margin-top: 11px; }
    .hpwrap { flex: 1 1 auto; min-width: 0; }
    .hplabel { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; letter-spacing: .12em; }
    .hpbar { height: 5px; background: rgba(0,0,0,.3); margin-top: 4px; }
    .hpbar i { display: block; height: 100%; background: var(--fg-dim); }
    .pcard.sel .hpbar i { background: var(--accent); }
    .stat { text-align: center; line-height: 1; } .stat b { display: block; font-size: 18px; font-weight: 700; }
    .stat span { font-size: 10px; letter-spacing: .2em; color: var(--fg-dim); }

    .inkfield { position: absolute; top: 0; bottom: 0; left: 0; width: 46%; background: var(--field);
      clip-path: polygon(0 0, 100% 0, 72% 100%, 0 100%); z-index: 1; overflow: hidden; }
    .inkfield .pbg { position: absolute; inset: 0; background-size: cover; background-position: top center;
      opacity: .14; filter: saturate(.6); }
    .inkfield .ghost { position: absolute; right: -3%; top: 5%; font-family: var(--f-disp); font-weight: 700;
      font-size: min(33vh, 290px); line-height: 1; color: var(--fg); opacity: .06; user-select: none; }
    .inkfield .who { position: absolute; left: 32px; top: 24px; right: 30%; }
    .inkfield .nm2 { font-family: var(--f-disp); font-weight: 700; color: var(--fg); font-size: clamp(19px, 2.3vw, 30px); letter-spacing: .04em; }
    .inkfield .cls2 { margin-top: 5px; font-size: 13px; font-weight: 600; letter-spacing: .14em; color: var(--accent2); line-height: 1.4; }

    .words { position: absolute; left: 32px; top: 21%; bottom: 56px; display: flex; flex-direction: column;
      justify-content: center; gap: 0; z-index: 2; }
    .word { font-family: var(--f-word); font-weight: 700; text-transform: uppercase; font-size: clamp(26px, 5vh, 46px);
      line-height: 1.05; letter-spacing: .02em; color: var(--fg); opacity: .32; cursor: pointer; user-select: none;
      position: relative; padding-left: 24px; transition: opacity .2s, transform .25s cubic-bezier(.22,.9,.3,1);
      background: none; border: none; text-align: left; display: block; }
    .word .sub { display: block; font-size: 11px; font-weight: 500; letter-spacing: .26em; opacity: 0;
      color: var(--accent2); line-height: 1.3; max-height: 0; overflow: hidden; transition: opacity .2s, max-height .2s; }
    .word.sel { opacity: 1; transform: translateX(12px); }
    .word.sel .sub { opacity: 1; max-height: 18px; }
    .word.sel::before { content: ''; position: absolute; left: 0; top: 12%; bottom: 30%; width: 5px;
      background: var(--accent); transform: skewX(-14deg); }
    .word:hover { opacity: .7; } .word.sel:hover { opacity: 1; }

    .pane { position: absolute; top: 0; bottom: 50px; left: 48%; right: 0; z-index: 2; display: flex; flex-direction: column; }
    .work { flex: 1 1 auto; min-height: 0; overflow-y: auto; padding: 26px 36px 16px 52px; }
    .work h2 { font-family: var(--f-word); font-weight: 700; font-size: 26px; letter-spacing: .16em; }
    .work .ruleline { height: 3px; width: 56px; background: var(--accent); margin: 8px 0 20px; transform: skewX(-30deg); }
    .pane-enter { animation: paneIn .26s ease both; } @keyframes paneIn { from { opacity: 0; transform: translateX(12px); } to { opacity: 1; transform: none; } }

    .detail { flex: none; height: 160px; border-top: 2px solid var(--accent); background: var(--field);
      padding: 14px 36px 14px 52px; overflow-y: auto; }
    .detail.empty { display: flex; align-items: center; color: var(--fg-dim); font-size: 14px; letter-spacing: .14em; }
    .d-head { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
    .d-name { font-family: var(--f-disp); font-weight: 700; font-size: 20px; color: var(--fg); }
    .d-type { font-size: 12px; letter-spacing: .18em; color: var(--fg-dim); font-weight: 600; }
    .d-tag { font-size: 10px; letter-spacing: .16em; font-weight: 700; color: var(--accent2); border: 1px solid var(--accent2); padding: 2px 6px; }
    .d-body { font-family: var(--f-body); font-size: 15px; line-height: 1.55; color: var(--fg); opacity: .92; margin-top: 6px; max-width: 640px; }

    .lrow { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; cursor: pointer;
      border-bottom: 1px solid var(--line); transition: background .12s; }
    .lrow:hover { background: rgba(0,0,0,.18); } .lrow.sel { background: var(--accent); color: var(--parchment); }
    .lrow .v { font-weight: 700; min-width: 46px; text-align: right; } .lrow .nm3 { font-size: 17px; font-weight: 500; }
    .lrow.pro .nm3::before { content: '\25C6'; color: var(--accent); margin-right: 9px; font-size: 10px; vertical-align: 2px; }
    .lrow.sel.pro .nm3::before { color: var(--parchment); }
    .lrow:not(.pro) .nm3::before { content: '\25C7'; color: var(--fg-dim); margin-right: 9px; font-size: 10px; vertical-align: 2px; }

    .vrow { display: flex; flex-wrap: wrap; gap: 22px; margin-bottom: 18px; }
    .vbig { line-height: 1; } .vbig b { font-family: var(--f-disp); font-size: 27px; font-weight: 700; display: block; }
    .vbig span { font-size: 10px; letter-spacing: .22em; color: var(--fg-dim); } .vbig.accent b { color: var(--accent); }
    .abil { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 460px; }
    .ab { border: 1px solid var(--line); padding: 11px 8px 9px; text-align: center; cursor: pointer; transition: background .12s; }
    .ab:hover { background: rgba(0,0,0,.18); } .ab.sel { background: var(--accent); color: var(--parchment); }
    .ab .lbl { font-size: 11px; font-weight: 600; letter-spacing: .26em; color: var(--fg-dim); }
    .ab.sel .lbl { color: var(--parchment); opacity: .8; }
    .ab .mod { font-family: var(--f-disp); font-weight: 700; font-size: 24px; margin-top: 2px; }
    .ab .raw { font-size: 11px; color: var(--fg-dim); } .ab.sel .raw { color: var(--parchment); opacity: .8; }

    .grp-title { font-size: 11px; font-weight: 700; letter-spacing: .24em; color: var(--fg-dim); margin: 16px 0 6px; }
    .grp-title:first-of-type { margin-top: 0; }
    .pips { display: inline-flex; gap: 5px; margin-left: 8px; vertical-align: middle; }
    .pip { width: 11px; height: 11px; transform: rotate(45deg); border: 2px solid var(--accent); }
    .pip.full { background: var(--accent); }

    .cgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; max-width: 620px; }
    .citem { border: 1px solid var(--line); padding: 8px 10px; cursor: pointer; transition: background .12s; }
    .citem:hover { background: rgba(0,0,0,.18); } .citem.sel { background: var(--accent); color: var(--parchment); }
    .citem .ci-n { font-size: 14px; font-weight: 500; line-height: 1.2; }
    .citem .ci-d { font-size: 11px; color: var(--fg-dim); margin-top: 2px; } .citem.sel .ci-d { color: var(--parchment); opacity: .85; }

    .money { display: flex; gap: 18px; margin-top: 18px; }
    .coin { text-align: center; } .coin b { display: block; font-family: var(--f-disp); font-size: 18px; } .coin span { font-size: 10px; letter-spacing: .2em; color: var(--fg-dim); }

    .story { max-width: 560px; font-family: var(--f-body); font-size: 16px; line-height: 1.7; color: var(--fg); }
    .story .seg { margin-bottom: 16px; }
    .story .seg .lab { font-family: var(--f-word); font-size: 11px; font-weight: 700; letter-spacing: .24em; color: var(--accent2); text-transform: uppercase; margin-bottom: 3px; }
    .story .seg .txt { opacity: .92; } .story .seg .txt.muted { opacity: .5; font-style: italic; }
    .story-toggle { display: inline-flex; gap: 0; margin-bottom: 18px; border: 1px solid var(--line); }
    .story-toggle button { font-family: var(--f-word); font-weight: 600; font-size: 12px; letter-spacing: .18em;
      padding: 6px 16px; background: none; border: none; color: var(--fg-dim); cursor: pointer; }
    .story-toggle button.on { background: var(--accent); color: var(--parchment); }
    /* Notes editor (write-back) */
    .notes-edit { width: 100%; min-height: 200px; resize: vertical; box-sizing: border-box;
      background: transparent; color: var(--fg); border: 1px solid var(--line); border-radius: 2px;
      padding: 12px 14px; font-family: inherit; font-size: 14px; line-height: 1.6; }
    .notes-edit:focus { outline: none; border-color: var(--accent); }
    .notes-bar { display: flex; align-items: center; justify-content: flex-end; gap: 14px; margin-top: 10px; }
    .notes-status { font-size: 12px; letter-spacing: .06em; color: var(--fg-dim); }
    .notes-status.ok  { color: var(--accent); }
    .notes-status.err { color: var(--blood); }
    .notes-save { font-family: var(--f-word); font-weight: 600; font-size: 12px; letter-spacing: .18em;
      padding: 8px 18px; background: var(--accent); color: var(--parchment); border: none; cursor: pointer; }
    .notes-save:disabled { background: transparent; color: var(--fg-dim); border: 1px solid var(--line); cursor: default; }
    #pm-work.focused { box-shadow: inset 2px 0 0 var(--accent); }

    .switch { position: absolute; top: 14px; right: 22px; z-index: 4; display: flex; align-items: center; gap: 9px; }
    .switch .dot { width: 9px; height: 9px; transform: rotate(45deg); background: rgba(0,0,0,.25); cursor: pointer; border: 1px solid var(--line); padding: 0; }
    .switch .dot.sel { background: var(--accent); border-color: var(--accent); }

    @media (prefers-reduced-motion: reduce) { .pm *, .pm *::before, .pm *::after { transition: none !important; animation: none !important; } }
  </style>
</head>
<body>

  <div id="nav-root"></div>

  <div class="pm" id="pm">
    <section class="screen on" id="pm-party">
      <div class="row" id="pm-row"></div>
      <div class="prompts"><span class="p"><kbd>&larr;</kbd><kbd>&rarr;</kbd> SELECT</span><span class="p"><kbd>&crarr;</kbd> OPEN</span></div>
    </section>

    <section class="screen" id="pm-sheet">
      <div class="inkfield">
        <div class="pbg" id="pm-pbg"></div>
        <div class="ghost" id="pm-ghost">&nbsp;</div>
        <div class="who"><div class="nm2" id="pm-nm">&mdash;</div><div class="cls2" id="pm-cls">&mdash;</div></div>
      </div>
      <nav class="words" id="pm-words"></nav>
      <div class="switch" id="pm-switch"></div>
      <div class="pane">
        <div class="work" id="pm-work"></div>
        <div class="detail empty" id="pm-detail">SELECT AN ENTRY TO SEE ITS DETAIL</div>
      </div>
      <div class="prompts">
        <span class="p"><kbd>&uarr;</kbd><kbd>&darr;</kbd> MOVE</span>
        <span class="p"><kbd>&rarr;</kbd><kbd>&larr;</kbd> ENTER / BACK</span>
        <span class="p"><kbd>[</kbd><kbd>]</kbd> CHARACTER</span>
        <span class="p"><kbd>ESC</kbd> PARTY</span>
      </div>
    </section>

    <div class="pm-status" id="pm-status"><div class="big">The Party</div><div>gathering the company&hellip;</div></div>
  </div>

  <script src="character-data.js"></script>
  <script src="characters.js"></script>
  <script src="nav.js"></script>
  <script src="battle.js"></script>
  <script src="feed-bridge.js"></script>
  <script>
  /* ============ PARTY MENU app — read-only v1, live data ============ */
  (function () {
    'use strict';
    const $ = s => document.querySelector(s);
    const esc = s => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
    const sgn = n => (n >= 0 ? '+' : '') + n;
    // Per-character portrait framing (background-position). Full-body art often
    // wants a slight downward nudge vs the default 'top center'; tune the value.
    const PORT_POS = { liadan: 'center 18%' };

    const SECTIONS = [
      { id: 'stats',    word: 'STATS',    sub: 'ABILITIES \u00B7 SAVES' },
      { id: 'skills',   word: 'SKILLS',   sub: 'PROFICIENCIES' },
      { id: 'features', word: 'FEATURES', sub: 'CLASS \u00B7 RACE \u00B7 FEATS' },
      { id: 'spells',   word: 'SPELLS',   sub: 'SLOTS \u00B7 PREPARED' },
      { id: 'gear',     word: 'GEAR',     sub: 'CARRIED \u00B7 CURRENCY' },
      { id: 'story',    word: 'STORY',    sub: 'BIO \u00B7 NOTES' },
    ];

    const SKILL_DESC = {
      Acrobatics: 'Stay on your feet in a tricky situation, or pull off a tumble, dive, or balance.',
      'Animal Handling': 'Calm, control, or read the intentions of a domesticated or wild animal.',
      Arcana: 'Recall lore about spells, magic items, planes, and arcane symbols.',
      Athletics: 'Climbing, jumping, swimming, and the brute physical contests of grappling and shoving.',
      Deception: 'Convincingly hide the truth through words or actions \u2014 a bluff, a disguise, a misdirection.',
      History: 'Recall lore about historical events, people, kingdoms, and ancient wars.',
      Insight: 'Read a creature\u2019s true intentions \u2014 a lie, a mood, a likely next move.',
      Intimidation: 'Influence through overt threats, hostile actions, or sheer presence.',
      Investigation: 'Deduce from clues, search for hidden details, and reason out how things work.',
      Medicine: 'Stabilize the dying or diagnose an illness.',
      Nature: 'Recall lore about terrain, plants, animals, weather, and natural cycles.',
      Perception: 'Spot, hear, or otherwise notice the presence of something.',
      Performance: 'Delight an audience with music, dance, acting, or storytelling.',
      Persuasion: 'Influence someone in good faith \u2014 tact, social grace, and good nature.',
      Religion: 'Recall lore about deities, rites, holy symbols, and the practices of cults.',
      'Sleight of Hand': 'Pickpocket, plant something, or conceal an object on your person.',
      Stealth: 'Conceal yourself, move silently, and slip past notice.',
      Survival: 'Track, hunt, navigate the wilds, and read the signs of weather and land.',
    };

    const S = { party: [], pi: 0, si: 0, storyTab: 'bio', focus: 'rail', ci: 0 };

    const curHp = c => (c.vitals && c.vitals.hp != null) ? c.vitals.hp : ((c.structural.combat || {}).hp || 0);
    const maxHp = c => ((c.structural.combat || {}).hpMax || 0) + ((c.vitals && c.vitals.hpBonus) || 0);
    const classLine = c => {
      const s = c.structural;
      return [s.classLabel, s.subclass && '(' + s.subclass + ')', s.level && 'Level ' + s.level, s.race]
        .filter(Boolean).join(' \u00B7 ');
    };

    function renderParty() {
      $('#pm-row').innerHTML = S.party.map((c, i) => {
        const cmb = c.structural.combat || {};
        const max = maxHp(c), hp = curHp(c), pct = max ? Math.round(100 * hp / max) : 0;
        const portrait = c.structural.portrait
          ? '<div class="portrait" style="background-image:url(\'' + esc(c.structural.portrait) + '\')'
            + (PORT_POS[c.key] ? ';background-position:' + PORT_POS[c.key] : '') + '"></div>' : '';
        return '<div class="pcard ' + (i === S.pi ? 'sel' : 'dim') + '" data-i="' + i + '" tabindex="0" role="button" aria-label="Open ' + esc(c.name) + '">'
          + portrait + '<div class="initial">' + esc((c.name || '?')[0]) + '</div><div class="wash"></div>'
          + '<div class="badge">' + esc(c.structural.classLabel || '') + '</div><div class="slash"></div>'
          + '<div class="plate"><div class="nm">' + esc(c.name) + '</div><div class="epi">' + esc(c.structural.background || c.structural.race || '') + '</div>'
          + '<div class="vit"><div class="hpwrap"><div class="hplabel"><span>HP</span><span>' + hp + ' / ' + max + '</span></div>'
          + '<div class="hpbar"><i style="width:' + pct + '%"></i></div></div>'
          + '<div class="stat"><b>' + (cmb.ac != null ? cmb.ac : '\u2014') + '</b><span>AC</span></div>'
          + '<div class="stat"><b>' + (cmb.initiative != null ? sgn(cmb.initiative) : '\u2014') + '</b><span>INIT</span></div></div>'
          + '</div></div>';
      }).join('');
      $('#pm-row').querySelectorAll('.pcard').forEach(el => {
        el.addEventListener('mouseenter', () => { S.pi = +el.dataset.i; paintParty(); });
        el.addEventListener('click', () => openSheet(+el.dataset.i));
        el.addEventListener('keydown', e => { if (e.key === 'Enter') openSheet(+el.dataset.i); });
      });
    }
    function paintParty() {
      document.querySelectorAll('.pcard').forEach((el, i) => { el.classList.toggle('sel', i === S.pi); el.classList.toggle('dim', i !== S.pi); });
    }

    function openSheet(i) {
      S.pi = i; S.si = 0; S.focus = 'rail'; S.ci = 0;
      $('#pm-party').classList.remove('on'); $('#pm-sheet').classList.add('on');
      renderSheet();
    }
    function closeSheet() {
      $('#pm-sheet').classList.remove('on'); $('#pm-party').classList.add('on'); paintParty();
    }
    function renderSheet() {
      const c = S.party[S.pi];
      $('#pm-nm').textContent = c.name;
      $('#pm-cls').textContent = classLine(c);
      $('#pm-ghost').textContent = (c.name || '?')[0];
      $('#pm-pbg').style.backgroundImage = c.structural.portrait ? "url('" + c.structural.portrait + "')" : 'none';
      $('#pm-pbg').style.backgroundPosition = PORT_POS[c.key] || '';
      $('#pm-words').innerHTML = SECTIONS.map((s, i) =>
        '<button class="word ' + (i === S.si ? 'sel' : '') + '" data-i="' + i + '">' + s.word + '<span class="sub">' + s.sub + '</span></button>').join('');
      $('#pm-words').querySelectorAll('.word').forEach(el => el.addEventListener('click', () => { S.si = +el.dataset.i; paintSection(); }));
      $('#pm-switch').innerHTML = S.party.map((p, i) => '<button class="dot ' + (i === S.pi ? 'sel' : '') + '" data-i="' + i + '" aria-label="' + esc(p.name) + '"></button>').join('');
      $('#pm-switch').querySelectorAll('.dot').forEach(el => el.addEventListener('click', () => gotoChar(+el.dataset.i)));
      paintSection();
    }
    function clearDetail(msg) { const d = $('#pm-detail'); d.className = 'detail empty'; d.textContent = msg || 'SELECT AN ENTRY TO SEE ITS DETAIL'; }
    function setDetail(html) { const d = $('#pm-detail'); d.className = 'detail'; d.innerHTML = html; }
    function selOne(w, el) { w.querySelectorAll('.lrow,.ab,.citem').forEach(x => x.classList.remove('sel')); if (el) el.classList.add('sel'); }
    // ── two-level keyboard focus: rail (sections) ↔ content (items) ──
    function navRows() { return Array.from($('#pm-work').querySelectorAll('.ab, .lrow, .citem')); }
    function focusRow(i) {
      const rows = navRows();
      if (!rows.length) { S.focus = 'rail'; return; }
      S.ci = ((i % rows.length) + rows.length) % rows.length;
      rows[S.ci].click();                       // reuse each section's own selOne + setDetail
      rows[S.ci].scrollIntoView({ block: 'nearest' });
    }
    function enterContent() {
      if (!navRows().length) return;            // nothing to step into (e.g. STORY)
      S.focus = 'content';
      $('#pm-work').classList.add('focused');
      focusRow(0);
    }
    function exitContent() {
      S.focus = 'rail'; S.ci = 0;
      $('#pm-work').classList.remove('focused');
      selOne($('#pm-work'), null);
      clearDetail(SECTIONS[S.si].id === 'story' ? 'STORY READS IN THE PANE ABOVE' : null);
    }
    function gotoChar(i) {                       // deliberate character switch, keeps current section
      const n = S.party.length;
      S.pi = ((i % n) + n) % n;
      S.focus = 'rail'; S.ci = 0;
      renderSheet();
    }
    function paintSection() {
      document.querySelectorAll('.word').forEach((el, i) => el.classList.toggle('sel', i === S.si));
      const id = SECTIONS[S.si].id, w = $('#pm-work');
      w.innerHTML = WORK[id](S.party[S.pi]);
      w.classList.remove('pane-enter'); void w.offsetWidth; w.classList.add('pane-enter');
      clearDetail(id === 'story' ? 'STORY READS IN THE PANE ABOVE' : null);
      if (WIRE[id]) WIRE[id]($('#pm-work'), S.party[S.pi]);
      // section changes reset S.focus to 'rail' before calling paintSection; if we
      // were in content (e.g. a realtime repaint), restore the highlighted row.
      if (S.focus === 'content') {
        const rows = w.querySelectorAll('.ab, .lrow, .citem');
        if (rows.length) { w.classList.add('focused'); S.ci = Math.min(S.ci, rows.length - 1); rows[S.ci].click(); rows[S.ci].scrollIntoView({ block: 'nearest' }); }
        else { S.focus = 'rail'; w.classList.remove('focused'); }
      } else { w.classList.remove('focused'); }
    }

    const head = (title) => '<h2>' + title + '</h2><div class="ruleline"></div>';

    const WORK = {
      stats(c) {
        const s = c.structural, cmb = s.combat || {}, ab = s.abilities || {};
        const order = ['str','dex','con','int','wis','cha'];
        const vbig = (cls, val, lab) => '<div class="vbig ' + cls + '"><b>' + val + '</b><span>' + lab + '</span></div>';
        return head('STATS') +
          '<div class="vrow">'
          + vbig('accent', curHp(c) + '/' + maxHp(c), 'HIT POINTS')
          + vbig('', cmb.ac != null ? cmb.ac : '\u2014', 'ARMOR CLASS')
          + vbig('', cmb.speed != null ? cmb.speed + 'ft' : '\u2014', 'SPEED')
          + vbig('', cmb.initiative != null ? sgn(cmb.initiative) : '\u2014', 'INITIATIVE')
          + vbig('', s.proficiencyBonus != null ? sgn(s.proficiencyBonus) : '\u2014', 'PROF')
          + vbig('', s.passivePerception != null ? s.passivePerception : '\u2014', 'PASSIVE PERC')
          + '</div>'
          + '<div class="abil">' + order.map(k => { const a = ab[k] || {}; return '<div class="ab" data-ab="' + k + '"><div class="lbl">' + k.toUpperCase() + '</div><div class="mod">' + (a.mod != null ? sgn(a.mod) : '\u2014') + '</div><div class="raw">' + (a.score != null ? a.score : '\u2014') + '</div></div>'; }).join('') + '</div>';
      },
      skills(c) {
        const sk = c.structural.skills || [];
        return head('SKILLS') + sk.map((row, i) => {
          const pro = row.prof && row.prof !== 'none' && row.prof !== '';
          return '<div class="lrow ' + (pro ? 'pro' : '') + '" data-sk="' + i + '"><span class="nm3">' + esc(row.name) + '</span><span class="v">' + sgn(row.bonus || 0) + '</span></div>';
        }).join('');
      },
      features(c) {
        const fs = c.structural.features || [];
        const bySrc = {};
        fs.forEach((f, i) => { const k = f.source || 'Other'; (bySrc[k] = bySrc[k] || []).push(i); });
        return head('FEATURES') + Object.keys(bySrc).map(src =>
          '<div class="grp-title">' + esc(src) + '</div>' + bySrc[src].map(i =>
            '<div class="lrow" data-ft="' + i + '"><span class="nm3">' + esc(fs[i].name) + '</span></div>').join('')
        ).join('');
      },
      spells(c) {
        const sp = c.structural.spells || {}, cf = c.structural.classFeatures || {};
        const slots = [];
        Object.keys(cf).forEach(k => {
          const v = cf[k];
          if (v && typeof v === 'object' && v.max != null) slots.push([k, v.current || 0, v.max]);
          else if (v && typeof v === 'object') Object.keys(v).forEach(lv => { const w = v[lv]; if (w && typeof w === 'object' && w.max != null) slots.push([k + ' ' + lv, w.current || 0, w.max]); });
        });
        const slotHtml = slots.map(([lab, cur, max]) =>
          '<div class="grp-title" style="margin-top:0">' + esc(String(lab).replace(/([A-Z])/g, ' $1').toUpperCase()) + '<span class="pips">'
          + Array.from({ length: max }, (_, k) => '<span class="pip ' + (k < (max - cur) ? 'full' : '') + '"></span>').join('') + '</span></div>').join('');
        const order = Object.keys(sp).sort((a, b) => (a === 'cantrip' ? -1 : b === 'cantrip' ? 1 : a - b));
        const lists = order.map(lvl => {
          const arr = sp[lvl] || [];
          const label = lvl === 'cantrip' ? 'CANTRIPS' : 'LEVEL ' + lvl;
          return '<div class="grp-title">' + label + '</div>' + arr.map((s2, i) =>
            '<div class="lrow" data-sp="' + lvl + ':' + i + '"><span class="nm3">' + esc(s2.name) + '</span><span class="v" style="min-width:auto;font-size:12px;color:var(--fg-dim)">' + esc(s2.castingTime || '') + '</span></div>').join('');
        }).join('');
        return head('SPELLS') + slotHtml + (slotHtml ? '<div style="height:14px"></div>' : '') + (lists || '<div style="color:var(--fg-dim);font-size:14px">No spells.</div>');
      },
      gear(c) {
        const inv = c.inventory || [], cur = c.currency || {};
        const coins = ['pp','gp','ep','sp','cp'].map(k => '<div class="coin"><b>' + (cur[k] != null ? cur[k] : 0) + '</b><span>' + k.toUpperCase() + '</span></div>').join('');
        const grid = inv.length ? '<div class="cgrid">' + inv.map((it, i) =>
          '<div class="citem" data-it="' + i + '"><div class="ci-n">' + esc(it.name) + '</div><div class="ci-d">' + esc(it.detail || it.typeLabel || '') + '</div></div>').join('') + '</div>'
          : '<div style="color:var(--fg-dim);font-size:14px">Nothing carried.</div>';
        return head('GEAR') + grid + '<div class="money">' + coins + '</div>';
      },
      story(c) {
        const bio = c.bio || {}, notes = c.notes || '';
        const tab = S.storyTab;
        const bioSegs = [['Personality', bio.personality], ['Ideals', bio.ideals], ['Bonds', bio.bonds], ['Flaws', bio.flaws], ['Backstory', bio.backstory]];
        const bioHtml = '<div class="story">' + bioSegs.map(seg =>
          '<div class="seg"><div class="lab">' + seg[0] + '</div><div class="txt ' + (seg[1] ? '' : 'muted') + '">' + (seg[1] ? esc(seg[1]) : '\u2014 not recorded \u2014') + '</div></div>').join('') + '</div>';
        const draft = (S.notesDraft && S.notesDraft[c.key] != null) ? S.notesDraft[c.key] : notes;
        const notesHtml = c._canEdit
          ? '<div class="story"><textarea id="pm-notes" class="notes-edit" placeholder="Write notes\u2026">' + esc(draft) + '</textarea>'
            + '<div class="notes-bar"><span id="pm-notes-status" class="notes-status"></span>'
            + '<button id="pm-notes-save" class="notes-save" disabled>SAVE</button></div></div>'
          : '<div class="story"><div class="seg"><div class="txt ' + (notes ? '' : 'muted') + '">' + (notes ? esc(notes) : '\u2014 no notes yet \u2014') + '</div></div></div>';
        return head('STORY') +
          '<div class="story-toggle"><button data-tab="bio" class="' + (tab === 'bio' ? 'on' : '') + '">BACKGROUND</button><button data-tab="notes" class="' + (tab === 'notes' ? 'on' : '') + '">NOTES</button></div>'
          + (tab === 'bio' ? bioHtml : notesHtml);
      },
    };

    const WIRE = {
      stats(w, c) {
        const ab = c.structural.abilities || {}, sk = c.structural.skills || [], sv = c.structural.saves || {};
        w.querySelectorAll('.ab').forEach(el => el.addEventListener('click', () => {
          selOne(w, el); const k = el.dataset.ab, a = ab[k] || {}, save = sv[k] || {};
          const linked = sk.filter(s => (s.attr || '').toLowerCase() === k).map(s => s.name).join(', ');
          setDetail('<div class="d-head"><span class="d-name">' + k.toUpperCase() + '</span><span class="d-type">SCORE ' + (a.score != null ? a.score : '\u2014') + ' \u00B7 MOD ' + (a.mod != null ? sgn(a.mod) : '\u2014') + '</span>' + (save.proficient ? '<span class="d-tag">SAVE PROF</span>' : '') + '</div>'
            + '<div class="d-body">Saving throw ' + (save.bonus != null ? sgn(save.bonus) : sgn(a.mod || 0)) + '.' + (linked ? ' Skills: ' + esc(linked) + '.' : '') + '</div>');
        }));
      },
      skills(w, c) {
        const sk = c.structural.skills || [];
        w.querySelectorAll('.lrow').forEach(el => el.addEventListener('click', () => {
          selOne(w, el); const row = sk[+el.dataset.sk] || {};
          const desc = SKILL_DESC[row.name] || '';
          setDetail('<div class="d-head"><span class="d-name">' + esc(row.name) + '</span><span class="d-type">' + esc((row.attr || '').toUpperCase()) + ' \u00B7 ' + sgn(row.bonus || 0) + '</span></div>'
            + '<div class="d-body">' + esc(desc) + '</div>');
        }));
      },
      features(w, c) {
        const fs = c.structural.features || [];
        w.querySelectorAll('.lrow').forEach(el => el.addEventListener('click', () => {
          selOne(w, el); const f = fs[+el.dataset.ft] || {};
          setDetail('<div class="d-head"><span class="d-name">' + esc(f.name) + '</span><span class="d-type">' + esc(f.source || '') + '</span></div>'
            + '<div class="d-body">' + esc(f.desc || 'No description recorded.') + '</div>');
        }));
      },
      spells(w, c) {
        const sp = c.structural.spells || {};
        w.querySelectorAll('.lrow').forEach(el => el.addEventListener('click', () => {
          selOne(w, el); const parts = el.dataset.sp.split(':'); const s = (sp[parts[0]] || [])[+parts[1]] || {};
          const meta = [parts[0] === 'cantrip' ? 'Cantrip' : 'Level ' + parts[0], s.castingTime, s.range, s.duration].filter(Boolean).join(' \u00B7 ');
          setDetail('<div class="d-head"><span class="d-name">' + esc(s.name) + '</span><span class="d-type">' + esc(meta) + '</span></div>'
            + '<div class="d-body">Casting time ' + esc(s.castingTime || '\u2014') + ' \u00B7 range ' + esc(s.range || '\u2014') + ' \u00B7 duration ' + esc(s.duration || '\u2014') + '.</div>');
        }));
      },
      gear(w, c) {
        const inv = c.inventory || [];
        w.querySelectorAll('.citem').forEach(el => el.addEventListener('click', () => {
          selOne(w, el); const it = inv[+el.dataset.it] || {};
          const bits = [it.detail, it.properties && 'Properties: ' + it.properties, it.weight != null && it.weight + ' lb', it.price].filter(Boolean).join(' \u00B7 ');
          const entries = Array.isArray(it.entries) && it.entries.length ? it.entries.filter(e => typeof e === 'string').join(' ') : '';
          setDetail('<div class="d-head"><span class="d-name">' + esc(it.name) + '</span><span class="d-type">' + esc(it.typeLabel || it.rarity || '') + '</span>' + (it.reqAttune ? '<span class="d-tag">ATTUNEMENT</span>' : '') + '</div>'
            + '<div class="d-body">' + esc(bits) + (entries ? '<br>' + esc(entries).slice(0, 400) : '') + '</div>');
        }));
      },
      story(w, c) {
        w.querySelectorAll('.story-toggle button').forEach(b => b.addEventListener('click', () => {
          S.storyTab = b.dataset.tab; paintSection();
        }));
        const ta = w.querySelector('#pm-notes');
        if (!ta) return; // read-only viewer (not editable) or on the BACKGROUND tab
        const btn = w.querySelector('#pm-notes-save');
        const status = w.querySelector('#pm-notes-status');
        let baseline = c.notes || '';
        const setDirty = () => {
          const dirty = ta.value !== baseline;
          btn.disabled = !dirty;
          S.notesDraft = S.notesDraft || {};
          if (dirty) S.notesDraft[c.key] = ta.value; else delete S.notesDraft[c.key];
          if (status.dataset.state !== 'saving') {
            status.textContent = dirty ? 'Unsaved changes' : '';
            status.className = 'notes-status';
          }
        };
        setDirty(); // honour a draft restored after a tab switch
        ta.addEventListener('input', setDirty);
        const doSave = async () => {
          if (btn.disabled) return;
          const val = ta.value;
          btn.disabled = true;
          status.dataset.state = 'saving';
          status.textContent = 'Saving\u2026'; status.className = 'notes-status';
          try {
            const updated = await window.CharacterData.save(c.key, { notes: val });
            baseline = updated.notes; c.notes = updated.notes; c.updatedAt = updated.updatedAt;
            if (S.notesDraft) delete S.notesDraft[c.key];
            status.dataset.state = ''; status.textContent = 'Saved'; status.className = 'notes-status ok';
          } catch (err) {
            status.dataset.state = '';
            status.textContent = (err && err.message) ? err.message : 'Save failed';
            status.className = 'notes-status err';
            btn.disabled = false; // allow retry
          }
        };
        btn.addEventListener('click', doSave);
        ta.addEventListener('keydown', e => {
          if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); doSave(); }
        });
      },
    };

    document.addEventListener('keydown', e => {
      if (e.target.matches('input,textarea')) return;
      const onSheet = $('#pm-sheet').classList.contains('on');
      const onParty = $('#pm-party').classList.contains('on');
      if (!onSheet && !onParty) return;
      if (onParty) {
        if (e.key === 'ArrowLeft')  { S.pi = (S.pi + S.party.length - 1) % S.party.length; paintParty(); e.preventDefault(); }
        if (e.key === 'ArrowRight') { S.pi = (S.pi + 1) % S.party.length; paintParty(); e.preventDefault(); }
        if (e.key === 'Enter') openSheet(S.pi);
      } else {
        const k = e.key;
        // character switch is deliberate now — bracket keys, never the arrows
        if (k === '[') { gotoChar(S.pi - 1); e.preventDefault(); return; }
        if (k === ']') { gotoChar(S.pi + 1); e.preventDefault(); return; }
        if (S.focus === 'content') {
          if (k === 'ArrowUp')         { focusRow(S.ci - 1); e.preventDefault(); }
          else if (k === 'ArrowDown')  { focusRow(S.ci + 1); e.preventDefault(); }
          else if (k === 'ArrowRight') { e.preventDefault(); /* reserved: drill deeper (GEAR) */ }
          else if (k === 'ArrowLeft' || k === 'Escape' || k === 'Backspace') { exitContent(); e.preventDefault(); }
          return;
        }
        // rail focus
        if (k === 'ArrowUp')         { S.focus = 'rail'; S.ci = 0; S.si = (S.si + SECTIONS.length - 1) % SECTIONS.length; paintSection(); e.preventDefault(); }
        else if (k === 'ArrowDown')  { S.focus = 'rail'; S.ci = 0; S.si = (S.si + 1) % SECTIONS.length; paintSection(); e.preventDefault(); }
        else if (k === 'ArrowRight') { enterContent(); e.preventDefault(); }
        else if (k === 'Escape' || k === 'Backspace') { closeSheet(); e.preventDefault(); }
        // ArrowLeft on the rail: intentionally nothing (was the character-switch trap)
      }
    });

    function setNavOffset() {
      const nav = document.getElementById('site-nav');
      const h = nav ? nav.getBoundingClientRect().height : 0;
      const pm = document.getElementById('pm');
      if (pm) pm.style.setProperty('--pm-top', (h > 0 && h < 120 ? h : 52) + 'px');
    }
    window.addEventListener('nav:ready', setNavOffset);
    window.addEventListener('resize', setNavOffset);

    // ── Vitals write-back: hand battle.js a characters.vitals backend ──
    // Same seam combat.html uses (window.__battle.useBackend) — battle.js is
    // backend-agnostic. combat.html points it at the `combatants` row; here we
    // point it at the durable `characters.vitals` column (via CharacterData), so
    // HP / temp / resources / concentration edited in the cross-page Battle HUD
    // (opened from nav's \u2694 button) persist to the same record the sheet reads.
    // characters.vitals is already the {hp,hpTemp,hpBonus,pipState,concentration}
    // shape battle.js's combat object expects, so it maps 1:1.
    function wireVitals() {
      const sb = window.__tok && window.__tok.sb;
      if (!sb || !window.__battle || !window.__battle.useBackend) return;
      let ch = null;

      // Keep the sheet's read-only HP display in step with HUD/realtime edits.
      const refreshSheetVitals = (key, vitals) => {
        const m = S.party.find(p => p.key === key);
        if (!m) return;
        m.vitals = vitals;
        paintParty(); // portrait-wall HP bars (no text inputs to disturb)
        const open = S.party[S.pi] && S.party[S.pi].key === key;
        if (open && SECTIONS[S.si].id === 'stats') paintSection();
      };

      window.__battle.useBackend({
        // durable vitals object for `key` (already in combat shape), or null
        async load(key) {
          try { const c = await window.CharacterData.loadCharacter(key); return (c && c.vitals) ? c.vitals : null; }
          catch (e) { console.warn('[party/vitals] load:', e); return null; }
        },
        // persist the whole combat/vitals object to the characters.vitals column
        async save(key, combat) {
          try {
            await window.CharacterData.save(key, { vitals: combat });
            refreshSheetVitals(key, combat); // reflect our own edit now (no realtime round-trip)
          } catch (e) { console.warn('[party/vitals] save:', e); }
        },
        // live external changes: characters UPDATE \u2192 battle HUD + sheet display
        subscribe(onChange) {
          if (ch) { sb.removeChannel(ch); ch = null; }
          ch = sb.channel('party-vitals')
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'characters' },
              ({ new: row }) => {
                if (!row || !row.key) return;
                let v = row.vitals;
                if (typeof v === 'string') { try { v = JSON.parse(v); } catch (_) { return; } }
                // TOAST guard: only adopt a real vitals object (Postgres can omit
                // unchanged large jsonb from the realtime payload).
                if (!v || typeof v !== 'object' || Array.isArray(v)) return;
                onChange({ key: row.key, combat: v }); // \u2192 battle.js SESSION + HUD
                refreshSheetVitals(row.key, v);        // \u2192 sheet display
              })
            .subscribe();
        },
      });
    }

    async function boot() {
      setNavOffset();
      try {
        const party = await window.CharacterData.loadParty();
        if (!party || !party.length) { $('#pm-status').innerHTML = '<div class="big">No characters found</div>'; return; }
        // Resolve edit rights once (canEdit awaits the profile); only 4 chars.
        await Promise.all(party.map(async c => {
          try { c._canEdit = await window.CharacterData.canEdit(c.key); }
          catch (e) { c._canEdit = false; }
        }));
        S.party = party;
        $('#pm-status').style.display = 'none';
        renderParty();
        wireVitals(); // route battle.js HP/vitals through characters.vitals
      } catch (err) {
        $('#pm-status').innerHTML = '<div class="big">Could not load the party</div><div>' + esc(err && err.message ? err.message : err) + '</div>';
      }
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
    else boot();
  })();
  </script>
</body>
</html>
