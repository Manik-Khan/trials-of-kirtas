  content: &quot;&quot;;
  transform: translate(2px, -50%);
  transition: transform 200ms cubic-bezier(0, 0, 0.2, 1);
}

.form-switch .form-check-input:checked {
  background: var(--primary);
}

.form-switch .form-check-input:checked::before {
  transform: translate(14px, -50%);
}

.form-switch .form-check-input:focus-visible {
  box-shadow: 0 0 0 2px var(--ring);
}

.form-range {
  appearance: none;
  display: block;
  width: 100%;
  height: 28px;
  flex: 1;
  margin: 0;
  padding: 0;
  outline: none;
  border: 0;
  accent-color: var(--primary);
  background: linear-gradient(
      color-mix(in srgb, var(--foreground) 7%, transparent),
      color-mix(in srgb, var(--foreground) 7%, transparent)
    )
    center / 100% 2px no-repeat;
}

.form-range::-webkit-slider-runnable-track {
  height: 28px;
  background: transparent;
}

.form-range::-webkit-slider-thumb {
  appearance: none;
  width: 20px;
  height: 20px;
  margin-top: 4px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-webkit-slider-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(
    [aria-pressed=&quot;true&quot;],
    [aria-selected=&quot;true&quot;],
    .is-selected
  ) {
  border-color: var(--primary);
  color: var(--primary-foreground);
  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {
  color: var(--destructive);
}

  &lt;script&gt;
    (function(){

      var monsters={

        hobgoblin:{name:&quot;Hobgoblin&quot;,cr:&quot;1/2&quot;,xp:100,related:[&quot;goblin&quot;,&quot;bugbear&quot;,&quot;worg&quot;]},
        bugbear:{name:&quot;Bugbear&quot;,cr:&quot;1&quot;,xp:200,related:[&quot;goblin&quot;,&quot;hobgoblin&quot;,&quot;worg&quot;]},
        worg:{name:&quot;Worg&quot;,cr:&quot;1/2&quot;,xp:100,related:[&quot;goblin&quot;,&quot;hobgoblin&quot;,&quot;bugbear&quot;]},

        {id:&quot;liadan&quot;,name:&quot;Líadan&quot;,level:4,active:true},
        {id:&quot;vesperian&quot;,name:&quot;Vesperian&quot;,level:4,active:true},
        {id:&quot;chonkalius&quot;,name:&quot;Chonkalius&quot;,level:4,active:false,disabled:true}

      var enemies={},target=&quot;medium&quot;,suggestMode=&quot;related&quot;,liveOpen=false,onBoardParty={},onBoardEnemies={},placementMode=null,groupSerial=2,explicitUnassigned={};
      var groups=[
        {id:&quot;party-main&quot;,label:&quot;Main Party&quot;,role:&quot;party&quot;,controller:&quot;unit-owners&quot;,unitIds:[&quot;caim&quot;,&quot;cosmere&quot;,&quot;liadan&quot;,&quot;vesperian&quot;],anchor:null,seed:21,manual:{},automated:false,trigger:&quot;Door opens&quot;,action:&quot;Reveal creatures and prompt initiative&quot;},
        {id:&quot;enemy-main&quot;,label:&quot;Enemies&quot;,role:&quot;enemy&quot;,controller:&quot;overseer&quot;,unitIds:[],anchor:null,seed:13,manual:{},automated:false,trigger:&quot;Door opens&quot;,action:&quot;Reveal creatures and prompt initiative&quot;}
      ];
      function showStep(step){
        root.querySelectorAll(&quot;[data-step]&quot;).forEach(function(button){button.setAttribute(&quot;aria-selected&quot;,String(button.dataset.step===step));});
        root.querySelectorAll(&quot;[data-panel]&quot;).forEach(function(panel){panel.hidden=panel.dataset.panel!==step;});
      }
      function activeParty(){return party.filter(function(row){return row.active&amp;&amp;!row.disabled;});}
      function thresholds(){
        var out={easy:0,medium:0,hard:0,deadly:0};
        activeParty().forEach(function(row){var values=row.level===3?[75,150,225,400]:[125,250,375,500];out.easy+=values[0];out.medium+=values[1];out.hard+=values[2];out.deadly+=values[3];});
        return out;
      }
      function enemyCount(){return Object.keys(enemies).reduce(function(total,key){return total+enemies[key];},0);}
      function adjustedFor(roster){
        var keys=Object.keys(roster),raw=keys.reduce(function(total,key){return total+monsters[key].xp*roster[key];},0),count=keys.reduce(function(total,key){return total+roster[key];},0),mult=count&lt;=1?1:count===2?1.5:count&lt;=6?2:count&lt;=10?2.5:3;
        return Math.round(raw*mult);

      function adjustedXp(){return adjustedFor(enemies);}
      function difficulty(xp,t,count){

        if(xp&lt;t.easy)return &quot;Below easy&quot;;

      function targetBand(t){

      }
      function renderMap(){
        var grid=root.querySelector(&quot;#fw-map-grid&quot;),layout=root.querySelector(&quot;#fw-layout&quot;).value,terrain=root.querySelector(&quot;#fw-terrain&quot;).value,seed=Number(root.querySelector(&quot;#fw-seed&quot;).value)||7;
        grid.innerHTML=&quot;&quot;;
        for(var i=0;i&lt;126;i++){
          var cell=document.createElement(&quot;span&quot;),high=layout===&quot;temple&quot;?(i%14&gt;7&amp;&amp;Math.floor(i/14)&lt;6):(layout===&quot;courtyard&quot;?(i%14&lt;3||i%14&gt;10):((i+seed)%11&lt;3)),wall=layout===&quot;legacy&quot;?((i+seed)%17===0):layout===&quot;courtyard&quot;?(Math.floor(i/14)===1||Math.floor(i/14)===7):layout===&quot;bridge&quot;?(i%14===6||i%14===7):((i+seed)%29===0),water=terrain===&quot;swamp&quot;&amp;&amp;((i+seed)%13&lt;2);
          cell.className=&quot;fw-cell&quot;+(high?&quot; high&quot;:&quot;&quot;)+(wall?&quot; wall&quot;:&quot;&quot;)+(water?&quot; water&quot;:&quot;&quot;);grid.appendChild(cell);

        root.querySelector(&quot;#fw-map-note&quot;).textContent=layout===&quot;temple&quot;?&quot;0 / 5 / 10 / 15 ft · place flags anywhere the scene needs them&quot;:layout===&quot;bridge&quot;?&quot;Bridge objective · place flags on either approach or anywhere else&quot;:&quot;Generated tactical field · flags can be placed anywhere&quot;;

      }
      function markMapPending(){root.querySelector(&quot;#fw-map-status&quot;).textContent=&quot;Ready to generate&quot;;root.querySelector(&quot;#fw-map-help&quot;).textContent=&quot;The recipe changed. Generate map to apply it.&quot;;}
      function renderParty(){
        var host=root.querySelector(&quot;#fw-party&quot;);

        host.querySelectorAll(&quot;[data-party]&quot;).forEach(function(button){button.onclick=function(){var row=party.filter(function(item){return item.id===button.dataset.party;})[0];row.active=!row.active;renderParty();renderWallet();renderTableSummary();};});

      }
      function renderQuick(){
        var host=root.querySelector(&quot;#fw-quick&quot;),keys=[&quot;goblin&quot;,&quot;hobgoblin&quot;,&quot;bugbear&quot;,&quot;worg&quot;];
        host.innerHTML=keys.map(function(key){var row=monsters[key];return &#x27;&lt;button class=&quot;btn&quot; type=&quot;button&quot; data-quick=&quot;&#x27;+key+&#x27;&quot;&gt;★ &#x27;+row.name+&#x27; · CR &#x27;+row.cr+&#x27;&lt;/button&gt;&#x27;;}).join(&quot;&quot;);
        host.querySelectorAll(&quot;[data-quick]&quot;).forEach(function(button){button.onclick=function(){addEnemy(button.dataset.quick,1);};});

      function addEnemy(key,delta){enemies[key]=Math.max(0,(enemies[key]||0)+delta);if(!enemies[key])delete enemies[key];renderRoster();renderWallet();renderSuggestions();renderTableSummary();}
      function renderRoster(){
        var host=root.querySelector(&quot;#fw-roster&quot;),keys=Object.keys(enemies);
        if(!keys.length)host.innerHTML=&#x27;&lt;div class=&quot;fw-roster-empty&quot;&gt;No default enemy. Add a starred creature, use a suggestion, or browse the Bestiary.&lt;/div&gt;&#x27;;
        else host.innerHTML=keys.map(function(key){var row=monsters[key];return &#x27;&lt;div class=&quot;fw-roster-row&quot;&gt;&lt;div&gt;&lt;strong&gt;&#x27;+row.name+&#x27;&lt;/strong&gt;&lt;small&gt;CR &#x27;+row.cr+&#x27; · &#x27;+row.xp+&#x27; XP each&lt;/small&gt;&lt;/div&gt;&lt;div class=&quot;fw-roster-step&quot;&gt;&lt;button class=&quot;btn&quot; type=&quot;button&quot; data-minus=&quot;&#x27;+key+&#x27;&quot;&gt;−&lt;/button&gt;&lt;span&gt;× &#x27;+enemies[key]+&#x27;&lt;/span&gt;&lt;button class=&quot;btn&quot; type=&quot;button&quot; data-plus=&quot;&#x27;+key+&#x27;&quot;&gt;+&lt;/button&gt;&lt;/div&gt;&lt;span&gt;&#x27;+row.xp*enemies[key]+&#x27; XP&lt;/span&gt;&lt;/div&gt;&#x27;;}).join(&quot;&quot;);
        host.querySelectorAll(&quot;[data-minus]&quot;).forEach(function(button){button.onclick=function(){addEnemy(button.dataset.minus,-1);};});

      function renderWallet(){
        var t=thresholds(),xp=adjustedXp(),band=targetBand(t),label=difficulty(xp,t),ceiling=Math.max(1,t.deadly),range=band.max==null?band.min.toLocaleString()+&quot;+ XP&quot;:band.min.toLocaleString()+&quot;–&quot;+band.max.toLocaleString()+&quot; XP&quot;;
        root.querySelector(&quot;#fw-wallet-value&quot;).textContent=xp.toLocaleString()+&quot; XP · &quot;+target.charAt(0).toUpperCase()+target.slice(1)+&quot; &quot;+range;

      function renderSuggestions(){

        else if(suggestMode===&quot;related&quot;)keys=[&quot;goblin&quot;,&quot;hobgoblin&quot;,&quot;bugbear&quot;];

        partyHost.querySelectorAll(&quot;[data-live-party]&quot;).forEach(function(button){button.onclick=function(){setLiveParty(button.dataset.liveParty,!onBoardParty[button.dataset.liveParty]);};});
        monsterHost.querySelectorAll(&quot;[data-live-monster]&quot;).forEach(function(button){button.onclick=function(){setLiveEnemy(button.dataset.liveMonster,1);};});
        rosterHost.querySelectorAll(&quot;[data-live-remove-party]&quot;).forEach(function(button){button.onclick=function(){setLiveParty(button.dataset.liveRemoveParty,false);};});
        rosterHost.querySelectorAll(&quot;[data-live-remove-monster]&quot;).forEach(function(button){button.onclick=function(){setLiveEnemy(button.dataset.liveRemoveMonster,-1);};});
        var pcs=boardPartyRows().length,foes=boardEnemyCount(),xp=adjustedFor(onBoardEnemies),label=foes?difficulty(xp,boardThresholds(),foes):&quot;No active enemies&quot;;
        root.querySelector(&quot;#fw-live-count&quot;).textContent=(pcs+foes)+&quot; combatant&quot;+(pcs+foes===1?&quot;&quot;:&quot;s&quot;);
        root.querySelector(&quot;#fw-live-difficulty&quot;).textContent=foes?label+&quot; · &quot;+xp.toLocaleString()+&quot; adjusted XP&quot;:label;
      }
      function openTable(){
        if(!deploymentReady()){root.querySelector(&quot;#fw-placement-message&quot;).textContent=&quot;Place every active group flag before opening the Table.&quot;;return;}
        if(!liveOpen){
          activeParty().forEach(function(row){onBoardParty[row.id]=true;});
          onBoardEnemies=Object.assign({},enemies);
          liveOpen=true;

        root.querySelector(&quot;#fw-live&quot;).hidden=false;

      root.querySelectorAll(&quot;[data-step]&quot;).forEach(function(button){button.onclick=function(){showStep(button.dataset.step);};});
      root.querySelectorAll(&quot;[data-step-jump]&quot;).forEach(function(button){button.onclick=function(){showStep(button.dataset.stepJump);};});
      root.querySelector(&quot;#fw-layout&quot;).onchange=markMapPending;root.querySelector(&quot;#fw-terrain&quot;).onchange=markMapPending;root.querySelector(&quot;#fw-size&quot;).onchange=markMapPending;
      root.querySelector(&quot;#fw-seed&quot;).oninput=markMapPending;root.querySelector(&quot;#fw-seed&quot;).onkeydown=function(event){if(event.key===&quot;Enter&quot;)renderMap();};
      root.querySelector(&quot;#fw-random-seed&quot;).onclick=function(){root.querySelector(&quot;#fw-seed&quot;).value=String(1000+Math.floor(Math.random()*89000));renderMap();};
      root.querySelector(&quot;#fw-generate&quot;).onclick=renderMap;
      root.querySelector(&quot;#fw-to-encounter&quot;).onclick=function(){showStep(&quot;encounter&quot;);};
      root.querySelectorAll(&quot;[data-target]&quot;).forEach(function(button){button.onclick=function(){target=button.dataset.target;renderWallet();};});
      root.querySelector(&quot;#fw-build-target&quot;).onclick=buildTarget;
      root.querySelectorAll(&quot;[data-suggest]&quot;).forEach(function(button){button.onclick=function(){suggestMode=button.dataset.suggest;renderSuggestions();};});
      root.querySelector(&quot;#fw-bestiary&quot;).onclick=function(){root.querySelector(&quot;#fw-bestiary-status&quot;).textContent=&quot;The full Bestiary opens without replacing the current roster or budget target.&quot;;};
      root.querySelector(&quot;#fw-to-table&quot;).onclick=function(){showStep(&quot;table&quot;);renderTableSummary();};
      root.querySelector(&quot;#fw-add-group&quot;).onclick=function(){var id=&quot;group-&quot;+(++groupSerial);groups.push({id:id,label:&quot;New group&quot;,role:&quot;enemy&quot;,controller:&quot;overseer&quot;,unitIds:[],anchor:null,seed:groupSerial*11,manual:{},automated:false,trigger:&quot;Door opens&quot;,action:&quot;Reveal creatures and prompt initiative&quot;});renderDeployment();};

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;
