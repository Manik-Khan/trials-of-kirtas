  background: light-dark(var(--primary-foreground), var(--foreground));
  box-shadow: var(--shadow-sm);
  content: &quot;&quot;;
  transform: translate(2px, -50%);
  transition: transform 200ms cubic-bezier(0, 0, 0.2, 1);
}

.form-switch .form-check-input:checked {
  background: var(--primary);
}

.form-switch .form-check-input:checked::before {
  transform: translate(14px, -50%);
}

.form-switch .form-check-input:focus-visible {
  box-shadow: 0 0 0 2px var(--ring);
}

.form-range {
  appearance: none;
  display: block;
  width: 100%;
  height: 28px;
  flex: 1;
  margin: 0;
  padding: 0;
  outline: none;
  border: 0;
  accent-color: var(--primary);
  background: linear-gradient(
      color-mix(in srgb, var(--foreground) 7%, transparent),
      color-mix(in srgb, var(--foreground) 7%, transparent)
    )
    center / 100% 2px no-repeat;
}

.form-range::-webkit-slider-runnable-track {
  height: 28px;
  background: transparent;
}

.form-range::-webkit-slider-thumb {
  appearance: none;
  width: 20px;
  height: 20px;
  margin-top: 4px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-webkit-slider-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(
    [aria-pressed=&quot;true&quot;],
    [aria-selected=&quot;true&quot;],
    .is-selected
  ) {
  border-color: var(--primary);
  color: var(--primary-foreground);
  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {
  color: var(--destructive);
}

&lt;div id=&quot;forge-workshop-flow&quot;&gt;
  &lt;style&gt;
    #forge-workshop-flow{color:var(--foreground);background:var(--background);padding:16px}

    #forge-workshop-flow .wf-step-list{display:grid;gap:6px}

    #forge-workshop-flow .wf-step-index{display:grid;place-items:center;width:24px;height:24px;border-radius:50%;background:var(--muted);color:var(--muted-foreground)}
    #forge-workshop-flow .wf-step[aria-selected=&quot;true&quot;] .wf-step-index{background:var(--primary);color:var(--primary-foreground)}
    #forge-workshop-flow .wf-step-copy{display:grid;gap:1px;min-width:0}
    #forge-workshop-flow .wf-step-copy span{font-weight:500}
    #forge-workshop-flow .wf-step-copy small{color:var(--muted-foreground);white-space:normal}
    #forge-workshop-flow .wf-main{min-width:0}
    #forge-workshop-flow .wf-pane[hidden]{display:none}
    #forge-workshop-flow .wf-pane-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px}
    #forge-workshop-flow .wf-pane-head h2{margin:0}
    #forge-workshop-flow .wf-pane-head p{margin:4px 0 0;color:var(--muted-foreground)}
    #forge-workshop-flow .wf-two{display:grid;grid-template-columns:minmax(0,1.15fr) minmax(220px,.85fr);gap:14px;align-items:start}
    #forge-workshop-flow .wf-stack{display:grid;gap:12px}
    #forge-workshop-flow .wf-card-body{display:grid;gap:10px}
    #forge-workshop-flow .wf-card-title{display:flex;align-items:center;justify-content:space-between;gap:8px}
    #forge-workshop-flow .wf-card-title h3{margin:0}
    #forge-workshop-flow .wf-party{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px}
    #forge-workshop-flow .wf-person{padding:8px;background:var(--muted);color:var(--muted-foreground);text-align:center}
    #forge-workshop-flow .wf-person strong{display:block;color:var(--foreground);font-weight:500}
    #forge-workshop-flow .wf-roster{display:grid;gap:7px}
    #forge-workshop-flow .wf-roster-row{display:grid;grid-template-columns:minmax(0,1fr) auto auto;gap:8px;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)}
    #forge-workshop-flow .wf-roster-row:last-child{border-bottom:0}
    #forge-workshop-flow .wf-read{display:grid;gap:10px}
    #forge-workshop-flow .wf-read-verdict{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
    #forge-workshop-flow .wf-read-verdict strong{font-weight:500}
    #forge-workshop-flow .wf-facts{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
    #forge-workshop-flow .wf-fact{padding:8px;background:var(--muted);text-align:center}
    #forge-workshop-flow .wf-fact strong{display:block;font-weight:500}
    #forge-workshop-flow .wf-fact span{color:var(--muted-foreground)}
    #forge-workshop-flow .wf-note{padding:9px 10px;border-left:3px solid var(--viz-series-1);background:var(--muted);color:var(--muted-foreground)}
    #forge-workshop-flow .wf-fields{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    #forge-workshop-flow .wf-field{display:grid;gap:5px}
    #forge-workshop-flow .wf-map{min-height:260px;display:grid;place-items:center;background:var(--muted);position:relative;overflow:hidden}
    #forge-workshop-flow .wf-map-grid{width:min(92%,440px);aspect-ratio:16/9;display:grid;grid-template-columns:repeat(12,1fr);grid-template-rows:repeat(7,1fr);gap:1px;padding:8px;background:color-mix(in srgb,var(--foreground) 18%,transparent)}
    #forge-workshop-flow .wf-cell{background:color-mix(in srgb,var(--viz-series-2) 30%,var(--card))}
    #forge-workshop-flow .wf-cell.high{background:color-mix(in srgb,var(--viz-series-3) 38%,var(--card))}
    #forge-workshop-flow .wf-cell.wall{background:color-mix(in srgb,var(--foreground) 42%,var(--card))}
    #forge-workshop-flow .wf-token{align-self:center;justify-self:center;z-index:2;width:18px;height:18px;border-radius:50%;display:grid;place-items:center;background:var(--viz-series-1);color:var(--background);font-weight:500}
    #forge-workshop-flow .wf-token.foe{background:var(--viz-series-4)}
    #forge-workshop-flow .wf-map-label{position:absolute;left:10px;top:10px;padding:5px 7px;background:var(--card);color:var(--card-foreground)}
    #forge-workshop-flow .wf-actions{display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap}
    #forge-workshop-flow .wf-locked{display:grid;gap:10px;min-height:230px;place-content:center;text-align:center}
    #forge-workshop-flow .wf-locked i{margin:auto;width:32px;height:32px;color:var(--muted-foreground)}
    #forge-workshop-flow .wf-groups{display:grid;gap:8px}
    #forge-workshop-flow .wf-group{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)}
    #forge-workshop-flow .wf-group:last-child{border-bottom:0}
    #forge-workshop-flow .wf-advanced-list{display:grid;gap:2px}
    #forge-workshop-flow details{border-bottom:1px solid var(--border);padding:9px 0}
    #forge-workshop-flow summary{cursor:pointer;font-weight:500}
    #forge-workshop-flow details p{color:var(--muted-foreground);margin:7px 0 0}
    @media(max-width:700px){
      #forge-workshop-flow{padding:10px}
      #forge-workshop-flow .wf-shell{grid-template-columns:1fr}
      #forge-workshop-flow .wf-step-list{grid-template-columns:repeat(2,minmax(0,1fr))}
      #forge-workshop-flow .wf-two{grid-template-columns:1fr}
    }
    @media(max-width:430px){

      #forge-workshop-flow .wf-party{grid-template-columns:repeat(2,minmax(0,1fr))}
      #forge-workshop-flow .wf-summary{align-items:flex-start;flex-direction:column}
    }

  &lt;script&gt;
    (function(){

        [[64,&quot;C&quot;,false],[66,&quot;V&quot;,false],[70,&quot;G&quot;,true],[72,&quot;G&quot;,true]].forEach(function(token){var el=document.createElement(&quot;span&quot;);el.className=&quot;wf-token&quot;+(token[2]?&quot; foe&quot;:&quot;&quot;);el.textContent=token[1];el.style.gridColumn=String(token[0]%12+1);el.style.gridRow=String(Math.floor(token[0]/12)+1);mapGrid.appendChild(el);});
        root.querySelector(&quot;#wf-preview-label&quot;).textContent=mapLabel(currentMap)+&quot; · seed &quot;+root.querySelector(&quot;#wf-seed&quot;).value;
        root.querySelector(&quot;#wf-map-name&quot;).textContent=mapLabel(currentMap);
        root.querySelector(&quot;#wf-deploy-state&quot;).textContent=regionsReady()?&quot;Ready to place&quot;:&quot;Unavailable&quot;;

      root.querySelectorAll(&quot;[data-pane]&quot;).forEach(function(button){button.addEventListener(&quot;click&quot;,function(){showPane(button.dataset.pane);});});

      root.querySelector(&quot;#wf-randomize&quot;).addEventListener(&quot;click&quot;,function(){root.querySelector(&quot;#wf-seed&quot;).value=String(1000+Math.floor(Math.random()*89000));root.querySelector(&quot;#wf-map-state&quot;).textContent=&quot;Changes pending&quot;;root.querySelector(&quot;#wf-generation-note&quot;).textContent=&quot;A new seed is selected. The current map remains unchanged until you generate it.&quot;;});
      root.querySelector(&quot;#wf-choose-temple&quot;).addEventListener(&quot;click&quot;,function(){root.querySelector(&quot;#wf-archetype&quot;).value=&quot;temple&quot;;pendingMap=&quot;temple&quot;;root.querySelector(&quot;#wf-map-state&quot;).textContent=&quot;Changes pending&quot;;root.querySelector(&quot;#wf-generation-note&quot;).textContent=&quot;Temple terraces is selected. Generate it to unlock region deployment; the encounter will be preserved.&quot;;showPane(&quot;battlefield&quot;);});

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;
