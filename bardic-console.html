<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Bardic Console · Trials of Kirtas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="bardic.css">
</head>
<body>
  <div id="nav-root"></div>
  <div id="app-root"></div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Audio engine + static data + message bus (plain JS, no JSX) -->
  <script src="bardic-audio.js"></script>
  <script src="bardic-data.js"></script>
  <script src="bardic-bus.js"></script>
  <script src="bardic-radio.js?v=clk2"></script>
  <script src="bardic-echo.js?v=E5"></script>

  <!-- React components — load order matters:
       tweaks-panel first (exports useTweaks, TweaksPanel, etc.)
       then components (uses MoodPad etc.)
       then app (uses everything) -->
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="bardic-components.jsx"></script>
  <script type="text/babel" src="bardic-app.jsx"></script>

  <!-- Site nav — loads after app so #nav-root placeholder is in DOM -->
  <script src="nav.js?v=um1"></script>
</body>
</html>
